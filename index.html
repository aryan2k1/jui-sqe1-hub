undaries, rights, condition, utilities, fire safety, planning/building regs, environmental issues, occupiers/employees, insurance and disputes, with supplemental forms for tenanted property or lease grants/assignments.","tags":["property_practice","ch5","5.7.2 Commercial Equivalent — CPSE"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch6","title":"6 . Planning and Building Regulations","subchapters":[{"title":"6.1 – 6.2 The Town and Country Planning Act 1990","cards":[{"id":"PP_0050","type":"D","question":"Does obtaining planning permission override a restrictive covenant in the title prohibiting the same work?","answer":"No — planning compliance and title clearance (e.g. freedom from a restrictive covenant) are entirely independent requirements; both must be cleared separately.","tags":["property_practice","ch6","6.1 – 6.2 The Town and Country Planning Act 1990"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0051","type":"A","question":"What is a 'material change of use' under the Town and Country Planning Act 1990?","answer":"A broadly interpreted concept covering changes such as converting one house into two, or a house into a shop and flat — one of the two categories of 'development' requiring planning permission, alongside building/engineering/mining operations.","tags":["property_practice","ch6","6.1 – 6.2 The Town and Country Planning Act 1990"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"6.2.1 Deemed vs Express Permission","cards":[{"id":"PP_0052","type":"A","question":"What is an Article 4 Direction?","answer":"A local authority mechanism disapplying permitted development rights in a specified area (e.g. a conservation area), forcing an express planning application even for minor works that would otherwise be deemed permitted development.","tags":["property_practice","ch6","6.2.1 Deemed vs Express Permission"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0053","type":"A","question":"Within what period must a full application on reserved matters be made after outline planning permission is granted?","answer":"3 years; work must then start within 2 years of reserved-matters approval in England (or within 5 years of outline permission/2 years of final reserved-matter approval, whichever is later, in Wales).","tags":["property_practice","ch6","6.2.1 Deemed vs Express Permission"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"6.2.2 Enforcement","cards":[{"id":"PP_0054","type":"D","question":"What is the post-April-2024 enforcement time limit in England for unauthorised building work, change of use, or breach of condition, and how does this differ from Wales?","answer":"10 years from the breach in England since April 2024 (unifying what was previously a 4-year limit for single-dwelling change of use and 10 years for other breaches). Wales retains the pre-reform position: 4 years for single-dwelling change of use, 10 years for all other breaches — the unified 10-year rule does not apply UK-wide.","tags":["property_practice","ch6","6.2.2 Enforcement"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"6.3 Listed Buildings","cards":[{"id":"PP_0055","type":"E","question":"What is the enforcement time limit for breaches of listed building status, and who bears liability?","answer":"There is no time limit for enforcement of breaches of listed building status, and liability attaches to the current owner regardless of who carried out the unauthorised work.","tags":["property_practice","ch6","6.3 Listed Buildings"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0056","type":"A","question":"What additional consent does work to a listed building require, beyond ordinary planning permission, and what are the two grades?","answer":"Listed building consent. Grading: Grade I (exceptional interest) and Grade II (most listed buildings; 'more than special interest'); listing extends to structures within the building's curtilage (e.g. a garden outbuilding).","tags":["property_practice","ch6","6.3 Listed Buildings"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"6.4 Building Regulations","cards":[{"id":"PP_0057","type":"C","question":"Are building regulations the same as planning permission, and what is the current English enforcement time limit (since October 2023)?","answer":"No — they are separate regimes; work exempt from planning permission may still require building regulations compliance. Since October 2023, the England enforcement time limit is 10 years from completion of the breaching work (previously 12 months); Wales remains at 12 months.","tags":["property_practice","ch6","6.4 Building Regulations"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0058","type":"D","question":"Why should a buyer's solicitor avoid contacting the local authority about missing permissions or certificates before seeking indemnity insurance?","answer":"Doing so can disqualify the property from obtaining indemnity insurance cover for the defect — the solicitor must arrange insurance without alerting the authority.","tags":["property_practice","ch6","6.4 Building Regulations"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0062","type":"D","question":"What is the remedy for a building regulations breach within the enforcement period, versus a planning breach once the enforcement period has expired?","answer":"Within the period, a regularisation certificate (building regs) or retrospective planning permission (planning breach). Once the relevant period has lapsed, a certificate of lawfulness, or — more commonly, as quicker and cheaper — indemnity insurance is used instead; even after the limit expires, an injunction may still be available.","tags":["property_practice","ch6","6.4 Building Regulations"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"6.6 Use of the Property — Use Classes","cards":[{"id":"PP_0059","type":"E","question":"Does a change of use within the same Use Class (e.g. restaurant to shoe shop, both Class E) require planning permission?","answer":"No, unless associated building work is involved; a change between different Use Classes generally does require permission, subject to limited permitted-development exceptions, while changes to/from drinking establishments, hot food takeaways, cinemas, and concert/dance/bingo halls always require permission.","tags":["property_practice","ch6","6.6 Use of the Property — Use Classes"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0060","type":"A","question":"What Use Class covers most shops, offices, and food/drink premises?","answer":"Class E (commercial/business/service), covering shops, financial/professional services, food and drink, offices, R&D, light industrial, and health/medical/gyms.","tags":["property_practice","ch6","6.6 Use of the Property — Use Classes"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0061","type":"E","question":"What three things can disapply permitted-development rights for a Use Class change?","answer":"The property being in a conservation area, being a listed building, or being subject to an Article 4 Direction.","tags":["property_practice","ch6","6.6 Use of the Property — Use Classes"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch7","title":"7 . Funding the Purchase","subchapters":[{"title":"7.1 Cash Purchase","cards":[{"id":"PP_0063","type":"C","question":"What two money-laundering checks must be done for a cash buyer, and which is harder to satisfy?","answer":"Source of funds (establishing the money's current location, e.g. held in a UK-based bank account in the client's name for the last three to six months) and source of wealth (establishing where the money originally came from, e.g. inheritance, job bonus, or sale of other assets, via documentary evidence). Source of wealth is generally the harder check to satisfy, as it requires proof of provenance rather than merely current location.","tags":["property_practice","ch7","7.1 Cash Purchase"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"7.2.1 What Is a Mortgage?","cards":[{"id":"PP_0064","type":"A","question":"Define mortgagor and mortgagee, and state the general mortgage term.","answer":"Mortgagor is the borrower who grants the mortgage; mortgagee is the lender who receives its benefit. The term is generally 25 years, though it may be longer or shorter; on default the mortgagee can take possession and sell the property, or lease it to raise funds.","tags":["property_practice","ch7","7.2.1 What Is a Mortgage?"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"7.2.2 Types of Mortgage","cards":[{"id":"PP_0065","type":"C","question":"Distinguish repayment, interest-only, endowment, pension, and Sharia-compliant mortgages.","answer":"Repayment: borrower repays capital and interest together throughout the term. Interest-only: borrower repays only interest during the term, then repays the capital sum at the end, requiring a separate investment plan. Endowment: combined with a life insurance policy intended to mature with enough funds to repay the capital — now rarely used as many such policies underperformed. Pension mortgage: similar to endowment but linked to a personal pension policy, suiting the self-employed. Sharia-compliant: specialist products avoiding interest, for clients with religious objections to conventional interest-bearing loans.","tags":["property_practice","ch7","7.2.2 Types of Mortgage"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"7.2.3 Generic Advice Only","cards":[{"id":"PP_0066","type":"D","question":"Can a solicitor advise a client on whether a particular mortgage offer is 'a good deal'?","answer":"No — the solicitor may explain only the generic terms (type of mortgage, amount borrowed, interest rate, conditions); specific advice on suitability must come from an Independent Financial Adviser, and the solicitor should decline and refer the client on.","tags":["property_practice","ch7","7.2.3 Generic Advice Only"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"7.2.4 The Mortgage Offer and the Handbook","cards":[{"id":"PP_0067","type":"A","question":"What governs most institutional mortgage offers in England and Wales, and what fraud-prevention checks does it require of the buyer's solicitor?","answer":"The UK Finance Mortgage Lender's Handbook (prepared with the Law Society) or the Building Societies Association Mortgage Instructions. Required checks include: security documentation properly signed (best practice: solicitor witnesses signatures); the seller is legally represented and funds are sent to the seller's solicitor's account; valuation, length of seller's ownership, and price in the offer match the contract price; no discrepancy between the lender's valuation description and the title description; the lender is named as applicant in HMLR pre-completion searches; and searches are not more than six months old at completion (except HMLR priority searches).","tags":["property_practice","ch7","7.2.4 The Mortgage Offer and the Handbook"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0068","type":"D","question":"What happens if a solicitor releases the mortgage advance without holding sufficient funds for stamp duty, Land Registry fees, and perfecting the mortgage?","answer":"The solicitor personally accepts responsibility for paying those sums.","tags":["property_practice","ch7","7.2.4 The Mortgage Offer and the Handbook"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"7.2.5 The Mortgage Deed and Certificate of Title","cards":[{"id":"PP_0069","type":"A","question":"What two functions does a Certificate of Title (CoT) perform for a lender?","answer":"It confirms to the lender that title is good and marketable, and it acts as the actual request for release of the mortgage advance; any title issue must be reported to the lender before exchange and drawdown, as the lender is otherwise entitled to assume all is satisfactory.","tags":["property_practice","ch7","7.2.5 The Mortgage Deed and Certificate of Title"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0074","type":"A","question":"Must a legal mortgage be made by deed, and when must it be executed?","answer":"Yes, executed by the mortgagor, typically around the time the contract is signed or at exchange, and always before completion.","tags":["property_practice","ch7","7.2.5 The Mortgage Deed and Certificate of Title"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"7.2.6 Borrowing from a Private Source","cards":[{"id":"PP_0070","type":"D","question":"Why can't the buyer's solicitor act for both the buyer and a private individual lending the buyer some of the purchase price?","answer":"Because of the risk of a conflict of interest between the two clients — the buyer's solicitor should not act for both the buyer and the provider of private funds.","tags":["property_practice","ch7","7.2.6 Borrowing from a Private Source"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"7.2.7 Occupiers on Completion","cards":[{"id":"PP_0071","type":"A","question":"What must a non-owning occupier of the property sign for the lender, and why can the buyer's solicitor not act for them?","answer":"A waiver/consent form confirming they do not acquire rights in the property as against the lender; the buyer's solicitor should not act for the non-owning occupier due to a conflict-of-interest risk.","tags":["property_practice","ch7","7.2.7 Occupiers on Completion"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"7.3 Perfecting the Mortgage","cards":[{"id":"PP_0072","type":"A","question":"What does 'perfecting the mortgage' mean, and what registration deadline applies if the borrower is a company?","answer":"Registering the lender's charge at HMLR as a first legal charge in the Charges Register after completion. If the borrower is a company, the mortgage must also be registered at Companies House within 21 days of completion — a strict deadline; missing it requires a court application to register the charge late.","tags":["property_practice","ch7","7.3 Perfecting the Mortgage"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0073","type":"D","question":"Does mortgaging an already-owned unregistered property (with no accompanying purchase) trigger first registration?","answer":"Yes — granting a first legal mortgage is itself a trigger for compulsory first registration, even where the solicitor is only mortgaging (not also purchasing) the property.","tags":["property_practice","ch7","7.3 Perfecting the Mortgage"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch8","title":"8 . Exchange of Contracts (Stage 3)","subchapters":[{"title":"8.1 The Effect of Exchange","cards":[{"id":"PP_0075","type":"A","question":"What is the legal significance of exchange of contracts?","answer":"It is the point at which the transaction becomes legally binding on both seller and buyer; before exchange either party can withdraw without paying compensation to the other.","tags":["property_practice","ch8","8.1 The Effect of Exchange"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0076","type":"D","question":"Are oral terms agreed but not included in the written contract binding after exchange?","answer":"Generally no — only terms actually included in the contract bind on exchange; the aggrieved party may instead have a negligence claim against their own solicitor if they instructed the solicitor to include the term and the solicitor failed to do so.","tags":["property_practice","ch8","8.1 The Effect of Exchange"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"8.1.1 Synchronising Related Transactions","cards":[{"id":"PP_0077","type":"D","question":"What must a solicitor do when a client has a related sale and purchase, and what is the consequence of failing to do so?","answer":"Synchronise both transactions so they exchange on the same day and complete on the same day; failure to synchronise risks the client being left with two properties, or none, and exposes the solicitor to a negligence claim.","tags":["property_practice","ch8","8.1.1 Synchronising Related Transactions"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"8.1.2 Leasehold – Exchange for a New Lease","cards":[{"id":"PP_0083","type":"D","question":"What happens to the form of a new lease attached to the contract after exchange?","answer":"It cannot be changed except by mutual agreement, usually achieved by executing a new lease agreement — the buyer/tenant has agreed to take, and the landlord to grant, the lease in the form of the agreed draft attached to the contract.","tags":["property_practice","ch8","8.1.2 Leasehold – Exchange for a New Lease"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"8.2 Methods of Exchange","cards":[{"id":"PP_0078","type":"C","question":"Distinguish the three methods of exchanging contracts and identify which is most common.","answer":"In person: solicitors meet and agree face-to-face that exchange has happened — certain but rare in practice. By post: exchange takes place when the seller's solicitor's part is posted to the buyer's solicitor — never used in practice now, too uncertain. By telephone: solicitors speak, confirm the contracts match, and insert the completion and exchange dates — the most common method in practice.","tags":["property_practice","ch8","8.2 Methods of Exchange"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"8.3 The Law Society's Formulae for Exchange","cards":[{"id":"PP_0079","type":"C","question":"Distinguish Formula A, B and C for telephone exchange, and identify when each is used.","answer":"Formula A: one solicitor (usually the seller's) holds both signed parts of the contract and the buyer's deposit cheque in advance, confirms they match, inserts dates, and sends their client's signed part — rare, used where there is no chain and one solicitor needs certainty (e.g. will be out of office on the exchange day). Formula B: each solicitor holds only their own client's signed part; the buyer's solicitor holds cleared deposit funds — the most common, used where there is no chain, or at each end of a chain with no related onward transaction. Formula C: used in a chain, with deposit money sent directly to another firm further up the chain, relying heavily on undertakings — exchange happens via two phone calls, the first locking in readiness, the second confirming actual exchange.","tags":["property_practice","ch8","8.3 The Law Society's Formulae for Exchange"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0080","type":"A","question":"What should a memorandum of exchange record?","answer":"The solicitors' names; the date and time of exchange; the formula used (and any agreed variations); the completion date; the deposit amount paid; and, for Formula C, the firm the funds were sent to.","tags":["property_practice","ch8","8.3 The Law Society's Formulae for Exchange"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"8.4 Protection of the Contract by Registration","cards":[{"id":"PP_0081","type":"C","question":"How is an estate contract protected on registered land versus unregistered land pending completion, and when is this most likely to be tested?","answer":"Registered land: a unilateral notice entered on the seller's charges register. Unregistered land: a Class C(iv) land charge registered against the seller's full name. The notice/charge is removed on completion. This is most likely to be tested where the buyer is purchasing a new-build from a builder-developer, where there will be a long gap between exchange and completion.","tags":["property_practice","ch8","8.4 Protection of the Contract by Registration"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"8.5 Variation of Contract After Exchange","cards":[{"id":"PP_0082","type":"D","question":"Can a contract for the sale of land be varied by an exchange of emails after exchange of contracts?","answer":"No — any variation must either be by a fresh exchange of contracts incorporating the variation, or otherwise comply with s.2 Law of Property (Miscellaneous Provisions) Act 1989 (in writing and signed by the party or their authorised agent); a mere conversation, letter or exchange of emails is not sufficient.","tags":["property_practice","ch8","8.5 Variation of Contract After Exchange"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch9","title":"9 . Pre-Completion (Stage 4)","subchapters":[{"title":"9.1 The Seller's Solicitor's Tasks","cards":[{"id":"PP_0084","type":"A","question":"What is 'simultaneous exchange and completion'?","answer":"Where exchange and completion both happen on the same day, rather than the more typical one-to-two-week gap.","tags":["property_practice","ch9","9.1 The Seller's Solicitor's Tasks"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"9.1.1 Completion Statement","cards":[{"id":"PP_0085","type":"A","question":"What does the seller's completion statement show?","answer":"The net sale proceeds, after deducting mortgage redemption, estate agent fees, legal fees, and indemnity insurance premiums; if there is no related purchase the net proceeds are sent to the seller on completion, otherwise they are typically transferred to the purchase file ledger to fund the related purchase.","tags":["property_practice","ch9","9.1.1 Completion Statement"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"9.1.2 Completion Information and Undertakings","cards":[{"id":"PP_0086","type":"A","question":"What undertaking does the seller's solicitor give in the Completion Information and Undertakings form if the property is mortgaged?","answer":"An undertaking to redeem the mortgage(s) out of sale proceeds and to provide evidence of discharge once received.","tags":["property_practice","ch9","9.1.2 Completion Information and Undertakings"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"9.2.2 Pre-Completion Searches","cards":[{"id":"PP_0087","type":"C","question":"Distinguish pre-contract searches from pre-completion searches.","answer":"Pre-contract searches (e.g. the local search, drainage and water search) are run before exchange to inform the decision to proceed. Pre-completion searches are run after exchange to confirm nothing has changed since exchange and to protect the buyer/lender from undisclosed third-party rights; they are usually run soon after exchange because results come back almost immediately, and must be received and considered before completion.","tags":["property_practice","ch9","9.2.2 Pre-Completion Searches"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0088","type":"A","question":"What is the 'registration gap'?","answer":"The period between completion (the disposition) and registration at HMLR, during which the buyer/lessee/mortgagee holds only an equitable interest, protectable by registering a notice in the Charges Register.","tags":["property_practice","ch9","9.2.2 Pre-Completion Searches"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0089","type":"A","question":"What forms are used for an official search with priority against the whole versus part of a registered title, and what priority period do they confer?","answer":"OS1 for the whole of a registered title; OS2 for part (e.g. a new-build plot from a developer). Both confer a priority period of 30 working days from when the search was lodged.","tags":["property_practice","ch9","9.2.2 Pre-Completion Searches"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0090","type":"D","question":"What happens if completion and registration cannot occur within the registered-title priority period?","answer":"A new search must be made, giving a new (not extended) priority period; any entry applied for by someone else during the lapsed original period will, by then, already be on the register.","tags":["property_practice","ch9","9.2.2 Pre-Completion Searches"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0091","type":"C","question":"What priority period applies to an unregistered land charges search run before completion, and is a D(ii) restrictive covenant usually a surprise on it?","answer":"15 working days. A D(ii) restrictive covenant is unlikely to be a surprise, since registration is what gives notice of the covenant in the first place, and the buyer should already be aware of it from earlier investigation — by contrast a C(i) puisne mortgage appearing unexpectedly must be resolved by the seller's solicitor undertaking to remove it.","tags":["property_practice","ch9","9.2.2 Pre-Completion Searches"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0092","type":"D","question":"What is the consequence of an error appearing in an official search certificate?","answer":"The buyer is bound by the register as it stands, even if unaware of the error, though they may be able to claim an indemnity from HMLR.","tags":["property_practice","ch9","9.2.2 Pre-Completion Searches"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"9.2.3 Completion Statement and Buyer's Finance","cards":[{"id":"PP_0093","type":"A","question":"What does the SRA Accounts Rules requirement on 'cleared funds' mean for completion day?","answer":"Any funds due to the firm must have actually cleared (the bank transfer finalised) before being used on completion day.","tags":["property_practice","ch9","9.2.3 Completion Statement and Buyer's Finance"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"9.3 The Purchase Deed","cards":[{"id":"PP_0094","type":"C","question":"What is the difference between a TR1 and a TP1, and what must such a transfer deed state?","answer":"TR1 transfers the whole of the land in a title; TP1 transfers only part of the land in a title. A TR1/TP1 must state: the title number and property address, date of transfer, full names of transferor and transferee, consideration paid, title guarantee given, and (if more than one transferee) a declaration of trust; new easements/covenants (including any indemnity covenant) are also added.","tags":["property_practice","ch9","9.3 The Purchase Deed"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0095","type":"A","question":"What deed is used when personal representatives transfer land to a beneficiary, and what are its formality requirements?","answer":"An assent (typically form AS1); it must be in writing but need not be a deed unless it contains a covenant (e.g. an indemnity covenant). All proving personal representatives must be parties to it.","tags":["property_practice","ch9","9.3 The Purchase Deed"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0097","type":"D","question":"Who must sign the purchase deed, and by when?","answer":"All sellers must sign on or before the contractual completion date; the buyer must also sign if the transfer includes buyer covenants, or there is a declaration of co-ownership (more than one buyer).","tags":["property_practice","ch9","9.3 The Purchase Deed"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"9.3.1 Leasehold Comparison – Assignment of an Existing Lease","cards":[{"id":"PP_0096","type":"A","question":"What is a 'retention' in the context of a leasehold service charge apportionment on assignment?","answer":"The buyer's solicitor holding back part of the purchase money pending the final service charge account, where a shortfall attributable to the seller's period of ownership is anticipated — the Standard Conditions of Sale provide for apportionment based on best estimates at completion, with the buyer paying any shortfall attributable to the seller's period.","tags":["property_practice","ch9","9.3.1 Leasehold Comparison – Assignment of an Existing Lease"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch10","title":"10 . Completion (Stage 5)","subchapters":[{"title":"10.1 Timing of Completion","cards":[{"id":"PP_0100","type":"A","question":"What is the default time for completion under the Standard Conditions of Sale absent a special condition?","answer":"2pm — money due on completion must be received by the seller's solicitor by 2pm; if received later, completion is treated as occurring on the next working day, with consequences for interest under the contract.","tags":["property_practice","ch10","10.1 Timing of Completion"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"10.2 Methods of Completion","cards":[{"id":"PP_0101","type":"C","question":"Distinguish the three methods of completion, and identify which is most common.","answer":"(1) Personal attendance by the parties' solicitors; (2) completion by agent (one solicitor acts as the other's agent); (3) completion by post, which is by far the most common method in modern practice, governed by the Law Society's Code for Completion by Post.","tags":["property_practice","ch10","10.2 Methods of Completion"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"10.2.1 Law Society's Code for Completion by Post","cards":[{"id":"PP_0102","type":"A","question":"What must the seller's solicitor do under the Law Society's Code for Completion by Post once it is adopted?","answer":"Provide a warranty that they hold the documents required to complete and that they will complete on the agreed date; confirm mortgage redemption figures; arrange for payment to be made by bank transfer; and notify the buyer's solicitor by 4pm on the day before completion if they will be unable to comply with the Code, alongside meeting post-completion document deadlines.","tags":["property_practice","ch10","10.2.1 Law Society's Code for Completion by Post"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0103","type":"D","question":"Under the Code for Completion by Post, who bears the risk once funds have been sent to complete?","answer":"The Code allocates responsibility for the funds and documents during the post-completion window via the seller's solicitor's warranties, so a chain of transactions can complete reliably even though solicitors are not meeting in person; the buyer's solicitor relies on these warranties rather than attending in person.","tags":["property_practice","ch10","10.2.1 Law Society's Code for Completion by Post"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"10.3 Chains of Transactions","cards":[{"id":"PP_0104","type":"B","question":"In a chain of transactions (Alan sells to Abdul, who in turn sells to Vernon), why does the timing and method of completion matter?","answer":"Because each sale in the chain typically depends on funds received from the sale below it, the solicitors must coordinate so that money received from Vernon's purchase of Abdul's property is available in time to fund Abdul's purchase from Alan; a delay or failure at any link can cause a knock-on delay or failure throughout the chain.","tags":["property_practice","ch10","10.3 Chains of Transactions"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"10.4 Effects of Completion","cards":[{"id":"PP_0105","type":"C","question":"How does the passing of title on completion differ between registered and unregistered land?","answer":"For registered land, legal title does not pass to the buyer until the transfer is registered at HMLR (completion passes only the right to apply for registration); for unregistered land, legal title passes immediately on completion when the deed is executed and delivered, though first registration must still follow within the priority period.","tags":["property_practice","ch10","10.4 Effects of Completion"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0106","type":"D","question":"What happens to the contract on completion, and what is a non-merger clause?","answer":"On completion, the contract generally merges into the purchase deed, meaning most contractual terms are no longer separately enforceable once completion has occurred; a non-merger clause in the Standard Conditions of Sale preserves specified contractual obligations so they remain separately actionable after completion despite the general merger rule.","tags":["property_practice","ch10","10.4 Effects of Completion"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch11","title":"11 . Post-Completion (Stage 6)","subchapters":[{"title":"11.1 The Seller's Solicitor's Tasks","cards":[{"id":"PP_0107","type":"A","question":"What must the seller's solicitor do regarding the mortgage as part of post-completion tasks?","answer":"Transfer sufficient funds to redeem the mortgage per the redemption statement, then request evidence of discharge from the lender; for unregistered land the original mortgage deed is sent to the lender, who acknowledges receipt and returns it, and the seller's solicitor then sends it to the buyer's solicitor to satisfy the undertaking to redeem.","tags":["property_practice","ch11","11.1 The Seller's Solicitor's Tasks"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0108","type":"A","question":"List the seller's solicitor's post-completion tasks.","answer":"Report to the client (telephone followed by written confirmation, and remind the seller to cancel buildings insurance); discharge the mortgage (transfer redemption funds and obtain evidence of discharge); pay the estate agent (usually from net sale proceeds shown on the completion statement); and close the file once the legal fees bill is rendered and funds are in hand.","tags":["property_practice","ch11","11.1 The Seller's Solicitor's Tasks"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"11.2 The Buyer's Solicitor's Tasks","cards":[{"id":"PP_0109","type":"A","question":"List the buyer's solicitor's post-completion tasks and their deadlines.","answer":"Report to client (telephone followed by a written letter of completion); register any company charge at Companies House within 21 days if the buyer is a company; pay SDLT within 14 days of completion via the SDLT1 form; and register the transaction at HMLR within the 30-working-day priority period (registered land) or 2-month period (unregistered land, first registration), also applying for discharge of the seller's mortgage(s) if not already done.","tags":["property_practice","ch11","11.2 The Buyer's Solicitor's Tasks"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0110","type":"D","question":"What happens if a buyer who is a company misses the 21-day deadline to register a company charge at Companies House?","answer":"A court order is required to register the charge late — missing the strict 21-day deadline does not simply waive the requirement but imposes the burden of obtaining court permission for late registration.","tags":["property_practice","ch11","11.2 The Buyer's Solicitor's Tasks"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0111","type":"D","question":"Why must SDLT be paid before the buyer's solicitor applies to register title at HMLR, even though SDLT has its own separate 14-day deadline?","answer":"HMLR requires proof of SDLT payment as part of the registration application itself, so any SDLT due must be paid before the buyer's solicitor can register the title — the SDLT deadline cannot be treated as independent of the registration process; in practice the SDLT payment must come first within the 14-day window so registration is not held up.","tags":["property_practice","ch11","11.2 The Buyer's Solicitor's Tasks"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0112","type":"A","question":"What registration deadlines apply for registered versus unregistered land post-completion?","answer":"30 working days (the priority period, for registered land) or 2 months (for unregistered land undergoing first registration).","tags":["property_practice","ch11","11.2 The Buyer's Solicitor's Tasks"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0113","type":"D","question":"What happens to the old title deeds after a first registration of previously unregistered land?","answer":"They lose legal significance and become known as 'pre-registration deeds' once HMLR has completed the first registration and made official copies of the title register (and title plan, if changed or this is a first registration) available.","tags":["property_practice","ch11","11.2 The Buyer's Solicitor's Tasks"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"11.3.1 Grant of a New Lease","cards":[{"id":"PP_0114","type":"A","question":"Above what lease term must the buyer's solicitor apply to register a new lease at HMLR, creating a new title?","answer":"A lease term exceeding seven years — any new mortgage is registered at the same time, and the tenant's solicitor must serve notice of the mortgage on the landlord after completion.","tags":["property_practice","ch11","11.3.1 Grant of a New Lease"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"11.3.2 Assignment of an Existing Lease","cards":[{"id":"PP_0115","type":"A","question":"On assignment of an existing lease, what are the seller's and buyer's solicitors' respective post-completion tasks?","answer":"Seller's solicitor sends the buyer's solicitor the original lease, original share certificate (if any), and original licence to assign (if any), and prepares any final service charge adjustment if a retention was agreed; buyer's solicitor arranges payment of SDLT, serves notice on the landlord of the assignment (and of any new mortgage), and registers the transfer of the lease and any new mortgage at HMLR.","tags":["property_practice","ch11","11.3.2 Assignment of an Existing Lease"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"11.4 Freehold vs Leasehold – Transaction-Wide Comparison","cards":[{"id":"PP_0116","type":"C","question":"What additional steps does a leasehold transaction require compared to a freehold one, across the whole transaction from pre-contract to post-completion?","answer":"Leasehold adds: a leasehold PIF, copy of the lease and any head lease, insurance policy and service charge accounts at pre-contract; a company search if the landlord is a company; review of leasehold/landlord's title and covenant liability under the Landlord and Tenant (Covenants) Act 1995 at enquiries; consent to assignment and lease covenant review at contract stage; checking the lease term is long enough for the lender at mortgage stage; engrossment of a new lease at exchange; landlord's consent and detailed rent/service charge apportionments pre-completion; and notice of assignment/charge to the landlord plus stock transfer form for management company shares post-completion.","tags":["property_practice","ch11","11.4 Freehold vs Leasehold – Transaction-Wide Comparison"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch12","title":"12 . Stamp Duty Land Tax","subchapters":[{"title":"12.1 The Basic Obligation","cards":[{"id":"PP_0117","type":"A","question":"What is the basic SDLT filing obligation, and does it apply even where no tax is due?","answer":"A buyer or lessee must send HMRC an SDLT1 return within 14 calendar days of completion, whether or not any SDLT is actually due; if the consideration exceeds the applicable threshold, the SDLT due must also be paid within the same 14-day period.","tags":["property_practice","ch12","12.1 The Basic Obligation"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.1.1 What Counts as Consideration","cards":[{"id":"PP_0118","type":"A","question":"What can count as 'consideration' for SDLT purposes beyond the purchase price?","answer":"The value of work performed in exchange for the property, the value of other property exchanged, or the amount left owing on an assumed mortgage — SDLT is charged on money or money's worth, not solely the cash price.","tags":["property_practice","ch12","12.1.1 What Counts as Consideration"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.1.2 Property Transferred to a Company for Shares","cards":[{"id":"PP_0119","type":"E","question":"When is land transferred to a company for shares deemed to be made at market value for SDLT purposes?","answer":"Where land is transferred to a connected company in exchange for shares (e.g. on incorporating a sole trader's business), the transaction is deemed made at the market value of the land, and the company must file a return and pay SDLT if that market value exceeds the threshold.","tags":["property_practice","ch12","12.1.2 Property Transferred to a Company for Shares"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.1.3 Exempt Transactions (No Return Required)","cards":[{"id":"PP_0120","type":"E","question":"Name three categories of SDLT-exempt transactions requiring no return.","answer":"Property transferred as a gift, or for consideration under £40,000; property transferred to a former spouse/civil partner on divorce or dissolution; and property transferred under a will, or a deed of variation changing the beneficiary, within two years of the death.","tags":["property_practice","ch12","12.1.3 Exempt Transactions (No Return Required)"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.1.4 Late Penalties","cards":[{"id":"PP_0121","type":"D","question":"What penalties apply for late filing of the SDLT1 return, and do they depend on whether tax is owed?","answer":"£100 fixed penalty (automatic) if filed up to 3 months late; £200 fixed penalty (automatic) if filed over 3 months late; and an additional tax-geared penalty up to the amount of SDLT due if filed over 1 year late. The £100/£200 fixed penalty applies regardless of whether any SDLT was actually due, because it penalises late filing, not late payment; interest may separately be charged for late payment of any SDLT itself.","tags":["property_practice","ch12","12.1.4 Late Penalties"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.2 Thresholds and Rates","cards":[{"id":"PP_0122","type":"A","question":"Is SDLT a flat-rate tax or a tiered (slice) tax, and what does this mean in practice?","answer":"SDLT is a tiered (slice) tax — each band's rate applies only to the slice of the price falling within that band, not the whole price; for example a price of £280,000 is taxed as £125,000 at 0%, the next £125,000 at 2%, and the remaining £30,000 at 5%, giving total SDLT of £4,000.","tags":["property_practice","ch12","12.2 Thresholds and Rates"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0123","type":"D","question":"Can the value of a seller's old home be deducted from the SDLT calculation on their new purchase?","answer":"No — there is no deduction for the value of a property being sold; SDLT is based solely on the consideration for the property being bought, as illustrated by Xenia selling her home for £110,000 (no SDLT due, within the 0% band) and separately paying full SDLT on her £280,000 purchase.","tags":["property_practice","ch12","12.2 Thresholds and Rates"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.2.1 Additional Charge for Additional Residential Properties","cards":[{"id":"PP_0124","type":"A","question":"What additional rate is charged on the purchase of an additional residential property, and are there exceptions?","answer":"An additional 5% is charged in each band on top of the standard rates where a buyer already owns a residential property and buys another (e.g. to let out), or where a company buys a residential property; the higher rates do not apply to transactions under £40,000, and in some circumstances are charged but refunded if the new property becomes the buyer's only or main residence.","tags":["property_practice","ch12","12.2.1 Additional Charge for Additional Residential Properties"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.2.2 Leases","cards":[{"id":"PP_0125","type":"A","question":"On the grant of a new lease, what two elements may separately attract SDLT?","answer":"Any lease premium (any up-front payment), taxed at the standard rates, and separately the net present value of the rent payable over the lease term, taxed at its own published rates — each calculated separately.","tags":["property_practice","ch12","12.2.2 Leases"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.3.1 First-Time Buyer Relief","cards":[{"id":"PP_0126","type":"E","question":"What is first-time buyer relief, and what is the consequence of exceeding its consideration limit?","answer":"Available to an individual purchasing their first property as their main or only residence, for consideration up to £500,000: 0% on consideration up to £300,000, and 5% on any remainder up to £500,000. If consideration exceeds £500,000, no relief is given at all and the usual rates apply to the whole price — the relief is all-or-nothing on the threshold, not tapered.","tags":["property_practice","ch12","12.3.1 First-Time Buyer Relief"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0127","type":"B","question":"Lily buys Harold's house for £475,000. Calculate her SDLT if (1) she is a genuine first-time buyer, (2) she already owns a house she intends to keep, and (3) the property is non-residential.","answer":"(1) First-time buyer relief applies: (£300,000 × 0%) + (£175,000 × 5%) = £8,750. (2) The additional-property surcharge applies (standard band rate + 5% in each band): (£125,000 × 5%) + (£125,000 × 7%) + (£225,000 × 10%) = £37,500. (3) Standard non-residential bands apply: (£150,000 × 0%) + (£100,000 × 2%) + (£225,000 × 5%) = £13,250.","tags":["property_practice","ch12","12.3.1 First-Time Buyer Relief"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.3.2 Six or More Residential Properties","cards":[{"id":"PP_0128","type":"E","question":"What relief applies where six or more residential properties are bought in a single transaction?","answer":"The non-residential rates apply instead of the (higher) residential/additional-property rates.","tags":["property_practice","ch12","12.3.2 Six or More Residential Properties"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"12.4 Land Transaction Tax (Wales)","cards":[{"id":"PP_0129","type":"C","question":"Distinguish SDLT from Welsh Land Transaction Tax (LTT) in terms of threshold, first-time buyer relief, and filing deadline.","answer":"LTT applies in Wales instead of SDLT, with a threshold of £225,000 for both residential property (where no other property is owned) and non-residential property; unlike SDLT, there is no first-time buyer relief in Wales, though higher rates may apply to a second or subsequent residential property. The LTT return and payment must reach the Welsh Revenue Authority within 30 days of completion, compared to SDLT's 14-day deadline to HMRC — different regimes, different deadlines, different forms.","tags":["property_practice","ch12","12.4 Land Transaction Tax (Wales)"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch13","title":"13 . Delayed Completion and Remedies","subchapters":[{"title":"13.1.1 Is Time of the Essence?","cards":[{"id":"PP_0130","type":"A","question":"Is time generally of the essence in a residential conveyance on the Standard Conditions of Sale, and what is the consequence?","answer":"No, time is not of the essence unless made so by a special condition (rare in practice). Any delay to completion is still a breach of contract entitling the innocent party to damages caused by the delay, but the innocent party can only cancel the contract if time was of the essence.","tags":["property_practice","ch13","13.1.1 Is Time of the Essence?"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0131","type":"D","question":"If completion funds are received after 2pm under the Standard Conditions of Sale, when is completion treated as taking place, and what is the seller entitled to?","answer":"Completion is treated as taking place on the next working day, and the seller is entitled to interest at the contract rate on the outstanding balance for each day of delay, calculated on the purchase price less any deposit paid; if the buyer is a tenant on the property, the seller may instead elect to take rental income up to completion in lieu of compensation, by notifying the buyer before completion.","tags":["property_practice","ch13","13.1.1 Is Time of the Essence?"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"13.1.2 Notice to Complete – Making Time of the Essence","cards":[{"id":"PP_0132","type":"A","question":"What is a notice to complete, who may serve it, and what is its effect?","answer":"A notice to complete is served by a party who is themselves ready, able, and willing to complete, at any time after the completion date has passed, but only where completion has not yet taken place at all (not where completion already happened, merely late). Its effect is to make time of the essence, giving the defaulting party 10 working days from service (excluding the day of service) to complete; if the buyer paid only a reduced deposit, on receiving the notice they must top it up to the full 10%.","tags":["property_practice","ch13","13.1.2 Notice to Complete – Making Time of the Essence"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0133","type":"D","question":"A seller has an existing mortgage and wants to serve a notice to complete after the buyer misses the 2pm deadline. Can they do so even though they have their own mortgage outstanding?","answer":"Yes — they may still serve the notice because the incoming sale proceeds will be sufficient to redeem the mortgage, which renders the seller ready, willing, and able under the Standard Conditions despite the existing charge.","tags":["property_practice","ch13","13.1.2 Notice to Complete – Making Time of the Essence"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"13.1.3 Consequences of Non-Compliance with a Notice to Complete","cards":[{"id":"PP_0134","type":"D","question":"What remedies does an innocent party have if the other side fails to comply with a notice to complete?","answer":"If the buyer defaults: the seller may rescind the contract, retain the deposit, resell the property, and claim damages. If the seller defaults: the buyer may rescind the contract, reclaim the deposit with interest at the contract rate, and claim damages. The innocent party is also entitled to compensation for the defaulting party's delay under the relevant Standard Conditions provisions.","tags":["property_practice","ch13","13.1.3 Consequences of Non-Compliance with a Notice to Complete"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"13.2.1 Before Completion","cards":[{"id":"PP_0135","type":"A","question":"Why is specific performance commonly available as a remedy for breach of a land contract, and what limit applies to its use alongside other remedies?","answer":"Specific performance is an equitable, discretionary remedy compelling the defaulting party to complete, available because land is unique and damages may be an inadequate remedy. It can be sought together with rescission and damages claims, but the claimant must elect between them by the time of the hearing; it can also be sought in anticipation of an expected breach.","tags":["property_practice","ch13","13.2.1 Before Completion"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0136","type":"D","question":"How is a seller's damages claim against a defaulting buyer limited, and what should the seller's solicitor advise if resale achieves a higher price than the original contract?","answer":"The seller's damages are limited to the difference between the contract price and the resale value; if the resale price is in fact higher than the original contract price, the seller's solicitor should advise retaining the buyer's deposit only, without pursuing a separate damages claim, to avoid double recovery.","tags":["property_practice","ch13","13.2.1 Before Completion"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"13.2.2 Rescission","cards":[{"id":"PP_0137","type":"E","question":"What two circumstances permit rescission specifically under the Standard Conditions of Sale?","answer":"Where there has been a misrepresentation due to an error or omission; or where landlord's consent to an assignment is required and the licence to assign has not been obtained at least three working days before completion, or is obtained subject to a condition either party reasonably objects to.","tags":["property_practice","ch13","13.2.2 Rescission"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"13.2.3 Misrepresentation","cards":[{"id":"PP_0138","type":"C","question":"Distinguish fraudulent, negligent, and innocent misrepresentation by their available remedies.","answer":"Fraudulent misrepresentation (a statement made knowingly or recklessly as to truth, deliberate dishonesty, though fraud is hard to prove): damages and rescission. Negligent misrepresentation (a careless statement that turns out untrue): damages and/or rescission. Innocent misrepresentation (a genuine, innocently-made mistake): rescission, or damages in lieu of rescission, but not both.","tags":["property_practice","ch13","13.2.3 Misrepresentation"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"13.2.4 Misdescription","cards":[{"id":"PP_0139","type":"A","question":"What is a 'misdescription' and what remedy does a significant misdescription entitle the innocent party to?","answer":"A misdescription is an error in the contract's property particulars, e.g. describing leasehold land as freehold, or significantly overstating the property's size (e.g. by 40%). A significant misdescription entitles the innocent party to rescind and claim damages.","tags":["property_practice","ch13","13.2.4 Misdescription"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"13.2.5 After Completion","cards":[{"id":"PP_0140","type":"D","question":"Why are fewer remedies available after completion, and what are the primary post-completion claims?","answer":"Because most contract terms merge into the purchase deed on completion (subject to any non-merger clause) and are no longer separately actionable. It is mainly the buyer who pursues post-completion remedies, since the seller has already received the proceeds; the primary post-completion claims are for breach of title guarantee or misrepresentation.","tags":["property_practice","ch13","13.2.5 After Completion"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0141","type":"C","question":"Distinguish full title guarantee, limited title guarantee, and no title guarantee, and state the remedy for breach.","answer":"Full title guarantee is the most common guarantee given; limited title guarantee is typically given by personal representatives or trustees; no title guarantee means no guarantee is given at all. For leasehold sales, the seller additionally guarantees the lease is valid and subsisting and that there is no breach of covenant rendering it liable to forfeiture (commonly modified by the parties). The only remedy for breach of a title guarantee covenant is damages, though such claims are rare in practice.","tags":["property_practice","ch13","13.2.5 After Completion"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch14","title":"14 . Landlord and Tenant Act 1954 — Business Lease Renewal","subchapters":[{"title":"14.1 The 1954 Act (Part II)","cards":[{"id":"PP_0142","type":"A","question":"What does 'security of tenure' mean under the Landlord and Tenant Act 1954 (Part II)?","answer":"It is the business tenant's right to remain in the premises at the end of the contractual term and request a new lease, unless the landlord successfully establishes a statutory ground to the contrary; a protected tenancy automatically continues at the end of the contractual term unless ended by forfeiture, surrender, a valid Section 25 notice, a Section 26 request, or a Section 27 notice.","tags":["property_practice","ch14","14.1 The 1954 Act (Part II)"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"14.2 Exclusions and Contracting Out","cards":[{"id":"PP_0143","type":"E","question":"Name three exclusions from protection under the 1954 Act.","answer":"Fixed-term tenancies not exceeding six months; service tenancies; and contracted-out tenancies.","tags":["property_practice","ch14","14.2 Exclusions and Contracting Out"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0144","type":"A","question":"Name the three statutory requirements for validly contracting out of the 1954 Act, and the consequence of getting them wrong.","answer":"The landlord's 'health warning' (a statutory notice explaining security of tenure and its loss, generally served at least 14 days before the tenant completes the lease, though a shorter period is permitted if the tenant signs a formal statutory declaration before an independent solicitor waiving the 14-day period); the tenant's declaration confirming receipt of the health warning and agreement to contract out; and a reference to both in the lease. Failure to satisfy all three renders the attempted contracting-out void, so the tenancy remains fully protected.","tags":["property_practice","ch14","14.2 Exclusions and Contracting Out"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"14.3.1 Landlord's Section 25 Notice","cards":[{"id":"PP_0145","type":"A","question":"Within what window must a landlord serve a Section 25 notice, and can the tenancy be ended before its contractual termination date?","answer":"Between six and 12 months before the date the landlord wants the existing tenancy to end. The tenancy cannot be ended before its contractual termination date, but can be ended on or after that date; the notice must specify one of the statutory grounds for opposing renewal.","tags":["property_practice","ch14","14.3.1 Landlord's Section 25 Notice"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0146","type":"B","question":"P Ltd's lease has a contractual termination date of 12 December 2025. Within what window may the landlord serve a Section 25 notice, and what happens if they miss the latest date?","answer":"The landlord may serve a Section 25 notice any time between 12 December 2024 (earliest, 12 months before) and 12 June 2025 (latest, 6 months before). If the landlord misses 12 June 2025, they cannot end the lease on the contractual date and must instead give a fresh six-to-12-month notice to end it on a later date.","tags":["property_practice","ch14","14.3.1 Landlord's Section 25 Notice"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0147","type":"C","question":"List the statutory grounds (a)-(g) for a landlord opposing lease renewal under the 1954 Act, and state which are discretionary and which are mandatory.","answer":"(a) Tenant's failure to carry out repairing obligations — discretionary. (b) Tenant's persistent delay in paying rent — discretionary. (c) Tenant's substantial breaches of other obligations — discretionary. (d) Suitable alternative accommodation available, provided/secured by the landlord — mandatory. (e) Tenant has sublet part; landlord requires the whole for subsequent letting — discretionary. (f) Landlord intends to demolish/reconstruct and cannot do so with the tenant in occupation — mandatory. (g) Landlord intends to occupy the whole building — mandatory.","tags":["property_practice","ch14","14.3.1 Landlord's Section 25 Notice"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0148","type":"D","question":"What is the practical difference between a discretionary and a mandatory ground for opposing lease renewal?","answer":"On a discretionary ground (a, b, c, e), even if the landlord proves the ground, the court may still order a new tenancy. On a mandatory ground (d, f, g), if the landlord proves the ground, the court must refuse to order a new tenancy — proving any ground does not automatically defeat the tenant.","tags":["property_practice","ch14","14.3.1 Landlord's Section 25 Notice"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"14.3.2 Tenant's Section 26 Request","cards":[{"id":"PP_0149","type":"A","question":"What is a Section 26 request, within what window must it be served, and how long does the landlord have to respond?","answer":"A Section 26 request is served by the tenant on the landlord's 'competent landlord' or agent, requesting a new lease and outlining its required terms. It must be served between six and 12 months before the tenant wants the new tenancy to start; the new tenancy cannot begin before the existing one's contractual termination date. The landlord then has two months to inform the tenant whether they intend to oppose, citing one of the same statutory grounds.","tags":["property_practice","ch14","14.3.2 Tenant's Section 26 Request"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0150","type":"B","question":"Rocco Fashion Ltd's lease ends in five months, and they want to renew via a Section 26 request requiring six months' notice. What is the practical consequence?","answer":"Because six months' notice is required but only five months remain, the tenant can serve the request now but will remain in occupation for one month past the old contractual termination date (under the old lease terms) before the new lease can begin.","tags":["property_practice","ch14","14.3.2 Tenant's Section 26 Request"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"14.4 Compensation for the Tenant","cards":[{"id":"PP_0151","type":"C","question":"On which grounds is the tenant entitled to statutory compensation, and on which is no compensation payable?","answer":"No compensation on the fault grounds (a, b, c) because the tenant is at fault, nor on ground (d) suitable alternative accommodation because the tenant has suffered no loss. Compensation is payable on the no-fault grounds (e, f, g), because the tenant loses the tenancy through no fault of their own.","tags":["property_practice","ch14","14.4 Compensation for the Tenant"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"14.4.1 Calculation of Compensation (No-Fault Grounds)","cards":[{"id":"PP_0152","type":"A","question":"How is compensation calculated for a tenant who has occupied for at least 14 years, versus less than 14 years?","answer":"At least 14 years (including any predecessor business occupancy combined): twice the rateable value of the holding. Less than 14 years: the rateable value of the holding. The rateable value is set by the government's Valuation Office Agency.","tags":["property_practice","ch14","14.4.1 Calculation of Compensation (No-Fault Grounds)"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"14.5 New Lease Ordered by the Court","cards":[{"id":"PP_0153","type":"A","question":"If the landlord fails to establish an opposition ground (or does not oppose), what is the maximum fixed term a court can order for the new lease, and when does a court-set lease commence?","answer":"The maximum fixed term the court can order, if the parties cannot agree, is 15 years. If the court itself has to set the terms (rare, as terms are usually negotiated), the new lease does not commence until three months after the court proceedings end.","tags":["property_practice","ch14","14.5 New Lease Ordered by the Court"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch15","title":"15 . VAT and the Option to Tax","subchapters":[{"title":"15.1 VAT and the Option to Tax","cards":[{"id":"PP_0154","type":"A","question":"Is the sale or lease of land normally subject to VAT, and what can an owner of commercial land elect to do?","answer":"No — the sale or lease of land is normally an exempt supply for VAT. However, owners of interests in commercial land and buildings may elect to opt to tax, charging VAT even where the supply would normally be exempt; once exercised, the option applies to all future supplies relating to that land or building, including a subsequent sale or letting to a tenant.","tags":["property_practice","ch15","15.1 VAT and the Option to Tax"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0161","type":"B","question":"How is combined turnover relevant to a sole trader who operates multiple businesses when assessing VAT thresholds?","answer":"Where a sole trader operates multiple businesses, their combined turnover across all of those businesses is used to assess whether the relevant VAT threshold is met, rather than looking at each business's turnover in isolation.","tags":["property_practice","ch15","15.1 VAT and the Option to Tax"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"15.1.1 Consequences of Opting to Tax","cards":[{"id":"PP_0155","type":"D","question":"Why might opting to tax help a landlord who has just bought a new commercial building?","answer":"Because the purchase itself was a taxable transaction (so VAT was charged at 20% on the building's value), and unless the landlord opts to tax, renting the building out would be exempt, making that input tax irrecoverable; opting to tax converts the rental income into a taxable supply, making the input VAT paid on the purchase recoverable.","tags":["property_practice","ch15","15.1.1 Consequences of Opting to Tax"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0158","type":"D","question":"Why can opting to tax a multi-let commercial building cause problems for some tenants?","answer":"The option to tax applies to the whole of that building, not just part of it, which can disadvantage tenants in a multi-let building who make exempt supplies, since they may be unable to recover the VAT now charged on their rent — the option is building-specific but not owner-wide, yet applies wholly once made.","tags":["property_practice","ch15","15.1.1 Consequences of Opting to Tax"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"15.2 Exclusion for Residential Land and Buildings","cards":[{"id":"PP_0156","type":"E","question":"Does the option to tax apply to residential land and buildings?","answer":"No — the option to tax does not apply to residential land and buildings at all.","tags":["property_practice","ch15","15.2 Exclusion for Residential Land and Buildings"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"15.3 Construction of New Commercial Buildings","cards":[{"id":"PP_0157","type":"A","question":"What VAT rate applies to constructing a new commercial building, or to selling a commercial building less than three years old?","answer":"The standard rate, 20%, applies to a contract to construct a new commercial building, and to the sale of a commercial building that is less than three years old.","tags":["property_practice","ch15","15.3 Construction of New Commercial Buildings"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"15.4 Revocation of the Option to Tax","cards":[{"id":"PP_0159","type":"A","question":"Within what period can a taxpayer have HMRC revoke an option to tax simply because they changed their mind, and what condition must be met?","answer":"Within six months, provided the option has not yet been put into practice (for example, by charging rent inclusive of VAT). An option to tax may also be revoked after a longer period with HMRC's consent.","tags":["property_practice","ch15","15.4 Revocation of the Option to Tax"],"source":"Property_Practice_SQE_Notes.pdf","note":"sparse source"},{"id":"PP_0160","type":"D","question":"Does an option to tax transfer with the land or building on a future sale?","answer":"No — the option is made personally by the owner of the land or building at the time and does not transfer with the land or building on a future disposal; a buyer must consider making their own fresh election if they want the same VAT treatment to continue.","tags":["property_practice","ch15","15.4 Revocation of the Option to Tax"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]}]},{"id":"trusts","title":"Trusts","color":"#c9a882","chapters":[{"id":"ch1","title":"1 . Introduction — Trusts Defined and Classified","subchapters":[{"title":"1.1 What Is a Trust?","cards":[{"id":"TR_0001","type":"A","question":"What is a trust?","answer":"A trust is a fiduciary relationship in which a trustee holds legal title to specific property under a duty to manage, invest, safeguard and administer that property for the benefit of designated beneficiaries, who hold equitable title. The split between legal and equitable ownership is the defining feature of a trust: the trustee is the legal owner on paper, but the beneficiary is the person equity recognises as truly entitled to the benefit of the property.","tags":["trusts","ch1","1.1 What Is a Trust?"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"1.2 Types of Trusts","cards":[{"id":"TR_0002","type":"C","question":"What is the difference between an inter vivos trust and a testamentary trust?","answer":"An inter vivos trust is created during the settlor's lifetime, by the settlor either declaring themselves trustee of property they already own or transferring property to a third party with a declaration that they hold it as trustee. A testamentary trust is created through the settlor's will and takes effect on the settlor's death. Both are forms of express trust, created by the deliberate intention of the settlor.","tags":["trusts","ch1","1.2 Types of Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0003","type":"C","question":"What is the difference between a fixed trust and a discretionary trust?","answer":"In a fixed (private) trust, the beneficiaries' shares are fixed by the settlor and the trustee has no choice in distribution (e.g. 'to T on trust for my husband for life, remainder to my children in equal shares'). In a discretionary trust, the trustees choose how to distribute the property among a class of beneficiaries (e.g. 'to T on trust for my children in such shares as T shall in his absolute discretion decide').","tags":["trusts","ch1","1.2 Types of Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0004","type":"A","question":"What is a private purpose (honorary) trust and what is its default validity?","answer":"A private purpose trust is set up for a purpose rather than for people, such as GBP5,000 to maintain a named dog. It normally fails for want of a beneficiary able to enforce it, but a narrow class of such trusts is recognised as valid (e.g. trusts for the maintenance of a specific animal) as an exception to the beneficiary principle.","tags":["trusts","ch1","1.2 Types of Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0005","type":"A","question":"What is a charitable trust and how does it differ from a private purpose trust?","answer":"A charitable trust is a type of purpose trust set up for the benefit of the public, or a sufficient section of the public, for a charitable purpose (e.g. GBP50,000 for the relief of poverty in Leeds). Unlike a private purpose trust, it is not subject to the beneficiary principle's requirement of ascertainable human beneficiaries because it is enforced by the Attorney General on behalf of the public.","tags":["trusts","ch1","1.2 Types of Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0006","type":"C","question":"Name the two types of implied trust and explain when each arises.","answer":"Resulting trusts arise where: (1) an interest under an express trust fails; (2) an express trust fails to dispose of the whole beneficial interest; or (3) a voluntary transfer or purchase is made in another's name — in each case the beneficial interest reverts to the settlor or the settlor's estate. Constructive trusts are imposed by the court to prevent unjust enrichment arising from wrongful conduct, such as fraud, undue influence, breach of fiduciary duty, or a third party knowingly receiving trust property — the property is held for whoever equity says should benefit.","tags":["trusts","ch1","1.2 Types of Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0007","type":"D","question":"Why is it wrong to use 'resulting trust' loosely to describe any informal trust over the family home?","answer":"A resulting trust responds specifically to a financial contribution to the purchase price, whereas a constructive trust (in the family home context) responds to a common intention to share ownership, evidenced by detriment. The two doctrines have different legal tests, so they must not be conflated — which one applies depends on the facts of the case, not interchangeable terminology.","tags":["trusts","ch1","1.2 Types of Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0008","type":"D","question":"Can a charitable trust be enforced by a private individual?","answer":"No. A charitable trust has no individual beneficiaries with standing to sue; it is instead enforced on behalf of the public by the Attorney General. This distinguishes it from a private trust, where the beneficiaries themselves have the right to enforce the trustee's duties.","tags":["trusts","ch1","1.2 Types of Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""}]}]},{"id":"ch2","title":"2 . Express Private Trusts — The Three Certainties, Constitution & Formalities","subchapters":[{"title":"2.1 The Three Certainties","cards":[{"id":"TR_0009","type":"A","question":"What are the three certainties required for a valid express trust?","answer":"An express trust must show certainty of intention, certainty of subject matter, and certainty of objects. All three are required; if any one of them is missing, the trust fails entirely.","tags":["trusts","ch2","2.1 The Three Certainties"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.1.1 Certainty of Intention","cards":[{"id":"TR_0010","type":"A","question":"What must a settlor show to satisfy certainty of intention, and when must it exist?","answer":"The settlor must show, by written or spoken words or by conduct, an intention to subject the trustee to a binding obligation. No particular form of words is required and the word 'trust' need not be used; communication of the intention to the beneficiaries is not necessary. The intention must be manifested while the settlor still owns the property and before transfer (though later conduct can be evidence of an earlier intention), and the settlor must intend the trust to take effect immediately, not at some future point.","tags":["trusts","ch2","2.1.1 Certainty of Intention"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0011","type":"E","question":"What are 'precatory words' and what is their effect on certainty of intention?","answer":"Precatory words express a mere hope, wish, or suggestion, and do not create a trust because they show no intention to impose a binding obligation. For example, leaving money 'in the hope that he will use it to support my niece's education' is precatory and no trust arises — the recipient takes the money absolutely. By contrast, wording such as 'which is to be used to pay my niece's school fees' is a binding instruction and creates a valid trust.","tags":["trusts","ch2","2.1.1 Certainty of Intention"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0012","type":"D","question":"What happens to property if a trust is void for uncertainty of intention?","answer":"The property passes as an outright gift to the person who would have been the trustee, since without a binding obligation there is nothing to distinguish their position from that of an absolute owner.","tags":["trusts","ch2","2.1.1 Certainty of Intention"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.1.2 Certainty of Subject Matter","cards":[{"id":"TR_0013","type":"A","question":"What must be clear to satisfy certainty of subject matter?","answer":"It must be clear what property is bound by the trust, and what each beneficiary is to receive (beneficial entitlement). Trust property must also be a present interest in existing property, not a mere expectancy — a future but already vested interest can be trust property, but a hope of inheriting under a living person's will cannot, because the testator could change the will at any time.","tags":["trusts","ch2","2.1.2 Certainty of Subject Matter"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0014","type":"C","question":"Compare the validity of a trust of '50% of my shares in X Ltd' with a trust of '20 bottles of wine stored in X warehouse' where the bottles are not segregated.","answer":"A trust of 50% of shares in X Ltd is valid because no segregation is required for intangible, fungible assets. A trust of 20 unsegregated bottles of wine fails unless the specific bottles are segregated from the rest of the stock, even if all the bottles are identical — tangible, unascertained property must be segregated for the trust to attach, regardless of fungibility.","tags":["trusts","ch2","2.1.2 Certainty of Subject Matter"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0015","type":"D","question":"What happens to property if a trust is void for uncertainty of subject matter?","answer":"The property reverts to the settlor, because without clarity as to what property is held on trust or what each beneficiary should receive, the trust cannot operate and the settlor's original ownership is unaffected.","tags":["trusts","ch2","2.1.2 Certainty of Subject Matter"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.1.3 Certainty of Objects (Beneficiaries)","cards":[{"id":"TR_0016","type":"C","question":"What test for certainty of objects applies to a fixed trust, and what does it require?","answer":"The complete list test applies: trustees must be able to draw up a complete list of every beneficiary. This requires both conceptual certainty (the description of the class is intellectually clear) and evidential certainty (there are facts or records sufficient to compile the list).","tags":["trusts","ch2","2.1.3 Certainty of Objects (Beneficiaries)"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0017","type":"C","question":"What test for certainty of objects applies to a discretionary trust, and what does it require?","answer":"The given postulant test from McPhail v Doulton applies: it must be possible to say with certainty whether any given individual is or is not a member of the class. Conceptual certainty is required, but evidential gaps (i.e. being unable to prove a particular postulant is in the class) do not defeat the trust, provided the class is not 'administratively unworkable'.","tags":["trusts","ch2","2.1.3 Certainty of Objects (Beneficiaries)"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0018","type":"D","question":"Is the complete list test for a fixed trust stricter or more forgiving than the given postulant test for a discretionary trust?","answer":"The complete list test is in fact stricter, because it additionally needs evidential certainty for the whole class, not just for the individual claimant being assessed. Subjective descriptions like 'my friends' or 'my kindest acquaintances' fail for conceptual uncertainty under either test, so students should not assume a fixed trust is more forgiving.","tags":["trusts","ch2","2.1.3 Certainty of Object

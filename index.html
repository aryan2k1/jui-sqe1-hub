the court must warn them of this possibility, since otherwise a defendant might wrongly believe that consenting to Magistrates' trial caps their eventual sentence.","tags":["allocation","committal for sentence","exception"],"source":"Criminal Law Practice SQE Notes.pdf","note":"exam trap flagged in source"},{"id":"CRP_0067","type":"E","question":"What is the special hybrid rule for low-value theft of £200 or less, and what two circumstances mean an either way offence is sent to the Crown Court without an allocation hearing at all?","answer":"For theft of property valued at £200 or less, the Magistrates' Court cannot decline jurisdiction and the case is treated as summary only for allocation purposes, but the defendant retains the right to elect Crown Court trial as though it were an either way offence. An either way offence is sent to the Crown Court without any allocation hearing where the defendant or a co-defendant is also charged with a related indictable only offence, or where the prosecution gives notice that the case involves serious or complex fraud or requires protection for a child witness.","tags":["low-value theft","allocation","exception"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]}]},{"id":"ch17_casemanagement","title":"17. Case Management & Pre-Trial Procedure","subchapters":[{"id":"17.1-17.3","title":"17.1-17.3 Magistrates' Directions and the Crown Court Timeline","cards":[{"id":"CRP_0068","type":"A","question":"What are the key timed disclosure and notification deadlines in the Magistrates' Court case management directions, and what must the form confirm about the defendant?","answer":"The prosecution must serve its evidence and a schedule of unused material within 20 business days, the defence must serve any defence statement within 14 days where applicable, and the defence must notify the prosecution of any witnesses required for cross-examination within 7 days of receiving the unused material schedule. The case management form must also confirm that the defendant has been advised both of the credit available for an early guilty plea and of the risk of trial proceeding in their absence if they fail to attend.","tags":["case management","Magistrates Court","deadlines"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0069","type":"D","question":"What is the Plea and Trial Preparation Hearing (PTPH), when does it take place, and what are its two possible outcomes?","answer":"The PTPH takes place in the Crown Court 28 days after the case is sent from the Magistrates' Court, and it is the hearing at which the defendant is formally arraigned, meaning asked to enter a plea to the indictment. If the defendant pleads guilty, sentencing follows, potentially with a Newton hearing if facts are disputed; if the defendant pleads not guilty, a trial date is fixed and the key evidential and case management issues for trial are settled at that hearing.","tags":["PTPH","Crown Court","arraignment"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]},{"id":"17.4-17.6","title":"17.4-17.6 Prosecution Disclosure and the Defence Case Statement","cards":[{"id":"CRP_0070","type":"E","question":"What is the prosecution's ongoing disclosure duty in the Crown Court, what are the time limits, and what is a public interest immunity application?","answer":"The prosecution must disclose all evidence it intends to rely on, plus any unused material that might undermine the prosecution's case or might reasonably assist the defence case, and this is a continuing duty throughout the proceedings, not a one-off obligation. The time limits are 50 days from sending where the defendant is in custody, and 70 days where the defendant is on bail. Where the prosecution holds sensitive unused material it wishes to withhold, such as material that would compromise an informant's safety, it can apply for public interest immunity, with the application heard by the judge in private chambers.","tags":["prosecution disclosure","time limits","public interest immunity"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0071","type":"D","question":"What must a defence case statement contain, when is it due, and what is the consequence of an inadequate or late statement?","answer":"The defence case statement must set out the nature of the defence, the facts on which the defendant takes issue with the prosecution, the reason for taking issue with each such fact, any point of law the defendant wishes to raise, and details of any alibi witness, and it is due 28 days after the prosecution complies with its initial disclosure duty; the statement is deemed to have been approved by the defendant personally. An inadequate, late, or absent defence case statement can lead the court to draw an adverse inference against the defendant at trial.","tags":["defence case statement","deadline","consequence"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]}]},{"id":"ch18_evidence","title":"18. Evidence","subchapters":[{"id":"18.1-18.3","title":"18.1-18.3 Visual Identification Evidence","cards":[{"id":"CRP_0072","type":"A","question":"When do the Turnbull guidelines apply to visual identification evidence, and what does the ADVOKATE mnemonic stand for?","answer":"The Turnbull guidelines apply whenever the prosecution's case rests wholly or substantially on disputed identification evidence, requiring the judge to give the jury a special warning about the dangers of relying on identification evidence even from an apparently convincing witness. ADVOKATE stands for the factors used to assess identification reliability: Amount of time the witness had the suspect under observation, Distance between witness and suspect, Visibility conditions at the time, any Obstruction to the witness's view, whether the witness Knew or had seen the suspect before, Any reason the witness had to remember the suspect, Time elapsed between the incident and the identification, and any Errors or discrepancies in the witness's earlier descriptions.","tags":["Turnbull guidelines","ADVOKATE","identification evidence"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0073","type":"D","question":"What must a judge do where identification evidence is weak and there is no other evidence supporting it, and what direction must be given to the jury even where the case proceeds?","answer":"Where identification evidence is poor in quality and unsupported by other evidence, the judge should withdraw the case from the jury and direct an acquittal, since a conviction in those circumstances would be unsafe. Where the case does proceed, the judge must still give the jury a Turnbull warning, explaining the special need for caution because a mistaken witness can be a convincing one, and directing the jury to consider the specific ADVOKATE weaknesses present in the evidence before them.","tags":["Turnbull guidelines","weak identification evidence","consequence"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]},{"id":"18.4","title":"18.4 Hearsay Evidence","cards":[{"id":"CRP_0074","type":"A","question":"What is the definition of hearsay under the Criminal Justice Act 2003, and what are the four gateways through which hearsay can be admitted?","answer":"Hearsay is a statement not made in oral evidence in the proceedings that is relied on as evidence of the matter stated. The four gateways for admissibility are: admissibility under a statutory provision, such as where the witness is unavailable because dead, unfit, abroad and it is impracticable to secure attendance, cannot be found, or is in fear and the court gives leave, or where the statement is a business document, a previous statement, expert evidence, or a confession; admissibility under a preserved common law rule of law, such as confessions, mixed statements, or res gestae statements made under the stress of the moment; agreement of all parties; and the interests of justice gateway, a discretionary safety net assessed against nine statutory factors.","tags":["hearsay","CJA 2003","four gateways"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0075","type":"E","question":"What three conditions must be satisfied for a document to qualify as a business document under the hearsay gateways, and how does multiple hearsay differ in its treatment?","answer":"A business document is admissible as hearsay if it was created or received in the course of a trade, business, profession, or other occupation, the person who supplied the information had, or may reasonably be supposed to have had, personal knowledge of the matters dealt with, and, where there were multiple links in the chain of transmission, each person in that chain was also acting in the course of a trade or business. Multiple hearsay, meaning hearsay reporting another hearsay statement, is subject to stricter admissibility rules than single hearsay because the reliability of the evidence is more attenuated at each additional remove.","tags":["business document","hearsay","multiple hearsay"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]},{"id":"18.5","title":"18.5 Confessions","cards":[{"id":"CRP_0076","type":"C","question":"What is the distinction between exclusion of a confession under s.76 PACE and exclusion under s.78 PACE, including who bears the burden and to what standard?","answer":"Under s.76 PACE, a confession must be excluded, mandatorily, if it was or may have been obtained by oppression or in circumstances making it unreliable, and once the defence raises this, the prosecution bears the burden of disproving it beyond reasonable doubt, with a causal link required between the bad conduct and the confession. Under s.78 PACE, exclusion is discretionary rather than mandatory, based on whether admitting the evidence would have such an adverse effect on the fairness of proceedings that it ought to be excluded, and this ground is commonly invoked for breaches of PACE procedure around identification, search, or surveillance rather than oppression specifically.","tags":["confessions","s.76 PACE","s.78 PACE","distinction"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0077","type":"D","question":"How is the admissibility of a disputed confession determined differently in the Crown Court compared to the Magistrates' Court?","answer":"In the Crown Court, admissibility of a disputed confession is determined by the judge alone, in the absence of the jury, through a voir dire, a trial within a trial. In the Magistrates' Court, the same lay magistrates or District Judge who will decide guilt also decide the admissibility question, and if they rule the confession inadmissible, they must then attempt to put it out of their minds entirely when deciding the verdict, since there is no separate jury to shield from the excluded evidence.","tags":["confessions","voir dire","Crown Court","Magistrates Court"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]},{"id":"18.6","title":"18.6 Bad Character Evidence","cards":[{"id":"CRP_0078","type":"E","question":"What are the seven gateways for admitting a defendant's bad character evidence under the Criminal Justice Act 2003, and which two trigger a stronger 'must not admit' fairness test?","answer":"The seven gateways are: all parties agree to admit it; the defendant adduces it themselves or it is adduced in response to questions the defendant asks; it is important explanatory evidence without which the jury could not properly understand other evidence; it is relevant to an important matter in issue between the prosecution and the defence, including propensity to commit the type of offence charged or propensity to be untruthful; it has substantial probative value on an important matter in issue between co-defendants in 'cut-throat' defences, a higher threshold than mere relevance; it corrects a false impression given by the defendant; and the defendant has made an attack on another person's character, such as alleging police misconduct or a witness's prior convictions. Gateways 4 (important matter in issue) and 7 (attack on another's character) trigger a stronger 'must not admit' fairness test if the defence applies to exclude, which is a tougher standard for the prosecution to meet than the ordinary discretionary s.78 fairness test.","tags":["bad character evidence","seven gateways","CJA 2003"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0079","type":"C","question":"What is the two-part 'good character direction' available to a defendant with no previous convictions, and can it still apply if the defendant has old or minor convictions?","answer":"The good character direction has two limbs: a propensity limb, telling the jury the defendant is less likely to have committed the offence because of their good character, and a credibility limb, telling the jury the defendant is more likely to be telling the truth. The direction remains available even where the defendant has old, minor, or unrelated previous convictions, since these may not undermine an otherwise good character, but it is likely unavailable where the defendant has no previous convictions yet the prosecution relies on other bad character evidence against them, since that other evidence undermines the claim to good character.","tags":["good character direction","bad character evidence","propensity"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]}]},{"id":"ch19_trial","title":"19. Trial Procedure","subchapters":[{"id":"19.1-19.4","title":"19.1-19.4 Trial Sequence and Modes of Address","cards":[{"id":"CRP_0080","type":"A","question":"What is the sequence of a criminal trial from prosecution opening through to verdict and sentence, and what restriction applies to questions during examination in chief versus cross-examination?","answer":"The trial proceeds: prosecution opening speech, prosecution evidence through examination in chief and then defence cross-examination, an optional defence submission of no case to answer, the defence case (with the defendant testifying before any other defence witnesses if the defendant chooses to testify), prosecution cross-examination of defence witnesses, closing speeches from both sides, and then, in the Crown Court, the judge's summing up followed by jury deliberation, with verdict and sentence following. During examination in chief, only non-leading questions may be asked of one's own witness, whereas leading questions, which suggest the answer, are permitted during cross-examination.","tags":["trial sequence","examination in chief","cross-examination"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0081","type":"E","question":"What are the correct modes of address for a District Judge, a lay magistrate, a Crown Court judge, and how do barristers and solicitors address each other?","answer":"A District Judge sitting in the Magistrates' Court is addressed as 'Judge', while a lay magistrate is addressed as 'Your Worship', 'Sir', or 'Madam'. A Crown Court judge is addressed as 'Your Honour'. When referring to opposing counsel, a barrister refers to another barrister as 'my learned friend', while a solicitor refers to another solicitor as simply 'my friend'.","tags":["modes of address","court etiquette","rule"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]},{"id":"19.5-19.7","title":"19.5-19.7 Competence, Compellability and Special Measures","cards":[{"id":"CRP_0082","type":"C","question":"What is the distinction between competence and compellability of a witness, and how does this apply to a defendant testifying for the prosecution versus the defence?","answer":"Competence refers to whether a witness is legally allowed to give evidence at all, while compellability refers to whether a witness can be forced to give evidence even if they are competent to do so. A defendant is neither competent nor compellable as a witness for the prosecution, but is competent, though not compellable, to give evidence in their own defence — though if the defendant chooses not to testify, the court may draw an adverse inference under s.35.","tags":["competence","compellability","distinction"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0083","type":"E","question":"In what circumstances is a defendant's spouse or civil partner compellable to give evidence for the prosecution, and which categories of witness qualify for special measures?","answer":"A spouse or civil partner is competent to give evidence for the prosecution but not ordinarily compellable, unless the offence charged involves assault, injury, or a threat of injury to the spouse or to a child under 16, a sexual offence against a child under 16, or an attempt or conspiracy to commit such an offence, in which case the spouse becomes compellable. Special measures are available to witnesses under 18, witnesses with a disability or disorder, witnesses in fear of giving evidence, complainants in sexual offence cases, and witnesses in gun or knife crime cases, with measures including screens, video link, removal of wigs and gowns, evidence given in private, pre-recorded testimony, and the use of an intermediary.","tags":["spouse compellability","special measures","exception"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]},{"id":"19.8-19.9","title":"19.8-19.9 No Case to Answer and the Solicitor's Duty to the Court","cards":[{"id":"CRP_0084","type":"C","question":"On what two grounds can a court find there is no case to answer, and how is this determined differently in the Crown Court compared to a summary trial?","answer":"A court can find no case to answer either where the prosecution has failed to adduce evidence on an essential element of the offence, or where the evidence presented is so weak or unreliable that no reasonable tribunal could properly convict on it. In the Crown Court, this submission is heard and determined by the judge alone with the jury sent out of the room, whereas in a summary trial the magistrates or District Judge themselves both hear the submission and decide it, since there is no separate jury to exclude.","tags":["no case to answer","Crown Court","summary trial"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0085","type":"B","question":"A solicitor realises during a summary trial that the Magistrates have wrongly accepted jurisdiction over a low-value theft case that should have been treated as summary only, working against their own client who wanted to elect Crown Court trial. What must the solicitor do?","answer":"The solicitor's duty to the court requires them to act with integrity and draw the court's attention to relevant law, even where doing so works against their own client's interests, so the solicitor must correct the Magistrates' wrongly accepted jurisdiction even though this disadvantages the client who wished to elect Crown Court trial. This duty reflects the broader professional conduct obligations not to mislead the court, not to make assertions that are not properly arguable, and not to waste the court's time.","tags":["solicitor duty to court","professional conduct","application"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]}]},{"id":"ch20_sentencing","title":"20. Sentencing","subchapters":[{"id":"20.1-20.3","title":"20.1-20.3 Purposes, Guidelines and Aggravating Factors","cards":[{"id":"CRP_0086","type":"E","question":"What are the five purposes of sentencing, and what aggravating factors must a court take into account when assessing seriousness?","answer":"The five purposes of sentencing are punishment, reduction of crime including by deterrence, reform and rehabilitation of the offender, protection of the public, and reparation by the offender to those affected by the offence. Courts must consider aggravating factors including any relevant previous convictions, whether the offence was committed while on bail, racial or religious aggravation, and hostility based on sexual orientation, transgender identity, or disability, and courts must follow the relevant sentencing guidelines unless satisfied it would be contrary to the interests of justice to do so.","tags":["sentencing purposes","aggravating factors","sentencing guidelines"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0087","type":"C","question":"What is the totality principle, and when should sentences for multiple offences run concurrently versus consecutively?","answer":"The totality principle requires that the overall sentence imposed for multiple offences must not be disproportionate to the overall seriousness of the offending, taken as a whole. Sentences should generally run concurrently, meaning served at the same time, where the offences arise out of the same incident or facts, while sentences should run consecutively, meaning added together, where the offences are unrelated and distinct from each other.","tags":["totality principle","concurrent sentences","consecutive sentences"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]},{"id":"20.4-20.7","title":"20.4-20.7 Custodial Sentences, Suspended Sentences and Community Orders","cards":[{"id":"CRP_0088","type":"A","question":"What is the custody threshold test, and what are the Magistrates' Court's maximum custodial sentencing powers?","answer":"The custody threshold is crossed where the offence is so serious that neither a fine alone nor a community order can be justified, and once crossed, the sentence imposed must be for the shortest term commensurate with the seriousness of the offence; an offender generally serves half their sentence in custody and the remainder on licence, with breach of licence or commission of a further offence triggering an automatic return to custody. The Magistrates' Court's maximum custodial powers are 6 months for a single either way offence, or 12 months where the offender is sentenced for two or more either way offences.","tags":["custody threshold","Magistrates Court","sentencing powers"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0089","type":"E","question":"What are the maximum suspendable sentence lengths in the Magistrates' Court and Crown Court, the permissible range of the suspension period, and the court's options on breach?","answer":"The Magistrates' Court can suspend a sentence of up to 6 months, while the Crown Court can suspend a sentence of up to 2 years, with the suspension period itself ranging from 14 days to 2 years. On breach of a suspended sentence, the court can activate the sentence in full, activate a reduced term, make the requirements of the order more onerous, or extend the period of suspension.","tags":["suspended sentence","breach","Magistrates Court","Crown Court"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0090","type":"D","question":"What is a Newton hearing, when is it triggered, and what is the consequence for guilty plea credit depending on its outcome?","answer":"A Newton hearing is triggered where a defendant pleads guilty but disputes the prosecution's factual account of the offence, offering instead their own 'basis of plea'; if the prosecution accepts the defendant's basis, sentencing proceeds on that agreed basis without a hearing, but if the prosecution rejects it, a Newton hearing, effectively a mini-trial on the disputed facts, is held before a judge alone. If the dispute is resolved in the prosecution's favour, the defendant loses the credit otherwise available for an early guilty plea, but if resolved in the defendant's favour, the defendant retains that credit.","tags":["Newton hearing","basis of plea","guilty plea credit","consequence"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]}]},{"id":"ch21_appeals","title":"21. Appeals","subchapters":[{"id":"21.1-21.2","title":"21.1-21.2 Magistrates' to Crown Court and Case Stated","cards":[{"id":"CRP_0091","type":"E","question":"What appeal rights does a defendant have from the Magistrates' Court to the Crown Court depending on whether they were convicted at trial or pleaded guilty, and within what time limit?","answer":"A defendant convicted at trial in the Magistrates' Court can appeal against conviction, sentence, or both, while a defendant who pleaded guilty can appeal against sentence only, since a guilty plea forecloses any appeal against conviction itself; the prosecution has no right of appeal to the Crown Court under this route. Written notice of appeal must be given within 15 business days of the Magistrates' decision, and no grounds need be stated at that stage.","tags":["Magistrates to Crown Court appeal","time limit","rule"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0092","type":"C","question":"How does an appeal by way of case stated to the High Court differ from an ordinary Magistrates'-to-Crown-Court appeal, in terms of who can bring it, the ground required, and how it is heard?","answer":"Case stated appeals to the High Court are available to both the prosecution and the defence, unlike the ordinary route which the prosecution cannot use, and the ground must be that the Magistrates' decision was wrong in law or made in excess of jurisdiction, rather than a general dissatisfaction with the outcome. The application must be made in writing within 21 days, and the appeal is heard by three judges of the Divisional Court who consider legal arguments only, with no rehearing of the evidence, unlike the Crown Court appeal which is a complete rehearing.","tags":["case stated","High Court","Crown Court appeal","distinction"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]},{"id":"21.3-21.5","title":"21.3-21.5 Crown Court to Court of Appeal and Beyond","cards":[{"id":"CRP_0093","type":"A","question":"What is required before a Crown Court conviction or sentence can be appealed to the Court of Appeal, and what is the test for allowing a conviction appeal?","answer":"Leave to appeal is required, granted either by the trial judge or by the Court of Appeal itself, with the application made within 28 days of conviction or sentence; if a single judge refuses leave, the application can be renewed before the full court. The test for allowing a conviction appeal is whether the conviction is 'unsafe', which can arise from wrongly admitted or excluded evidence, an incorrect jury direction, judicial bias, a wrongful exercise of discretion, errors in summing up, or problems with the jury itself.","tags":["Court of Appeal","leave to appeal","unsafe conviction"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0094","type":"E","question":"What outcomes are available to the Court of Appeal on a conviction appeal, what is the test for a sentence appeal, and what limit applies to a sentence appeal outcome?","answer":"On a conviction appeal, the Court of Appeal can quash the conviction and order an acquittal or a retrial, substitute a conviction for an alternative or lesser offence, or dismiss the appeal and uphold the conviction. A sentence appeal succeeds where the sentence was wrong in law, wrong in principle, or manifestly excessive, but the Court of Appeal cannot increase the sentence beyond what the Crown Court originally imposed, and any new sentence is deemed to have been imposed on the original sentencing date.","tags":["Court of Appeal","sentence appeal","manifestly excessive"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0095","type":"C","question":"Can the prosecution appeal a jury's acquittal, and what avenues does the prosecution have instead, including the Attorney General's role?","answer":"The prosecution cannot appeal a jury's acquittal under any circumstances, but it can appeal certain rulings made by the trial judge during proceedings, such as a ruling of no case to answer, or a ruling admitting or excluding evidence including confession or identification evidence. Separately, the Attorney General can refer a sentence considered 'unduly lenient' to the Court of Appeal for review, but only with the Court of Appeal's leave, and a further appeal to the Supreme Court is available to either side only if both the Court of Appeal grants leave and certifies that a point of law of general public importance is involved.","tags":["prosecution appeal","jury acquittal","Attorney General","exception"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]}]},{"id":"ch22_youth","title":"22. The Youth Court","subchapters":[{"id":"22.1-22.3","title":"22.1-22.3 Jurisdiction, Procedure and Grave Crimes","cards":[{"id":"CRP_0096","type":"A","question":"What is the age jurisdiction of the Youth Court, and which offences must always be sent to the Crown Court regardless of the defendant's age?","answer":"The Youth Court has jurisdiction over defendants aged 10 to 17, since those under 10 are below the age of criminal responsibility and incapable of committing a crime; the courtroom is closed to the public, though the press may attend subject to restrictions on reporting identifying details, and procedure is generally less formal than in adult courts. Murder, attempted murder, and manslaughter must always be sent to the Crown Court, along with certain firearms offences and specified violent, sexual, or terrorism offences where the youth is assessed as 'dangerous'.","tags":["Youth Court jurisdiction","age","Crown Court sending"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0097","type":"E","question":"What is a 'grave crime' for Youth Court purposes, and when should the Youth Court decline jurisdiction over one?","answer":"A grave crime is one punishable in the adult courts by 14 years' imprisonment or more. The Youth Court should decline jurisdiction over a grave crime, and send it to the Crown Court, only where there is a real prospect that the eventual sentence will be substantially more than 2 years, rather than simply because the maximum sentence available is high.","tags":["grave crime","Youth Court","Crown Court sending"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0098","type":"C","question":"If a youth is jointly charged with an adult, what is the default rule on which court they appear in, and what factors might displace that default?","answer":"The default rule is that the youth follows the adult's court, meaning the youth is sent to the Crown Court if the adult is sent there, or tried alongside the adult in the Magistrates' Court if that is where the adult is tried. This default can be displaced by factors such as injustice to witnesses if the cases are separated, the youth's relative age and maturity, and the youth's culpability compared to the adult's, all of which a court weighs in deciding whether to depart from the default joint-venue rule.","tags":["joint charge","Youth Court","Crown Court","exception"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]},{"id":"22.4","title":"22.4 Youth Sentencing","cards":[{"id":"CRP_0099","type":"E","question":"What are the three main types of youth sentence, and under what conditions must a Referral Order be made versus when it cannot be made at all?","answer":"The three main youth sentence types are the Referral Order, referring the youth to a Youth Offender Panel under a contract lasting 3 to 12 months; the Youth Rehabilitation Order, lasting up to 3 years and combining elements such as supervision, unpaid work of up to 240 hours over 12 months, programme requirements, curfew, exclusion, or residence requirements; and the Detention and Training Order, a custodial sentence. A Referral Order must be made where the youth pleads guilty to an imprisonable offence, has no prior imprisonable conviction, and the court does not intend a custodial sentence or absolute discharge, but it cannot be made where the youth pleaded not guilty and was convicted after a trial.","tags":["Referral Order","Youth Rehabilitation Order","youth sentencing"],"source":"Criminal Law Practice SQE Notes.pdf","note":""},{"id":"CRP_0100","type":"C","question":"What are the age-based restrictions on the Detention and Training Order, and what happens during the first half versus the second half of the order?","answer":"A Detention and Training Order is not available at all for offenders aged 10-11; for ages 12-14 it is available only for 'persistent young offenders', defined as those sentenced on three or more prior occasions for an imprisonable offence; for ages 15-17 it is available for any offender where the custody threshold is crossed, with fixed lengths of 4, 6, 8, 10, 12, 18, or 24 months. The first half of the order is served in custody, while the second half is served under Youth Offending Team supervision in the community, with the conditions of that supervision set by the Youth Offending Team rather than the court, and breach of those conditions can result in further custody.","tags":["Detention and Training Order","age restrictions","rule"],"source":"Criminal Law Practice SQE Notes.pdf","note":""}]}]}]},{"id":"dispute_resolution","title":"Dispute Resolution","color":"#9a6840","chapters":[{"id":"ch1","title":"1 . Methods of Dispute Resolution (ADR)","subchapters":[{"title":"1.1 Litigation","cards":[{"id":"DR_0001","type":"A","question":"What is litigation, and what are its main characteristics compared to other dispute resolution methods?","answer":"Litigation is taking legal action through the court system, producing a legally binding judgment that is enforceable against the other party. It is expensive, slow, decided by a judge rather than the parties, and governed by strict rules of evidence. It is usually treated as a last resort once other methods of resolving the dispute have failed, though it remains the most common form of dispute resolution overall.","tags":["dispute_resolution","ch1","1.1 Litigation"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0002","type":"C","question":"What is the legal effect of 'without prejudice' communications made during negotiation, and why does this matter?","answer":"Communications forming part of a negotiation can be made 'without prejudice', meaning they cannot be referred to in court or relied on by the other party if the negotiation fails. This protection gives the parties freedom to explore settlement options candidly, since nothing said in that context can later be used against them at trial. Negotiation itself can happen at any time, whether before or after proceedings are issued.","tags":["dispute_resolution","ch1","1.1 Litigation"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0003","type":"A","question":"What is a round-table or joint settlement meeting, and when is it usually held?","answer":"A round-table or joint settlement meeting is a more formal type of negotiation in which the parties and their representatives meet to try to agree a settlement. It is usually held post-proceedings, after disclosure of witness statements and other evidence, because by that stage the parties properly understand the strengths and weaknesses of each side's case.","tags":["dispute_resolution","ch1","1.1 Litigation"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"1.2 Alternative Dispute Resolution (ADR) — in general","cards":[{"id":"DR_0004","type":"C","question":"What is Alternative Dispute Resolution (ADR), and what power does the court have over it?","answer":"ADR is the collective term for methods of resolving disputes other than through the normal trial process. The court can order parties to engage in ADR and/or stay proceedings to enable it, provided the order does not restrict a party's right to proceed to a final judicial hearing and is proportionate to settling the dispute fairly, quickly and at reasonable cost. Lawyers must ensure their clients understand the availability and purpose of ADR, since court protocols stress that litigation should be a last resort.","tags":["dispute_resolution","ch1","1.2 Alternative Dispute Resolution (ADR) — in general"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0005","type":"B","question":"What factors does the court weigh when deciding whether to order ADR, and what is the consequence of unreasonably refusing to engage in it?","answer":"The court's non-exhaustive list of factors includes the form of ADR proposed, whether the parties are legally represented, whether ADR is likely to be effective and appropriate, and whether there is a realistic prospect of settlement. An unreasonable refusal to engage in ADR is penalised through costs rather than by striking out the claim — for example, a successful party who unreasonably ignored a request to mediate can have its recoverable costs reduced, such as by 40%.","tags":["dispute_resolution","ch1","1.2 Alternative Dispute Resolution (ADR) — in general"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"1.3 Principal Methods of ADR","cards":[{"id":"DR_0006","type":"A","question":"What is arbitration, and what happens if a party issues court proceedings despite a valid arbitration clause?","answer":"Arbitration is common in large-value, complex and international commercial contracts, where the contract may require disputes to be arbitrated; once parties agree to arbitrate, they must follow that process unless both agree otherwise. If a party issues court proceedings despite a valid arbitration clause, the court will stay the proceedings because arbitration is the agreed forum. Procedurally, the parties appoint an arbitrator (often a solicitor, barrister or other relevant professional); strict rules of evidence do not apply, with the process relying on written submissions and documents; and the arbitrator makes a final award that is binding and enforceable in the courts.","tags":["dispute_resolution","ch1","1.3 Principal Methods of ADR"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0007","type":"A","question":"What is mediation, and what role does the mediator play?","answer":"Mediation is the most commonly used form of ADR. It is a confidential, voluntary process in which a neutral third party assists the parties to reach their own resolution; the mediator does not adjudicate, rule on the merits of the dispute, or impose terms on the parties. The mediator is entirely neutral with no interest in the outcome, and any settlement reached is non-binding until it is set out in a final written agreement signed by the parties.","tags":["dispute_resolution","ch1","1.3 Principal Methods of ADR"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0008","type":"C","question":"What are the key features of mediation that distinguish it from litigation and arbitration?","answer":"Mediation is confidential and conducted on a 'without prejudice' basis, so disclosures made during it cannot be referred to at trial if the mediation fails. The parties stay in control throughout and can walk away at any time, strict rules of evidence do not apply, and the costs of the process are usually shared jointly between the parties. This contrasts with litigation, which is involuntary and decided by an imposed judge under formal evidential rules, and with arbitration, where a specialist arbitrator makes a final, binding award.","tags":["dispute_resolution","ch1","1.3 Principal Methods of ADR"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0009","type":"D","question":"What is Early Neutral Evaluation (ENE), and how does it differ from an ombudsman scheme?","answer":"In Early Neutral Evaluation, a neutral third party hears each side of the dispute and gives a non-binding opinion on the probable trial outcome, with the aim of encouraging the parties to settle. An ombudsman, by contrast, investigates complaints against public organisations or certain private services rather than giving an opinion on litigation prospects. Both methods rely on a neutral third party, but they serve different purposes and operate in different contexts.","tags":["dispute_resolution","ch1","1.3 Principal Methods of ADR"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0010","type":"D","question":"Are litigation and ADR mutually exclusive once court proceedings have started?","answer":"No. Litigation and ADR are not mutually exclusive, and the parties must keep considering ADR even after proceedings have begun. The court can grant a stay specifically to make time for ADR to be attempted, and the Directions Questionnaire expressly asks whether a party wants a stay in order to attempt settlement.","tags":["dispute_resolution","ch1","1.3 Principal Methods of ADR"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch2","title":"2 . Pre-Action Considerations: Limitation","subchapters":[{"title":"2.1 The basic limitation periods","cards":[{"id":"DR_0011","type":"A","question":"What is a limitation period, and what is the policy reason behind it?","answer":"A claim must be brought within a limitation period, most of which are set by the Limitation Act 1980; bringing a claim after the period expires makes it 'statute-barred', allowing the defendant to raise limitation as a defence to strike the claim out. The underlying policy is to protect the defendant from prejudice, since evidence and witnesses degrade in quality over time. Because of this, a solicitor must check limitation before anything else, and advancing a claim that is statute-barred is regarded as negligent.","tags":["dispute_resolution","ch2","2.1 The basic limitation periods"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0012","type":"B","question":"What are the standard limitation periods for breach of contract, tort, personal injury, fatal accident claims, defamation and unfair dismissal?","answer":"Breach of contract and most claims in tort each carry a 6-year limitation period. Personal injury and fatal accident claims each carry a 3-year period, while defamation claims carry only 1 year and unfair dismissal claims must be brought within 3 months. Separately, latent defects carry a 15-year longstop period running from the negligent act or omission.","tags":["dispute_resolution","ch2","2.1 The basic limitation periods"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"2.2 Limitation in tort — accrual vs date of knowledge","cards":[{"id":"DR_0013","type":"C","question":"In tort claims, how is the limitation start date determined where the injury is not immediately apparent?","answer":"Time runs from whichever trigger is later engaged: the date of accrual, when the tortious act occurs (such as the date of an accident), or, where the injury or claim is not readily apparent, the date of knowledge. The date of knowledge is when the claimant first knows the facts establishing the essential elements of the claim — the claimant need not know the precise details of the alleged negligence or be able to prove conclusively that the defendant caused the loss, since having enough information to begin investigating is sufficient to start the clock.","tags":["dispute_resolution","ch2","2.2 Limitation in tort — accrual vs date of knowledge"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0014","type":"B","question":"What four facts must a claimant know for the date of knowledge to arise in a clinical negligence claim?","answer":"In a clinical negligence case, such as a sponge left inside a patient after surgery, the date of knowledge arises when the claimant knows: that the injury was significant; that it was attributable to the act or omission alleged to be negligent; the identity of the defendant; and, if the act was someone else's, that other person's identity together with the facts supporting an action against the defendant. This contrasts with ordinary personal injury claims, where knowledge usually coincides with accrual because the claimant knows the injury and its cause at once.","tags":["dispute_resolution","ch2","2.2 Limitation in tort — accrual vs date of knowledge"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0015","type":"D","question":"How does limitation operate where the injured claimant dies, and does death revive an already-expired claim?","answer":"If the injured party dies within three years of accrual, the limitation period becomes the later of three years from the date of death or three years from the personal representative's date of knowledge. However, if the injured party dies after the original three-year period had already expired, the claim remains statute-barred — death does not revive a claim that was already time-barred.","tags":["dispute_resolution","ch2","2.2 Limitation in tort — accrual vs date of knowledge"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"2.3 Limitation in contract","cards":[{"id":"DR_0016","type":"C","question":"How does the limitation period in contract differ from the tort position, particularly regarding causation?","answer":"In contract, the limitation period is 6 years running from the date of the breach, not the date the contract was made and regardless of when any loss actually occurs. Unlike in tort, no causation is required for the contractual clock to start — accrual is simply the date of breach. Where the same facts give rise to both a contract claim and a tort claim, the claimant may choose whichever limitation position is more favourable.","tags":["dispute_resolution","ch2","2.3 Limitation in contract"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0017","type":"D","question":"Does a defects liability or 'make good' clause in a construction contract shorten the general contractual limitation period?","answer":"No. A defects liability or 'make good' clause, often running for one to two years, requires the contractor to fix defects within that window, but it does not displace the general 6-year contractual limitation period. This is a recognised trap: a make-good clause expiring does not mean the claim itself is time-barred, so cracking discovered at five years, for instance, is still within the 6-year contract period.","tags":["dispute_resolution","ch2","2.3 Limitation in contract"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"2.4 Latent defects — Latent Damage Act 1986","cards":[{"id":"DR_0018","type":"B","question":"What limitation periods apply to latent defects under the Latent Damage Act 1986?","answer":"For negligence claims where a defect was hidden at completion, the limitation period is the later of six years from accrual or three years from the 'starting date', being the earliest date the claimant knew or ought to have known the material facts. This is overridden by an absolute 15-year longstop running from the negligent act or omission, after which the claim is barred no matter how late the damage appears.","tags":["dispute_resolution","ch2","2.4 Latent defects — Latent Damage Act 1986"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"2.5 Contractual restrictions on liability","cards":[{"id":"DR_0019","type":"D","question":"Can parties contractually shorten the statutory limitation period, and is there any limit on doing so?","answer":"Yes — contracts, such as those containing 'entire agreement' clauses, may attempt to shorten the limitation period that would otherwise apply. However, any agreed shorter period is subject to a reasonableness test under the Unfair Contract Terms Act 1977, so an unreasonably short contractual limitation period may not be enforceable.","tags":["dispute_resolution","ch2","2.5 Contractual restrictions on liability"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"2.6 Procedural issues","cards":[{"id":"DR_0020","type":"B","question":"What procedural rules govern exactly when limitation time starts and stops running?","answer":"Time starts the day after the cause of action arose, and it stops when the claimant delivers a properly completed claim form, the request to issue, and the correct fee to the court office — missing any one of these means the court will not issue the claim. If the court office is closed on the day the limitation period expires, the claim is still in time if it is lodged on the next court business day.","tags":["dispute_resolution","ch2","2.6 Procedural issues"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0021","type":"C","question":"How does limitation operate for minors and claimants lacking capacity, and what about fraud, concealment or mistake?","answer":"For a minor, the limitation clock does not start until the claimant's 18th birthday, so a personal injury claimant in that position effectively has until their 21st birthday. If the claimant lacks capacity at the date of accrual, time does not start until they are certified of sound mind, but if capacity is lost only after accrual, the clock keeps running regardless. Where there has been fraud, concealment or mistake, time runs from when the claimant discovers it, or could have discovered it with reasonable diligence.","tags":["dispute_resolution","ch2","2.6 Procedural issues"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0022","type":"D","question":"After limitation has expired, can a claimant correct a misnamed defendant or add an entirely new party?","answer":"Correcting a defendant's name after expiry is permitted where the defendant was correctly identified in substance but simply misnamed, such as through a spelling error. Adding a genuinely new party after expiry is treated differently: the normal limitation period still applies, and if the new defendant raises limitation as a defence, the claimant must apply to the court to disapply it.","tags":["dispute_resolution","ch2","2.6 Procedural issues"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch3","title":"3 . Pre-Action Protocols & Applications","subchapters":[{"title":"3.1 What pre-action protocols are","cards":[{"id":"DR_0023","type":"A","question":"What is the purpose of pre-action protocols, and what is their formal legal status?","answer":"Pre-action protocols are guidance on the steps parties should take before issuing proceedings, with the purpose of focusing parties on settling without litigation and enabling an exchange of information so that negotiation can take place; if settlement fails, they lay the groundwork for proceedings. A key trap is that protocols are Practice Directions rather than Civil Procedure Rules, so they do not carry formal CPR status — but the court still reviews pre-action conduct after issue, and non-compliance carries adverse costs consequences. Protocols must not be used to gain an unfair advantage over the other party.","tags":["dispute_resolution","ch3","3.1 What pre-action protocols are"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"3.2 The Practice Direction on Pre-Action Conduct","cards":[{"id":"DR_0024","type":"B","question":"What does the Practice Direction on Pre-Action Conduct require where no specific protocol exists?","answer":"The Practice Direction expects the claimant to write to the defendant with concise details of the claim, and the defendant to respond within a reasonable time — suggested as around 14 days for straightforward matters up to a maximum of 3 months for complex ones — confirming whether the claim is accepted and, if not, why. It further expects the parties to exchange relevant documents, to note that court permission is needed to rely on expert evidence (and that the court can cap recoverable fees, considering a single joint expert), to consider ADR, and to 'take stock' of the dispute before launching into court.","tags":["dispute_resolution","ch3","3.2 The Practice Direction on Pre-Action Conduct"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"3.3 Specific protocols","cards":[{"id":"DR_0025","type":"C","question":"What common features do the specific pre-action protocols share, and for what types of claim do dedicated protocols exist?","answer":"Specific protocols exist for categories including clinical disputes, construction and engineering, defamation, professional negligence, judicial review, disease and illness, housing disrepair, possession claims, dilapidations, low-value personal injury, and debt claims. Where a claim falls within one of these categories, that protocol governs rather than the general Practice Direction. Common features across these protocols include a template letter of claim and letter of response, pre-action exchange and disclosure of relevant documents, encouragement to instruct a single joint expert, a reminder to consider ADR, and a proposed investigation timetable with a bar on issuing proceedings until a set period has elapsed after the letter of claim.","tags":["dispute_resolution","ch3","3.3 Specific protocols"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"3.4 Consequences of non-compliance","cards":[{"id":"DR_0026","type":"B","question":"What sanctions can the court impose for non-compliance with a pre-action protocol?","answer":"The court considers non-compliance when giving directions or making costs orders, though it ignores minor or technical breaches and may relieve a party of the obligation in appropriate cases. Sanctions can include a costs order against the non-compliant party; if the claimant is non-compliant, depriving it of interest or restricting the rate or period of interest recovered; and if the defendant is non-compliant, ordering it to pay the claimant's costs on the indemnity basis together with a higher rate of interest on damages.","tags":["dispute_resolution","ch3","3.4 Consequences of non-compliance"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"3.5 When it's appropriate to issue before completing the protocol","cards":[{"id":"DR_0027","type":"D","question":"In what circumstances is it appropriate to issue proceedings before the pre-action protocol has been completed?","answer":"It is appropriate to issue early where limitation is about to expire, since issuing avoids the claim becoming statute-barred — in that situation the claimant should tell the defendant why, serve the claim, and then seek a stay so the protocol can still be followed. It is also appropriate where a court order is needed to protect or preserve evidence or assets, or where there is concern that the defendant may issue proceedings abroad to escape the jurisdiction of England and Wales.","tags":["dispute_resolution","ch3","3.5 When it's appropriate to issue before completing the protocol"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"3.6 Pre-action applications","cards":[{"id":"DR_0028","type":"B","question":"What are the criteria for an order for pre-action disclosure, and can it be made against a non-party?","answer":"The criteria for pre-action disclosure are that the respondent is likely to be a party to proceedings, the applicant is likely to be a party, the documents would fall within standard disclosure, and disclosure now would fairly help dispose of the claim without proceedings or would save costs. It can also be ordered against a non-party if disclosure would support the applicant's claim or adversely affect the opponent's case, and is necessary to dispose of the matter fairly or to save costs.","tags":["dispute_resolution","ch3","3.6 Pre-action applications"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0029","type":"D","question":"What must an applicant show to obtain pre-action inspection of property?","answer":"The applicant must show that the property is, or may become, the subject matter of the proceedings, or that it is otherwise relevant to the issues in the case — for example, inspecting and preserving a defective machine before its owner has the opportunity to alter it.","tags":["dispute_resolution","ch3","3.6 Pre-action applications"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"3.7–3.8 Costs & offers in the protocol period","cards":[{"id":"DR_0030","type":"C","question":"What is the costs position where a claimant decides not to proceed after complying with the protocol, and what is the status of a settlement offer made during the protocol period?","answer":"If the parties comply with the protocol but the claimant simply decides not to proceed, the defendant is unlikely to recover its costs; however, if proceedings were issued and then stayed for protocol compliance, for example because limitation was about to expire, recovery of wasted costs is more likely, and only proportionate costs will be awarded in any event. An offer to settle made during the protocol period, if it is not withdrawn, has the same effect as a Part 36 offer made after issue.","tags":["dispute_resolution","ch3","3.7–3.8 Costs & offers in the protocol period"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch4","title":"4 . Starting Proceedings: Choice of Court","subchapters":[{"title":"4.1 How a claim starts","cards":[{"id":"DR_0031","type":"A","question":"How does a claimant start court proceedings once the pre-action protocol has been exhausted?","answer":"Once the protocol has been exhausted and ADR is either not possible or has failed, the claimant starts proceedings by completing a claim form containing brief details of the claim and sending it, together with the fee and a request to issue, to the appropriate court — either for the court to serve it on the defendant, or for the court to return it to the claimant to serve themselves.","tags":["dispute_resolution","ch4","4.1 How a claim starts"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"4.2 High Court or County Court","cards":[{"id":"DR_0032","type":"B","question":"What value thresholds determine whether a claim may be started in the High Court?","answer":"A claim may not be started in the High Court unless it exceeds £100,000, except for personal injury claims, where the threshold is over £50,000. Despite this, a claim over £100,000 may still be started in the County Court instead, such as a straightforward breach of contract claim — the High Court threshold sets a floor for High Court issue, not a requirement to use it.","tags":["dispute_resolution","ch4","4.2 High Court or County Court"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0033","type":"C","question":"Beyond the value threshold, what factors point towards starting a claim in the High Court rather than the County Court?","answer":"A claimant should consider starting in the High Court where, by reason of the financial value or amount in dispute, the complexity of the facts, law, remedies or procedure involved, and/or the public importance of the outcome, the claimant believes the case should be heard by a High Court judge. If a claim is wrongly started in the High Court, the court has the power to transfer it down to the County Court or to strike it out.","tags":["dispute_resolution","ch4","4.2 High Court or County Court"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"4.2.2 Issuing in the County Court","cards":[{"id":"DR_0034","type":"D","question":"Where are debt and specified claims issued, and what is the Damages Claims Portal?","answer":"All debt and specified claims are issued by the Civil National Business Centre (CNBC) in Northampton. Separately, the Damages Claims Portal on MyHMCTS allows digital issue of County Court damages claims, but only where the claimant is legally represented, with the system also allowing defendants to respond digitally.","tags":["dispute_resolution","ch4","4.2.2 Issuing in the County Court"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"4.3–4.4 Part 8 claims & transfer","cards":[{"id":"DR_0035","type":"C","question":"What is a Part 8 claim, and how does the court typically deal with transfer of such a claim after a defence or admission?","answer":"A Part 8 claim is one unlikely to involve a substantial dispute of fact, and it can be started at any County Court hearing centre unless a rule or Practice Direction says otherwise. After a defence or admission is filed, the court typically transfers the claim to the hearing centre local to the defendant's home if the defendant is an individual, or to the claimant's preferred centre if the defendant is a company.","tags":["dispute_resolution","ch4","4.3–4.4 Part 8 claims & transfer"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"4.5 The High Court divisions","cards":[{"id":"DR_0036","type":"B","question":"What are the three divisions of the High Court, and what type of work does each typically handle?","answer":"The High Court has three divisions: King's Bench, Chancery, and Family. The King's Bench Division typically handles defamation, breach of contract, negligence, personal injury, land possession and non-payment of debts, and contains specialist courts such as the Technology and Construction Court for building, engineering and surveying disputes (which does not normally hear cases under £250,000) and the Commercial Court for complex national or international business disputes. The Chancery Division typically handles equity and trusts, commercial fraud, tax, intellectual property, land, business disputes, contentious probate, regulatory work and bankruptcy, including specialist Bankruptcy and Companies Courts.","tags":["dispute_resolution","ch4","4.5 The High Court divisions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0037","type":"D","question":"If a claim form simply states 'High Court' without naming a Division or District Registry, where does it issue?","answer":"If the claim form states only 'High Court' without specifying a Division or a District Registry, it issues out of the Royal Courts of Justice in London. Where the claimant does specify a Division and any relevant District Registry on the claim form, the claim is issued accordingly in that location instead.","tags":["dispute_resolution","ch4","4.5 The High Court divisions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch5","title":"5 . Issuing Proceedings: The Claim Form","subchapters":[{"title":"5.1–5.2 Contents of the claim form (Form N1)","cards":[{"id":"DR_0038","type":"B","question":"What information about the parties must the claim form (Form N1) contain?","answer":"Form N1 is used in both the High Court and the County Court, and it must state the full, unabbreviated name and address of each party. Where a party trades under another name, the form should state, for example, 'Mr John Smith trading as JS Builders'; for a partnership, it should state the firm name plus every partner; and for a company or LLP, it should state the registered name with the correct suffix, such as Ltd, plc or LLP.","tags":["dispute_resolution","ch5","5.1–5.2 Contents of the claim form (Form N1)"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0039","type":"A","question":"What must the claim form state about the statement of value, and what is disregarded when valuing a claim for this purpose?","answer":"The statement of value states how much the claimant expects to recover, which is used to set the track and the court fee; a specified sum is treated as a debt claim, while damages are always treated as an 'unspecified' claim because the court decides the amount. For unspecified claims, the claimant states whether they expect to recover not more than £10,000, more than £10,000, or more than £25,000. A recognised trap is that when valuing the claim, the claimant must disregard interest, costs, contributory negligence, any counterclaim, and sums repayable to the Compensation Recovery Unit — so a £70,000 personal injury claim can still be issued in the High Court even if a counterclaim and contributory negligence might net it below £50,000.","tags":["dispute_resolution","ch5","5.1–5.2 Contents of the claim form (Form N1)"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0040","type":"B","question":"What court fees apply to claims of different values, and who signs the statement of truth on the claim form?","answer":"The court fee for claims over £10,000 up to £200,000 is 5% of the claim's value, while claims over £200,000 attract a fixed fee of £10,000. The statement of truth, declaring that the facts in the claim form are true, is usually signed by the claimant based on their first-hand knowledge; a solicitor may sign it only in exceptional circumstances where the claimant is unavailable.","tags":["dispute_resolution","ch5","5.1–5.2 Contents of the claim form (Form N1)"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"5.2.7 Particulars of Claim","cards":[{"id":"DR_0041","type":"D","question":"What is the Particulars of Claim, and when must it be served if not included with the claim form?","answer":"The Particulars of Claim is the detailed statement of the case; it may appear on the back of the claim form itself, but is usually served as a separate document, either together with the claim form or within 14 days after service of the claim form.","tags":["dispute_resolution","ch5","5.2.7 Particulars of Claim"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"5.3 Issuing","cards":[{"id":"DR_0042","type":"C","question":"What happens procedurally when the court issues a claim, and what two time-related effects does issue have?","answer":"The court issues the claim by sealing the claim form, allocating a claim number, and sending a Notice of Issue stating the issue date. Issue has two important effects: it stops time running for limitation purposes, and it starts time running for service of the claim form. Before sending the claim form to the court, the claimant must also decide whether the court or the claimant will serve it, since this affects exactly what documents need to be sent with it.","tags":["dispute_resolution","ch5","5.3 Issuing"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"5.4 Part 8 claims","cards":[{"id":"DR_0043","type":"D","question":"How does a Part 8 claim differ procedurally from an ordinary Part 7 claim once a defendant is served?","answer":"Under a Part 8 claim, the defendant does not file a defence; instead, they file witness evidence with the acknowledgment of service, and the claim is then treated as if it were on the multi-track. A defendant who fails to respond to a Part 8 claim cannot take part in the hearing without the court's permission. The exam tip is that ordinary claims are Part 7, and a claim should only be treated as Part 8 where the facts are clearly not in dispute.","tags":["dispute_resolution","ch5","5.4 Part 8 claims"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch6","title":"6 . Service of Proceedings","subchapters":[{"title":"6.2 Time limits for service","cards":[{"id":"DR_0044","type":"A","question":"What are the time limits for serving a claim form within and outside the jurisdiction?","answer":"Within the jurisdiction, the sealed claim form must be served within 4 months of issue, by midnight on the calendar day four months after issue. Outside the jurisdiction, the claimant has 6 months from issue to serve the claim form. Service rules are applied strictly by the courts, and a defendant need not respond at all until they have been properly served.","tags":["dispute_resolution","ch6","6.2 Time limits for service"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"6.3 Methods of service (within the jurisdiction)","cards":[{"id":"DR_0045","type":"B","question":"What rules govern personal service of the claim form on an individual, a company and a partnership?","answer":"Personal service on an individual requires physically handing the documents to that person. For a company, personal service requires leaving the documents with a senior person such as the chairman, chief executive, managing director or other director. For a partnership, it requires leaving the documents with a partner, or with the person managing the business at its principal place of business. A recognised trap is that it is still good service if the recipient hands the papers back or drops them, provided the server explained the documents' general nature, and a company cannot be served by posting to a director's home address.","tags":["dispute_resolution","ch6","6.3 Methods of service (within the jurisdiction)"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0046","type":"D","question":"What conditions must be satisfied for service by fax or email to be valid?","answer":"Service by fax requires the recipient to have expressed a written willingness to be served that way, given a fax number for the purpose, and the number must be within the jurisdiction. Service by email requires the recipient's express consent and an email address given for that purpose — merely having an address on letterhead is not consent, and nor is the fact that the parties have emailed each other before.","tags":["dispute_resolution","ch6","6.3 Methods of service (within the jurisdiction)"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"6.4 Deemed service of the claim form","cards":[{"id":"DR_0047","type":"A","question":"When is a claim form deemed to have been served, and what counts as a 'business day' for this purpose?","answer":"For any method of service other than personal service by the claimant, there is an irrebuttable presumption that the claim form is deemed served on the second business day after the relevant step was taken. A business day excludes Saturdays, Sundays, bank holidays, Good Friday and Christmas Day — so, for example, personal service carried out on a Monday is deemed served on the Wednesday.","tags":["dispute_resolution","ch6","6.4 Deemed service of the claim form"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"6.5–6.7 Special situations, challenges & certificates","cards":[{"id":"DR_0048","type":"C","question":"What steps must be taken where a defendant's whereabouts are unknown, and what counts as invalid service that the defendant can challenge?","answer":"Where the defendant's whereabouts are unknown, the claimant should serve at a known address; if it is believed the defendant has moved, reasonable steps must be taken to find the current address, failing which the claimant serves the last known address or applies for alternative service. Invalid service that a defendant can challenge includes service of an unsealed photocopy, fax or email sent without permission, service out of time, service on the wrong person, or service at a wrong address where insufficient attempts were made to trace the defendant. A defendant who wishes to challenge service must indicate this on the acknowledgment of service and apply within 14 days.","tags":["dispute_resolution","ch6","6.5–6.7 Special situations, challenges & certificates"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"6.8–6.9 Extending validity & service out of the jurisdiction","cards":[{"id":"DR_0049","type":"D","question":"When can the validity of a claim form be extended, and what must a claimant show to serve out of the jurisdiction?","answer":"An application to extend the claim form's validity must be made within the original validity period, and the court grants it only in exceptional circumstances. To serve out of the jurisdiction (other than within Scotland, Northern Ireland or elsewhere in the UK, where no permission is needed), the claimant must obtain the court's permission and show that England and Wales is the most appropriate forum for the dispute; the defendant can challenge this either before service, by seeking to set aside the order, or after service, by seeking to set aside the service itself.","tags":["dispute_resolution","ch6","6.8–6.9 Extending validity & service out of the jurisdiction"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"6.10–6.11 Service by alternative method & service of Particulars","cards":[{"id":"DR_0050","type":"B","question":"Can the court permit alternative service retrospectively, and by when must the Particulars of Claim be served if not served with the claim form?","answer":"Yes — if service cannot be achieved within the validity period, the court can permit an alternative method or place of service where there is good reason, and it can do this retrospectively, treating steps already taken as good service, particularly where the defendant clearly had notice of the proceedings. Where the Particulars of Claim are not served with the claim form, they must be served within 14 days of service of the claim form, but never later than the end of the 4-month claim-form validity period — for example, if a claim form issued on 1 March is served on 25 June, the Particulars are due by 1 July (the end of the validity period), not 9 July.","tags":["dispute_resolution","ch6","6.10–6.11 Service by alternative method & service of Particulars"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch7","title":"7 . Responding to a Claim","subchapters":[{"title":"7.1 Time to respond & deemed service of documents","cards":[{"id":"DR_0051","type":"A","question":"From what point does the 14-day period for a defendant to respond to a claim run, and how is deemed service of documents other than the claim form calculated?","answer":"The defendant must respond within 14 days after deemed service of the Particulars of Claim, not the claim form — until the Particulars arrive, no response is due at all. For documents other than the claim form, deemed service is calculated under CPR 6.26: for first-class post or DX, it is the second day after posting if that is a business day (otherwise the next business day); for documents left at a permitted address, fax or other electronic service, or personal service, it is that same day if completed before 4:30pm on a business day, otherwise the next business day.","tags":["dispute_resolution","ch7","7.1 Time to respond & deemed service of documents"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"7.2–7.3 The available responses & extensions","cards":[{"id":"DR_0052","type":"B","question":"What options are available to a defendant on receiving a claim, and what happens if there is no response within 14 days?","answer":"A defendant may admit the claim, file and serve a defence (possibly with a counterclaim), or acknowledge service and indicate an intention to defend. If there is no response within 14 days, the claimant is entitled to enter judgment. The parties may agree an extension of up to a further 28 days, making 56 days in total, from deemed service of the Particulars where an acknowledgment of service was filed, though the court must be informed and any longer extension requires a court application.","tags":["dispute_resolution","ch7","7.2–7.3 The available responses & extensions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"7.4 Admissions","cards":[{"id":"DR_0053","type":"C","question":"How does the court treat an admission of a whole claim for a specified sum, and what happens with an unspecified amount?","answer":"Where the defendant admits the whole claim for a specified sum, the court issues judgment for that sum plus accrued interest and fixed costs, and an admission made during the protocol binds the defendant in claims worth up to £25,000. Where the amount is unspecified, the court instead stays the case and lists a disposal hearing to assess damages. Admissions made by or on behalf of minors or protected parties must be approved by the court, and an admission can only be withdrawn with the court's permission, having regard to factors such as prejudice, the reasons it was made, and the interests of justice.","tags":["dispute_resolution","ch7","7.4 Admissions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"7.5 Defence & acknowledgment of service","cards":[{"id":"DR_0054","type":"A","question":"What must a defence contain beyond a bare denial, and what are the timing options for filing it?","answer":"The CPR require a defendant to do more than bare-deny a claim; the defence must state why the claim is disputed and advance an alternative version of events. On timing, the defendant can either file a defence within 14 days of the Particulars with no acknowledgment of service needed, or file an acknowledgment of service within 14 days, which extends the defence deadline to 28 days from service of the Particulars. The acknowledgment also lets the defendant signal an intention to dispute jurisdiction or to admit and seek time to pay.","tags":["dispute_resolution","ch7","7.5 Defence & acknowledgment of service"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"7.6–7.7 Summary judgment & disputing jurisdiction","cards":[{"id":"DR_0055","type":"D","question":"What is the procedure for a defendant who wishes to dispute the court's jurisdiction, and what is the critical procedural trap?","answer":"To dispute jurisdiction, the defendant ticks the relevant box on the acknowledgment of service and then applies, with written evidence, within 14 days of filing that acknowledgment. The critical trap is that the defendant must not file a defence first — doing so submits to the jurisdiction of the court and defeats the jurisdiction challenge entirely, regardless of its underlying merits.","tags":["dispute_resolution","ch7","7.6–7.7 Summary judgment & disputing jurisdiction"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"7.8 Default judgment & setting it aside","cards":[{"id":"DR_0056","type":"B","question":"What must be shown to set aside a default judgment, and when must the court set one aside as of right?","answer":"To set aside a default judgment, the court must be satisfied that the defendant has a real prospect of successfully defending the claim, or that there is some other good reason to set it aside and let the defendant defend, applying the three-stage relief-from-sanctions test and considering whether the defendant acted promptly. The court must set judgment aside, regardless of the merits, where it was wrongly entered in the first place — for instance, entered too early, while a strike-out or summary judgment application was pending, where the claim had already been paid or settled, or where a time-to-pay request was outstanding.","tags":["dispute_resolution","ch7","7.8 Default judgment & setting it aside"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"7.9 Discontinuance & settlement","cards":[{"id":"DR_0057","type":"C","question":"How does a claimant discontinue their own claim, and what legal weight does a settlement carry before it is recorded in a court order?","answer":"A claimant may discontinue at any stage by filing a Notice of Discontinuance, which ends the claim but is subject to the claimant having to pay the defendant's costs. A settlement reached at any stage of the proceedings carries no legal weight at all until it is embodied in a clear, unambiguous court order setting out the terms and the time for payment, such as a Tomlin order.","tags":["dispute_resolution","ch7","7.9 Discontinuance & settlement"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch8","title":"8 . Statements of Case","subchapters":[{"title":"8.4 Particulars of Claim — content","cards":[{"id":"DR_0058","type":"A","question":"What are 'statements of case', and what purpose do they serve in the proceedings?","answer":"Statements of case comprise the Particulars of Claim, the defence and any reply. Driven by the overriding objective, their purpose is to let the judge identify the issues early and g

ive proportionate directions; their job is to outline each party's case on liability, causation and quantum, and an inadequate statement of case can be struck out.","tags":["dispute_resolution","ch8","8.4 Particulars of Claim — content"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0059","type":"B","question":"What types of allegation must be specifically pleaded in a statement of case if a party intends to rely on them?","answer":"Certain matters must be specifically pleaded if a party intends to rely on them, including fraud, illegality, misrepresentation, breach of trust, notice or knowledge of a fact, unsoundness of mind, undue influence, wilful default, and an allegation that the other side failed to mitigate its loss. This requirement reflects the broader purpose of statements of case in identifying the real issues in dispute early in the proceedings.","tags":["dispute_resolution","ch8","8.4 Particulars of Claim — content"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0060","type":"D","question":"How does the basis for claiming interest in a breach of contract claim work, and what rates are typically used?","answer":"Interest must be pleaded by stating the basis for it, whether contractual or statutory, and for a specified sum, the rate, the period, the total and the daily rate thereafter. In a breach of contract claim, interest is awarded at the statutory rate or the contract rate, whichever is higher; the statutory rate is not fixed, but courts typically use 8% in non-commercial cases and 1% above the Bank of England base rate in commercial cases.","tags":["dispute_resolution","ch8","8.4 Particulars of Claim — content"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"8.5 The defence — admit / deny / non-admit","cards":[{"id":"DR_0061","type":"C","question":"What are the three ways a defence can respond to a paragraph of the Particulars of Claim, and what is the effect of failing to respond to a paragraph?","answer":"A defence must respond to each paragraph of the Particulars in one of three ways: admit, meaning the fact is no longer in dispute and the claimant need not prove it; deny, meaning the defendant gives reasons and sets out a positive alternative case, so the claimant must then prove the fact; or non-admission, used where the fact is outside the defendant's knowledge, such as the claimant's losses, where the claimant must still prove it. Failing to respond to a paragraph at all is treated as a deemed admission of that paragraph.","tags":["dispute_resolution","ch8","8.5 The defence — admit / deny / non-admit"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0062","type":"D","question":"What is the difference between a non-admission and a denial in a defence?","answer":"A non-admission effectively says 'I don't know whether this is true', used where the relevant fact is outside the defendant's own knowledge, and the claimant must still prove the point. A denial, by contrast, says 'I know this is untrue', and the defendant must give reasons for the denial and set out a positive alternative version of events — the two responses are not interchangeable, since they carry different evidential and pleading consequences.","tags":["dispute_resolution","ch8","8.5 The defence — admit / deny / non-admit"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0063","type":"B","question":"What is set-off, and how does it differ from a counterclaim filed with the defence in terms of permission?","answer":"Set-off is where the defendant reduces the sum it owes the claimant by a sum the claimant in turn owes the defendant, which is common in debt claims. A counterclaim against the claimant on the same or substantially the same facts can be filed without permission if it is filed together with the defence, but permission is needed if it is filed later — the defence may also dispute the claimant's statement of value, give the defendant's own figure where possible, and address whether a PI medical report is agreed.","tags":["dispute_resolution","ch8","8.5 The defence — admit / deny / non-admit"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"8.6 Reply","cards":[{"id":"DR_0064","type":"A","question":"What is a reply, and what is its purpose and limitation?","answer":"A reply is an optional statement of case responding to the defence, used only to address genuinely new points raised in it. No adverse inference is drawn against a claimant who chooses not to file a reply, and importantly a reply cannot be used to fix omissions that should have appeared in the original Particulars of Claim.","tags":["dispute_resolution","ch8","8.6 Reply"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"8.7 Part 20 (additional) claims","cards":[{"id":"DR_0065","type":"C","question":"What is the difference between contribution and indemnity in a Part 20 claim, and what permission rules apply to a contribution notice filed against a co-party?","answer":"Contribution means paying part of the loss, while indemnity means paying all of it. A contribution or indemnity notice against a co-party needs no permission if it is filed with the defence; if it is served against a party who joins later, no permission is needed provided it is served within 28 days of that party filing its defence, and no claim form or fee is required for that route.","tags":["dispute_resolution","ch8","8.7 Part 20 (additional) claims"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0066","type":"D","question":"What happens if a Part 20 additional party fails to respond to the claim made against them?","answer":"An additional party brought into the proceedings under Part 20 who fails to respond is deemed to admit the main action and is bound by its outcome. A defence to a counterclaim, separately, is due within 14 days, failing which the claimant who counterclaimed may enter judgment on it.","tags":["dispute_resolution","ch8","8.7 Part 20 (additional) claims"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"8.8 Requests for Further Information (RFI)","cards":[{"id":"DR_0067","type":"B","question":"What is a Request for Further Information, and on what grounds can a party object to providing it?","answer":"Any party may request clarification or additional information on a disputed matter; the proper process is to make a formal request first, applying to the court only if there has been no adequate response within a reasonable time, and replies require a statement of truth. A party can object to an RFI on the grounds that the request is unnecessary, irrelevant or improper, that the responding party cannot provide the information, that insufficient time was given, that the expense would be disproportionate, or that the information is protected by privilege.","tags":["dispute_resolution","ch8","8.8 Requests for Further Information (RFI)"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"8.9 Amending a statement of case","cards":[{"id":"DR_0068","type":"A","question":"What rules govern amending a statement of case, and when can a new party be added or substituted after limitation has already expired?","answer":"Before service, a statement of case can be amended at any time without permission; after service, it can only be amended with the written consent of all parties or with the court's permission. After limitation has expired, a party may only be added or substituted if limitation was current when proceedings started and the change is necessary — meaning a party was named by mistake, the claim cannot continue without the change, or the original party died or became bankrupt and the relevant interest passed on.","tags":["dispute_resolution","ch8","8.9 Amending a statement of case"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch9","title":"9 . Case Management & Track Allocation","subchapters":[{"title":"9.2 The overriding objective","cards":[{"id":"DR_0069","type":"A","question":"What is the overriding objective, and what does it require of the court in managing cases?","answer":"The overriding objective requires the court to deal with cases justly and at proportionate cost, putting the parties on an equal footing, saving expense, being proportionate to the value, importance and complexity of the case, ensuring matters proceed expeditiously and fairly, allotting an appropriate share of the court's resources, and enforcing compliance with rules and orders. In pursuit of this, the court actively identifies the issues early, decides what genuinely needs a full trial, encourages settlement, and fixes timetables for the case.","tags":["dispute_resolution","ch9","9.2 The overriding objective"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"9.3 Allocation","cards":[{"id":"DR_0070","type":"B","question":"What are the four case management tracks and their value bands, and what factors does the court weigh when allocating a case to a track?","answer":"The four tracks are the small claims track for claims up to £10,000, the fast track for claims between £10,000 and £25,000, the intermediate track for claims between £25,000 and £100,000, and the multi-track for claims over £100,000. Allocation turns mainly on financial value, but also on the remedy sought, the complexity of the case, any counterclaim, the number of parties, the amount of oral evidence required, the importance of the case to non-parties, and the parties' own circumstances; the court ignores sums not genuinely in dispute, interest, costs and contributory negligence when valuing the claim for this purpose.","tags":["dispute_resolution","ch9","9.3 Allocation"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0071","type":"C","question":"What is the maximum trial length and expert evidence regime on the fast track and the intermediate track?","answer":"On the fast track, the trial must not exceed 1 day, fixed recoverable costs apply, written evidence is emphasised with witness statements standing as evidence-in-chief, single joint experts are encouraged, and each party may use a maximum of 2 experts in 2 fields. On the intermediate track, which excludes clinical negligence unless breach and causation are admitted, the trial must not exceed 3 days, each party may again use a maximum of 2 experts whose reports are limited to 20 pages, and fixed recoverable costs apply.","tags":["dispute_resolution","ch9","9.3 Allocation"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0072","type":"D","question":"Can a low-value claim be allocated to a higher track than its value would suggest, and what is the trap regarding the value used for allocation?","answer":"Yes — a claim can be moved up a track regardless of its headline value, for example a £15,000 claim being placed on the multi-track because the trial is expected to take two days. The trap is that the value used is the amount genuinely in dispute, not the headline figure on the claim form, so a £13,000 claim where only £5,000 is genuinely disputed can still be allocated to the small claims track.","tags":["dispute_resolution","ch9","9.3 Allocation"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"9.8 The Directions Questionnaire (DQ)","cards":[{"id":"DR_0073","type":"B","question":"What is the Directions Questionnaire, and within what time limit must it be returned?","answer":"The Directions Questionnaire helps the court make appropriate case management directions, covering matters such as use of Welsh, protocol compliance, case management information including the proposed track and disclosure, the identity and need for experts, witnesses and their issues, estimated trial length, anticipated costs, and proposed trial periods. It must be returned within 28 days of service, and the parties are not permitted to agree an extension to that deadline between themselves.","tags":["dispute_resolution","ch9","9.8 The Directions Questionnaire (DQ)"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"9.10 Multi-track directions & CMCs","cards":[{"id":"DR_0074","type":"A","question":"What happens at a Case Management Conference in a multi-track case, and what is required of the parties beforehand?","answer":"For high-value or complex multi-track cases, the court lists a Case Management Conference (CMC); the parties must file disclosure reports at least 14 days before the CMC and costs budgets at least 7 days before it, and a case summary is mandatory. The CMC reviews the case's progress and compliance, gives further directions, encourages agreement between the parties, and handles preliminary issues such as trying limitation separately or splitting the case into stages.","tags":["dispute_resolution","ch9","9.10 Multi-track directions & CMCs"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"9.11 Non-compliance, sanctions & relief","cards":[{"id":"DR_0075","type":"C","question":"What is the usual precondition before a court will strike out a claim or defence for non-compliance, and what is the relief-from-sanctions test?","answer":"The court will generally not strike out a claim, defence or counterclaim for non-compliance unless the innocent party first obtained an 'unless' order, specifying a penalty unless the other party complies, which was then itself breached — so the tactical step on the other side's default is to apply for an unless order. Relief from sanctions requires a good reason, since merely complying late is not enough on its own; beyond proportionality and the overriding objective, the court weighs the seriousness of the breach and the reasons for it, with something like a serious illness or accident potentially justifying relief, but an unexplained delay will not.","tags":["dispute_resolution","ch9","9.11 Non-compliance, sanctions & relief"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch10","title":"10 . Interim Applications","subchapters":[{"title":"10.3–10.6 Procedure","cards":[{"id":"DR_0076","type":"B","question":"What is the standard notice period for an interim application, and what is the exception?","answer":"An interim application is any application requiring a judicial decision, and the applicant must comply fully with the rules and the overriding objective or risk an adverse costs order. The standard requirement is at least 3 days' notice to the other side (5 days if the application is made by telephone), with all supporting evidence filed in writing with the notice and fee; an application made without notice is exceptional, used where giving notice would defeat the application's purpose, typically for freezing or search orders.","tags":["dispute_resolution","ch10","10.3–10.6 Procedure"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0077","type":"D","question":"What happens after a without-notice order is made, and what risk does a solicitor face if the application was wrongly made without notice?","answer":"After a without-notice order is made, it is served on the respondent together with the evidence relied upon, and the respondent then has 7 days to apply to vary or discharge the order. If the without-notice application is later found to have been wrongly made, the solicitor who made it risks a wasted costs order being made against them personally.","tags":["dispute_resolution","ch10","10.3–10.6 Procedure"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"10.9 Summary judgment & strike-out","cards":[{"id":"DR_0078","type":"A","question":"What is the test for summary judgment, and how does it differ from a strike-out?","answer":"Either party may apply for summary judgment at any time; the test is that the other side has no real prospect of success and there is no other compelling reason for a trial. This differs from a strike-out, which is available where there are no reasonable grounds for bringing or defending the claim at all, where the statement of case is an abuse of process, or where there has been a failure to comply with a rule, Practice Direction or order. The key trap is that where the Particulars disclose no allegation or cause of action at all, that is a strike-out situation rather than summary judgment, which is reserved for claims or defences that exist but lack merit.","tags":["dispute_resolution","ch10","10.9 Summary judgment & strike-out"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0079","type":"B","question":"What is the evidence timetable for a summary judgment application, and what outcomes are possible?","answer":"For summary judgment, the applicant must serve evidence at least 14 days before the hearing, the respondent must serve evidence at least 7 days before, and any reply must be served at least 3 days before. The possible outcomes are that the claimant wins and obtains summary judgment, the defendant wins and the claim is struck out, the application fails and the court instead gives directions for trial, or the court makes a conditional order, such as requiring a sum to be paid into court.","tags":["dispute_resolution","ch10","10.9 Summary judgment & strike-out"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"10.9.3 Interim payments","cards":[{"id":"DR_0080","type":"C","question":"On what grounds can a claimant obtain an interim payment, and what cap applies to the amount awarded?","answer":"An interim payment is an order to pay money before final determination of the claim; it is always discretionary and will never be ordered if it would cause injustice. Grounds include the defendant having admitted liability, judgment having been obtained but the sum being unassessed, the court being satisfied the claimant would obtain judgment for a substantial sum at trial, or, where there are multiple defendants, judgment against at least one of them where each defendant is insured. The court cannot award more than a reasonable proportion of the likely final judgment, though courts have in practice awarded 75% or more, and must account for contributory negligence, set-off and any counterclaim.","tags":["dispute_resolution","ch10","10.9.3 Interim payments"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"10.10 Relief from sanctions — the three-stage test","cards":[{"id":"DR_0081","type":"A","question":"What are the three stages of the relief-from-sanctions test, and to what other application does the same test apply?","answer":"The three-stage relief-from-sanctions test asks first whether the breach was serious or significant, since if it was not serious relief is likely; second, why the default occurred, with a good reason such as serious illness or accident supporting relief; and third, all the circumstances of the case, so that the court can deal justly with the application overall. This same test also governs applications to set aside a default judgment.","tags":["dispute_resolution","ch10","10.10 Relief from sanctions — the three-stage test"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"10.11 Injunctions","cards":[{"id":"DR_0082","type":"B","question":"What is an injunction, and when will the court refuse to grant one?","answer":"An injunction is an order either to do something (mandatory) or to stop doing something (prohibitory), and can be granted on an interim basis before trial or as a final remedy; breach of an injunction is contempt of court, with a penal notice warning of up to 2 years' imprisonment or sequestration of assets. The court will not grant an injunction where damages would be an adequate remedy instead. An injunction is often sought without notice, in which case it runs until a return date when the respondent can argue against it, and all types of injunction lie in the High Court because the County Court's jurisdiction is limited.","tags":["dispute_resolution","ch10","10.11 Injunctions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0083","type":"D","question":"What grounds allow a respondent to seek discharge of an injunction, and what undertaking might the court require of the applicant?","answer":"Grounds for discharge of an injunction include material non-disclosure by the applicant when obtaining it, breach of the order's own terms, the underlying facts not justifying relief, oppression, a material change of circumstances or law, or failure by the applicant to prosecute the matter with due speed. The court may also require an undertaking in damages from the applicant, so that the respondent can be compensated if the injunction turns out to have been wrongly granted.","tags":["dispute_resolution","ch10","10.11 Injunctions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"10.12 Freezing injunctions","cards":[{"id":"DR_0084","type":"A","question":"What are the four requirements for a freezing injunction, and which court must grant it?","answer":"A freezing injunction is a prohibitory injunction stopping a defendant from dissipating assets, and it must be made by a High Court judge, usually without notice. The four requirements are that the claimant has a good arguable case, that the defendant has assets within the jurisdiction, that there is a real risk of those assets being dissipated or removed before judgment can be enforced, and that granting the order is just and right in the circumstances.","tags":["dispute_resolution","ch10","10.12 Freezing injunctions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0085","type":"B","question":"What limits apply to the scope of a freezing injunction, and what undertakings must the claimant give?","answer":"The amount frozen under a freezing injunction must not exceed the maximum value of the claim, and the order must state its own duration. In return, the claimant must give undertakings, including an undertaking in damages, an undertaking to notify the defendant of the order, an undertaking to inform third parties such as banks, and an undertaking to indemnify third parties for expenses incurred in complying with the order. The order binds third parties who have knowledge of it, and it can be varied to allow for living expenses, where the frozen amount is excessive, or to permit a legitimate set-off.","tags":["dispute_resolution","ch10","10.12 Freezing injunctions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"10.13 Search orders & preservation of property","cards":[{"id":"DR_0086","type":"C","question":"What are the three requirements for a search order, and who oversees its execution?","answer":"A search order is a mandatory injunction, treated as a relief of last resort, allowing the claimant to search the defendant's premises and seize evidence at risk of destruction. The three requirements are a strong prima facie case on the merits, conduct by the defendant causing very serious harm to the claimant's interests, and clear evidence that the relevant documents or property are in the defendant's possession with a real risk of destruction before an on-notice application could be made. An independent supervising solicitor oversees execution of the order, explaining it to the defendant, informing them of their right to advice and to apply to vary or discharge it, and reporting on the search; the claimant's solicitor must undertake to return originals within 2 days and to hold disputed property securely.","tags":["dispute_resolution","ch10","10.13 Search orders & preservation of property"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch11","title":"11 . Disclosure & Inspection","subchapters":[{"title":"11.2 Standard disclosure","cards":[{"id":"DR_0087","type":"A","question":"What is the difference between disclosure and inspection, and how long does the duty to disclose last?","answer":"Disclosure means stating that a document exists, not showing it to the other side; inspection is the separate process of allowing the other party to actually view documents that have been disclosed. The duty to disclose is a continuing one, reflecting the CPR's 'cards on the table' approach, and it ends only when the proceedings themselves conclude. A 'document' for these purposes is anything containing recorded information, including emails (even deleted ones), databases, servers, hard drives, photographs and physical objects.","tags":["dispute_resolution","ch11","11.2 Standard disclosure"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0088","type":"B","question":"What documents must a party disclose under standard disclosure, and who signs the disclosure statement?","answer":"Standard disclosure, the default order for all cases except the small claims track, requires each party to disclose documents it relies on, plus documents that adversely affect its own case, that adversely affect another party's case, or that support another party's case — limited to documents relevant to the issues and within the party's control, meaning physical possession, a right to possession, inspection or copying, or a document it once had. A reasonable and proportionate search must be carried out, and it is the party itself, not the lawyer, who signs the disclosure statement certifying this; a false disclosure statement can amount to contempt of court, and the lawyer must advise on the duty and cease acting if the client refuses to comply.","tags":["dispute_resolution","ch11","11.2 Standard disclosure"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"11.3 Disclosure orders, lists & inspection","cards":[{"id":"DR_0089","type":"C","question":"What three categories appear on a disclosure list, and what standard time limits apply to lists and inspection?","answer":"The disclosure list has three parts: documents that the party does not object to the other side inspecting, documents that are objected to (usually on the grounds of privilege) together with reasons for the objection, and documents that are no longer within the party's control. Standard directions typically allow 28 days for the lists to be exchanged and inspection within 7 days of notice, usually achieved by providing photocopies; inspection can be refused on grounds of privilege, loss of control, or disproportionality, and documents may be redacted to remove irrelevant or confidential parts.","tags":["dispute_resolution","ch11","11.3 Disclosure orders, lists & inspection"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0090","type":"D","question":"What options does a party have if it believes the other side's disclosure is inadequate?","answer":"If disclosure appears inadequate, for example because documents seem to be missing, privilege has been wrongly claimed, or the search appears weak, the available options are to apply for specific disclosure, to serve a Notice to Admit Facts, to make a Request for Further Information, or to seek an unless order against the non-compliant party.","tags":["dispute_resolution","ch11","11.3 Disclosure orders, lists & inspection"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"11.5–11.6 Specific & pre-action disclosure","cards":[{"id":"DR_0091","type":"A","question":"What is specific disclosure, and against whom is pre-action disclosure generally available?","answer":"Specific disclosure allows the court to order a party to disclose or search for documents it believes may help the applicant's case or damage the respondent's case, or that may lead to a train of enquiry with either effect; the proper process is to make a written request first, supported by evidence of the belief that disclosure has been inadequate. Pre-action disclosure is usually only available against a party who is likely to become a party to the proceedings; against a non-party, it is available only in special cases such as freezing injunctions, search orders, preservation orders, or requests for information.","tags":["dispute_resolution","ch11","11.5–11.6 Specific & pre-action disclosure"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"11.7 Privilege","cards":[{"id":"DR_0092","type":"B","question":"What is legal advice privilege, and how does it differ from litigation privilege in terms of the parties involved and whether litigation is required?","answer":"Legal advice privilege protects confidential communications between a client and their lawyer where the dominant purpose is giving or receiving legal advice; it applies whether or not litigation is contemplated, and it covers only the solicitor–client relationship, not advice from other professionals such as accountants. Litigation privilege, by contrast, protects confidential communications with third parties such as experts or barristers, made for the purpose of pending or reasonably contemplated litigation (a real likelihood, not a mere possibility); for multi-purpose documents, it applies only if the dominant purpose is litigation, and the privilege is lost if the document is used at trial since it must then be exchanged.","tags":["dispute_resolution","ch11","11.7 Privilege"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0093","type":"C","question":"What is common interest privilege and without prejudice privilege, and what is public interest immunity?","answer":"Common interest privilege protects documents shared between parties with a shared interest, such as co-defendants, provided the common interest existed at the time of sharing; waiving it requires all interested parties to agree, and it survives a later breakdown in relations between them. Without prejudice privilege protects genuine settlement communications, which the opponent cannot refer to in the action. Public interest immunity, which is not strictly a form of privilege, allows withholding of material where disclosure would harm the nation or the administration of justice, with the court balancing the harm against the value of the material to the other party.","tags":["dispute_resolution","ch11","11.7 Privilege"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"11.8 Loss of privilege","cards":[{"id":"DR_0094","type":"D","question":"Whose privilege is it, how is it waived, and what happens if a privileged document is mistakenly disclosed and inspected?","answer":"Privilege belongs to the client, who alone may choose to waive it; serving a copy of a document on the other side waives privilege in it, which is why a witness statement served under directions loses its privilege, while an unused and unhelpful statement retains it. Where a privileged document is mistakenly disclosed, the party who has inspected it may use it only with the court's permission, and the court can prevent its use where there was an 'obvious mistake' in the disclosure.","tags":["dispute_resolution","ch11","11.8 Loss of privilege"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"11.9 Electronic disclosure","cards":[{"id":"DR_0095","type":"B","question":"What does electronic disclosure cover, and how do parties typically deal with disputes about its scope?","answer":"Electronic disclosure covers emails, stored data and deleted documents. Parties complete an Electronic Disclosure Questionnaire alongside the disclosure list and must try to agree the scope of the electronic search between themselves, with any disputes referred to the judge at the first Case Management Conference.","tags":["dispute_resolution","ch11","11.9 Electronic disclosure"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch12","title":"12 . Witness Evidence","subchapters":[{"title":"12.1 Types of evidence","cards":[{"id":"DR_0096","type":"A","question":"What must the claimant prove in civil proceedings, and what is the difference between direct and circumstantial evidence?","answer":"The claimant must prove every element of the claim, namely liability, causation and quantum. Direct evidence is oral evidence from a witness who personally perceived the relevant facts, while circumstantial evidence is evidence that allows the court to infer a fact, which includes opinion evidence, generally reserved for expert witnesses rather than lay witnesses.","tags":["dispute_resolution","ch12","12.1 Types of evidence"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"12.2 Witnesses generally","cards":[{"id":"DR_0097","type":"B","question":"What is the general rule about how trial evidence is given, and what can compel an unwilling witness to attend?","answer":"The general rule is that trial evidence comes from witnesses who have provided a signed statement verified by a statement of truth and served on time in accordance with the directions; the witness then attends to be cross-examined, and if a statement was not served, the witness cannot be called without the court's permission. A witness must be competent, meaning they have the legal capacity to be lawfully called, and an unwilling witness can be compelled to attend by a witness summons, issued on request and served at least 7 days before the hearing along with conduct money for travel and lost earnings.","tags":["dispute_resolution","ch12","12.2 Witnesses generally"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"12.3–12.6 Statements, exchange, summaries & affidavits","cards":[{"id":"DR_0098","type":"C","question":"What is a witness summary, and when is an affidavit required rather than an ordinary witness statement?","answer":"A witness summary, identifying the witness and the issues their evidence covers, may be served with the court's permission where a full witness statement cannot be obtained in time. An affidavit is a sworn statement made before a solicitor, and is required for certain processes, such as applications for freezing injunctions and search orders, which must be supported by affidavit evidence.","tags":["dispute_resolution","ch12","12.3–12.6 Statements, exchange, summaries & affidavits"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"12.7 Hearsay","cards":[{"id":"DR_0099","type":"D","question":"What is hearsay evidence, and when does a witness statement stop being treated as hearsay?","answer":"Hearsay is a statement made out of court that is tendered to prove the truth of its contents; it is admissible in civil proceedings under the Civil Evidence Act, although the judge gives it less weight because it cannot be tested by cross-examination. All witness statements start out as hearsay, but they cease to be hearsay once the witness attends trial, confirms the statement as their evidence-in-chief, and is cross-examined on it — a statement remains hearsay if the witness is unable to attend.","tags":["dispute_resolution","ch12","12.7 Hearsay"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0100","type":"B","question":"What factors does a judge weigh when deciding what weight to give to hearsay evidence, and what is the process for serving a hearsay notice?","answer":"The judge weighs factors such as whether it was reasonable or practicable to compel the witness's attendance, whether the statement was contemporaneous, whether it amounts to multiple hearsay, any motive the witness might have had to misrepresent or conceal facts, whether the statement was edited, and any attempt to prevent its proper evaluation. The proper process is to serve a hearsay notice on the opponent: if the witness will attend trial, serving the statement is itself sufficient notice, but if not, a formal hearsay notice must be served, after which the other party has 14 days to apply to call the witness or to give notice of an intention to attack their credibility.","tags":["dispute_resolution","ch12","12.7 Hearsay"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"12.8 Other evidential issues","cards":[{"id":"DR_0101","type":"C","question":"What is a 'hostile witness', and what is a Notice to Admit Facts used for?","answer":"A party cannot cross-examine its own witness merely because that witness gives unfavourable evidence, but if a witness is significantly uncooperative or inconsistent, the judge can formally declare them 'hostile', which allows the calling party to cross-examine them, for example on a prior inconsistent statement. A Notice to Admit Facts is served no later than 21 days before trial, and facts admitted in response need not be proved at trial; if a party refuses to admit a fact that is then proved at trial, the refusing party may have to bear the costs of proving it, regardless of who wins the case overall.","tags":["dispute_resolution","ch12","12.8 Other evidential issues"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"12.9 Admissibility & standard of proof","cards":[{"id":"DR_0102","type":"A","question":"What types of evidence are inadmissible in civil proceedings, and what is the civil standard of proof?","answer":"Inadmissible evidence includes opinion evidence (except from experts), privileged material, 'without prejudice' communications including settlement offers, public interest immunity material, and anything irrelevant to the issues; the court also retains a discretion to disallow otherwise-admissible evidence. The claimant bears the burden of proof, which must be discharged on the balance of probabilities, meaning the fact in question is more likely than not to be true — in a negligence claim, this means duty, breach and causation must each be proved on the balance of probabilities.","tags":["dispute_resolution","ch12","12.9 Admissibility & standard of proof"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch13","title":"13 . Expert Evidence","subchapters":[{"title":"13.1–13.4 Definition, opinion & duties","cards":[{"id":"DR_0103","type":"A","question":"Who can act as an expert witness, and to whom is the expert's overriding duty owed?","answer":"An expert is a person instructed to give or prepare expert evidence for the purpose of proceedings; this can be anyone with relevant knowledge or experience, since a formal qualification is preferred but not essential — for example, an experienced mechanic or a long-time coin collector may qualify. Unlike a lay witness, an expert is permitted to draw inferences and give opinion evidence, but the expert's key duty is owed to the court — covering independence, integrity and impartiality — and this overriding duty takes priority over any duty owed to the party instructing and paying them.","tags":["dispute_resolution","ch13","13.1–13.4 Definition, opinion & duties"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"13.5 Directions on experts","cards":[{"id":"DR_0104","type":"B","question":"When will the court direct that no expert evidence is needed, or that a single joint expert should be instructed?","answer":"Directions on expert evidence are typically given following the Directions Questionnaire or after a Case Management Conference; the judge may decide no expert is needed at all, permit each side to instruct its own expert, or order a single joint expert. An expert may be refused where the judge already has the relevant expertise to decide the point — for example, a conveyancing solicitor's standard practice is something a judge can typically assess without expert assistance.","tags":["dispute_resolution","ch13","13.5 Directions on experts"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"13.6–13.8 The report, oral evidence & changing opinion","cards":[{"id":"DR_0105","type":"C","question":"What form does expert evidence usually take, and when will the court permit an expert to give oral evidence?","answer":"Expert evidence is generally given in the form of a written report addressed to the court rather than to the instructing party; the report must be independent and objective, state the facts it relies on, and flag where an issue lies outside the author's field or where the evidence available is insufficient. By default, experts do not attend court to give oral evidence unless the court permits it, which it will do where oral evidence would likely affect the outcome, would assist the judge, where there is a risk of injustice if the evidence remains untested, and where the additional cost is not disproportionate; the court can also order experts to give evidence simultaneously, known as 'hot tubbing'.","tags":["dispute_resolution","ch13","13.6–13.8 The report, oral evidence & changing opinion"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"13.9–13.10 Single joint vs own experts","cards":[{"id":"DR_0106","type":"D","question":"What is the difference between a single joint expert and an 'agreed' expert, and what is the fast-track default?","answer":"A single joint expert is jointly instructed by both parties, who try to agree on the expert's identity (with the court choosing from their lists if they cannot agree), and they receive the expert's responses simultaneously; on the fast track, the court must direct a single joint expert unless there is good reason not to, and the parties share the fee until the losing party ultimately takes responsibility for it. An 'agreed' expert, more common in personal injury claims, is nominated by the claimant during the protocol stage and not objected to by the defendant — but the expert is not jointly instructed, and the defendant retains the right to instruct its own expert if it is unhappy with the agreed expert's evidence.","tags":["dispute_resolution","ch13","13.9–13.10 Single joint vs own experts"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"13.11–13.13 Instructing, questions & discussions","cards":[{"id":"DR_0107","type":"A","question":"When is a party permitted to instruct its own expert rather than relying on a single joint expert, and what privilege protects expert instructions?","answer":"Own experts, more likely to be permitted on the multi-track, require the court's permission, justified by factors such as the complexity or value of the case, the existence of pre-existing experts, competing schools of thought within the relevant field, or high-significance issues on liability or quantum. The instructions given to an expert and their report, including drafts, must be disclosed but are privileged from inspection, and that privilege is lost only once a party relies on the report and exchanges it with the other side.","tags":["dispute_resolution","ch13","13.11–13.13 Instructing, questions & discussions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0108","type":"C","question":"Within what time limit can a party put written questions to an expert, and who attends the experts' discussion meeting?","answer":"A party may put written questions to an expert for purposes of clarification, provided they are proportionate, within 28 days of the expert's report, copying the questions to the other side. Where each side has its own expert, the directions usually require a 'without prejudice' experts' meeting to narrow the issues between them, held by arrangement (even by telephone), and legal representatives are not present at that meeting.","tags":["dispute_resolution","ch13","13.11–13.13 Instructing, questions & discussions"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch14","title":"14 . Trial","subchapters":[{"title":"14.1 Settlement before trial — consent & Tomlin orders","cards":[{"id":"DR_0109","type":"A","question":"What is a Tomlin order, and why is it commonly used to record a settlement reached during proceedings?","answer":"If a case settles other than by accepting a Part 36 offer, the terms, including costs, must be recorded in a consent order, since without one there is no enforceable obligation to pay. A Tomlin order is a common form of consent order with two parts: an order staying the case pending performance of the settlement, and a schedule setting out the amount payable, by whom, and the payment date. Its advantage is that it avoids the need for fresh proceedings if the settlement terms are not carried out, since the stayed claim can simply be revived.","tags":["dispute_resolution","ch14","14.1 Settlement before trial — consent & Tomlin orders"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"14.2 Pre-trial checklists & review","cards":[{"id":"DR_0110","type":"B","question":"What is the purpose of the pre-trial checklist, and when must it be filed?","answer":"The pre-trial checklist, on Form N170, confirms each party's readiness for trial, re-estimates the trial length, and offers a chance to propose further directions; it must be filed no later than 8 weeks before the trial date or trial period. In multi-track cases, the court may also hold a pre-trial review, usually around 4 weeks before the trial window, to check compliance, approve the trial timetable, set further directions, arrange trial bundles, and fix the trial date.","tags":["dispute_resolution","ch14","14.2 Pre-trial checklists & review"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"14.3 Witness summons","cards":[{"id":"DR_0111","type":"C","question":"What are the requirements for serving a witness summons to compel attendance at trial, and what happens if conduct money is not tendered?","answer":"A separate witness summons must be sent for each witness, together with a copy, the relevant fee, and conduct money covering travel and lost income — currently a maximum of £67, plus subsistence or overnight costs where relevant. The summons must be served at least 7 days before trial, and if conduct money is not tendered with it, the summons is ineffective; non-attendance after valid service is contempt of court, typically resulting in a fine in the County Court, and a summons is normally needed to compel a police officer to attend.","tags":["dispute_resolution","ch14","14.3 Witness summons"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"14.4 Advocacy & modes of address","cards":[{"id":"DR_0112","type":"D","question":"Who has rights of audience in the County Court and the High Court, and what courtroom etiquette applies during a trial?","answer":"Solicitors have rights of audience in the County Court, and in the High Court and Court of Appeal only if they hold Higher Rights; otherwise a barrister, referred to as counsel, is instructed, with the solicitor sitting behind them. Courtroom etiquette requires formal dress, with solicitor advocates wearing a gown, collar and bands but no wig; electronic devices must be switched off, since recording in court is contempt; advocates bow on entering and leaving; and courtesy is shown to the judge and to the opponent, who is referred to as 'my friend'.","tags":["dispute_resolution","ch14","14.4 Advocacy & modes of address"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"14.4–14.5 Advocacy, modes of address & the trial bundle","cards":[{"id":"DR_0113","type":"B","question":"How are different judges addressed in court, and who prepares the trial bundle and bears its cost?","answer":"A District Judge and a Master are both addressed as 'Judge'; a Circuit Judge is addressed as 'Your Honour'; and a High Court Judge or a Court of Appeal judge is addressed as 'My Lord' or 'My Lady'. The trial bundle is prepared by the claimant's solicitor, who also bears its cost, with one copy for the court and one per party, and it must be filed between 3 and 7 days before trial, containing party details, a case summary, a schedule of issues, witness statements and expert reports.","tags":["dispute_resolution","ch14","14.4–14.5 Advocacy, modes of address & the trial bundle"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"14.6 Trial format","cards":[{"id":"DR_0114","type":"A","question":"What is the usual order of events at trial, and what are the three stages of questioning a witness?","answer":"The usual order at trial is opening submissions from the claimant then the defendant, preliminary issues, the claimant's witnesses, the claimant's experts, the defendant's witnesses, the defendant's experts, and finally closing submissions from the claimant then the defendant. Each witness is questioned in three stages: evidence-in-chief, being the witness's own statement presented by the party calling them; cross-examination by the opposing party; and re-examination by the calling party, limited to matters arising from cross-examination and aimed at restoring credibility. Leading questions are permitted in cross-examination but are not allowed in re-examination.","tags":["dispute_resolution","ch14","14.6 Trial format"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"14.7–14.9 Judgment, ancillary matters & discontinuance","cards":[{"id":"DR_0115","type":"C","question":"How is judgment given at the end of trial, and what matters are typically argued on hand-down of a reserved judgment?","answer":"The judge may give judgment immediately, after a short retirement, or may reserve judgment to 'hand down' at a later date. On hand-down, the parties typically argue a number of ancillary matters, including interest, costs (under the normal rule that the loser pays), time to pay, a stay of execution pending any appeal, and permission to appeal.","tags":["dispute_resolution","ch14","14.7–14.9 Judgment, ancillary matters & discontinuance"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0116","type":"D","question":"When is permission required to discontinue a claim, and what costs consequence does a discontinuing claimant face?","answer":"Permission to discontinue is required where an interim injunction has been granted in the proceedings, or where the claimant has received an interim payment, unless the party that paid it consents to the discontinuance. A discontinuing claimant remains liable for the defendant's costs, subject to qualified one-way costs shifting where that regime applies.","tags":["dispute_resolution","ch14","14.7–14.9 Judgment, ancillary matters & discontinuance"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch15","title":"15 . Appeals","subchapters":[{"title":"15.1 Destination of appeals","cards":[{"id":"DR_0117","type":"A","question":"How is the destination of an appeal determined, and what is the usual rule for appeals from a final decision of a District Judge or Circuit Judge?","answer":"The destination of an appeal depends on the level of the judge who made the decision being appealed and whether the decision was final or interim. As a general rule, an appeal from a final decision of a District Judge or Circuit Judge in the County Court, or from a final decision of a High Court Master or District Judge, goes up to the next tier — for example, from a Circuit Judge to a High Court Judge — rather than to the Court of Appeal directly.","tags":["dispute_resolution","ch15","15.1 Destination of appeals"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"15.2–15.4 Permission, grounds & time limits","cards":[{"id":"DR_0118","type":"B","question":"What is the test for obtaining permission to appeal, and from whom must permission usually be sought first?","answer":"Permission to appeal is required for almost all appeals, and the test is that the appeal would have a real prospect of success, or that there is some other compelling reason why it should be heard, such as an important point of principle or practice. Permission should be sought first from the lower court that made the decision, at the same hearing if possible; if refused there, the appellant can renew the application to the appeal court itself.","tags":["dispute_resolution","ch15","15.2–15.4 Permission, grounds & time limits"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0119","type":"C","question":"What are the usual grounds of appeal, and what is the normal time limit for filing an appellant's notice?","answer":"An appeal is not a rehearing of the case from scratch; it proceeds on the grounds that the lower court's decision was wrong in law, wrong on the facts, or unjust because of a serious procedural irregularity. The normal time limit for filing an appellant's notice is 21 days from the decision being appealed, though the lower court can extend or shorten this time, and a failure to meet the deadline requires an application for relief from sanctions or an extension.","tags":["dispute_resolution","ch15","15.2–15.4 Permission, grounds & time limits"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"15.5–15.6 Process & hearing","cards":[{"id":"DR_0120","type":"D","question":"Does filing an appeal automatically suspend (stay) enforcement of the decision being appealed?","answer":"No. Filing an appeal does not automatically stay enforcement of the order under appeal, so the successful party at first instance can usually still enforce the judgment while the appeal is pending. A stay of execution must be separately and specifically applied for and granted by the court, and will not be assumed simply because permission to appeal has been given.","tags":["dispute_resolution","ch15","15.5–15.6 Process & hearing"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0121","type":"B","question":"What powers does the appeal court have when it hears an appeal, and is fresh evidence generally admissible?","answer":"The appeal court can affirm, set aside or vary the order under appeal, can refer any claim or issue for determination by the lower court, can order a new trial or hearing, and can make orders for costs, including interest on costs. Fresh evidence that was not before the lower court is not generally admissible on appeal, since the appeal court is reviewing the decision made on the material available at the time, not re-trying the case afresh.","tags":["dispute_resolution","ch15","15.5–15.6 Process & hearing"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch16","title":"16 . Costs","subchapters":[{"title":"16.1–16.4 The general rule & the indemnity principle","cards":[{"id":"DR_0122","type":"A","question":"What is the general rule on costs, and what is the indemnity principle?","answer":"The general rule is that the unsuccessful party pays the costs of the successful party, although the court retains discretion to depart from this where justified, for example because of a party's conduct or partial success on different issues. The indemnity principle means a receiving party cannot recover more in costs from the paying party than it is actually liable to pay its own solicitor — costs recovery is capped by the receiving party's own genuine liability, not simply by what the paying party can afford.","tags":["dispute_resolution","ch16","16.1–16.4 The general rule & the indemnity principle"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"16.5–16.6 Fixed vs assessed costs","cards":[{"id":"DR_0123","type":"C","question":"What is the difference between the standard basis and the indemnity basis of costs assessment?","answer":"On the standard basis, the default basis, the court only allows costs that are proportionate to the matters in issue, resolving any doubt about reasonableness or proportionality in favour of the paying party. On the indemnity basis, by contrast, there is no proportionality requirement at all, and any doubt about reasonableness is instead resolved in favour of the receiving party — making the indemnity basis significantly more generous, and it is typically awarded only as a sanction for unreasonable conduct, such as ignoring a Part 36 offer that should have been accepted.","tags":["dispute_resolution","ch16","16.5–16.6 Fixed vs assessed costs"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"16.7–16.10 Assessing costs","cards":[{"id":"DR_0124","type":"D","question":"What is the difference between fixed costs and assessed costs, and what are the two methods of assessing costs?","answer":"Fixed recoverable costs apply automatically on the fast track and the intermediate track, set by reference to the stage reached in the litigation rather than calculated case-by-case. Assessed costs, used on the multi-track and in other cases outside the fixed regime, are calculated either by summary assessment, carried out by the trial judge there and then for hearings of a day or less, or by detailed assessment, a separate, longer process before a costs judge for larger or more complex bills.","tags":["dispute_resolution","ch16","16.7–16.10 Assessing costs"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"16.8 Costs budgeting","cards":[{"id":"DR_0125","type":"B","question":"What is costs budgeting, and in what cases is it mandatory?","answer":"Costs budgeting requires the parties to estimate and exchange the costs they expect to incur at each stage of the litigation, with the court then approving a budget at the costs management conference; once approved, a party generally cannot recover costs beyond its approved budget for a phase without good reason. Costs budgeting is mandatory in most multi-track claims, subject to exceptions such as claims over £10 million or cases the court otherwise directs should be exempt.","tags":["dispute_resolution","ch16","16.8 Costs budgeting"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"16.11–16.14 Security for costs & other orders","cards":[{"id":"DR_0126","type":"C","question":"What is security for costs, and what factors does the court weigh when deciding whether to order it?","answer":"Security for costs is an order requiring the claimant to put up money, typically into court or an escrow account, as security for the defendant's costs if the claim fails, available against claimants such as those resident outside the jurisdiction or companies that may be unable to pay an adverse costs order. In deciding whether to order security, the court considers whether the claimant's lack of means resulted from the defendant's own conduct, whether the application was made promptly, and the overall merits and circumstances of the case, since the order must not stifle a genuine claim.","tags":["dispute_resolution","ch16","16.11–16.14 Security for costs & other orders"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0127","type":"D","question":"What is a wasted costs order, and against whom can it be made?","answer":"A wasted costs order is made against a legal representative personally, rather than against their client, where costs have been incurred as a result of an improper, unreasonable or negligent act or omission by that representative — for example, wrongly making a without-notice application or causing unnecessary delay. It reflects the broader principle that the court's costs powers can reach beyond the parties themselves where professional conduct has caused the waste.","tags":["dispute_resolution","ch16","16.11–16.14 Security for costs & other orders"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch17","title":"17 . Part 36 Offers to Settle","subchapters":[{"title":"17.2 Formal requirements","cards":[{"id":"DR_0128","type":"A","question":"What is a Part 36 offer, and what are its key formal requirements?","answer":"A Part 36 offer is a formal settlement offer carrying specific costs consequences under the CPR, available to either party at any time, including before proceedings start. To be valid, it must be in writing, state that it is intended to have the consequences of Part 36, specify a period of not less than 21 days within which the defendant will pay the costs of acceptance, state whether it relates to the whole claim or only part, and state whether it takes into account any counterclaim.","tags":["dispute_resolution","ch17","17.2 Formal requirements"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"17.3–17.6 Timing, clarification, withdrawal & acceptance","cards":[{"id":"DR_0129","type":"B","question":"Can a Part 36 offer be made and accepted before proceedings have started, and what is the effect of accepting one within the relevant period?","answer":"Yes — a Part 36 offer can be made and accepted before proceedings are issued, and if it is, the claimant must start proceedings to enforce the settlement if necessary. If a Part 36 offer is accepted within the specified relevant period, the claimant is entitled to its costs up to the date of acceptance, normally on the standard basis, and the case is stayed on the agreed terms rather than going to trial.","tags":["dispute_resolution","ch17","17.3–17.6 Timing, clarification, withdrawal & acceptance"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0130","type":"C","question":"What happens if a Part 36 offer is accepted late, after the specified relevant period has expired, in terms of costs?","answer":"Where a Part 36 offer is accepted after the relevant period has expired, the offeree is liable for the offeror's costs from the end of the relevant period to the date of acceptance, unless the court orders otherwise, while costs up to the end of the relevant period are dealt with on the ordinary basis. This default position is what makes the relevant period commercially significant, since delaying acceptance carries a real costs penalty.","tags":["dispute_resolution","ch17","17.3–17.6 Timing, clarification, withdrawal & acceptance"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0131","type":"D","question":"Can a Part 36 offer be withdrawn, and what is the effect of withdrawal on the costs consequences that would otherwise apply?","answer":"A Part 36 offer can be withdrawn or its terms changed, but if this happens before the relevant period expires, the offeror must serve written notice of withdrawal, and the offer cannot then attract the automatic costs consequences for a judgment that is later equal to or worse than the withdrawn offer. After the relevant period has expired, the offer remains open for acceptance until formally withdrawn, even though the offeree no longer benefits from the original favourable acceptance terms by then.","tags":["dispute_resolution","ch17","17.3–17.6 Timing, clarification, withdrawal & acceptance"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"17.7 Cost consequences of rejecting a Part 36 offer","cards":[{"id":"DR_0132","type":"A","question":"What are the costs consequences for a claimant who fails to obtain a judgment more advantageous than its own Part 36 offer?","answer":"Where a claimant's Part 36 offer is not accepted and the claimant goes on to obtain a judgment at least as advantageous as the offer, the court will order, unless it considers it unjust, that the claimant is entitled to interest on the sum awarded at a rate not exceeding 10% above base rate, costs on the indemnity basis from the end of the relevant period, interest on those indemnity costs at the same enhanced rate, and an additional amount of up to £75,000, calculated as a percentage of the sum awarded.","tags":["dispute_resolution","ch17","17.7 Cost consequences of rejecting a Part 36 offer"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0133","type":"C","question":"What are the costs consequences for a defendant where the claimant fails to do better than a defendant's Part 36 offer at trial?","answer":"Where the defendant's Part 36 offer is not accepted and the claimant fails to obtain a judgment more advantageous than that offer, the court will order, unless it considers it unjust, that the defendant recovers its costs from the end of the relevant period, with interest on those costs, and that the claimant's own costs from that date are reduced or disallowed. In deciding whether these consequences would be unjust, the court has regard to all the circumstances, including the terms of the offer, the timing, the information available to the parties when it was made, and the conduct of the parties in giving or refusing information to enable the offer to be properly evaluated.","tags":["dispute_resolution","ch17","17.7 Cost consequences of rejecting a Part 36 offer"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]},{"id":"ch18","title":"18 . Enforcement of Judgments","subchapters":[{"title":"18.2 Interest on judgments","cards":[{"id":"DR_0134","type":"A","question":"What must a judgment creditor do before most enforcement methods, and what interest accrues on a judgment debt?","answer":"A judgment creditor generally cannot enforce a judgment until the time for payment specified in the judgment has passed, and unsatisfied judgments of £5,000 or more in the High Court (and any County Court judgment by separate provision) accrue statutory interest at 8% per year from the date of judgment until payment. Before choosing an enforcement method, the creditor should also consider the debtor's likely means, since enforcing against a debtor with no realisable assets simply wastes further costs.","tags":["dispute_resolution","ch18","18.2 Interest on judgments"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"18.3 Oral examination","cards":[{"id":"DR_0135","type":"B","question":"What is an order to obtain information (oral examination), and what happens if the debtor fails to comply with it?","answer":"An order to obtain information requires the judgment debtor to attend court and answer questions, under oath, about their means and assets, helping the creditor decide which enforcement method to pursue. If the debtor fails to attend or fails to answer the questions properly, that failure is contempt of court, which can ultimately lead to a warrant for the debtor's arrest.","tags":["dispute_resolution","ch18","18.3 Oral examination"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"18.4 Taking control of goods","cards":[{"id":"DR_0136","type":"C","question":"What is 'taking control of goods', and what types of property are exempt from seizure under this enforcement method?","answer":"Taking control of goods, carried out by enforcement agents (formerly called bailiffs), allows the creditor to seize and sell the debtor's goods to satisfy the judgment debt. Certain items are exempt from seizure, including tools, books, vehicles and equipment that the debtor needs for their work or business up to a value of £1,350, together with items needed to satisfy the basic domestic needs of the debtor and their household, such as clothing, bedding, furniture, household equipment and a basic means of communication.","tags":["dispute_resolution","ch18","18.4 Taking control of goods"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"18.5–18.8 Other methods","cards":[{"id":"DR_0137","type":"D","question":"What is a third-party debt order, and how does it differ from a charging order over the debtor's property?","answer":"A third-party debt order freezes and then transfers to the creditor money owed to the debtor by a third party, most commonly funds held in the debtor's bank account, by serving an interim order on the third party which then becomes final unless successfully objected to. A charging order, by contrast, secures the judgment debt against the debtor's land, securities or interest in a trust fund, and although it does not itself force a sale, it can be followed by an application for an order for sale to realise the secured asset.","tags":["dispute_resolution","ch18","18.5–18.8 Other methods"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""},{"id":"DR_0138","type":"C","question":"What is an attachment of earnings order, and against whom is it not available?","answer":"An attachment of earnings order requires the debtor's employer to deduct a set amount from the debtor's wages each pay period and pay it directly to the court for onward payment to the creditor, calculated using a protected earnings rate that ensures the debtor retains enough income for their own and their family's basic needs. It is not available against a self-employed debtor, since there is no employer to make the deduction, meaning a different enforcement method must be used against someone in that position.","tags":["dispute_resolution","ch18","18.5–18.8 Other methods"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]},{"title":"18.9 Combining methods","cards":[{"id":"DR_0139","type":"B","question":"Can a judgment creditor pursue more than one method of enforcement at the same time?","answer":"Yes — a judgment creditor is generally entitled to combine enforcement methods, for example seeking a charging order over the debtor's house while simultaneously applying for a third-party debt order against their bank account, since the methods are not mutually exclusive. The creditor should nonetheless act proportionately, bearing in mind the costs of each additional enforcement step relative to the likely recovery.","tags":["dispute_resolution","ch18","18.9 Combining methods"],"source":"Dispute_Resolution_SQE_Notes.pdf","note":""}]}]}]}]};

function dayIndexLocal(){
  var ds = localDateStr();
  var h = 0;
  for (var i = 0; i < ds.length; i++){ h = (h * 31 + ds.charCodeAt(i)) | 0; }
  return Math.abs(h);
}

var TYPE_LABELS = { A:"Rule / Test", B:"Application", C:"Distinction", D:"Consequence", E:"Exception" };

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function trunc(s, n){
  s = s || "";
  return s.length > n ? s.slice(0, n-1) + "…" : s;
}

function scKey(sId, chId, idx){ return sId + "__" + chId + "__" + idx; }

var ALL_CARDS = [];
function buildAllCards(){
  ALL_CARDS = [];
  DECK.subjects.forEach(function(s){
    (s.chapters||[]).forEach(function(ch){
      (ch.subchapters||[]).forEach(function(sc, scIdx){
        var scId = scKey(s.id, ch.id, scIdx);
        (sc.cards||[]).forEach(function(c){
          ALL_CARDS.push(Object.assign({}, c, {
            sId: s.id, sTitle: s.title, sColor: s.color,
            chId: ch.id, chTitle: ch.title,
            scId: scId, scTitle: sc.title
          }));
        });
      });
    });
  });
}

// ---------------------------------------------------------------------------
// Custom JSON import / export
// New chapters, subchapters, and cards can be added at runtime by importing
// a JSON file. Imports are additive only (no overwrites, no duplicate card
// ids) and are persisted in localStorage so they survive a reload of this
// same file in this same browser. Use "Export Deck" to download the full
// merged deck if you want the additions to travel to another browser/machine.
// ---------------------------------------------------------------------------
function loadCustomImports(){
  try { return JSON.parse(localStorage.getItem("jui_custom_imports")) || []; }
  catch(e){ return []; }
}
function saveCustomImports(list){
  try { localStorage.setItem("jui_custom_imports", JSON.stringify(list)); }
  catch(e){}
}

function collectExistingCardIds(){
  var ids = {};
  DECK.subjects.forEach(function(s){
    (s.chapters||[]).forEach(function(ch){
      (ch.subchapters||[]).forEach(function(sc){
        (sc.cards||[]).forEach(function(c){ if (c.id) ids[c.id] = true; });
      });
    });
  });
  return ids;
}

function validateImportObject(obj){
  if (!obj || typeof obj !== "object" || Array.isArray(obj)){
    return ["Root of the JSON file must be an object (not an array or primitive)."];
  }
  var errs = [];
  if (!obj.subjectId || typeof obj.subjectId !== "string"){
    errs.push("Missing or invalid 'subjectId' (string).");
  }
  if (!Array.isArray(obj.chapters) || obj.chapters.length === 0){
    errs.push("Missing or empty 'chapters' array.");
  }
  if (errs.length) return errs;

  var existingSubject = DECK.subjects.filter(function(s){ return s.id === obj.subjectId; })[0];
  if (!existingSubject){
    if (!obj.subjectTitle || typeof obj.subjectTitle !== "string"){
      errs.push("Subject '" + obj.subjectId + "' does not exist yet — 'subjectTitle' is required to create it.");
    }
    if (!obj.subjectColor || typeof obj.subjectColor !== "string" || !/^#[0-9A-Fa-f]{6}$/.test(obj.subjectColor)){
      errs.push("Subject '" + obj.subjectId + "' does not exist yet — 'subjectColor' must be a 6-digit hex color like '#c4956a'.");
    }
  }

  var validTypes = ["A","B","C","D","E"];
  obj.chapters.forEach(function(ch, i){
    var chLoc = "chapters[" + i + "]";
    if (!ch.id || typeof ch.id !== "string") errs.push(chLoc + " is missing 'id'.");
    if (!ch.title || typeof ch.title !== "string") errs.push(chLoc + " is missing 'title'.");
    if (!Array.isArray(ch.subchapters) || ch.subchapters.length === 0){
      errs.push(chLoc + " ('" + (ch.title || ch.id || "?") + "') has no subchapters.");
    }
    (ch.subchapters || []).forEach(function(sc, j){
      var scLoc = chLoc + ".subchapters[" + j + "]";
      if (!sc.title || typeof sc.title !== "string") errs.push(scLoc + " is missing 'title'.");
      if (!Array.isArray(sc.cards) || sc.cards.length === 0){
        errs.push(scLoc + " ('" + (sc.title || "?") + "') has no cards.");
      }
      (sc.cards || []).forEach(function(c, k){
        var cLoc = scLoc + ".cards[" + k + "]";
        if (!c.id || typeof c.id !== "string") errs.push(cLoc + " is missing 'id'.");
        if (validTypes.indexOf(c.type) === -1) errs.push(cLoc + " ('" + (c.id || "?") + "') has invalid 'type' — must be A, B, C, D, or E.");
        if (!c.question || typeof c.question !== "string" || c.question.trim().length < 10){
          errs.push(cLoc + " ('" + (c.id || "?") + "') is missing a 'question', or it's too short.");
        }
        if (!c.answer || typeof c.answer !== "string" || c.answer.trim().length < 15){
          errs.push(cLoc + " ('" + (c.id || "?") + "') is missing an 'answer', or it's too short.");
        }
      });
    });
  });

  var existingIds = collectExistingCardIds();
  var seenInImport = {};
  obj.chapters.forEach(function(ch){
    (ch.subchapters || []).forEach(function(sc){
      (sc.cards || []).forEach(function(c){
        if (!c.id) return;
        if (existingIds[c.id]) errs.push("Card id '" + c.id + "' already exists in the deck — duplicates are not allowed.");
        if (seenInImport[c.id]) errs.push("Card id '" + c.id + "' appears more than once inside this import file.");
        seenInImport[c.id] = true;
      });
    });
  });

  return errs;
}

function mergeImportIntoDeck(obj){
  // Idempotent by design: re-applying the same import object twice (e.g. if
  // stored imports are ever replayed more than once in a page lifetime) must
  // not duplicate cards. Every card id actually written is checked against
  // a running set that starts from whatever already exists in DECK.
  var subject = DECK.subjects.filter(function(s){ return s.id === obj.subjectId; })[0];
  if (!subject){
    subject = { id: obj.subjectId, title: obj.subjectTitle, color: obj.subjectColor, chapters: [] };
    DECK.subjects.push(subject);
  }
  var existingIds = collectExistingCardIds();
  var stats = { chapters: 0, subchapters: 0, cards: 0, skipped: 0 };
  obj.chapters.forEach(function(chIn){
    var chExisting = subject.chapters.filter(function(c){ return c.id === chIn.id; })[0];
    if (!chExisting){
      chExisting = { id: chIn.id, title: chIn.title, subchapters: [] };
      subject.chapters.push(chExisting);
      stats.chapters++;
    }
    (chIn.subchapters || []).forEach(function(scIn){
      var scExisting = chExisting.subchapters.filter(function(s){
        return (s.title || "").trim().toLowerCase() === (scIn.title || "").trim().toLowerCase();
      })[0];
      if (!scExisting){
        scExisting = { title: scIn.title, cards: [] };
        chExisting.subchapters.push(scExisting);
        stats.subchapters++;
      }
      (scIn.cards || []).forEach(function(c){
        if (c.id && existingIds[c.id]){
          stats.skipped++;
          return;
        }
        scExisting.cards.push(c);
        if (c.id) existingIds[c.id] = true;
        stats.cards++;
      });
    });
  });
  return stats;
}

function applyStoredImports(){
  var imports = loadCustomImports();
  imports.forEach(function(obj){
    try { mergeImportIntoDeck(obj); } catch(e){}
  });
}

// ---------------------------------------------------------------------------
// Custom card creation + editing. New cards go into an EXISTING
// subject/chapter/subchapter and live in "jui_custom_cards"; edits to
// question/answer/type live in "jui_custom_edits" keyed by card id (a custom
// card's own entry is edited in place in jui_custom_cards instead). Both are
// idempotent on re-apply, and both ALSO travel through the Firebase sync
// code (see pushProgress / pullAndMerge above), so a card added on this
// device appears on the desktop hub too, once both share the same sync code.
// ---------------------------------------------------------------------------
function loadCustomCards(){
  try { return JSON.parse(localStorage.getItem("jui_custom_cards")) || []; }
  catch(e){ return []; }
}
function saveCustomCards(list){
  try { localStorage.setItem("jui_custom_cards", JSON.stringify(list)); }
  catch(e){}
}
function loadCustomEdits(){
  try { return JSON.parse(localStorage.getItem("jui_custom_edits")) || {}; }
  catch(e){ return {}; }
}
function saveCustomEdits(map){
  try { localStorage.setItem("jui_custom_edits", JSON.stringify(map)); }
  catch(e){}
}

function applyCustomCards(){
  var list = loadCustomCards();
  list.forEach(function(c){
    var subj = DECK.subjects.filter(function(s){ return s.id === c.sId; })[0];
    if (!subj) return;
    var ch = (subj.chapters || []).filter(function(x){ return x.id === c.chId; })[0];
    if (!ch) return;
    var sc = (ch.subchapters || [])[c.scIdx];
    if (!sc) return;
    if ((sc.cards || []).some(function(existing){ return existing.id === c.id; })) return;
    sc.cards.push({ id: c.id, type: c.type, question: c.question, answer: c.answer, tags: c.tags || [], source: "Jui (custom)", note: "" });
  });
}

function applyCustomEdits(){
  var edits = loadCustomEdits();
  if (!Object.keys(edits).length) return;
  DECK.subjects.forEach(function(s){
    (s.chapters || []).forEach(function(ch){
      (ch.subchapters || []).forEach(function(sc){
        (sc.cards || []).forEach(function(c){
          var e = edits[c.id];
          if (!e) return;
          if (e.question !== undefined) c.question = e.question;
          if (e.answer !== undefined) c.answer = e.answer;
          if (e.type !== undefined) c.type = e.type;
        });
      });
    });
  });
}

function findCardInDeck(cardId){
  for (var si = 0; si < DECK.subjects.length; si++){
    var s = DECK.subjects[si];
    for (var ci = 0; ci < (s.chapters || []).length; ci++){
      var ch = s.chapters[ci];
      for (var sci = 0; sci < (ch.subchapters || []).length; sci++){
        var sc = ch.subchapters[sci];
        for (var k = 0; k < (sc.cards || []).length; k++){
          if (sc.cards[k].id === cardId) return sc.cards[k];
        }
      }
    }
  }
  return null;
}

      alert("That file isn't valid JSON:\n" + err.message);
      return;
    }
    var errs = validateImportObject(obj);
    if (errs.length){
      var shown = errs.slice(0, 12);
      var msg = "Import rejected — " + errs.length + " problem(s) found:\n\n" + shown.join("\n");
      if (errs.length > shown.length) msg += "\n...and " + (errs.length - shown.length) + " more.";

}

var fbDb = null;

function getSyncCode(){
  try { return localStorage.getItem("jui_sync_code") || ""; }
  catch(e){ return ""; }

  try { localStorage.setItem("jui_sync_code", code); }

function setSyncStatus(text){

  if (el) el.textContent = text;

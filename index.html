n":"A seller offers to sell a cargo on a ship called 'Peerless', but the buyer and seller are each thinking of a different ship of that name, sailing in different months. Is there a contract?","answer":"There is no contract. This is mutual mistake, where the parties are at genuine cross-purposes and there is no objective way to resolve the ambiguity as to which ship — and therefore which cargo — was meant. Because the two parties' understandings of the essential subject matter diverge irreconcilably and objectively, no agreement can be said to have been reached.","tags":["mutual mistake","cross purposes"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"8.1.3","title":"8.1.3 Unilateral Mistake (One Party's Mistake, Known to the Other)","cards":[{"id":"CON_0040","type":"A","question":"When can a contract be void for unilateral mistake as to identity, and why are courts reluctant to find this in face-to-face dealings?","answer":"Where D contracts with C, but D intended to contract with a different person X, and C knew that D had no intention of contracting with C, the contract may be void for mistake as to identity. However, courts are very reluctant to find this, especially in face-to-face dealings, because there is a strong presumption in such cases that the offer is made to the person physically present, even if that person is lying about who they are.","tags":["unilateral mistake","mistake as to identity","face-to-face"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0041","type":"C","question":"In face-to-face dealings, what is the distinction between a mistake as to a person's identity and a mistake as to their attributes, and why does it matter?","answer":"In face-to-face cases, the mistake is treated as being about the other party's attributes — such as their creditworthiness or name — rather than their identity, because the strong presumption is that the offer was made to the person actually present regardless of what they claim about themselves. This distinction matters because a mistake as to attributes only makes the contract voidable for misrepresentation, whereas a genuine mistake as to identity (more likely in dealings at a distance) can make the contract void for mistake — a much more drastic outcome that defeats the claims of innocent third parties who later acquired the goods.","tags":["unilateral mistake","identity","attributes","misrepresentation","distinction"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"8.1.5","title":"8.1.5 Rectification","cards":[{"id":"CON_0042","type":"A","question":"What three requirements must be satisfied before a court will rectify a written contract?","answer":"Rectification is available where the parties clearly agreed on certain terms but the written document fails to record that agreement correctly, and it allows the court to correct the document to reflect the true agreement. The notes set out three requirements: (1) there must have been a clear and outright common intention between the parties at the time of contracting; (2) the written document must fail to express that intention; and (3) no third party must have acquired rights under the contract as written.","tags":["rectification","mistake","test"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"8.2","title":"8.2 Duress","cards":[{"id":"CON_0043","type":"A","question":"What is the effect of duress on a contract, and what three-part test applies to economic duress?","answer":"Duress makes a contract voidable, not void, so the innocent party must elect to rescind it — it does not automatically fall away. The notes set out a three-part test for economic duress: (1) was there illegitimate pressure, such as threats to breach a contract or threats of unlawful acts (as opposed to mere hard commercial bargaining or legitimate threats to exercise contractual rights, which do not count); (2) did the pressure significantly contribute to the claimant's decision, noting that it need not be the only reason, merely a significant cause; and (3) did the claimant have no practical alternative, such that the pressure amounted to a coercion of the will.","tags":["duress","economic duress","voidable","test"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"8.3","title":"8.3 Undue Influence","cards":[{"id":"CON_0044","type":"A","question":"What is undue influence, and what effect does it have on a contract?","answer":"Undue influence makes a contract voidable. It applies where a party's consent to a contract is secured by improper, though not necessarily illegal, pressure arising from a relationship of trust and influence between the parties.","tags":["undue influence","voidable","definition"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0045","type":"E","question":"In which relationships does a presumption of undue influence arise automatically, and how does this differ from relationships like spouses or close friends?","answer":"The notes list five relationships where the presumption of undue influence arises automatically: solicitor-client, doctor-patient, parent-child (when the child is young), trustee-beneficiary, and religious adviser-follower. By contrast, in relationships such as spouses, cohabitants, and close friends, the presumption is not automatic — it must instead be proved on the facts of the particular relationship.","tags":["undue influence","presumption","relationships"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"8.4","title":"8.4 Illegality and Restraint of Trade","cards":[{"id":"CON_0046","type":"C","question":"What is the difference in treatment between contracts that are illegal at formation and contracts that are legal at formation but performed illegally?","answer":"Contracts that are illegal at formation — contrary to statute or common law public policy — are generally void. Contracts that are legal at formation but performed illegally may instead be unenforceable, but only by the party who committed the illegal act, and the notes record that courts now apply a flexible approach to this following Patel v Mirza [2016].","tags":["illegality","void","unenforceable","Patel v Mirza"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0047","type":"A","question":"When will a restraint of trade clause, which is prima facie void, nonetheless be enforceable?","answer":"A clause restricting a party's ability to compete or work for rivals is prima facie void, but it may be enforceable if two conditions are met: (1) there is a legitimate interest to protect, such as trade secrets, customer relationships, or confidential information, and (2) the restriction is reasonable in scope, meaning it is not wider than necessary in terms of geographic area, duration, and the activities restricted.","tags":["restraint of trade","legitimate interest","reasonableness"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0048","type":"D","question":"If a restraint of trade clause is found to be unreasonably wide, what can a court do about it, and what is the limit on that power?","answer":"If a restraint clause is unreasonably wide, courts may use the 'blue pencil' technique to sever the unreasonable part of the clause, but only if the remaining clause still makes sense as a standalone provision once the offending words are removed. The notes are explicit that courts will not rewrite the clause to make it reasonable — severance is the only tool available, and if what remains after severance does not stand alone sensibly, the whole clause fails.","tags":["restraint of trade","blue pencil","severance","consequence"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch9_misrep","title":"Chapter 9: Misrepresentation","subchapters":[{"id":"9.0","title":"9.0 What Is Misrepresentation?","cards":[{"id":"CON_0049","type":"A","question":"What is a misrepresentation, and what is its effect on the contract?","answer":"A misrepresentation is a pre-contractual false statement that induces the other party to enter the contract. The notes state that it makes the contract voidable and can give rise to a claim for damages, and that the particular type of misrepresentation determines exactly what remedies are available.","tags":["misrepresentation","voidable","definition"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"9.1.2","title":"9.1.2 Inducement","cards":[{"id":"CON_0050","type":"A","question":"What is required to show that a misrepresentation induced the claimant to contract, and what defeats inducement?","answer":"The misrepresentation must have induced the claimant to enter the contract, but the notes are clear it need not be the sole or even the primary reason — it must merely be a reason among others. Inducement is defeated if the claimant knew the statement was false, or if the claimant did not actually rely on it — for example, where the claimant conducted their own investigation that revealed the truth and contracted on the basis of that investigation rather than the false statement.","tags":["misrepresentation","inducement","reliance"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"9.3","title":"9.3 Rescission","cards":[{"id":"CON_0051","type":"A","question":"What is rescission as a remedy for misrepresentation, and what does it do to the parties' positions?","answer":"Rescission is the primary remedy for misrepresentation. It sets the contract aside completely, as if it never existed (ab initio), and restores the parties to the positions they were in before the contract was made.","tags":["misrepresentation","rescission","remedy"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch10_discharge","title":"Chapter 10: Discharge and Variation of Contract","subchapters":[{"id":"10.0","title":"10.0 What Is Discharge?","cards":[{"id":"CON_0052","type":"C","question":"What are the four modes of discharging a contract, and how does discharge for breach differ from rescission?","answer":"A contract is discharged when the parties' obligations come to an end, and the notes identify four modes: performance, agreement, frustration, and breach. The notes stress that discharge for breach must be distinguished from rescission: rescission unwinds the contract from the start as though it never existed, whereas discharge for breach simply brings the parties' future obligations to an end going forward, without undoing what has already been performed.","tags":["discharge","rescission","distinction"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"10.1","title":"10.1 Discharge by Performance","cards":[{"id":"CON_0053","type":"A","question":"What does the 'entire obligations rule' require for discharge by performance?","answer":"The entire obligations rule requires complete and exact performance of all of a party's obligations in order to discharge the contract by performance. Falling short of complete performance generally means the contract is not discharged in this way, even if performance is substantially, but not entirely, complete.","tags":["discharge","performance","entire obligations rule"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0054","type":"E","question":"What are the three recognised exceptions to the entire obligations rule?","answer":"The notes identify three exceptions: (1) divisible contracts — where the contract is structured in separate stages with separate payments, the claimant can recover for completed stages even if they fail to complete later ones; (2) partial performance voluntarily accepted — if the defendant freely accepts partial performance, having had a genuine choice to reject it, they must pay on a quantum meruit basis (a reasonable sum for the value received), though the notes caution that if the claimant's partial work is already on the defendant's land and cannot realistically be returned, the defendant's acceptance is not considered free; and (3) prevention by the other party — if the defendant's own conduct prevents the claimant from completing performance, the claimant can claim the full contract price.","tags":["discharge","performance","entire obligations rule","exception","quantum meruit"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"10.2","title":"10.2 Discharge by Agreement","cards":[{"id":"CON_0055","type":"C","question":"What is the difference between discharging a contract by agreement where both parties still have outstanding obligations, versus where one party has already performed in full?","answer":"Where neither party has fully performed, an agreement to end the contract is supported by mutual consideration — each party gives up their right to the other's future performance — so it is binding without needing a deed. Where one party (A) has already performed everything required of them and the other party (B) wants to release A from doing something in return, that release requires either a deed (for which no consideration is needed) or fresh consideration from A; otherwise B's promise to release A is unsupported and unenforceable.","tags":["discharge","agreement","consideration","deed","distinction"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"10.3","title":"10.3 Discharge by Frustration","cards":[{"id":"CON_0056","type":"A","question":"What is frustration and when does it apply to discharge a contract?","answer":"Frustration automatically discharges both parties from their future obligations under a contract. It applies when, after the contract is formed, a supervening event fundamentally changes the character of what was to be done, making performance impossible, illegal, or radically different from what the parties contemplated when contracting.","tags":["frustration","discharge","definition"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0057","type":"E","question":"In what three situations will frustration NOT apply, even though a supervening event has occurred?","answer":"The notes identify three situations where frustration does not apply: (1) self-induced frustration, where the event was caused by the party seeking to rely on it; (2) foreseeable events, where the frustrating event was foreseeable at the time of contracting, on the basis that the parties should have made provision for it; and (3) contractual allocation of risk, where one party has expressly or impliedly accepted the risk of the event, for example through a force majeure clause.","tags":["frustration","exception","force majeure","foreseeability"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"10.3.1","title":"10.3.1 Effect of Frustration — Law Reform (Frustrated Contracts) Act 1943","cards":[{"id":"CON_0058","type":"D","question":"What is the relationship between a force majeure clause and the Law Reform (Frustrated Contracts) Act 1943?","answer":"Commercial contracts routinely include force majeure clauses that define in advance which events will trigger relief and what that relief will be. The notes state that such clauses override the Law Reform (Frustrated Contracts) Act 1943 to the extent the parties have agreed, so if a force majeure clause covers the event in question, neither frustration nor the 1943 Act is needed — the contractual clause governs instead.","tags":["frustration","force majeure","Law Reform (Frustrated Contracts) Act 1943"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"10.4","title":"10.4 Discharge by Breach","cards":[{"id":"CON_0059","type":"A","question":"What is anticipatory breach, and what does it consist of?","answer":"Breach occurs when a party fails to perform their obligations, either through non-performance or defective performance (actual breach), or by indicating before performance is due that they will not perform at all (anticipatory breach). Anticipatory breach is therefore distinguished by the fact that it is signalled in advance of the date performance is actually due.","tags":["breach","anticipatory breach","definition"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0060","type":"E","question":"What two options does the innocent party have when faced with an anticipatory breach, and what is the risk of each?","answer":"The innocent party can either: (1) accept the repudiation immediately and sue for damages without waiting for the performance date, which the notes describe as usually the better commercial choice; or (2) affirm the contract and keep it alive, waiting for the performance date — but this carries the risk that if the contract becomes frustrated before that date, the innocent party gets nothing, and if they continue their own performance after affirming, they must still mitigate their losses rather than running up avoidable losses.","tags":["breach","anticipatory breach","repudiation","affirmation","mitigation"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch11_remedies","title":"Chapter 11: Remedies for Breach of Contract","subchapters":[{"id":"11.0","title":"11.0 Overview of Remedies","cards":[{"id":"CON_0061","type":"A","question":"What is the primary remedy for breach of contract, and how do equitable remedies fit alongside it?","answer":"The primary remedy for breach of contract is damages — a monetary award designed to put the claimant in the position they would have been in had the contract been performed. Equitable remedies, such as specific performance and injunction, are described in the notes as secondary and discretionary, meaning they are only available in addition to, or instead of, damages where damages are not adequate and a court chooses to grant them.","tags":["remedies","damages","equitable remedies","overview"],"source":"Contract SQE Notes.docx","note":"sparse source — notes name specific performance and injunction as the equitable remedies but give no further detail on when each is granted"}]}]}]},{"id":"tort","title":"Tort","color":"#b07d4e","chapters":[{"id":"ch1_intentional","title":"Chapter 1: Intentional Torts","subchapters":[{"id":"1.1","title":"1.1 Trespass to Land","cards":[{"id":"TRT_0001","type":"E","question":"What are the five elements of trespass to land?","answer":"Trespass to land protects a person's exclusive possession of land from unlawful, direct physical interference, and the notes break it into five elements: (1) possession — the claimant must have exclusive possession, not mere ownership, so a tenant in possession (not the landlord) has standing to sue; (2) land — this includes the land itself, buildings, sub-soil, and airspace up to the height reasonably necessary for ordinary use, so tunnelling under a neighbour's land or flying a drone through their airspace at normal flying height can both be trespass; (3) direct interference — the contact must be direct, such as physically walking, driving, or throwing or placing objects onto the land, whereas indirect interference like vibrations is not trespass but may be nuisance; (4) unlawful — the interference must be without the owner's permission or justification, and being told to leave converts a previously lawful visit into a trespass if the person stays; and (5) intention — the defendant need only intend to do the act causing the interference, not know the land belongs to another or intend to trespass, so a gardener who mows a neighbour's grass believing it is their own is still liable.","tags":["trespass to land","elements","test"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0002","type":"E","question":"What defences are available to a claim of trespass to land?","answer":"The notes list four defences: consent or licence, whether express or implied, such as a postman's implied licence to walk to the front door; necessity, where entry is to prevent a greater harm; lawful authority, such as statutory powers like police entering with a warrant; and customary or prescriptive right.","tags":["trespass to land","defences"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"1.2.1","title":"1.2.1 Battery","cards":[{"id":"TRT_0003","type":"A","question":"What must a defendant intend to be liable for battery, and what must they NOT necessarily intend?","answer":"Battery is the tort for unwanted physical contact, committed where the defendant intentionally makes direct physical contact with the claimant's body. The key point in the notes is that the defendant does not need to intend harm — they only need to intend the contact itself, so deliberately pushing someone, kissing them without consent, throwing something that hits them, or a security guard grabbing a suspect's arm without justification are all examples of battery even without any intent to cause injury.","tags":["battery","trespass to the person","intention"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"1.2.2","title":"1.2.2 Assault","cards":[{"id":"TRT_0004","type":"C","question":"What is the difference between assault and battery, and what is required for there to be an assault?","answer":"Assault does not require physical contact at all — it is the reasonable apprehension of an imminent battery, essentially 'almost touching'. The notes illustrate the distinction: if D strikes C from behind without C seeing it coming, there is battery (the contact) but not assault (because there was no prior apprehension); conversely, if D raises a fist at C and C sees it, there is assault even if D never follows through, because C apprehended an imminent battery. A verbal threat conditioned on a future event, such as 'if it weren't for these handcuffs I'd knock you out', is not assault because the threatened harm is not immediate.","tags":["assault","battery","distinction","imminence"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"1.2.3","title":"1.2.3 False Imprisonment","cards":[{"id":"TRT_0005","type":"E","question":"What three requirements must be satisfied for false imprisonment, and what counts as 'complete constraint'?","answer":"False imprisonment protects freedom of movement and covers any unlawful total restraint — the claimant does not need to be locked in a cell, since being detained in a shop, blocked in a car, or prevented from leaving an area can all qualify. The notes set out three requirements: (1) complete constraint — if demonstrators are kettled but can leave via one exit, there is no false imprisonment, because the restraint must be total; (2) unlawfulness — a lawful arrest is not false imprisonment, but an unlawful arrest is; and (3) intention — the defendant must have intended the act of restraint itself, though not necessarily its unlawfulness.","tags":["false imprisonment","elements","complete constraint"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch2_negligence","title":"Chapter 2: Negligence — The Core SQE Topic","subchapters":[{"id":"2.0","title":"2.0 The Four Elements of Negligence","cards":[{"id":"TRT_0006","type":"A","question":"What are the four elements of a negligence claim, and in what order must they be addressed?","answer":"The notes state the elements of negligence are: (1) duty of care, (2) breach of duty, (3) causation of damage, and (4) no effective defence, describing it as a four-stage test where the claimant must establish the first three elements before the defendant may then raise defences. The notes warn that missing an element, or applying them out of order, is a serious analytical error.","tags":["negligence","elements","structure"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.1.2","title":"2.1.2 Novel Duty Situations — The Caparo Test","cards":[{"id":"TRT_0007","type":"A","question":"What is the Caparo three-stage test for establishing a novel duty of care, and why is foreseeability alone insufficient?","answer":"Where there is no established authority on whether a duty exists (a 'novel' situation), courts apply the Caparo three-stage test, and all three stages must be satisfied — failure at any one stage means there is no duty of care. The notes explain that foreseeability alone does not suffice because countless people might foreseeably be affected by a careless act; the proximity and policy stages exist to limit liability to a manageable class of claimants in a close relationship with the defendant, and the fair/just/reasonable stage lets courts weigh policy considerations such as whether imposing a duty would have a chilling, defensive effect on valuable activities like emergency services.","tags":["duty of care","Caparo test","novel duty","policy"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.1.3","title":"2.1.3 Omissions — The General Rule and Exceptions","cards":[{"id":"TRT_0008","type":"A","question":"What is the general rule on liability for pure omissions, illustrated by the drowning stranger example?","answer":"English law does not generally impose liability for pure omissions — the mere failure to act. The notes illustrate this with the example that if you see a stranger drowning, you have no legal duty to rescue them, regardless of how easy the rescue might be.","tags":["omissions","duty of care","general rule"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0009","type":"E","question":"What are the five recognised exceptions where a duty to act CAN arise despite the general rule against liability for omissions?","answer":"The notes list five exceptions: (1) special relationship, such as parent-child, employer-employee, teacher-pupil, doctor-patient, or police officer with detainee; (2) assumption of responsibility, where D has voluntarily assumed responsibility to protect C, illustrated by a decorator who agrees to look after C's house while C is away; (3) control, where D has control over a third party or situation posing a risk, such as a prison authority controlling a prisoner; (4) creation of danger, where D who actively creates a dangerous situation may owe a duty to take reasonable steps to remedy it; and (5) rescue commenced, where a defendant who begins a rescue owes a limited duty not to make things worse, so abandoning a rescue after prompting others not to intervene may itself be a breach.","tags":["omissions","duty of care","exception"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.1.4","title":"2.1.4 Scope of Duty of Care","cards":[{"id":"TRT_0010","type":"A","question":"Even where a duty of care exists, what limits liability under the 'scope of duty' concept?","answer":"The notes describe scope of duty as a frequently overlooked concept: even when a duty of care clearly exists, liability is limited to harm that falls within the scope of that duty — that is, the type of harm the duty was designed to guard against. A defendant may be negligent and cause damage, but if that damage falls outside the scope of the duty, there is no liability for it.","tags":["scope of duty","duty of care"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.2.1","title":"2.2.1 The Objective Standard — The Reasonable Person","cards":[{"id":"TRT_0011","type":"E","question":"How is the standard of care adjusted for under-skilled defendants, professionals, children, and a person taking on a task above their skill level?","answer":"Breach is assessed objectively, asking what a reasonable person in D's position would have done, and the notes set out four sub-rules: under-skilled defendants, such as a learner driver, are held to the standard of a competent practitioner of that activity, so 'I was only a learner' is no defence; professionals are held to the standard of a reasonably competent member of that profession, so a junior doctor performing a senior task is held to the senior standard; children are held to the standard of a reasonable child of the same age, neither a worst-case child nor an adult; and a person who takes on a task exceeding their qualifications is held to the standard of someone qualified to perform that task.","tags":["breach","reasonable person","objective standard"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.2.2","title":"2.2.2 Assessing Breach — The Balancing Test","cards":[{"id":"TRT_0012","type":"A","question":"How do courts assess whether a defendant breached their duty, and is a defendant required to take all possible precautions?","answer":"The court does not simply ask whether D took all possible precautions; instead it balances the risk created by D's conduct against the burden of taking precautions against it. The greater the risk and potential harm, the more D must do to avoid liability, but if the cost of precautions greatly outweighs the risk, D may not be in breach for failing to take them.","tags":["breach","balancing test","risk"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.2.3","title":"2.2.3 Proving Breach — Res Ipsa Loquitur","cards":[{"id":"TRT_0013","type":"A","question":"What is the doctrine of res ipsa loquitur, and what are the classic examples given?","answer":"Usually the claimant must produce positive evidence of breach, such as witnesses or expert evidence, but under res ipsa loquitur ('the thing speaks for itself'), the very fact that the accident occurred can itself demonstrate breach. The notes give two classic examples: a barrel of flour falling from an upper-floor window onto a pedestrian, and a patient who goes in for a routine operation and wakes up with a swab stitched inside them.","tags":["res ipsa loquitur","breach","evidence"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0014","type":"D","question":"What is the effect of a criminal conviction for an offence involving negligence (such as careless driving) on a later civil negligence claim?","answer":"If a person is convicted of a criminal offence involving negligence, such as careless driving, that conviction is admissible in subsequent civil proceedings as evidence that the defendant was negligent. This means the claimant can rely on the existence of the conviction itself to help establish breach in the civil claim.","tags":["criminal conviction","breach","evidence","consequence"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.3.1","title":"2.3.1 Causation in Fact — The 'But For' Test","cards":[{"id":"TRT_0015","type":"A","question":"What is the 'but for' test for causation in fact, and how is it applied where there are alternative possible causes of the claimant's harm?","answer":"The 'but for' test asks whether the claimant's harm would have occurred but for the defendant's breach of duty; if the claimant would have suffered the same harm anyway regardless of the breach, then the breach did not cause it. Where there are two or more possible causes of the harm, the claimant must prove on the balance of probabilities that the defendant's breach was the cause rather than the alternative, and if the claimant cannot show this is more likely than not, causation fails.","tags":["causation","but for test","factual causation"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.3.2","title":"2.3.2 Modified Test: Material Contribution to Harm","cards":[{"id":"TRT_0016","type":"A","question":"What unfairness does the 'but for' test create when multiple simultaneous causes each could have caused the claimant's injury, and how does the material contribution test address it?","answer":"The 'but for' test creates unfairness where multiple causes act simultaneously to contribute to one injury, because if each cause could individually have caused the injury, the claimant would fail the 'but for' test against any single defendant even though one of them must have caused the harm. The law remedies this with the material contribution test, which allows the claimant to succeed against a defendant by showing that defendant's breach materially contributed to the harm, without needing to prove it was the sole 'but for' cause.","tags":["causation","material contribution","but for test"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.3.3","title":"2.3.3 Divisible vs Indivisible Injuries and Contribution Between Tortfeasors","cards":[{"id":"TRT_0017","type":"C","question":"What is the difference between a divisible and an indivisible injury for the purposes of apportioning liability between multiple tortfeasors?","answer":"A divisible injury, such as industrial deafness caused by exposure at multiple employers, gets worse over time and allows each defendant to be liable only for the share of injury they individually caused — meaning the claimant must sue all defendants to recover in full, and bears the loss if one cannot pay. An indivisible injury, such as multiple fractures suffered in a single crash caused by two careless drivers, results from one event, and all defendants are jointly and severally liable for the full amount, so the claimant can recover the full sum from any one of them, leaving those defendants to sort out contribution between themselves under the Civil Liability (Contribution) Act 1978.","tags":["causation","divisible injury","indivisible injury","joint and several liability","Civil Liability (Contribution) Act 1978"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.3.4","title":"2.3.4 Intervening Acts — Novus Actus Interveniens","cards":[{"id":"TRT_0018","type":"E","question":"What are the three types of intervening act that can break the chain of causation, and what is the threshold for each?","answer":"The notes identify three types: (1) a third party act, which breaks the chain only if unforeseeable — but if D's negligence created the very risk that the third party's act brought about, such as a negligent doctor subsequently treating an injury D caused, the chain is not broken because that further negligence is generally foreseeable as a consequence of causing personal injury; (2) the claimant's own act, which breaks the chain only if the claimant acted entirely unreasonably, a high threshold — merely unreasonable conduct, such as not wearing a seatbelt, does not break the chain and is instead dealt with through contributory negligence; and (3) a natural event, which may break the chain if it is unforeseeable and extraordinary.","tags":["causation","intervening act","novus actus interveniens"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.3.5","title":"2.3.5 Remoteness of Damage — The Reasonable Foreseeability Test","cards":[{"id":"TRT_0019","type":"A","question":"What does the remoteness test for damage ask, and what is the consequence if the type of damage was unforeseeable?","answer":"The remoteness stage asks whether the claimant's damage is of a type that was reasonably foreseeable, even though the defendant caused the loss and was negligent. If the type of damage was unforeseeable, the defendant escapes liability for it, even though they were negligent and even though their breach factually caused the harm.","tags":["remoteness","reasonable foreseeability"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0020","type":"E","question":"What are the two recognised exceptions where an unforeseeable EXTENT of damage is not too remote?","answer":"The notes give two exceptions: (1) the egg-shell skull rule ('take your victim as you find them') — if D causes a type of harm that is foreseeable, D is liable for the full extent of that harm even if it is far greater than foreseeable because the claimant has a pre-existing physical or psychological vulnerability; and (2) the 'similar in type' rule — if the type of harm is foreseeable but the precise manner in which it occurs is not, D is still liable, because the law requires foreseeability of the type or category of harm, not the specific mechanism by which it comes about.","tags":["remoteness","egg-shell skull rule","similar in type rule","exception"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.4.1","title":"2.4.1 Contributory Negligence — Partial Defence","cards":[{"id":"TRT_0021","type":"A","question":"Is contributory negligence a complete or partial defence, and does the claimant's conduct need to have contributed to the accident itself?","answer":"Contributory negligence is a partial defence under the Law Reform (Contributory Negligence) Act 1945 — it does not eliminate liability but reduces the damages the claimant can recover. The notes stress an important nuance: the claimant's failure need not have contributed to the accident happening at all; it only needs to have contributed to the damage suffered, illustrated by a failure to wear a seatbelt, which does not cause a car accident but increases the injuries suffered, typically reducing damages by 15–25% in reported seatbelt cases.","tags":["contributory negligence","Law Reform (Contributory Negligence) Act 1945","partial defence"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.4.2","title":"2.4.2 Volenti Non Fit Injuria — Complete Defence","cards":[{"id":"TRT_0022","type":"C","question":"How does volenti non fit injuria differ from contributory negligence in effect, and why are courts reluctant to apply it to employees or visitors to dangerous premises?","answer":"Volenti non fit injuria is the voluntary assumption of risk and is a complete defence — if established, it eliminates the defendant's liability entirely, unlike contributory negligence which only reduces damages. Courts are very reluctant to apply it because of this drastic effect and much prefer contributory negligence in close cases; the notes explain that employees are usually held not to have freely chosen to accept the risks of their employment, because economic coercion means they lacked a genuinely free choice, and a visitor to dangerous premises who merely knows of a risk may not be found to have truly consented to run it.","tags":["volenti non fit injuria","complete defence","contributory negligence","distinction"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.4.3","title":"2.4.3 Exclusion of Liability","cards":[{"id":"TRT_0023","type":"E","question":"What statutory controls restrict a business's ability to exclude liability for negligence?","answer":"The notes set out three rules: business liability for death or personal injury caused by negligence cannot be excluded at all, under UCTA 1977 s.2(1); business liability for other losses caused by negligence can only be excluded if the exclusion is reasonable, under UCTA 1977 s.2(2); and in consumer contracts, liability for negligence causing death or personal injury cannot be excluded, under the Consumer Rights Act 2015.","tags":["exclusion of liability","UCTA 1977","Consumer Rights Act 2015","negligence"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"2.4.4","title":"2.4.4 Illegality (Ex Turpi Causa Non Oritur Actio)","cards":[{"id":"TRT_0024","type":"A","question":"What does the defence of illegality (ex turpi causa) provide, and what kind of defence is it?","answer":"The defence of illegality provides that a person cannot found a claim on their own criminal or seriously unlawful conduct. The notes describe it as a complete defence, grounded in public policy, meaning it bars the claim entirely rather than merely reducing damages.","tags":["illegality","ex turpi causa","complete defence"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch3_pel","title":"Chapter 3: Negligence — Pure Economic Loss (PEL)","subchapters":[{"id":"3.1.1","title":"3.1.1 The Distinction Between PEL and Consequential Economic Loss","cards":[{"id":"TRT_0025","type":"C","question":"What is the distinction between pure economic loss (PEL) and consequential economic loss (CEL), and which is recoverable?","answer":"Pure economic loss is financial loss that is the harm itself, not a consequence of physical harm to the claimant's person or property — the financial loss is the direct, primary injury rather than flowing from physical damage. The notes describe the distinction between PEL and consequential economic loss as the single most important distinction in this area: consequential economic loss, which does flow from physical damage, is recoverable, whereas pure economic loss generally is not.","tags":["pure economic loss","consequential economic loss","distinction"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"3.2","title":"3.2 The General Rule: No Duty for PEL","cards":[{"id":"TRT_0026","type":"A","question":"Why does the law generally refuse to impose a duty of care for pure economic loss, using the power-cable example?","answer":"The notes explain the rationale using the example of a defendant who carelessly cuts a power cable: hundreds of businesses might lose profits as a result, and if all of them could sue, the defendant's liability would be enormous and disproportionate to their fault. The law therefore draws the line so that only those who suffer physical damage can claim, leaving pure economic loss generally unrecoverable.","tags":["pure economic loss","general rule","policy"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"3.3","title":"3.3 The Exception: Negligent Statements and the Special Relationship","cards":[{"id":"TRT_0027","type":"A","question":"When does pure economic loss become recoverable under the 'special relationship' exception, and does this extend beyond advice to services?","answer":"Pure economic loss becomes recoverable where the defendant makes a negligent statement, or provides a negligent service, and there is a 'special relationship' of reliance between the parties, giving rise to a duty of care for the resulting PEL. The notes confirm this special relationship extends to negligent services as well as advice, giving the example that a solicitor drafting a will owes a duty to the intended beneficiaries — even though the solicitor's client is the testator — because the very purpose of the will is to benefit those beneficiaries.","tags":["pure economic loss","special relationship","negligent statements","exception"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch4_psychiatric","title":"Chapter 4: Negligence — Psychiatric Harm","subchapters":[{"id":"4.3","title":"4.3 Primary Victims","cards":[{"id":"TRT_0028","type":"A","question":"Who counts as a primary victim for the purposes of a psychiatric harm claim, and why are the rules for primary victims more generous?","answer":"A primary victim is someone who was in the actual area of danger created by the defendant's negligence, or who reasonably believed they were in the area of danger. The notes state that the rules for primary victims are more generous than for secondary victims: once a primary victim who suffered a medically recognised condition is identified, the claim is relatively straightforward, with the only real remaining question being whether there was a foreseeable risk of physical harm to the claimant.","tags":["psychiatric harm","primary victim","definition"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"4.4","title":"4.4 Secondary Victims","cards":[{"id":"TRT_0029","type":"A","question":"Who is a secondary victim, and why are the rules for secondary victim claims significantly stricter than for primary victims?","answer":"Secondary victims are those outside the area of danger who suffer psychiatric harm from witnessing the consequences of the defendant's negligence on others. The notes explain the rules are significantly stricter because the law is concerned about the potentially unlimited class of people who might claim to have witnessed an accident's consequences and suffered psychiatric harm as a result.","tags":["psychiatric harm","secondary victim","policy"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0030","type":"E","question":"What four requirements must a secondary victim satisfy to succeed in a psychiatric harm claim?","answer":"The notes set out four requirements: (1) normal fortitude — assessed objectively by asking whether a person of normal psychological robustness would have suffered a recognised psychiatric illness in the claimant's position, so an unusually sensitive claimant cannot recover for harm a normal person would not have suffered; (2) close ties — automatically presumed for spouses and parents of children, but must be proved for siblings, adult children, and close friends, and a rescuer or professional attending an accident does not automatically have close ties; (3) proximity in time and space — the claimant must be at the scene when the accident occurred or arrive very shortly afterwards, so arriving hours later at the hospital does not satisfy this; and (4) unaided senses — the claimant must have witnessed the event directly, not been told about it by telephone, heard it on the radio, or watched it on live television.","tags":["psychiatric harm","secondary victim","requirements","test"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch5_employers","title":"Chapter 5: Employers' Liability","subchapters":[{"id":"5.0","title":"5.0 Employer's Personal Duty vs Vicarious Liability","cards":[{"id":"TRT_0031","type":"C","question":"How does an employer's personal, non-delegable duty of care to employees differ from vicarious liability, and why does the distinction matter?","answer":"Employers' liability is the personal, non-delegable duty of care that an employer owes directly to each employee, which is distinct from vicarious liability: under the employer's personal duty the employer is personally responsible, whereas vicarious liability makes the employer only derivatively responsible for the acts of others. The distinction matters because an employer may be personally liable for an injury even where they are not vicariously liable — for example, where an independent contractor caused the harm, there is no vicarious liability, but there may still be a breach of the employer's own non-delegable duty.","tags":["employers' liability","vicarious liability","non-delegable duty","distinction"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"5.2","title":"5.2 The Duty Is Non-Delegable","cards":[{"id":"TRT_0032","type":"A","question":"What does it mean that an employer's duty of care to employees is 'non-delegable'?","answer":"The notes describe non-delegability as the critical feature of the employer's personal duty: an employer who delegates a task to a third party — whether an employee, contractor, or agency — does not discharge their duty merely by delegating it. If the third party then fails to take reasonable care, it is the employer's own duty that is breached, not just the third party's.","tags":["employers' liability","non-delegable duty"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"5.3","title":"5.3 Standard and Individual Employee Circumstances","cards":[{"id":"TRT_0033","type":"E","question":"How does the standard of care owed by an employer vary according to (a) an individual employee's known vulnerabilities, (b) common industry practice, and (c) the date of knowledge of a risk?","answer":"The standard is reasonable care, not absolute safety, but because the duty is owed to each employee individually, the notes identify three relevant factors: (1) an employer who knows a particular employee is more vulnerable, for example allergic to a substance, blind in one eye, or having back problems, must take greater precautions for that employee even if those precautions would not be required for other employees; (2) common industry practice is relevant but not determinative — following standard practice is likely to meet the standard of care, but proof that something was common practice does not automatically establish it was reasonable; and (3) date of knowledge — an employer cannot be held liable for failing to guard against a risk that was unknown in the industry at the time, since the standard is judged by what was known and reasonably foreseeable at the time of the breach.","tags":["employers' liability","standard of care","vulnerable employee","date of knowledge"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch6_vicarious","title":"Chapter 6: Vicarious Liability","subchapters":[{"id":"6.0","title":"6.0 The Three-Question Framework","cards":[{"id":"TRT_0034","type":"A","question":"What three questions must all be answered 'yes' for vicarious liability to be established, and why is vicarious liability described as a form of strict liability?","answer":"The notes describe vicarious liability as a form of strict liability because the defendant is held liable for someone else's tort without being personally at fault, justified on the basis that employers benefit from their employees' work and should bear the risks too. Three questions must all be answered yes: (1) was a tort committed, (2) was it committed by an employee (or someone akin to one), and (3) was it committed in the course of employment.","tags":["vicarious liability","strict liability","framework"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"6.1","title":"6.1 Was a Tort Committed?","cards":[{"id":"TRT_0035","type":"A","question":"Why must the underlying tort be established before vicarious liability can be considered?","answer":"The notes warn that this step is often overlooked: before any question of vicarious liability arises, you must first analyse whether the tortfeasor — the person who actually caused the harm — committed a tort at all, working through the full elements of the relevant tort, usually negligence, including duty, breach, causation, and remoteness. If no tort was committed by the individual, there can be no vicarious liability for the employer.","tags":["vicarious liability","underlying tort"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"6.2","title":"6.2 By an Employee?","cards":[{"id":"TRT_0036","type":"A","question":"Is an employer vicariously liable for the torts of an independent contractor, and how do courts determine whether someone is an employee for this purpose?","answer":"An employer is vicariously liable only for the torts of employees, meaning those under a contract of service, and not for independent contractors, who work under a contract for services. The notes emphasise that the label given to the contract does not determine the issue — courts look at the economic reality of the relationship rather than how the parties have described it.","tags":["vicarious liability","employee","independent contractor","economic reality"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"6.3","title":"6.3 Relationships 'Akin to Employment'","cards":[{"id":"TRT_0037","type":"A","question":"What relationships have courts extended vicarious liability to cover beyond strict employment, and what examples are given?","answer":"Recent case law has extended vicarious liability to relationships sufficiently analogous to employment, even without a formal employment contract. The notes give examples of prisoners working for a prison authority, who are treated as akin to employees of the prison, foster parents placed by a local authority, and agents in agency relationships.","tags":["vicarious liability","akin to employment","extension"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"6.4","title":"6.4 In the Course of Employment?","cards":[{"id":"TRT_0038","type":"B","question":"A delivery driver drives carelessly and causes an accident while making deliveries. Is this within the course of employment?","answer":"Yes. The notes explain that negligent performance of an authorised act — where the employee did what they were authorised to do, but did it carelessly — is clearly within the course of employment. A delivery driver who drives too fast is still doing their authorised job, just doing it negligently, so the employer remains vicariously liable.","tags":["vicarious liability","course of employment","negligent performance"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0039","type":"A","question":"Does an employee committing a criminal act automatically take them outside the course of employment?","answer":"No. The notes state that being a criminal act does not automatically take the employee outside the course of employment; if the criminal act is closely connected with the employment, such as a security guard using excessive force when ejecting a customer, vicarious liability may still arise.","tags":["vicarious liability","course of employment","criminal acts"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"6.4.1","title":"6.4.1 Disobedience of Instructions — Scope vs. Manner","cards":[{"id":"TRT_0040","type":"C","question":"What is the difference between a 'scope' restriction and a 'manner' restriction on an employee's instructions, and why does it matter for vicarious liability?","answer":"A scope restriction defines the boundaries of what the employee is authorised to do at all — the notes give the example 'do not drive the company van' — and an employee who breaches it and causes an accident is taken outside the course of employment, so the employer is not vicariously liable. A manner restriction, by contrast, only limits how an authorised task is performed — illustrated by 'do not drive the company van over 60mph' — and an employee who breaches this while still doing the authorised task (driving the van, just too fast) remains within the course of employment, so the employer remains vicariously liable.","tags":["vicarious liability","scope vs manner","course of employment","distinction"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"6.5","title":"6.5 Independent Contractors — No Vicarious Liability","cards":[{"id":"TRT_0041","type":"E","question":"Although an employer is not vicariously liable for an independent contractor's torts, what two ways can the employer still be personally liable?","answer":"The notes identify two ways: (1) breach of the employer's own non-delegable duty, such as failing to ensure safe equipment for employees, which exists independently of the contractor's fault; and (2) failure to take reasonable care in selecting a competent contractor — if the employer hires a contractor without checking their qualifications, and that contractor turns out to be incompetent and causes harm, the employer may be personally liable for their own negligence in the selection process.","tags":["independent contractors","vicarious liability","non-delegable duty","negligent selection"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch7_remedies_pi","title":"Chapter 7: Remedies for Personal Injury and Death","subchapters":[{"id":"7.0","title":"7.0 The Compensatory Principle","cards":[{"id":"TRT_0042","type":"A","question":"What is the aim of tort damages, and how must they be paid?","answer":"The aim of tort damages is compensatory — to restore the claimant to the position they would have been in had the tort not occurred, so far as money can achieve that. The notes note that non-pecuniary losses, such as pain, suffering, and loss of enjoyment of life, can only be reflected in money rather than truly compensated, that punitive damages are very rarely awarded in English tort law, and that damages must be claimed as a single lump sum paid once, not periodically — which creates the difficulty of assessing future losses that have not yet crystallised.","tags":["damages","compensatory principle","lump sum"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"7.1.1","title":"7.1.1 Pecuniary Losses — Past and Future Loss of Income","cards":[{"id":"TRT_0043","type":"A","question":"How is past loss of income calculated, and what deductions are made?","answer":"Past loss of income covers income lost between the date of injury and trial or settlement, and is capable of precise calculation because it has already occurred. The notes specify it is calculated on a net basis, after tax and national insurance deductions, and that any sick pay received from the employer is deducted from the award.","tags":["damages","past loss of income","pecuniary loss"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0044","type":"A","question":"How is future loss of income calculated using a multiplicand and multiplier, and what does the multiplier adjust for?","answer":"Future loss of income cannot be calculated precisely because it has not yet occurred, so the court estimates it using a multiplicand — the claimant's annual net pre-accident income, or the difference between pre- and post-accident income if the claimant can return to lower-paid work — multiplied by a multiplier representing the number of years of lost income. The notes state the multiplier is discounted for two factors: the fact that the claimant receives the money in advance as a lump sum, and the chance that the claimant might have left work or lost income for other reasons anyway.","tags":["damages","future loss of income","multiplicand","multiplier"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0045","type":"D","question":"If a tort has shortened the claimant's life expectancy, can they recover the income they would have earned during the 'lost years', and is any deduction made?","answer":"Yes — where the tort has shortened the claimant's life expectancy, the claimant can recover the income they would have earned during the lost years. The notes specify that a deduction is made for the living expenses the claimant would have incurred during those lost years, since that money would not actually have been retained.","tags":["damages","lost years","future loss of income"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"7.1.1c","title":"7.1.1(c) Pecuniary Losses — Expenses","cards":[{"id":"TRT_0046","type":"A","question":"What expenses are recoverable as part of a personal injury claim, including gratuitous care, and is the claimant obliged to use NHS treatment?","answer":"Recoverable expenses include past and future costs of treatment, care (including care provided gratuitously by relatives, the cost of which forms part of the claimant's damages), specialist equipment, home adaptations, and travel costs. The notes specifically state that the claimant is not obliged to mitigate their loss by using NHS treatment if they choose private treatment instead — the defendant cannot argue that the claimant should have used the NHS.","tags":["damages","expenses","gratuitous care","mitigation"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"7.1.2","title":"7.1.2 Non-Pecuniary Losses — PSLA","cards":[{"id":"TRT_0047","type":"C","question":"What is the difference between damages for 'pain and suffering' and damages for 'loss of amenity', and how does the position of an unconscious claimant illustrate this distinction?","answer":"Pain and suffering damages compensate for the physical and mental experience of the injury and its treatment, both past and future, whereas loss of amenity damages compensate for the effect on the claimant's ability to enjoy life, such as an inability to pursue hobbies, participate in sports, or enjoy relationships. The notes explain that loss of amenity is assessed objectively, so even if the claimant is unconscious and unaware of their incapacity, loss of amenity damages are still awarded, even though pain and suffering awards are not (since an unconscious claimant cannot be experiencing pain or suffering).","tags":["damages","PSLA","pain and suffering","loss of amenity","distinction"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0048","type":"A","question":"How do courts quantify PSLA damages given that they cannot be precisely calculated?","answer":"PSLA damages cannot be precisely calculated, so the notes explain that courts refer to published guidelines — the Judicial College Guidelines — which set out conventional award ranges for different types and severities of injury. These guideline awards cover both past and future PSLA together, rather than being split into separate past and future components.","tags":["damages","PSLA","Judicial College Guidelines"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"7.2.1","title":"7.2.1 Survival of Deceased's Cause of Action — LR(MP)A 1934","cards":[{"id":"TRT_0049","type":"E","question":"Under the Law Reform (Miscellaneous Provisions) Act 1934, which causes of action survive the deceased's death for the estate to pursue, and what is the effect of the deceased's own contributory negligence?","answer":"The notes note two specific points about survival of the deceased's cause of action: defamation claims do not survive death, so the estate cannot continue a defamation claim the deceased could have brought; and where the deceased was contributorily negligent, that contributory negligence reduces the estate's recovery in the same way it would have reduced the deceased's own claim had they lived.","tags":["damages on death","Law Reform (Miscellaneous Provisions) Act 1934","contributory negligence"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"7.2.2","title":"7.2.2 New Causes of Action — Fatal Accidents Act 1976","cards":[{"id":"TRT_0050","type":"A","question":"What is the precondition for dependants or family members to bring a claim under the Fatal Accidents Act 1976, and what three heads of loss does it cover?","answer":"A claim under the Fatal Accidents Act 1976 can only be brought if the deceased would have been able to bring a successful claim themselves had they lived — it is a separate cause of action from the estate's survival claim, brought by dependants and for bereavement. The notes identify three heads of recovery: (a) bereavement damages, a fixed statutory sum; (b) loss of dependency damages; and (c) funeral expenses, recoverable where the tort caused the death.","tags":["damages on death","Fatal Accidents Act 1976","bereavement damages","loss of dependency"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch8_occupiers","title":"Chapter 8: Occupiers' Liability","subchapters":[{"id":"8.1","title":"8.1 Who Is an Occupier?","cards":[{"id":"TRT_0051","type":"A","question":"What is the key test for who counts as an 'occupier' of premises, and can there be more than one occupier at once?","answer":"The occupier is the person who has control over the premises, not necessarily the owner — control is the key concept. The notes give examples: a tenant in occupation, not the landlord, is the occupier unless the landlord retained control over particular parts such as a common staircase; a builder who takes over control of a building site becomes an occupier; and a landlord retaining control of common areas remains the occupier of those areas even after letting the rest of the property. The notes confirm there may be multiple occupiers of the same premises simultaneously, each owing the relevant duty.","tags":["occupiers' liability","occupier","control","definition"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"8.2","title":"8.2 What Are Premises?","cards":[{"id":"TRT_0052","type":"A","question":"What counts as 'premises' for occupiers' liability purposes, and what type of liability is excluded?","answer":"Premises include land (including gardens), buildings on the land, and also fixed or movable structures such as temporary scaffolding or ladders. The notes specify that the occupiers' liability Acts cover liability for dangers due to the state of the premises, not liability for activities carried out on the premises, which would instead be ordinary negligence.","tags":["occupiers' liability","premises","definition"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"8.3","title":"8.3 Who Is a Lawful Visitor?","cards":[{"id":"TRT_0053","type":"D","question":"Can a person who enters premises lawfully become a trespasser, and what example is given?","answer":"Yes — permission to be on premises may be limited, so someone who enters with permission for one purpose becomes a trespasser if they go beyond that permission. The notes give the example of a customer in a shop who wanders into the back office, who becomes a trespasser in that area even though they were a lawful visitor in the shop's public area.","tags":["occupiers' liability","lawful visitor","limited permission","trespasser"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"8.4","title":"8.4 Occupiers' Liability Act 1957 — Lawful Visitors","cards":[{"id":"TRT_0054","type":"A","question":"What is the 'allurement' principle for child visitors under the Occupiers' Liability Act 1957?","answer":"Under the 1957 Act, an occupier must be prepared for children to be less careful than adults and so must take higher precautions for them. The allurement principle means that if something on the premises is especially attractive to children, such as a machine or a pond, the occupier may be liable even if they took steps to keep children out, provided the allurement is present and the risk to exploring children is foreseeable.","tags":["occupiers' liability","1957 Act","children","allurement"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0055","type":"C","question":"How does the standard expected of a 'skilled visitor' differ from an ordinary visitor under the 1957 Act?","answer":"An occupier may expect a person exercising a calling, meaning a trade or profession, to appreciate and guard against risks that are incidental to that calling — the notes give the example of an electrician entering to repair wiring, who is expected to guard against risks from electrical wiring. The notes note that an occupier who tells the electrician to work with live wiring may still have breached their duty, but an electrician who ignores obvious electrical risks incidental to their own work may find their claim fails.","tags":["occupiers' liability","1957 Act","skilled visitor","distinction"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0056","type":"A","question":"When does a warning satisfy the common duty of care owed to a lawful visitor under the 1957 Act?","answer":"A warning satisfies the common duty of care only if it was enough in the circumstances to enable the visitor to be reasonably safe. The notes caution that a warning sign alone may not be enough if the visitor cannot avoid the danger or has no alternative route — merely warning of a danger does not automatically discharge the duty.","tags":["occupiers' liability","1957 Act","warnings"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0057","type":"E","question":"What three conditions must be met for an occupier to discharge their duty in respect of work done by an independent contractor under the 1957 Act?","answer":"The notes set out three conditions: (a) it was reasonable to entrust the work to an independent contractor in the first place; (b) the occupier took reasonable care to check that the contractor was competent; and (c) the occupier inspected the completed work to check it was properly done, with the degree of inspection required depending on the technical nature of the work.","tags":["occupiers' liability","1957 Act","independent contractors","test"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"8.5","title":"8.5 Occupiers' Liability Act 1984 — Non-Visitors (Trespassers)","cards":[{"id":"TRT_0058","type":"C","question":"How is the duty owed to a trespasser under the 1984 Act more limited than the duty owed to a lawful visitor under the 1957 Act?","answer":"The 1984 Act governs liability to trespassers and the notes describe its duty as significantly more limited than under the 1957 Act in two ways: (1) the duty is only to take such care as is reasonable to prevent the trespasser from suffering personal injury, not property damage; and (2) the duty may be discharged simply by giving a warning of the danger, a less onerous standard than for lawful visitors, where a warning must actually enable the visitor to be safe. Volenti and contributory negligence apply as defences under the 1984 Act in the same way as elsewhere.","tags":["occupiers' liability","1984 Act","trespassers","distinction"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch9_products","title":"Chapter 9: Products Liability","subchapters":[{"id":"9.1","title":"9.1 Liability in Negligence (Fault-Based)","cards":[{"id":"TRT_0059","type":"C","question":"In a products liability negligence claim, who typically owes a duty of care and who typically does not — manufacturers, retailers, or wholesalers/distributors?","answer":"Manufacturers clearly owe a duty of care, as do those who assemble or repair products. Retailers generally do not owe a duty in negligence, because they have merely passed the product on without examining it, whereas wholesalers and distributors may owe a duty if they handle the product or have the opportunity to inspect it.","tags":["products liability","negligence","duty of care","manufacturers"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0060","type":"A","question":"Who is the manufacturer's duty of care for a defective product owed to?","answer":"The duty is owed to anyone the manufacturer could reasonably foresee as likely to be affected by a defect in the product, not just the purchaser. The notes confirm this includes bystanders who are injured by the product, even though they never purchased or used it themselves.","tags":["products liability","duty of care","scope"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"9.2","title":"9.2 Consumer Protection Act 1987 — Strict Liability","cards":[{"id":"TRT_0061","type":"A","question":"Why was the Consumer Protection Act 1987 introduced, and what kind of liability does it impose?","answer":"The Consumer Protection Act 1987 was introduced to make it easier for consumers to claim for defective products without having to prove the manufacturer's fault. The notes confirm it imposes strict liability, meaning there is no need to prove negligence in order to succeed under the Act.","tags":["products liability","Consumer Protection Act 1987","strict liability"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch10_statutory_duty","title":"Chapter 10: Breach of Statutory Duty","subchapters":[{"id":"10.0","title":"10.0 Breach of Statutory Duty as a Separate Claim","cards":[{"id":"TRT_0062","type":"A","question":"How can a claimant succeed in breach of statutory duty even where a negligence claim would fail?","answer":"Breach of a statutory duty may give rise to a separate civil claim for damages, entirely independent from a negligence claim. The notes explain that even where the claimant cannot prove negligence because the ordinary standard of care was met, they may still succeed in breach of statutory duty if the statute imposes a stricter standard than the common law negligence standard.","tags":["breach of statutory duty","negligence","distinction"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0063","type":"D","question":"Do health and safety regulations made under the HSWA 1974 give rise to a separate civil claim for breach of statutory duty, and what use can still be made of them?","answer":"The notes give this as a key example of a category-2 statute: the HSWA 1974 and health and safety regulations made under it generally do not give rise to civil claims for breach of statutory duty, so injured employees must rely on a negligence claim instead. However, the content of those regulations is still relevant to the negligence standard of care, because it indicates what a reasonable employer would have done.","tags":["breach of statutory duty","HSWA 1974","negligence standard"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"10.2","title":"10.2 When a Silent Statute Gives Rise to a Civil Claim","cards":[{"id":"TRT_0064","type":"E","question":"What two factors do courts examine to decide whether Parliament intended a 'silent' statute to create a civil right of action?","answer":"Courts examine, first, whether the duty was imposed to protect a limited class of persons rather than the public at large — if so, a civil right is more likely intended — and second, whether the statute provides alternative remedies, such as criminal prosecution, a fine, or regulatory action, since if it does, Parliament may have intended those alternative remedies to be the only ones, meaning no civil claim arises.","tags":["breach of statutory duty","silent statute","parliamentary intent"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0065","type":"E","question":"Once a civil right of action is found to exist under a statute, what four elements must the claimant prove?","answer":"The notes set out four elements: (1) the claimant falls within the class of persons the statute was designed to protect — for example, a statute protecting children cannot be relied on by an adult; (2) the statutory duty was breached, assessed by reference to the specific wording of the statute, which may impose a stricter standard than negligence; (3) the damage suffered is of the type the statute was designed to prevent — illustrated by a statute requiring sealed containers to prevent environmental contamination, which does not cover a claim for property damage where waste falls from an unsealed container and damages a car windscreen, because that is a different type of harm from what the statute aimed to prevent; and (4) causation — the claimant must prove the breach caused their loss, applying standard causation rules.","tags":["breach of statutory duty","elements","test"],"source":"Tort SQE Notes.docx","note":""}]}]},{"id":"ch11_nuisance","title":"Chapter 11: Nuisance and the Rule in Rylands v Fletcher","subchapters":[{"id":"11.1","title":"11.1 Public Nuisance","cards":[{"id":"TRT_0066","type":"A","question":"Who can bring a claim for public nuisance, and what is the significance of a single isolated event?","answer":"Only an individual who has suffered particular damage beyond the harm suffered by the general class can sue for public nuisance, although the Attorney General may seek an injunction on behalf of the class as a whole. The notes give examples of public nuisance such as obstruction of the highway, an offensive trade like a tannery emitting noxious smells over a wide area, and quarry blasting creating dust and noise over a wide area, and note that, unlike private nuisance, a single isolated event can constitute public nuisance.","tags":["public nuisance","standing","single event"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"11.2","title":"11.2 Private Nuisance","cards":[{"id":"TRT_0067","type":"C","question":"Does private nuisance compensate for personal injury, and how does this contrast with the recoverability of amenity damage like noise or smells?","answer":"Private nuisance protects the use and enjoyment of land, not personal safety, so it generally does not give rise to personal injury damages — physical harm caused to a claimant while on their own land may be recoverable in negligence, but not as part of a nuisance claim. Conversely, intangible amenity damage such as noise, smells, or vibrations causing discomfort is recoverable in nuisance, even though it would not be recoverable in a negligence action because it is not actionable damage for negligence purposes.","tags":["private nuisance","personal injury","amenity damage","distinction"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"11.2.1","title":"11.2.1 Who Can Be Sued (Defendant)?","cards":[{"id":"TRT_0068","type":"C","question":"What is the difference between an occupier 'adopting' and 'continuing' a nuisance they did not create?","answer":"An occupier adopts a nuisance if they make use of it themselves, whereas an occupier continues a nuisance if they know of it, or ought to know of it, and fail to take reasonable steps to abate it. The notes confirm that the creator of a nuisance can also be sued even after they no longer occupy the land, and that an occupier can be liable for nuisances created by independent contractors where the activity carried a special risk of nuisance, or even by trespassers or natural events, if the occupier knew of them and failed to take reasonable steps to address them.","tags":["private nuisance","defendant","adopt","continue","distinction"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"11.2.2","title":"11.2.2 Assessing Unreasonableness — The Balancing Exercise","cards":[{"id":"TRT_0069","type":"E","question":"What factors does the court weigh when assessing whether an interference with neighbouring land is an 'unreasonable' private nuisance?","answer":"The notes identify five factors: (1) duration and frequency — the interference must generally be continuing, since a one-off event is usually insufficient, and the longer and more frequent the interference, the more likely it is actionable; (2) character of the neighbourhood — relevant for amenity damage like noise or smells but not for physical damage to land, so someone living in an industrial area must tolerate more noise but the industrial character does not excuse physical damage such as crop damage from factory emissions; (3) abnormal sensitivity — if the claimant's land use is abnormally sensitive, interference that would not affect ordinary use is generally not actionable, illustrated by a commercially sensitive film studio disrupted by ordinary street noise that would not affect ordinary premises; (4) malice — a defendant who acts out of spite may render a nuisance actionable even where the same act done for ordinary purposes would not be, as in Hollywood Silver Fox Farm v Emmett [1936], where firing guns near the claimant's farm to frighten foxes into not breeding was held actionable because of the defendant's malicious purpose; and (5) reasonable care — the reasonableness of the defendant's conduct is irrelevant, since what matters is the nature of the interference, so a defendant can be liable in nuisance even having taken all reasonable precautions.","tags":["private nuisance","unreasonableness","balancing test","Hollywood Silver Fox Farm v Emmett"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"11.2.3","title":"11.2.3 Defences to Private Nuisance","cards":[{"id":"TRT_0070","type":"E","question":"What defences are available to private nuisance, and what two common arguments are explicitly NOT defences?","answer":"The notes list prescription — where the defendant has carried on the nuisance for over 20 years since it became actionable without any action being taken, applying to the nuisance itself rather than just the activity — and statutory authority, where a statute expressly or impliedly authorises the activity causing the nuisance, as the two defences. The notes are explicit that two common arguments are not defences: planning permission to carry out an activity does not authorise the nuisance that results from it, and 'coming to the nuisance' — where the claimant purchased property next to a pre-existing nuisance — does not cause the claimant to lose their right to complain about it.","tags":["private nuisance","defences","prescription","statutory authority","planning permission"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"11.2.4","title":"11.2.4 Remedies for Private Nuisance","cards":[{"id":"TRT_0071","type":"A","question":"What is the primary remedy for private nuisance, and when might a court refuse it and award damages instead?","answer":"The primary remedy for private nuisance is an injunction, an equitable and discretionary order requiring the defendant to stop or limit the nuisance-causing activity. The notes state that a court may refuse an injunction and award damages in lieu instead where the defendant's activity has high social utility and the harm to the claimant is small.","tags":["private nuisance","remedies","injunction","damages in lieu"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0072","type":"D","question":"What is 'abatement' as a remedy for private nuisance, and what must the claimant do before exercising it?","answer":"Abatement is a self-help remedy where the claimant takes steps to remove the nuisance themselves, such as cutting back overhanging branches. The notes specify that the claimant must give reasonable notice before entering the defendant's land to abate the nuisance — failure to give that notice may make the claimant liable in trespass.","tags":["private nuisance","abatement","self-help"],"source":"Tort SQE Notes.docx","note":""}]},{"id":"11.3","title":"11.3 The Rule in Rylands v Fletcher — Strict Liability","cards":[{"id":"TRT_0073","type":"E","question":"What do the three key elements of t

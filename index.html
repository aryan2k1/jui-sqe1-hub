he rule in Rylands v Fletcher — 'brings onto land', 'non-natural use', and 'escape' — each require?","answer":"The notes explain three elements: 'brings onto land' requires that the defendant accumulated or brought something onto the land themselves, so naturally occurring features do not qualify — water naturally present on land is not Rylands, but large quantities of water stored for commercial purposes are; 'non-natural use' requires a special use creating an increased risk beyond the ordinary, so ordinary domestic water pipes are a natural use but a large commercial industrial reservoir is non-natural, with the distinction being fact-sensitive; and 'escape' requires that the thing actually leaves the defendant's land, so if water floods within the defendant's own land without crossing the boundary, there is no Rylands liability.","tags":["Rylands v Fletcher","strict liability","elements"],"source":"Tort SQE Notes.docx","note":""},{"id":"TRT_0074","type":"E","question":"What defences are available to a claim under the rule in Rylands v Fletcher?","answer":"The notes list six defences: act of God, an extraordinary and unforeseeable natural event such as unprecedented rainfall causing a reservoir to overflow; act of stranger, where the escape was caused by the unforeseeable act of a third party over whom the defendant had no control; consent, where the claimant consented to the accumulation; common benefit, where the accumulation was for the common benefit of both defendant and claimant, which limits the doctrine's scope; statutory authority, where the relevant statute authorises the accumulation; and contributory negligence, available as a partial defence.","tags":["Rylands v Fletcher","defences"],"source":"Tort SQE Notes.docx","note":""}]}]}]},{"id":"legal_services","title":"Legal Services","color":"#8db87a","chapters":[{"id":"ch1_regulatory_framework","title":"1. The Regulatory Framework","subchapters":[{"id":"1.0","title":"1.0 Regulators and Reserved Legal Activities","cards":[{"id":"LGS_0001","type":"A","question":"What is the structure of legal services regulation in England and Wales, and what is a 'reserved legal activity'?","answer":"The Legal Services Board (LSB) is the overarching regulator for legal services in England and Wales, with seven professional regulators beneath it, including the SRA for solicitors. A reserved legal activity is an activity that only authorised lawyers may carry out, with examples given of exercising a right of audience (appearing in court) and conducting litigation (issuing or defending proceedings).","tags":["regulatory framework","Legal Services Board","reserved legal activities"],"source":"SQE Legal Service Notes.html","note":""},{"id":"LGS_0002","type":"D","question":"What is the practical significance of an activity being classified as a 'reserved legal activity'?","answer":"The notes describe reserved legal activities as the gateway concept: if an activity is reserved, only persons regulated by the relevant body can carry it out, whereas if it is not reserved, unregulated persons can carry it out without authorisation.","tags":["reserved legal activities","regulatory framework","consequence"],"source":"SQE Legal Service Notes.html","note":""}]}]},{"id":"ch2_pii","title":"2. Professional Indemnity Insurance","subchapters":[{"id":"2.0","title":"2.0 PII Requirements","cards":[{"id":"LGS_0003","type":"A","question":"What factors determine whether a firm's professional indemnity insurance is 'adequate and appropriate', and what is the minimum standard?","answer":"Law firms must hold adequate and appropriate professional indemnity insurance, at a level no less than the minimum set by the SRA Indemnity Insurance Rules. What counts as adequate and appropriate depends on the type of client, the annual matter value, and the firm's claims history.","tags":["professional indemnity insurance","SRA Indemnity Insurance Rules"],"source":"SQE Legal Service Notes.html","note":""},{"id":"LGS_0004","type":"C","question":"How do the professional indemnity insurance obligations differ between freelance solicitors practising alone and solicitors in non-commercial bodies?","answer":"Freelance solicitors practising alone in their own name have no obligation to hold professional indemnity insurance unless they are carrying out reserved legal activities. Solicitors in non-commercial bodies, by contrast, must ensure the body holds adequate insurance if it is providing reserved legal activities.","tags":["professional indemnity insurance","freelance solicitors","non-commercial bodies","distinction"],"source":"SQE Legal Service Notes.html","note":""}]}]},{"id":"ch3_funding","title":"3. Funding Legal Services","subchapters":[{"id":"3.0","title":"3.0 Funding Options","cards":[{"id":"LGS_0005","type":"E","question":"What funding options are available for non-litigation matters?","answer":"For non-litigation matters, the notes list four main funding options: a retainer, where the client agrees to pay fees directly; monies on account, an upfront payment; monthly billing; and a fixed fee.","tags":["funding","non-litigation","retainer","fixed fee"],"source":"SQE Legal Service Notes.html","note":""},{"id":"LGS_0006","type":"E","question":"What funding options are available specifically for litigation, including the difference between a CFA and a DBA?","answer":"For litigation, the notes list private funding (as for non-litigation matters), a Conditional Fee Agreement (CFA) — a 'no win, no fee' arrangement where the solicitor's fee is uplifted by an agreed percentage if the client wins — a Damages Based Agreement (DBA), where the solicitor's fee is instead an agreed percentage of the damages awarded, third-party or insurer funding (either before the event, such as car insurance, or after the event, obtained post-accident), and Legal Aid or public funding, available in civil and criminal cases subject to a means test and a merits test. The notes flag that CFAs and DBAs are only available for litigation, not for non-litigation matters.","tags":["funding","litigation","CFA","DBA","Legal Aid"],"source":"SQE Legal Service Notes.html","note":""},{"id":"LGS_0007","type":"C","question":"What is the difference between the means test and the merits test for Legal Aid, and how do the merits test requirements differ between civil and criminal cases?","answer":"The means test requires that the client's income be below a prescribed threshold. The merits test differs by case type: in civil cases it requires good prospects of success, while in criminal cases it requires that funding be in the interests of justice. The notes emphasise that both tests must be satisfied for Legal Aid to be granted — meeting only the means test is not enough.","tags":["Legal Aid","means test","merits test","distinction"],"source":"SQE Legal Service Notes.html","note":""}]}]},{"id":"ch4_equality_act","title":"4. The Equality Act 2010","subchapters":[{"id":"4.0","title":"4.0 Discrimination, Victimisation, Harassment and Reasonable Adjustments","cards":[{"id":"LGS_0008","type":"C","question":"What is the difference between direct and indirect discrimination under the Equality Act 2010, and can either be justified?","answer":"Direct discrimination is treating someone less favourably because of a protected characteristic, such as age or race, while indirect discrimination is a policy that looks neutral on its face but puts people with a protected characteristic at a disadvantage. The notes confirm that both direct and indirect discrimination can be justified if the action is a proportionate means of achieving a legitimate aim.","tags":["Equality Act 2010","direct discrimination","indirect discrimination","justification"],"source":"SQE Legal Service Notes.html","note":""},{"id":"LGS_0009","type":"C","question":"What is the difference between victimisation and harassment under the Equality Act 2010?","answer":"Victimisation is treating someone less favourably because they were involved in a discrimination or harassment complaint. Harassment is unwanted conduct related to a protected characteristic that violates a person's dignity or creates an intimidating, hostile, degrading, humiliating, or offensive environment.","tags":["Equality Act 2010","victimisation","harassment","distinction"],"source":"SQE Legal Service Notes.html","note":""},{"id":"LGS_0010","type":"A","question":"Does the duty to make reasonable adjustments under the Equality Act 2010 apply only to employees or also to clients, and what examples are given?","answer":"Firms must make reasonable adjustments so that both employees and clients with disabilities are not placed at a substantial disadvantage. The notes give examples such as specialist equipment, extra breaks, and layout changes to premises, and flag as an exam tip that the duty applies to both groups — a common exam question wrongly tries to limit it to just one.","tags":["Equality Act 2010","reasonable adjustments","employees","clients"],"source":"SQE Legal Service Notes.html","note":"exam tip flagged in source"}]}]},{"id":"ch5_money_laundering","title":"5. Money Laundering","subchapters":[{"id":"5.0","title":"5.0 The Three Stages of Money Laundering","cards":[{"id":"LGS_0011","type":"E","question":"What are the three stages of money laundering, and at which stages are solicitors most likely to become involved?","answer":"Money laundering is the conversion of criminal proceeds into assets that appear legitimate, and proceeds through three stages: placement, where criminal cash enters the financial system; layering, where the origin of the funds is obscured; and integration, where the funds now appear clean. The notes state that solicitors are most likely to become involved at the layering and integration stages, rather than at placement.","tags":["money laundering","placement","layering","integration"],"source":"SQE Legal Service Notes.html","note":""}]},{"id":"5a","title":"5a. Direct Involvement Offences (POCA)","cards":[{"id":"LGS_0012","type":"E","question":"What are the three direct involvement money laundering offences under POCA, what is the test for liability, and what defences are available?","answer":"The three direct involvement offences under the Proceeds of Crime Act 2002 are concealing (trying to disguise criminal proceeds as legitimate), arrangement (making arrangements that help another person acquire or retain criminal property), and acquisition (using or possessing criminal property). The test for these offences is subjective — what did the individual actually know or suspect — and the available defences are authorised disclosure (reporting to the National Crime Agency as soon as possible) and legal professional privilege.","tags":["money laundering","POCA","direct involvement offences","subjective test"],"source":"SQE Legal Service Notes.html","note":""}]},{"id":"5b","title":"5b. Indirect Involvement Offences (POCA)","cards":[{"id":"LGS_0013","type":"E","question":"What are the three indirect involvement money laundering offences under POCA, what is the test for liability, and what defences are available?","answer":"The three indirect involvement offences are failing to disclose (not submitting a suspicious activity report when there are grounds to do so), tipping off (warning a suspect that a suspicious activity report has been made or an investigation is underway), and prejudicing an investigation (falsifying or destroying information relevant to a money laundering investigation). The test for these offences is objective — what the individual knew, suspected, or ought to have known or suspected — and the available defences are legal professional privilege, lack of training, and disclosures made to other legal professionals.","tags":["money laundering","POCA","indirect involvement offences","objective test"],"source":"SQE Legal Service Notes.html","note":""},{"id":"LGS_0014","type":"C","question":"Why does the subjective/objective distinction between direct and indirect money laundering offences matter in practice?","answer":"Direct offences require the individual to have actually known or suspected the relevant facts, applying a subjective test, whereas indirect offences catch people who merely ought to have known or suspected, applying an objective test. The notes flag this as an important exam point because it means a lack of personal awareness is riskier under the indirect offences, since 'I didn't know' is not a defence if a reasonable person in that position ought to have known.","tags":["money laundering","subjective test","objective test","distinction"],"source":"SQE Legal Service Notes.html","note":"exam tip flagged in source"}]},{"id":"5c","title":"5c. The Money Laundering Regulations — Firm Requirements","cards":[{"id":"LGS_0015","type":"E","question":"What does the Money Laundering Regulations 2017 require firms to do, and what is the difference between the MLRO and the MLCO?","answer":"Firms must carry out customer due diligence ('know your customer') when carrying out prescribed activities, put in place client identification procedures, provide training to client-facing staff, appoint a Money Laundering Reporting Officer (MLRO) — a senior, experienced staff member who receives and reviews suspicious activity reports and decides whether to report to the National Crime Agency — and appoint, where required, a Money Laundering Compliance Officer (MLCO), responsible for training and implementing anti-money laundering procedures, including verification of identities and recordkeeping, and keep records of suspicious activity reports and disclosures. The notes confirm the MLCO and MLRO roles can be held by the same person.","tags":["money laundering","Money Laundering Regulations 2017","MLRO","MLCO"],"source":"SQE Legal Service Notes.html","note":""}]}]},{"id":"ch6_financial_services","title":"6. Financial Services — the General Prohibition","subchapters":[{"id":"6.0","title":"6.0 The General Prohibition and Regulated Activities","cards":[{"id":"LGS_0016","type":"A","question":"What is the 'General Prohibition' under the Financial Services and Markets Act 2000, and what four elements make up a 'regulated activity'?","answer":"Under the Financial Services and Markets Act 2000, it is a criminal offence to carry out a regulated activity without authorisation from the Financial Conduct Authority or an applicable exemption — this is the General Prohibition. A regulated activity requires all four of: a specified activity, a specified investment, that the activity is carried out in the course of business, and that no exclusion applies.","tags":["FSMA 2000","General Prohibition","regulated activity","test"],"source":"SQE Legal Service Notes.html","note":""},{"id":"LGS_0017","type":"E","question":"What are examples of 'specified activities' and 'specified investments' under the FSMA regime, and what is notably excluded from specified investments?","answer":"Specified activities include advising, arranging, dealing as agent, managing, and safeguarding or administering assets. Specified investments include insurance contracts, company shares, debentures, mortgage contracts, pension schemes, and funeral plans, but the notes specifically state that land or property, whether residential or commercial, is not a specified investment, meaning activities relating to land fall outside the General Prohibition.","tags":["FSMA 2000","specified activities","specified investments","land exclusion"],"source":"SQE Legal Service Notes.html","note":""},{"id":"LGS_0018","type":"B","question":"A solicitor gives free advice on investments to a family member at their home. The same solicitor gives similar advice to a paying client in the office. Does the 'in the course of business' element of a regulated activity apply to both, one, or neither?","answer":"It applies only to the advice given to the paying client in the office, not the personal advice given to a family member at home. The notes explain that 'in the course of business' requires a business element — personal advice to a family member at home would not count, whereas advice given in the office for payment would, because that involves a business element that the family advice lacks.","tags":["FSMA 2000","in the course of business","application"],"source":"SQE Legal Service Notes.html","note":""}]},{"id":"6a","title":"6a. Exclusions from the General Prohibition","cards":[{"id":"LGS_0019","type":"E","question":"What are the three exclusions from the General Prohibition described in the notes, and when does each apply?","answer":"The notes describe three exclusions: the takeover exclusion, which applies where the client is buying, or would end up owning, more than 50% of the shares in a company; acting through an authorised person, which applies where the solicitor refers the client to an FCA-regulated adviser such as a stockbroker; and the reasonably necessary exclusion, which applies where the activity is a reasonably necessary part of performing legal services that do not otherwise involve a regulated activity.","tags":["FSMA 2000","exclusions","takeover exclusion","reasonably necessary exclusion"],"source":"SQE Legal Service Notes.html","note":""}]},{"id":"6b","title":"6b. Designated Professional Body Exemption","cards":[{"id":"LGS_0020","type":"A","question":"What is the Designated Professional Body exemption, and what condition must be satisfied for solicitors to rely on it?","answer":"Even where none of the exclusions from the General Prohibition apply, solicitors regulated by the SRA, as a Designated Professional Body under the Law Society, can benefit from a limited exemption. The notes specify this exemption only applies provided the financial service in question is incidental to the provision of legal advice.","tags":["FSMA 2000","Designated Professional Body","exemption"],"source":"SQE Legal Service Notes.html","note":""}]},{"id":"6c","title":"6c. Insurance Distribution — Special Rules","cards":[{"id":"LGS_0021","type":"E","question":"Do the standard exclusions from the General Prohibition apply to insurance products, and what additional requirements apply to firms carrying out insurance distribution activities?","answer":"None of the standard exclusions apply to insurance products, such as defective title insurance or after-the-event insurance. The notes set out three additional requirements for firms carrying out insurance distribution activities: they must appoint an insurance distribution officer, register in the Financial Services Register, and provide clear information to the client about the policy. The notes flag insurance as the exception to the exclusions rule — whenever insurance products appear in a question, the additional insurance distribution requirements must be checked, since the usual exclusions will not save the firm.","tags":["FSMA 2000","insurance distribution","exception"],"source":"SQE Legal Service Notes.html","note":"exam tip flagged in source"}]}]}]},{"id":"business_law","title":"Business Law & Practice","color":"#7a2424","chapters":[{"id":"ch1_mediums","title":"1. Key Advantages & Disadvantages of Business Mediums","subchapters":[{"id":"1.1-1.2","title":"1.1-1.2 Limited Liability & Incorporation","cards":[{"id":"BIZ_0001","type":"C","question":"How does liability for the entity's debts differ between a sole trader/general partnership and a company/LLP?","answer":"Sole traders and general partners have unlimited personal liability, with personal wealth at stake, and partner liability is joint and several so creditors can pursue any or all partners. Companies and LLPs, by contrast, offer limited liability because incorporation creates a separate legal entity behind a 'veil of incorporation': the entity itself is liable for its debts, and a shareholder's liability is capped at the amount agreed to be contributed for their shares, with no further contribution required once shares are fully paid up.","tags":["business mediums","limited liability","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0002","type":"D","question":"What regulatory consequence follows from a business choosing the limited liability of a company or LLP over a sole trader or general partnership?","answer":"Limited liability comes with regulation: companies and LLPs must register with Companies House and meet ongoing filing requirements, whereas sole traders and general partnerships face no such formalities and need not publish accounts, making them quicker and cheaper to start and more private.","tags":["business mediums","incorporation","consequence"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"1.4-1.5","title":"1.4-1.5 Finance & Management","cards":[{"id":"BIZ_0003","type":"E","question":"Which business mediums can grant a floating charge, and why does this matter for raising finance?","answer":"Only companies and LLPs can grant a floating charge — a charge over present and future assets retained in the business, such as inventory — giving lenders enhanced security on top of fixed charges over immovable assets. Sole traders and general partnerships cannot grant floating charges, which makes it harder for them to raise finance on the same terms.","tags":["business mediums","floating charge","finance"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0004","type":"A","question":"What is the default management structure in a sole trader/general partnership compared with a company, and what statutory minimums apply to companies?","answer":"In a sole trader or general partnership, ownership and management are the same person or people. In a company there is a separation: shareholders own, and directors manage, though one person can hold both roles in a small family company. The Companies Act 2006 requires at least one director for a private company or two for a public company, and imposes statutory duties on them, while the articles of association form the internal constitution governing board meetings and the appointment and termination of directors.","tags":["business mediums","management","directors"],"source":"Business Practice SQE Notes.pdf","note":""}]}]},{"id":"ch2_partnerships","title":"2. Sole Traders & Partnerships (General & Limited)","subchapters":[{"id":"2.2","title":"2.2 What is a General Partnership","cards":[{"id":"BIZ_0005","type":"A","question":"What are the three statutory elements of a general partnership under the Partnership Act 1890, and what counts as prima facie evidence of one?","answer":"The Partnership Act 1890 defines a partnership as the relation subsisting between persons carrying on a business in common with a view of profit, requiring: two or more persons, carrying on a business in common, with a view of profit. No formalities are required — no written agreement and no filing with Companies House — so a partnership exists the moment the three elements are met. Receipt of a share of profits is prima facie evidence of a partnership, but not where the payment is a debt repayment, employee or agent remuneration, or an annuity to a survivor of a partner or buyer of goodwill.","tags":["partnership","Partnership Act 1890","rule"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0006","type":"E","question":"What is NOT, on its own, sufficient to establish a partnership exists?","answer":"Sharing losses is not prima facie evidence of a partnership, and the absence of an agreement on losses does not prevent a partnership existing. Joint ownership of property or sharing gross returns is also not, in itself, evidence of a partnership.","tags":["partnership","Partnership Act 1890","exception"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"2.3","title":"2.3 Authority to Bind the Firm","cards":[{"id":"BIZ_0007","type":"A","question":"What is the difference between a partner's actual authority and apparent (ostensible) authority to bind the firm?","answer":"Under actual authority, the firm is bound by any act done in a way showing an intention to bind it, by a person actually authorised — express actual authority comes from the partnership agreement or a partners' vote, while implied actual authority arises where the other partners have allowed a partner to regularly do an act without objection. Under apparent authority, the firm is bound by an act of a partner carrying on in the usual way business of the kind carried on by the firm, unless the partner had no authority and the third party either knew that or did not know/believe the person was a partner — the test is objective, asking whether a reasonable third party would expect a business of this kind to do this act.","tags":["partnership","actual authority","apparent authority","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0008","type":"B","question":"A partner with no actual authority to borrow money enters into a loan agreement with a bank on the firm's behalf, in a manner consistent with how trading partnerships usually operate. The bank had no reason to doubt the partner's authority. Is the firm bound?","answer":"Yes, the firm is bound under apparent authority. Borrowing money is within the usual business of a trading partnership, so the act was of a kind usually carried on by such a firm; it was done in a manner that would lead a reasonable third party to expect such authority; and the bank did not know the partner lacked authority nor did it disbelieve that the person was a partner. All elements of the apparent authority test are therefore satisfied, even though the partner had no actual authority.","tags":["partnership","apparent authority","application"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0009","type":"D","question":"What is the consequence if a partner enters a contract without authority and the third party knew the partner lacked authority (or did not believe they were a partner)?","answer":"In that situation, only that partner is personally liable to the third party for breach of warranty of authority — not on the contract itself — because neither actual nor apparent authority is satisfied, so the firm is not bound by the agreement.","tags":["partnership","apparent authority","consequence"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"2.4-2.6","title":"2.4-2.6 Liability, Incoming/Outgoing Partners, Holding Out","cards":[{"id":"BIZ_0010","type":"C","question":"How does liability differ between a partner who joins a firm and a partner who retires, in relation to debts incurred before and after their change in status?","answer":"An incoming partner is not liable to creditors for anything done before they joined, unless they contractually agree otherwise, and a new partner can only be added with the unanimous consent of existing partners. An outgoing partner remains liable for debts incurred before retirement — an indemnity from the firm does not bind the third party, and a novation (a tripartite agreement with the creditor) is needed to discharge that liability — and remains liable for debts incurred after retirement to anyone who continues to treat them as still a partner until notice of retirement is given, meaning actual notice to existing creditors and a London Gazette advertisement for new customers.","tags":["partnership","incoming partner","outgoing partner","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0011","type":"E","question":"What is 'holding out' under partnership law, and who can rely on it?","answer":"A person who represents themselves, or knowingly allows others to represent them, as a partner is liable to any third party who has given credit on the strength of that representation, as if they were a partner. 'Given credit' is interpreted broadly and includes goods supplied on credit. This applies to retiring partners who fail to remove themselves from notices, websites, and stationery after leaving the firm.","tags":["partnership","holding out","rule"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"2.7-2.9","title":"2.7-2.9 Property, Financial Entitlements, Management","cards":[{"id":"BIZ_0012","type":"A","question":"What is partnership property, and what happens when an individual partner's personal creditor wants to seize it for that partner's separate debt?","answer":"Partnership property is property originally brought into the partnership or acquired for partnership purposes in the course of business; property bought with the firm's money or titled in the firm's name is partnership property unless a contrary intention is shown, while property used by the partnership but owned individually by a partner remains that partner's, since the parties' intention is decisive. An individual partner's personal creditor cannot seize partnership property for that partner's separate debt — they can only apply for a charging order on the partner's interest, which entitles them to distributions but not to partnership rights or management, and a partner cannot dispose of partnership property by will.","tags":["partnership","partnership property","rule"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0013","type":"E","question":"What are the default financial entitlements of partners absent a contrary agreement, regarding capital/profit sharing, interest, and remuneration?","answer":"Absent a contrary agreement, capital and profits are shared equally regardless of contribution, and losses are shared in the same way, with no right to distribution before dissolution except as agreed. There is no interest on capital, but a partner is entitled to 5% per annum interest on loans they make to the firm. A partner is not entitled to be paid for work done for the partnership unless this is agreed, which is common where active partners work alongside sleeping partners who are pure investors.","tags":["partnership","financial entitlements","default rules"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0014","type":"E","question":"What voting rule governs ordinary partnership decisions, and which decisions instead require a unanimous vote?","answer":"By default, every partner has an equal right to take part in management on a one-partner-one-vote basis, and most decisions are made by simple majority. A unanimous vote is required for admitting a new partner, changing the nature of the business, and altering the partnership agreement, and a majority cannot expel a partner unless this is expressly agreed.","tags":["partnership","management","unanimous vote"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"2.10-2.13","title":"2.10-2.13 Duties, Termination, Limited Partnerships, Tax","cards":[{"id":"BIZ_0015","type":"E","question":"What fiduciary-type duties do partners owe to one another?","answer":"Partners owe a fiduciary duty to act in good faith for the benefit of the partnership, a duty to disclose information on all things affecting the partnership, and a duty to account for secret profits — meaning any benefit obtained without the others' consent from a transaction concerning the partnership or from use of partnership property or name, including profits from a competing business carried on without consent.","tags":["partnership","fiduciary duty","secret profits"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0016","type":"E","question":"What events dissolve a general partnership without court involvement, and which ground for court-ordered dissolution cannot be excluded by agreement?","answer":"Dissolution without court involvement occurs on expiration of a fixed term or completion of a specific enterprise, on notice by any partner in a partnership at will, and automatically on the bankruptcy or death of any partner (with the others able to elect to dissolve if a partner's share is charged for a personal debt). Illegality — any event making the business unlawful, such as a solicitor failing to renew their practising certificate — also dissolves the partnership, and this ground cannot be modified by the partnership agreement. Court-ordered dissolution is available on grounds including permanent incapacity, prejudicial conduct, persistent breach of the agreement, the business only being able to operate at a loss, or on a just and equitable basis, often used in cases of deadlock.","tags":["partnership","dissolution","illegality"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0017","type":"A","question":"On dissolution of a general partnership, in what order are assets distributed, and how are losses borne?","answer":"Assets are distributed in order: first to pay creditors (with partners personally liable for any shortfall if assets are insufficient), then to repay partner loans, then to repay partner contributions, and finally any remaining assets are divided in the same proportions as profits, equally absent agreement. Losses are paid first out of profits, then out of capital, and then by the partners individually in their profit-sharing proportions.","tags":["partnership","dissolution","distribution"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0018","type":"C","question":"How does a limited partnership under the Limited Partnerships Act 1907 differ from a general partnership, and what happens if a limited partner takes part in management?","answer":"A limited partnership requires at least one general partner with unlimited liability who manages the business, and one or more limited partners whose liability is limited to the amount contributed, provided they take no part in management; limited partnerships must be registered at Companies House, unlike general partnerships. If a limited partner participates in management, they lose their limited-liability protection.","tags":["limited partnership","Limited Partnerships Act 1907","distinction"],"source":"Business Practice SQE Notes.pdf","note":""}]}]},{"id":"ch3_llp","title":"3. Limited Liability Partnerships (LLPs)","subchapters":[{"id":"3.1-3.2","title":"3.1-3.2 Formation & Legal Personality","cards":[{"id":"BIZ_0019","type":"A","question":"What is required to form an LLP under the LLPA 2000, and what happens if statutory compliance fails?","answer":"An LLP is formed by registration with the Registrar of Companies under the Limited Liability Partnerships Act 2000, and it cannot trade until it has a certificate of incorporation; required information includes a name ending in 'LLP' or 'Limited Liability Partnership', an appropriate registered office where delivery can be acknowledged (a PO box will not qualify), the names and addresses of at least two members, and details of any people with significant control. If statutory compliance fails, no LLP is created — by default the relationship is a general partnership under the Partnership Act 1890, with full personal liability, so exam facts where members intended an LLP but did not file correctly should be read this way.","tags":["LLP","LLPA 2000","formation"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0020","type":"D","question":"What legal personality does an LLP have, comparable to a company?","answer":"Like a company, an LLP has a separate legal personality: it owns property, contracts, and sues and is sued in its own name, and it has perpetual succession, meaning it is unaffected by the death or bankruptcy of a member.","tags":["LLP","legal personality","consequence"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"3.3","title":"3.3 Membership, Authority & PSCs","cards":[{"id":"BIZ_0021","type":"E","question":"What happens if an LLP carries on business with only one member for more than six months?","answer":"If an LLP carries on business with one member for more than six months, that remaining person becomes jointly and severally liable with the LLP for debts incurred after the six months while it had only one member.","tags":["LLP","single member","consequence"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0022","type":"A","question":"What is the Person with Significant Control threshold for an LLP, and what is the classic trap regarding equal-membership LLPs?","answer":"An individual is a PSC of an LLP if they directly or indirectly hold rights over more than 25% of surplus assets on winding up, hold more than 25% of voting rights on members' decisions, have the right to appoint or remove the majority of those in management, or otherwise exercise significant influence or control. The threshold is 'more than' 25%, so four equal members at exactly 25% each have no PSCs, whereas three equal members at roughly 33% each are all PSCs.","tags":["LLP","PSC","threshold"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0023","type":"C","question":"How does an outgoing LLP member cease membership, and until when do they remain liable as a member to third parties?","answer":"An outgoing member ceases by giving reasonable notice to the other members and notifying the Registrar within 14 days. Until a third party is notified of the departure, or the Registrar has been informed, the former member is treated as still a member by that third party — mirroring the partnership 'holding out' principle.","tags":["LLP","outgoing member","rule"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"3.5-3.7","title":"3.5-3.7 Liability & Taxation","cards":[{"id":"BIZ_0024","type":"E","question":"What is the LLP 'clawback' rule on withdrawals before insolvent liquidation?","answer":"If a member has withdrawn property — such as a profit share, salary, loan repayment, or interest — within the 2 years before insolvent liquidation, and knew or had reasonable grounds to believe the LLP was, or would become, unable to pay its debts as a result, the court may order that member to contribute to the assets of the LLP.","tags":["LLP","clawback","insolvency"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0025","type":"C","question":"How is an LLP taxed compared with a company, despite having separate legal personality like a company?","answer":"An LLP is not a taxable person and pays no corporation tax, even though it has separate legal personality. Members are instead taxed individually like partners — income tax on their profit share, capital gains tax on disposal of LLP assets, and inheritance tax as partners — making the LLP tax-transparent like a partnership despite its company-like legal structure.","tags":["LLP","taxation","distinction"],"source":"Business Practice SQE Notes.pdf","note":""}]}]},{"id":"ch4_companies_formation","title":"4. Companies — Types & Formation","subchapters":[{"id":"4.1-4.2","title":"4.1-4.2 Types of Company & Private vs Public","cards":[{"id":"BIZ_0026","type":"E","question":"What are the three types of registered company by liability structure, and how does each treat members' liability on winding up?","answer":"An unlimited company has members personally liable for all of the company's debts, and is rare, though it is not obliged to publish accounts, giving better confidentiality than a limited company. A company limited by guarantee has members who pay only a fixed guaranteed amount, usually £1, on winding up, has no shares or shareholders, and is used by charities and not-for-profits, which are exempt from including 'Limited' in the name. A company limited by shares caps members' liability at the amount agreed for their shares: if fully paid and the company becomes insolvent, no further contribution is required, but if partly paid, the member must pay the outstanding balance.","tags":["companies","company types","liability"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0027","type":"C","question":"What are the key statutory differences between a private limited company and a public limited company?","answer":"A private company's name ends in 'Limited' or 'Ltd' and cannot offer shares to the public, needs a minimum of 1 director, has no statutory minimum share capital, no requirement for a company secretary, can start trading from incorporation, and files accounts within 9 months of its accounting reference date (often exempt from audit if small). A public limited company's name ends in 'Public Limited Company' or 'Plc', can offer shares to the public and be listed on a stock exchange, needs a minimum of 2 directors and a qualified company secretary, requires £50,000 nominal share capital, cannot start trading until it obtains a trading certificate, and must file audited accounts within 6 months. A company is private by default unless it meets the PLC requirements.","tags":["companies","private company","public company","distinction"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"4.3","title":"4.3 Promoters & Registration","cards":[{"id":"BIZ_0028","type":"E","question":"What is a promoter's liability on a pre-incorporation contract, and what steps can protect them from that liability?","answer":"Pre-incorporation contracts made 'on behalf of' a company before it is incorporated bind the promoter personally under the Companies Act 2006 and at common law, and that liability persists after incorporation unless protective steps are taken. The notes give four protection options: keeping the contract in draft until incorporation; a novation after incorporation, being a tripartite agreement substituting the company for the promoter; a post-incorporation assignment of the benefit together with an indemnity from the company; or using a shelf company — a pre-formed, never-traded company bought ready to use.","tags":["companies","promoter","pre-incorporation contract"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0029","type":"E","question":"What two core documents must be filed with Companies House to incorporate a company, and what does the certificate of incorporation signify?","answer":"To incorporate, the company must file the Memorandum of Association — a statement that the subscribers wish to form the company and become members — and an Application for Registration, covering matters such as the registered office address, business activity and SIC code, proposed name, whether limited by shares or guarantee, whether private or public, subscribers, statement of capital, proposed officers, and PSCs. The Registrar then issues a certificate of incorporation, described as the company's 'birth certificate': from its date the company is a legal entity and can trade with limited liability.","tags":["companies","incorporation","registration"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"4.4","title":"4.4 Constitution & Articles of Association","cards":[{"id":"BIZ_0030","type":"D","question":"What is the legal effect of the articles of association as a 'statutory contract', and what is the classic trap regarding enforcement?","answer":"The articles form a statutory contract between the company and each member, and between members themselves, but they are enforceable only in respect of membership rights, such as dividend or voting rights, and not personal rights held in another capacity, such as being a director or employee. The classic trap is a provision in the articles stating that a named individual 'will always be the company's solicitor' — this is unenforceable against the company by that individual because it is a personal employment right, not a membership right.","tags":["companies","articles of association","statutory contract"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0031","type":"A","question":"How can the articles of association be altered, and what limits exist on that power, including entrenchment?","answer":"The articles can be altered by special resolution, requiring at least 75% approval, but this power cannot be used to increase a member's liability to the company, such as forcing them to take more shares. Entrenchment can require a more onerous process for amending specific provisions, and must be notified to the Registrar, but it cannot completely prevent amendment by special resolution. A non-consenting shareholder can ask the court to set aside an alteration where no reasonable person would consider it in the company's best interests as a whole — disadvantaging the minority is not enough on its own, since the test asks whether the benefit is one any hypothetical member could enjoy.","tags":["companies","articles of association","alteration"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"4.5","title":"4.5 Legal Personality & the Veil","cards":[{"id":"BIZ_0032","type":"E","question":"When do shareholders or directors face personal liability despite the veil of incorporation, according to the notes?","answer":"Lifting the veil of incorporation is rare; most cases of director or shareholder personal liability instead arise from other legal provisions: fraudulent or wrongful trading under the Insolvency Act 1986, trading without a PLC trading certificate, or situations where the company was formed for fraud or to evade an existing obligation, such as circumventing a non-solicitation clause by trading through a newly formed limited company.","tags":["companies","veil of incorporation","personal liability"],"source":"Business Practice SQE Notes.pdf","note":""}]}]},{"id":"ch5_directors","title":"5. Companies — Directors","subchapters":[{"id":"5.1.1-5.1.3","title":"5.1.1-5.1.3 Appointment, Types & Powers","cards":[{"id":"BIZ_0033","type":"E","question":"What is a shadow director, and who is specifically excluded from that category?","answer":"A shadow director is a person whose directions the directors of a company are accustomed to act on, and they are treated like a de jure (formally appointed) director under the Companies Act 2006. Professional advisers acting in that capacity are specifically excluded from being shadow directors, even if the board regularly follows their advice.","tags":["directors","shadow director","exception"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0034","type":"D","question":"Where do directors' powers derive from, and what happens if shareholders want to direct the board?","answer":"Directors' powers derive from the articles of association; the Model Articles give the board all of the company's powers except where the articles provide otherwise. Shareholders can direct the board to take or refrain from a particular action, but only by special resolution requiring 75% approval, which is rare in practice. Directors must act collectively as a board through board resolutions, although they may delegate authority to a person or committee.","tags":["directors","powers","shareholder direction"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"5.1.6","title":"5.1.6 Directors' Duties (CA 2006, ss.171-177)","cards":[{"id":"BIZ_0035","type":"A","question":"What is the dual test under s.174 CA 2006 for a director's duty to exercise reasonable care, skill and diligence?","answer":"Section 174 applies a dual test: an objective limb, asking what a reasonably diligent person with the general knowledge, skill and experience expected of someone in that director's role would do, and a subjective limb, asking what the actual knowledge, skill and experience that particular director has. Whichever standard is higher prevails, so a director with specialist expertise is held to that higher subjective standard even though the objective limb alone would set a lower bar.","tags":["directors","duties","s.174","test"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0036","type":"B","question":"A director of a struggling company exploits a business opportunity for personal gain that the company itself could not have taken up due to lack of funds, without first seeking the board's authorisation. Has the director breached their duties?","answer":"Yes, this is a breach of the s.175 duty to avoid conflicts of interest. The duty to avoid actual or possible conflicts of interest, including exploitation of property, information, or opportunity, applies even where the company could not have taken the opportunity itself — the only ways to avoid breach are if it is a transaction with the company itself and the board is informed, the conflict is not reasonably likely to arise, or the directors authorise it, none of which occurred here.","tags":["directors","duties","s.175","application"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0037","type":"E","question":"Under s.172 CA 2006, whose interests must a director promote, and how does this shift when the company becomes insolvent or nearly so?","answer":"Section 172 requires a director to act in good faith to promote the success of the company for the benefit of the members as a whole, having regard to long-term consequences, employees, business relationships, the community and environment, reputation, and fair treatment of members — sometimes called 'enlightened shareholder value'. If the company is insolvent or near-insolvent, the duty shifts to acting in the interests of creditors instead.","tags":["directors","duties","s.172","insolvency"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0038","type":"E","question":"What must a director disclose under ss.177 and 182 CA 2006 regarding an interest in a transaction, and is disclosure to shareholders sufficient?","answer":"A director must notify the other directors of any interest in a proposed or existing transaction before entering into or continuing it, and the notice may be written, general, or given orally at a board meeting, but it must state both the nature and the extent of the interest. Disclosure to the members/shareholders is not sufficient — the notification must be to the other directors.","tags":["directors","duties","s.177","disclosure"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0039","type":"D","question":"What is the consequence of a provision in the articles or a contract purporting to exempt a director from liability for breach of duty, and what protections are permitted instead?","answer":"Such an exemption provision is void. However, the company is permitted to buy directors' and officers' (D&O) insurance and to indemnify a director against third-party claims, except that it cannot indemnify against criminal or regulatory fines. The notes also confirm that directors' duties continue after the directorship ends, so a former director cannot exploit an opportunity that came to them while still in office.","tags":["directors","duties","exemption","consequence"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0040","type":"E","question":"What happens if directors breach their duties, and can shareholders ratify the breach?","answer":"A director who breaches their duties may have to compensate the company for losses suffered or account for any profits made. Shareholders may ratify the conduct by ordinary resolution, but a director who is also a shareholder cannot vote on the ratification of their own breach.","tags":["directors","duties","ratification","consequence"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"5.1.7-5.1.9","title":"5.1.7-5.1.9 Board Meetings, Removal & Disqualification","cards":[{"id":"BIZ_0041","type":"E","question":"What is required to pass a written board resolution under the Model Articles, and how does this differ from voting at a board meeting?","answer":"A written board resolution requires unanimous director approval, in contrast to decisions made at a board meeting, which are decided by simple majority, with the chair holding a casting vote in the event of deadlock. At a meeting, a director interested in a matter generally cannot vote or count toward the quorum on it, and the quorum under the Model Articles is a minimum of 2 directors.","tags":["directors","board meetings","written resolution","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0042","type":"A","question":"What procedure must be followed to remove a director under s.168 CA 2006, and what device can give a director-shareholder protection against removal?","answer":"Removal of a director is by ordinary resolution, a simple majority, under s.168 CA 2006 — it cannot be done by written resolution. The shareholders' right to remove overrides most contrary provisions in the articles or service contract, and the procedure requires 28 days' notice of the intention to propose the resolution at a general meeting; the company must notify the director, who has the right to make written representations to be circulated and to speak at the meeting even if not a shareholder. A 'Bushell v Faith' clause, giving a director-shareholder weighted voting on a resolution to remove them, is permissible and can defeat the removal in practice.","tags":["directors","removal","s.168","Bushell v Faith"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0043","type":"E","question":"What are the two main grounds for disqualification of a director under the Company Directors Disqualification Act 1986?","answer":"Disqualification can be ordered for general misconduct — such as an indictable offence connected with the formation, management, or liquidation of a company, persistent breaches of companies legislation, fraud including fraudulent trading, or summary convictions for non-filing — or for unfitness, imposed for between 2 and 15 years where a director's conduct in an insolvent company makes them unfit, which also covers wrongful trading or being an undischarged bankrupt. A voluntary disqualification undertaking avoids the need to go to court.","tags":["directors","disqualification","CDDA 1986"],"source":"Business Practice SQE Notes.pdf","note":""}]}]},{"id":"ch6_members","title":"6. Companies — Members & Shareholders","subchapters":[{"id":"6.3","title":"6.3 Dividends","cards":[{"id":"BIZ_0044","type":"A","question":"Under what conditions can a company lawfully pay a dividend, and who is liable if it pays an unlawful one?","answer":"A company can only make distributions out of profits available for the purpose, defined as accumulated realised profits minus accumulated realised losses ('distributable profits'), and the payment must not render the company insolvent — this is part of the capital maintenance regime protecting creditors. Directors recommend a dividend after reviewing the accounts, and shareholders approve and declare it by ordinary resolution, though they can decline or reduce it but cannot declare more than recommended. If a dividend is paid otherwise than from distributable profits, a shareholder who knew or had reasonable grounds to believe the distribution was unlawful is liable to repay it, and the directors may also be personally liable for recommending it.","tags":["companies","dividends","distributable profits"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0045","type":"C","question":"What is the difference between cumulative and non-cumulative preference shares regarding unpaid dividends?","answer":"Cumulative preference shares roll over any unpaid dividend, so it accumulates and must be paid in a later year before ordinary shareholders receive anything, whereas a non-cumulative preference dividend is simply lost for that year if not paid, with no carry-forward entitlement.","tags":["companies","preference shares","distinction"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"6.5-6.6","title":"6.5-6.6 Derivative Claims & Minority Protection","cards":[{"id":"BIZ_0046","type":"C","question":"What is the difference between a derivative claim and an unfair prejudice petition, in terms of whose wrong is remedied and what relief is available?","answer":"A derivative claim is brought by a shareholder on behalf of the company against a director, shadow director, or other person, for breach of duty, where the board will not act, and damages from a successful claim go to the company, not the shareholder personally. An unfair prejudice petition under s.994 CA 2006 is brought where the company's affairs are conducted in a manner unfairly prejudicial to the petitioning shareholder personally, with the most common remedy being an order that the minority's shares be purchased at a fair price. Both routes can target the same underlying conduct but have very different procedures and outcomes.","tags":["companies","derivative claim","unfair prejudice","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0047","type":"E","question":"What is the two-stage court filter applied to a derivative claim application?","answer":"The court first dismisses the application if it does not disclose a prima facie case for permission to continue the claim. If that hurdle is passed, the court will still dismiss the application if a person promoting the success of the company for its members as a whole would not continue the claim, or if the act complained of was or would be authorised by the company; the court also considers good faith, the importance of the matter to the company, and whether the act could be ratified.","tags":["companies","derivative claim","test"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"6.7","title":"6.7 Right to Inspect","cards":[{"id":"BIZ_0048","type":"E","question":"What documents can a shareholder inspect, and what must the company do if it considers the request improper?","answer":"Shareholders have a right to inspect directors' service contracts, kept at the registered office for at least 1 year after the director leaves, and the register of members, which is also kept at the registered office. The shareholder must state their name, address, the purpose of the request, and who the information will be shared with, and the company must comply within 5 working days or apply to court on the basis that the purpose is improper, such as building a commercial mailing list for personal gain.","tags":["companies","inspection rights","register of members"],"source":"Business Practice SQE Notes.pdf","note":""}]}]},{"id":"ch7_decisions","title":"7. Joint Decision Making (Board & Shareholder Resolutions)","subchapters":[{"id":"7.1","title":"7.1 Shareholder Meetings & Resolutions","cards":[{"id":"BIZ_0049","type":"C","question":"What is the threshold and use for an ordinary resolution versus a special resolution, and what filing deadlines apply to each?","answer":"An ordinary resolution requires a simple majority of more than 50% of votes cast and is used for matters such as appointing or removing directors, declaring dividends, and approving accounts. A special resolution requires at least 75% of votes cast and is used for matters such as altering the articles, reducing share capital, winding up, or changing the company's name; special resolutions must be filed at Companies House within 15 days of being passed.","tags":["companies","resolutions","ordinary","special","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0050","type":"D","question":"How does voting by 'show of hands' differ from voting by poll, and when can a poll be demanded?","answer":"By default, voting is by show of hands, giving one vote per shareholder regardless of how many shares they hold. Five or more shareholders, or shareholders holding at least 10% of voting rights or 10% of paid-up capital, may demand a poll instead, under which voting is one vote per share — this can dramatically change the outcome where one shareholder holds the bulk of the shares but would otherwise have only one vote on a show of hands.","tags":["companies","show of hands","poll","consequence"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0051","type":"C","question":"How does the calculation of 'majority' differ between a vote at a shareholder meeting and a written resolution?","answer":"At a meeting, percentages are normally based on votes cast by those who attend, including by proxy, typically on a show of hands giving one vote per shareholder. For a written resolution, by contrast, percentages are based on all members entitled to vote, using one vote per share, so a written resolution passes once the requisite share-vote threshold has been signed in by members entitled to vote, rather than by counting attendees at a meeting.","tags":["companies","written resolution","majority calculation","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0052","type":"E","question":"Which two resolutions cannot be passed by written resolution, even though most ordinary and special resolutions can be?","answer":"A written resolution, available only to private companies, cannot be used to remove a director or to remove an auditor — both require a resolution passed at a meeting, with director removal additionally requiring 28 clear days' notice.","tags":["companies","written resolution","exception"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"7.2","title":"7.2 Matters Requiring Board and/or Shareholder Approval","cards":[{"id":"BIZ_0053","type":"E","question":"What is the threshold for a Substantial Property Transaction (SPT) requiring ordinary resolution approval, and what other matters need an ordinary resolution involving a director?","answer":"An SPT requires ordinary resolution approval where a non-cash asset bought or sold with a director or connected person is worth more than £100,000, or worth more than £5,000 and exceeding 10% of the company's net assets. Other matters needing ordinary resolution include ratifying a director's breach of duty, entering a director's service contract longer than 2 years, making a loan to a director, and a payment for loss of office to a director; for service contracts over 2 years or loans to a director, a memorandum of terms must sit at the registered office for at least 15 days before the meeting, or be circulated with the written resolution.","tags":["companies","substantial property transaction","threshold"],"source":"Business Practice SQE Notes.pdf","note":""}]}]},{"id":"ch8_finance","title":"8. Raising Finance","subchapters":[{"id":"8.1","title":"8.1 Equity Finance","cards":[{"id":"BIZ_0054","type":"A","question":"When can directors allot new shares without needing shareholder approval, under the rule for companies incorporated after 2009?","answer":"For companies incorporated after 2009, directors automatically have power to allot more shares if the company has only one class of shares, the new allotment is more of that same class, and the articles do not restrict the power — the Model Articles do not restrict it. Otherwise, directors need shareholders' permission by ordinary resolution before allotting shares.","tags":["companies","share allotment","directors' power"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0055","type":"E","question":"What is the statutory pre-emption right under s.561 CA 2006, and what two situations does it NOT apply to?","answer":"Where a company proposes to issue ordinary shares for cash, it must first offer them to existing shareholders in proportion to their existing holdings, on the same terms as any open-market offer, giving at least 14 days to accept before the shares can go to the market. Pre-emption does not apply to shares issued for non-cash consideration, or to preference shares, and the right can be disapplied by special resolution, with a private company's articles able to disapply it altogether (the Model Articles do not).","tags":["companies","pre-emption rights","s.561","exception"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0056","type":"C","question":"What is the difference between an allotment of shares and a transfer of shares, and what discretion do directors have over registering a transfer?","answer":"An allotment is the issue of brand new shares by the company in exchange for consideration paid to the company, whereas a transfer is the sale or gift of existing shares between a seller and buyer, with consideration (if any) going to the seller, not the company, and no new shares being created. On a transfer, the seller gives the share certificate and a stock transfer form to the buyer, the buyer pays stamp duty if applicable, and the documents go to the company; under the Model Articles for private companies, directors have an absolute power to refuse to register a transfer.","tags":["companies","allotment","transfer of shares","distinction"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"8.2","title":"8.2 Debt Finance","cards":[{"id":"BIZ_0057","type":"C","question":"What is the difference between a fixed charge and a floating charge, and which one is only available to companies and LLPs?","answer":"A fixed charge is taken over an asset the company will own for a long period, such as machinery or shares, and the company cannot dispose of, lease, or further charge that asset without the lender's consent; on default the chargee can sell the asset. A floating charge is taken over a class of assets that changes over time, such as inventory, and hovers over the class until crystallisation on default or insolvency, at which point it attaches to the items then in the class — a floating charge is only available to companies and LLPs, not sole traders or general partnerships.","tags":["companies","fixed charge","floating charge","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0058","type":"D","question":"What is the consequence of a company failing to register a charge at Companies House within 21 days, and how do fixed and floating charges rank against each other?","answer":"Charges created by a company must be registered at Companies House within 21 days with a certified copy and fee; failure to register makes the charge void against a liquidator or administrator and the company's other creditors, even if the borrower is solvent at the time — lenders therefore usually file the registration themselves rather than rely on the directors. Fixed charges over the same asset rank in date order of creation, and floating charges over the same asset also rank in date order, but a fixed charge takes priority over a floating charge on the same asset even if the floating charge was created earlier.","tags":["companies","charge registration","priority","consequence"],"source":"Business Practice SQE Notes.pdf","note":""}]}]},{"id":"ch9_recordkeeping","title":"9. Companies — Recordkeeping, Filing & Disclosure","subchapters":[{"id":"9.1-9.2","title":"9.1-9.2 Registers, Records & Companies House Filings","cards":[{"id":"BIZ_0059","type":"E","question":"What five statutory registers must a private company keep under the CA 2006, and for how long must board/general meeting minutes and directors' service contracts be retained?","answer":"A private company must keep a register of members, register of directors, register of secretaries, register of charges over the company's assets, and register of PSCs, available for inspection at the registered office, free for members and for a fee for the public (the director and member registers may instead be kept at Companies House if the company elects). Minutes of all general meetings and board meetings must be kept for at least 10 years, with general-meeting minutes free for members to inspect, and directors' service contracts must be kept for at least 1 year after the director leaves.","tags":["companies","statutory registers","recordkeeping"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0060","type":"E","question":"What is the annual confirmation statement, and what is the consequence of filing it late?","answer":"The annual confirmation statement confirms that the company's information held at Companies House is up to date and that its intended future activities are lawful — a 'no change' statement is still required even if nothing has changed. The first review period runs from the date of incorporation plus 12 months, and the statement must be filed within 14 days of the end of each review period; failing to file on time is a criminal offence.","tags":["companies","confirmation statement","filing"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0061","type":"E","question":"What are the accounts filing deadlines for private and public companies, and what are the consequences of late filing?","answer":"Private companies must file accounts within 9 months, and public companies within 6 months, after the end of the accounting reference period; once filed, accounts become public on the Companies House website, must give a 'true and fair view', and must be approved by the directors, with audit required except for small companies. Late filing can lead to financial penalties, possible criminal sanctions, and director disqualification.","tags":["companies","accounts","filing deadline","consequence"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"9.4","title":"9.4 Disclosure on Letterhead","cards":[{"id":"BIZ_0062","type":"E","question":"What must appear on a company's letterhead, and what is the rule if a director's name is included?","answer":"A company's letterhead must show its registered name, the part of the UK where it is registered, its registered number, and its registered office address. If the letterhead displays the name of any director, it must display the names of all directors — partial disclosure of director names is not permitted.","tags":["companies","letterhead","disclosure"],"source":"Business Practice SQE Notes.pdf","note":""}]}]},{"id":"ch10_insolvency","title":"10. Insolvency","subchapters":[{"id":"10.2","title":"10.2 Individuals & Partners — Bankruptcy","cards":[{"id":"BIZ_0063","type":"A","question":"What is an Individual Voluntary Arrangement, what approval threshold does it need, and which creditors are bound?","answer":"An IVA is a formal, court-supervised compromise with all creditors arranged via an insolvency practitioner: the debtor prepares a statement of affairs, the IP applies for an interim order halting bankruptcy petitions and other proceedings, and a creditors' meeting follows requiring approval by 75% in value of unsecured creditors. Once approved, it is binding on all ordinary unsecured creditors who had notice, whether or not they voted, but preferential and secured creditors are not bound unless they agree. If the debtor breaches the arrangement or lied in setting it up, the supervisor or any creditor can petition for the debtor's bankruptcy.","tags":["insolvency","IVA","rule"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0064","type":"E","question":"What are the three routes to a bankruptcy order, and what is the minimum debt for a creditor petition?","answer":"The three routes are: the debtor's own online application, with an adjudicator deciding if the debtor is unable to pay their debts; a creditor petition, which requires that the debtor owes at least £5,000, alone or combined with other debts; and a petition by the IVA supervisor, for breach of the arrangement, hidden assets, or preferences. A creditor can prove insolvency through a statutory demand for at least £5,000 unpaid for 3 weeks (or not set aside), a statutory demand for proof of ability to pay a future debt of at least £5,000, or failed execution on a judgment of at least £5,000.","tags":["insolvency","bankruptcy","routes"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0065","type":"E","question":"What restrictions apply to an undischarged bankrupt, and when does automatic discharge occur?","answer":"While bankrupt, the debtor cannot apply for credit above a prescribed limit, act as a company director, be a partner, or trade under another name without disclosure. Automatic discharge occurs after 1 year, unless the bankrupt was culpable through dishonesty, negligence, or recklessness, in which case a bankruptcy restrictions order can extend the restrictions for up to 15 years.","tags":["insolvency","bankruptcy","discharge","restrictions"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0066","type":"A","question":"What is the order of priority for distributing a bankrupt's estate?","answer":"The order is: first, the costs of the bankruptcy; second, preferential debts, including holiday pay and employee wages for the last 4 months and HMRC amounts for VAT, PAYE, and NI; third, ordinary unsecured creditors; and fourth, postponed creditors such as a spouse or civil partner. Within each tier, debts rank and abate equally.","tags":["insolvency","bankruptcy","priority"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"10.3","title":"10.3 Corporate Insolvency — the Options","cards":[{"id":"BIZ_0067","type":"C","question":"What is the difference between fixed-asset receivership and administration, in terms of whose interests the appointee acts in?","answer":"In fixed-asset receivership, a secured creditor appoints a receiver to take and sell only the charged asset to pay that one creditor — it is not strictly an insolvency procedure, though it often triggers insolvency because the company can no longer function without the asset. In administration, an independent administrator instead acts in the interests of creditors as a whole, pursuing statutory objectives in order of importance: rescuing the company as a going concern, achieving a better result for creditors than winding up, or realising property for one or more secured creditors.","tags":["insolvency","receivership","administration","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0068","type":"E","question":"What is a moratorium, and what restrictions does it place on creditors and floating-charge holders?","answer":"A moratorium is a breathing-space tool that stops creditors enforcing their rights or commencing insolvency procedures: landlords cannot forfeit a lease, and floating-charge holders cannot crystallise their charge. The company is given a payment holiday, with exceptions including wages and staff amounts, and directors stay in control of the company but under the oversight of an insolvency practitioner called a 'monitor'. A moratorium is not available if the company has been in an insolvency procedure in the last 12 months.","tags":["insolvency","moratorium","rule"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0069","type":"C","question":"What is the difference between a Members' Voluntary Liquidation and a Creditors' Voluntary Liquidation?","answer":"An MVL is used for a solvent company: directors make a statutory declaration of solvency, which is a criminal offence to make falsely, members pass a special resolution to wind up and an ordinary resolution to appoint a liquidator, and notice is given in the London Gazette and to Companies House. A CVL is used for an insolvent company: directors resolve that the company is insolvent, members pass a special resolution, and within 7 days a statement of affairs is sent to creditors with a liquidator nominated — this route is often used to avoid personal liability for fraudulent or wrongful trading.","tags":["insolvency","MVL","CVL","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0070","type":"A","question":"How can insolvency be shown for the purposes of a creditor's compulsory liquidation petition, and when will the court dismiss the petition?","answer":"Insolvency can be shown by a statutory demand for more than £750 unpaid for 3 weeks with no arrangement to pay, failed execution on a judgment, the cash flow test (the company cannot pay debts as they fall due), or the balance sheet test (assets are less than liabilities). The court can dismiss the petition if the company convinces it that there are recovery prospects, or that the debt is genuinely disputed.","tags":["insolvency","compulsory liquidation","test"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0071","type":"A","question":"What is the order of priority for payment in a corporate liquidation, and what is the ring-fencing rule that protects unsecured creditors?","answer":"The order is: certain moratorium and priority pre-moratorium debts (if within 12 weeks of the end of a moratorium); expenses of winding up; preferential debts, such as employees' holiday pay and wages for the last 4 months up to a cap, and HMRC amounts for VAT, PAYE, and NI; debts secured by floating charges in priority order, subject to ring fencing; unsecured debts; and finally shareholders. The ring fencing rule reserves, for unsecured creditors, 50% of the first £10,000 of floating-charge assets and 20% of the amount above that, capped at a £800,000 ring-fenced fund.","tags":["insolvency","liquidation","priority","ring fencing"],"source":"Business Practice SQE Notes.pdf","note":""}]},{"id":"10.4","title":"10.4 Claw-Back of Assets","cards":[{"id":"BIZ_0072","type":"C","question":"What is the difference between a 'preference' and a 'transaction at an undervalue', including their respective look-back windows?","answer":"A preference is an act that puts a creditor, surety, or guarantor in a better position on insolvency than they would otherwise be, requiring a desire to prefer, which is presumed for connected persons; the look-back window is 6 months before the onset of insolvency, extended to 2 years for a connected person. A transaction at an undervalue is a gift or sale at significantly less than market value; for a company the look-back window is 2 years and the company must have been insolvent at the time or become so as a result (presumed if to a connected person), while for an individual the window is 5 years before the petition, with no insolvency requirement within 2 years pre-petition but insolvency presumed for transactions to close relatives or associates.","tags":["insolvency","preference","transaction at undervalue","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0073","type":"E","question":"What is the difference between fraudulent trading and wrongful trading, and what defence is available to wrongful trading?","answer":"Fraudulent trading involves carrying on business with intent to defraud creditors, brought by a liquidator or administrator, carrying both civil personal contribution and criminal liability, but it is rarely proved because intent is hard to establish. Wrongful trading involves continuing to trade where directors knew or ought to have known there was no reasonable prospect of avoiding insolvency, and failing to take adequate steps to minimise losses to creditors — the s.172 duty shifts to creditors at this point. The defence to wrongful trading is to show that the director took every step to minimise creditor loss after realising insolvency was unavoidable, which should include taking and following professional advice.","tags":["insolvency","fraudulent trading","wrongful trading","distinction"],"source":"Business Practice SQE Notes.pdf","note":""},{"id":"BIZ_0074","type":"E","question":"When is a floating charge automatically void on a company's insolvency?","answer":"A floating charge is automatically void, with no application needed, if it was created for no fresh consideration within 12 months of the onset of insolvency (2 years if created in favour of a connected person), or if it was created when the company was insolvent or became so as a result, though this insolvency-based ground applies only to charges in favour of unconnected persons since there is no insolvency requirement for connected persons. Where there is fresh consideration, such as an increased overdraft, the charge remains valid for the new money only, not for any pre-existing debt.","tags":["insolvency","floating charge","void","conse

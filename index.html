<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Jui's SQE1 &#x2696;&#xFE0F;</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C4607A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Jui's SQE1">
<link rel="icon" href="icon-192.png" sizes="192x192">
<link rel="icon" href="icon-512.png" sizes="512x512">
<style>
:root{
  --bg:#FFF0F5;
  --surface:#FFFFFF;
  --border:#F0C0D0;
  --pill-ring:#E8A0B4;
  --accent:#C4607A;
  --text:#3D2B35;
  --muted:#9E7A88;
  --again:#E85858;
  --hard:#E8A430;
  --good:#5BB98C;
  --easy:#5B9EE8;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
.hidden{display:none !important;}
body{
  background:var(--bg);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
  color:var(--text);
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

#top-bar{
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex;
  align-items:center;
  gap:16px;
  position:sticky;
  top:0;
  z-index:100;
}
#flowers-l, #flowers-r{ display:flex; gap:4px; opacity:0.8; flex-shrink:0; }
#flowers-r{ transform:scaleX(-1); }
#header-mid{ flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
#counter{ font-weight:bold; font-size:14px; color:var(--accent); }
#daily-msg{
  font-style:italic;
  font-size:13px;
  color:var(--muted);
  max-width:600px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#sync-status{ font-size:11px; color:var(--muted); min-height:14px; }
#data-tools{ display:flex; gap:8px; flex-shrink:0; }
.tool-btn{
  padding:7px 14px;
  border:2px solid var(--pill-ring);
  border-radius:16px;
  background:#FFFFFF;
  color:var(--text);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  font-family:inherit;
  transition:all 0.15s;
  white-space:nowrap;
}
.tool-btn:hover{ background:var(--accent); color:#FFFFFF; border-color:var(--accent); }

#nav-section{
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
  padding:0 20px;
}
#breadcrumb{
  font-size:10px;
  color:var(--muted);
  padding:8px 0 0;
  min-height:22px;
}
#pill-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px 0 12px;
  align-items:center;
}
.pill{
  padding:7px 16px;
  border:2px solid var(--pill-ring);
  border-radius:20px;
  background:#FFFFFF;
  color:var(--text);
  font-size:12.5px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.15s;
  white-space:nowrap;
  font-family:inherit;
}
.pill:hover{ background:#FFF0F5; border-color:var(--accent); }
.pill.sel{ background:var(--accent); color:#FFFFFF; border-color:var(--accent); }
.pill.back{ border-style:dashed; color:var(--muted); }
.pill.back:hover{ color:var(--accent); border-color:var(--accent); }
.pill.test-all{ background:#FFF5F8; border-color:var(--accent); font-weight:600; }
.pill.test-all:hover{ background:var(--accent); color:#FFFFFF; }

#sidebar-toggle{
  position:fixed;
  left:0;
  top:50%;
  transform:translateY(-50%);
  z-index:201;
  background:var(--accent);
  color:#FFFFFF;
  border:none;
  padding:16px 8px;
  border-radius:0 12px 12px 0;
  cursor:pointer;
  font-size:16px;
  font-family:inherit;
  box-shadow:2px 0 10px rgba(196,96,122,0.3);
}
#sidebar-toggle:hover{ background:#AD4F66; }
#sidebar{
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  width:230px;
  background:#FFFFFF;
  border-right:1px solid var(--border);
  box-shadow:4px 0 18px rgba(196,96,122,0.16);
  transform:translateX(-100%);
  transition:transform 0.25s ease;
  z-index:200;
  padding:60px 16px 16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
}
#sidebar.open{ transform:translateX(0); }
#sidebar-header, .sidebar-header{
  font-weight:700;
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-bottom:4px;
}
.sidebar-btn{
  width:100%;
  text-align:left;
  padding:11px 14px;
  border:2px solid var(--pill-ring);
  border-radius:14px;
  background:#FFFFFF;
  color:var(--text);
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  font-family:inherit;
  transition:all 0.15s;
}
.sidebar-btn:hover{ background:var(--accent); color:#FFFFFF; border-color:var(--accent); }

#welcome{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
  color:var(--muted);
}
#welcome p{ margin:10px 0 0; }
#due-btn{
  margin-top:18px;
  padding:9px 20px;
  border:2px solid var(--pill-ring);
  border-radius:20px;
  background:#FFFFFF;
  color:var(--text);
  font-size:13px;
  cursor:pointer;
  font-family:inherit;
  transition:all 0.15s;
}
#due-btn:hover{ background:var(--accent); color:#FFFFFF; border-color:var(--accent); }

#card-area{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 20px 0;
  width:100%;
}
#card-wrap{
  width:100%;
  max-width:680px;
  height:min(380px, calc(100vh - 340px));
  flex-shrink:0;
  perspective:1200px;
}
#card{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.42s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
  border-radius:16px;
}
#card.flipped{ transform:rotateY(180deg); }
.cface{
  position:absolute;
  inset:0;
  border-radius:16px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border:1px solid var(--border);
  border-left-width:4px;
  padding:28px 32px 22px;
  display:flex;
  flex-direction:column;
  background:#FFFFFF;
  box-shadow:0 4px 24px rgba(196,96,122,0.10);
}
#cb{ transform:rotateY(180deg); overflow-y:auto; }
#cb::-webkit-scrollbar{ width:4px; }
#cb::-webkit-scrollbar-thumb{ background:var(--border); }
.card-type{
  font-size:10px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:14px;
}
#cq{
  font-family:'Palatino Linotype',Palatino,Georgia,serif;
  font-size:20px;
  line-height:1.6;
  color:var(--text);
  flex:1;
  display:flex;
  align-items:center;
}
#chint{
  font-size:12px;
  color:var(--muted);
  text-align:center;
  margin-top:14px;
  letter-spacing:.03em;
}
#ca{ font-size:14.5px; line-height:1.8; color:var(--text); flex:1; white-space:pre-wrap; }
#ctags{ display:flex; flex-wrap:wrap; gap:4px; margin-top:14px; }
.tag{ font-size:11px; padding:2px 8px; border-radius:9px; background:#FFF0F5; color:var(--muted); }

.card-flower{ position:absolute; top:12px; right:14px; opacity:0.18; pointer-events:none; }

#controls{
  width:100%;
  max-width:680px;
  margin:0 auto;
  padding:12px 0 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
#nav-row{ display:flex; align-items:center; gap:12px; width:100%; }
#prev-btn, #next-btn{
  padding:8px 18px;
  border:2px solid var(--pill-ring);
  border-radius:20px;
  background:#FFFFFF;
  color:var(--text);
  font-size:13px;
  cursor:pointer;
  transition:all .15s;
  font-family:inherit;
}
#prev-btn:hover:not(:disabled), #next-btn:hover:not(:disabled){
  background:var(--accent); color:#FFFFFF; border-color:var(--accent);
}
#prev-btn:disabled, #next-btn:disabled{
  opacity:.35; cursor:not-allowed; background:#FFFFFF; color:var(--text);
}
#card-pos{ flex:1; text-align:center; font-size:12.5px; color:var(--muted); }

#rrow{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  width:100%;
}
.rb{
  padding:9px 6px;
  border:1px solid var(--border);
  border-radius:8px;
  background:#FFFFFF;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  transition:transform .12s;
  border-bottom:3px solid var(--border);
}
.rb:hover{ transform:translateY(-2px); }
.rl{ font-size:13px; font-weight:600; }
.ri{ font-size:10px; color:var(--muted); }
.ra{ border-bottom-color:var(--again); }
.ra .rl{ color:var(--again); }
.rh{ border-bottom-color:var(--hard); }
.rh .rl{ color:var(--hard); }
.rg{ border-bottom-color:var(--good); }
.rg .rl{ color:var(--good); }
.re{ border-bottom-color:var(--easy); }
.re .rl{ color:var(--easy); }

#kb-hint{ font-size:11px; color:var(--muted); text-align:center; }

#reset-btn{
  position:fixed;
  bottom:16px;
  right:20px;
  padding:6px 14px;
  border:1px solid var(--border);
  border-radius:12px;
  background:#FFFFFF;
  color:var(--muted);
  font-size:11px;
  cursor:pointer;
  font-family:inherit;
  z-index:50;
}
#reset-btn:hover{ color:var(--accent); border-color:var(--accent); }

/* ---------------------------------------------------------------------
   Mobile / PWA layer (Pixel 10 Pro and similar ~412-460dp phones)
   --------------------------------------------------------------------- */
@supports (height: 100dvh){
  body{ min-height:100dvh; }
}
body{
  padding-top:env(safe-area-inset-top);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
@media (max-width:600px){
  #top-bar{
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    gap:10px;
    flex-wrap:wrap;
  }
  #flowers-l, #flowers-r{ display:none; }
  #header-mid{ order:1; flex-basis:100%; }
  #data-tools{ order:2; flex-basis:100%; justify-content:flex-end; }
  #counter{ font-size:13px; }
  #daily-msg{ max-width:100%; white-space:normal; -webkit-line-clamp:2; display:-webkit-box; -webkit-box-orient:vertical; overflow:hidden; }
  .tool-btn{ padding:9px 12px; font-size:12px; min-height:40px; }

  #nav-section{ padding:0 12px; }
  #pill-row{ gap:6px; padding:8px 0 10px; }
  .pill{ padding:9px 14px; font-size:13px; min-height:40px; display:flex; align-items:center; }

  #sidebar-toggle{
    padding:18px 9px;
    font-size:18px;
    left:0;
  }
  #sidebar{
    width:min(280px, 82vw);
    padding:calc(56px + env(safe-area-inset-top)) 16px 16px;
  }
  .sidebar-btn{ padding:13px 14px; font-size:14px; min-height:46px; }

  #welcome{ padding:24px 16px; }
  #due-btn{ padding:12px 22px; font-size:14px; min-height:46px; }

  #card-area{ padding:12px 12px 0; }
  #card-wrap{
    height:min(420px, calc(100dvh - 300px));
    min-height:260px;
  }
  .cface{ padding:20px 18px 18px; }
  #cq{ font-size:18px; line-height:1.5; }
  #ca{ font-size:14px; line-height:1.7; }
  #chint{ font-size:12px; }

  #controls{ padding:10px 0 calc(16px + env(safe-area-inset-bottom)); }
  #prev-btn, #next-btn{ padding:11px 16px; font-size:14px; min-height:46px; min-width:46px; }
  #card-pos{ font-size:12px; }

  #rrow{ gap:6px; }
  .rb{ padding:12px 4px; min-height:54px; }
  .rl{ font-size:13.5px; }
  .ri{ font-size:9.5px; }

  #kb-hint{ display:none; } /* keyboard shortcuts are meaningless on a touchscreen */

  #reset-btn{
    bottom:calc(12px + env(safe-area-inset-bottom));
    right:14px;
    padding:8px 14px;
    font-size:11px;
    min-height:38px;
  }
}
@media (max-width:600px) and (max-height:700px){
  /* Smaller / landscape-ish viewports: claw back vertical space further */
  #card-wrap{ height:min(340px, calc(100dvh - 260px)); min-height:200px; }
  .cface{ padding:14px 16px 14px; }
  #cq{ font-size:16px; }
}

#due-btn .dc-split, .sidebar-btn .dc-split{ font-size:11px; opacity:.85; }

#congrats-toast{
  position:fixed;
  top:18px;
  left:50%;
  transform:translate(-50%,-30px);
  background:linear-gradient(135deg,var(--accent),#E8849E);
  color:#FFFFFF;
  padding:14px 26px;
  border-radius:20px;
  font-size:14px;
  font-weight:600;
  box-shadow:0 8px 28px rgba(196,96,122,0.35);
  z-index:500;
  opacity:0;
  pointer-events:none;
  transition:opacity .35s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
  text-align:center;
  max-width:90vw;
}
#congrats-toast.show{ opacity:1; transform:translate(-50%,0); }

.card-edit-btn{
  position:absolute;
  top:12px;
  right:14px;
  background:#FFFFFF;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:11px;
  padding:4px 9px;
  cursor:pointer;
  color:var(--muted);
  font-family:inherit;
  z-index:5;
}
.card-edit-btn:hover{ color:var(--accent); border-color:var(--accent); }

.modal-overlay{
  position:fixed; inset:0; background:rgba(61,43,53,0.45);
  display:flex; align-items:center; justify-content:center;
  z-index:600; padding:20px;
}
.modal-box{
  background:#FFFFFF; border-radius:18px; padding:24px 26px;
  max-width:520px; width:100%; max-height:88vh; overflow-y:auto;
  box-shadow:0 12px 40px rgba(0,0,0,0.25);
}
.modal-box h3{ margin:0 0 14px; font-size:17px; color:var(--text); }
.modal-field{ margin-bottom:14px; }
.modal-field label{ display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; }
.modal-field select, .modal-field textarea, .modal-field input[type="text"]{
  width:100%; padding:9px 11px; border:1px solid var(--border); border-radius:10px;
  font-family:inherit; font-size:13.5px; color:var(--text); resize:vertical;
}
.modal-field textarea{ min-height:70px; }
.modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }
.modal-actions button{
  padding:9px 18px; border-radius:14px; font-family:inherit; font-size:13px;
  cursor:pointer; border:2px solid var(--pill-ring); background:#FFFFFF; color:var(--text);
}
.modal-actions .primary{ background:var(--accent); border-color:var(--accent); color:#FFFFFF; font-weight:600; }
.modal-actions button:hover{ opacity:.88; }
.modal-err{ color:var(--again); font-size:12px; margin-top:8px; min-height:14px; }
</style>
</head>

<script>
const DECK={"meta":{"title":"SQE1 Master Deck","generated":"2026-06-26","totalCards":1198,"version":"1.0","lastMerged":"2026-06-26"},"subjects":[{"id":"solicitors_accounts","title":"Solicitors' Accounts","color":"#2f6f6f","chapters":[{"id":"ch1","title":"1 . Introduction to Solicitors' Accounts — Business Money vs Client Money","subchapters":[{"title":"1.1 Who the Rules Apply To","cards":[{"id":"SA_0001","type":"A","question":"What three types of body are \"authorised bodies\" under the SRA Accounts Rules 2019?","answer":"A licensed body, a recognised body, or a sole practitioner's practice. These, together with their managers and employees, are the persons to whom the Rules apply.","tags":["solicitors_accounts","ch1","1.1 Who the Rules Apply To"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0019","type":"A","question":"Who is ultimately responsible for ensuring compliance with the Accounts Rules?","answer":"The partners of the firm are personally responsible for ensuring the firm complies with the Rules. Even though an individual solicitor will rarely make accounting entries themselves, every solicitor must understand the Rules, as this is independently examinable.","tags":["solicitors_accounts","ch1","1.1 Who the Rules Apply To"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.2 Client Money vs Business Money","cards":[{"id":"SA_0002","type":"C","question":"What is the core test for distinguishing client money from business money?","answer":"The test is whether the client would be unhappy if the solicitor spent the money on themselves — if yes, it is client money. Business money, by contrast, belongs to the solicitor or practice itself and the firm is free to use it for its own purposes. Client money includes money held for regulated services, on behalf of third parties, as a trustee or office-holder, and unpaid fees/disbursements before a bill is delivered.","tags":["solicitors_accounts","ch1","1.2 Client Money vs Business Money"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0003","type":"E","question":"Is money for unpaid fees/disbursements received before a bill is delivered client or business money?","answer":"It is client money, even though it relates to the firm's own fees. It only becomes business money once a bill has actually been delivered to the client. This is a common trap, since students often assume money owed to the firm for its own fees must be business money.","tags":["solicitors_accounts","ch1","1.2 Client Money vs Business Money"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.3 The Client Account","cards":[{"id":"SA_0004","type":"A","question":"Where must a client account be held, and how must it be named?","answer":"A client account must be held at a bank or building society in England and Wales. The account name must include the firm's name and the word \"client\" to distinguish it from other accounts. The account must not be used to provide banking facilities to clients or third parties — payments in and out must relate to the delivery of regulated services.","tags":["solicitors_accounts","ch1","1.3 The Client Account"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.3.1 Records, Statements and Reconciliation","cards":[{"id":"SA_0005","type":"A","question":"How often must client account statements/reconciliations be carried out, and who must sign off the reconciliation?","answer":"Reconciliations and statements must be carried out at least every five weeks. The reconciliation must be signed off by the Compliance Officer for Finance and Administration (COFA) or a manager of the firm.","tags":["solicitors_accounts","ch1","1.3.1 Records, Statements and Reconciliation"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0006","type":"A","question":"What is the deadline for delivering an accountant's report, and when is one required?","answer":"An accountant's report must be delivered within six months of the end of the accounting period, but is only required if it is qualified — i.e. it shows a failure to comply with the Rules placing client or third-party money at risk.","tags":["solicitors_accounts","ch1","1.3.1 Records, Statements and Reconciliation"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0007","type":"E","question":"What two exceptions remove the need for an accountant's report?","answer":"(1) All client money held or received in the accounting period came from the Legal Aid Agency; or (2) the total balance of all client accounts held/operated did not exceed an average of GBP10,000 and a maximum of GBP250,000 during the period.","tags":["solicitors_accounts","ch1","1.3.1 Records, Statements and Reconciliation"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0008","type":"A","question":"How long must accounting records be retained, and what is the exception for jointly held money regarding reconciliation?","answer":"Accounting records must be retained for at least six years. Where money is held jointly with the client and a third party, the statement/reconciliation rules do not apply, except that statements must still be obtained and records kept.","tags":["solicitors_accounts","ch1","1.3.1 Records, Statements and Reconciliation"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.4.1 Receipt — the promptly rule","cards":[{"id":"SA_0009","type":"A","question":"What does \"promptly\" mean for paying client money into a client account, and what governs this under the Rules?","answer":"Client money must be paid promptly into a client account under Rule 2.3. \"Promptly\" is undefined by the current Rules, but based on the predecessor rules it is generally taken to mean the day of receipt or the next working day. The money must be available on demand and returned promptly once there is no longer any reason to hold it.","tags":["solicitors_accounts","ch1","1.4.1 Receipt — the promptly rule"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0010","type":"E","question":"When is there no obligation to hold money received for unpaid fees/disbursements in a client account?","answer":"Where the only client money held relates to unpaid fees/disbursements, and (a) the disbursement money relates to costs the firm is itself liable for, and (b) the firm does not otherwise maintain a client account, there is no obligation to hold the money in a client account — provided the client was told in advance how the money will be held.","tags":["solicitors_accounts","ch1","1.4.1 Receipt — the promptly rule"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.4.2 The Cash Account and Double-Entry Bookkeeping","cards":[{"id":"SA_0011","type":"A","question":"Under the double-entry system, what entry is made on the cash sheet and client ledger when the firm receives money for a client, and when it pays money out?","answer":"When the firm receives money from/for a client: debit (DR) the cash account, credit (CR) the client ledger. When the firm pays out money for/on behalf of a client: credit (CR) the cash account, debit (DR) the client ledger. A debit on the cash account represents money the firm now holds for the client; a credit represents money paid out.","tags":["solicitors_accounts","ch1","1.4.2 The Cash Account and Double-Entry Bookkeeping"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0012","type":"D","question":"How is a withdrawal from the client account checked for sufficiency of funds?","answer":"Money can be withdrawn from the client account only if sufficient funds for that specific client are held, checked by reference to that client's own ledger balance, never the account's overall balance.","tags":["solicitors_accounts","ch1","1.4.2 The Cash Account and Double-Entry Bookkeeping"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.4.3 Withdrawals","cards":[{"id":"SA_0013","type":"A","question":"Under Rule 5, when can money be withdrawn from a client account?","answer":"Only for the purpose for which it is being held; following receipt of instructions from the client; or on the SRA's prior written authorisation/order. Payments must never exceed the amount held for that specific client (Rule 5.3), and all withdrawals must be appropriately authorised and supervised (Rule 5.2).","tags":["solicitors_accounts","ch1","1.4.3 Withdrawals"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.5 Billing: Profit Costs and VAT","cards":[{"id":"SA_0014","type":"D","question":"Does issuing a bill move any money on the cash sheet, and how is it recorded?","answer":"No — issuing a bill is a paper entry only, because the client becomes a debtor to the firm at that point. Both entries go on the business side of the client ledger: debit client ledger (Profit Costs amount), business account / credit Profit Costs ledger; and debit client ledger (VAT amount), business account / credit HMRC ledger. Cash only moves when the client actually pays.","tags":["solicitors_accounts","ch1","1.5 Billing: Profit Costs and VAT"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0015","type":"E","question":"When can the firm transfer client account funds to pay a bill?","answer":"The firm cannot simply transfer client account money to pay a bill unless either (a) a bill has actually been issued, or (b) the client was clearly told in advance (e.g. in the client care letter, or when asked for money on account) that client account funds would be used to pay or reimburse the firm's costs/disbursements. Transferring prematurely without this is itself a breach.","tags":["solicitors_accounts","ch1","1.5 Billing: Profit Costs and VAT"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.5.1 Abatement (Reduction) of a Bill","cards":[{"id":"SA_0016","type":"B","question":"What is an abatement, and how is it recorded?","answer":"An abatement is a reduction of a disputed bill agreed by the firm. It is recorded by debiting the Profit Costs ledger and crediting the client ledger for the reduction amount (business account), and debiting the HMRC ledger and crediting the client ledger for the VAT element of the reduction (business account throughout). This simply reverses part of the original billing entries.","tags":["solicitors_accounts","ch1","1.5.1 Abatement (Reduction) of a Bill"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.6 Breach of the Rules and Rectification","cards":[{"id":"SA_0017","type":"A","question":"What must happen when any breach of the Rules is discovered, and what is the consequence of non-compliance?","answer":"Any breach of the Rules must be rectified promptly upon discovery (Rule 6), including money improperly withheld or withdrawn from the client account — even if this means partners must use personal funds to make up the shortfall. Breaches can lead to SRA disciplinary action or, in serious cases, criminal sanctions.","tags":["solicitors_accounts","ch1","1.6 Breach of the Rules and Rectification"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"1.6.1 Dishonoured (Bounced) Cheques","cards":[{"id":"SA_0018","type":"D","question":"What must happen if a dishonoured cheque causes the client account to become overdrawn for a client?","answer":"This is a breach of Rule 5.3 (no payment may exceed funds held for that client); the firm must immediately transfer the overdrawn amount from the business account to the client account to rectify it, regardless of whether or when the client repays it.","tags":["solicitors_accounts","ch1","1.6.1 Dishonoured (Bounced) Cheques"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]}]},{"id":"ch2","title":"2 . Placement of Client/Business Funds","subchapters":[{"title":"2.1 Client Money Must Be Paid Promptly Into a Client Account","cards":[{"id":"SA_0020","type":"E","question":"What are the three recognised exceptions to paying client money promptly into a client account?","answer":"(1) The solicitor holds the money as trustee/office-holder and paying it into the client account would conflict with those obligations; (2) the money represents payments received from the Legal Aid Agency for the firm's costs; or (3) an alternative arrangement has been agreed in writing with the client/third party for whom the money is held.","tags":["solicitors_accounts","ch2","2.1 Client Money Must Be Paid Promptly Into a Client Account"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"2.1.1 Placing Business Money Into the Client Account","cards":[{"id":"SA_0021","type":"E","question":"Name the circumstances in which business money may be placed into a client account.","answer":"Business money may be placed into a client account: to open the client account or maintain it at an agreed level; to fund a payment on behalf of a client/trust in excess of the funds held for that client/trust; to replace a sum incorrectly withdrawn; to allow money in lieu of interest on client money; or under Rule 4 (mixed receipts).","tags":["solicitors_accounts","ch2","2.1.1 Placing Business Money Into the Client Account"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"2.2 Dealing With Mixed Receipts","cards":[{"id":"SA_0022","type":"A","question":"What rule governs allocation of mixed receipts, and what does it require?","answer":"Rule 4.2 governs mixed receipts (part client money, part business money) and requires that the funds be allocated promptly to the correct account. There is more than one permissible method for doing this.","tags":["solicitors_accounts","ch2","2.2 Dealing With Mixed Receipts"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0024","type":"D","question":"What is the danger sign in an MCQ answer choice for dealing with mixed receipts?","answer":"An answer stating the firm \"must\" use one specific method (e.g. must split the cheque) is usually wrong, because the Rules permit more than one valid approach and give the firm a choice of method.","tags":["solicitors_accounts","ch2","2.2 Dealing With Mixed Receipts"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"2.2.1 Option 1 — Split the Cheque / 2.2.2 Option 2 — Deposit in Either Account, Then Transfer","cards":[{"id":"SA_0023","type":"C","question":"What are the two main methods of dealing with a mixed receipt, and which is more commonly used?","answer":"(1) Split the cheque — pay the business element into the business account and the client element into the client account directly; this is uncommon because banks may refuse to split a single cheque. (2) Deposit the whole mixed receipt into one account (client or business, per the firm's own policy) and then transfer the misallocated portion promptly to the correct account — this is the more commonly used and more likely to be tested method.","tags":["solicitors_accounts","ch2","2.2.1 Option 1 — Split the Cheque / 2.2.2 Option 2 — Deposit in Either Account, Then Transfer"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"2.2.3 Receipts After a Bill Has Been Sent","cards":[{"id":"SA_0025","type":"E","question":"If a bill has been sent covering an unpaid (future) disbursement, where should money received for that disbursement go?","answer":"Generally into the client account (not the business account), per current SRA guidance, even though a bill has been issued — because client account money is protected if the firm becomes insolvent, whereas business account money is at risk. Only the Profit Costs and already-paid disbursement elements are pure business money once billed.","tags":["solicitors_accounts","ch2","2.2.3 Receipts After a Bill Has Been Sent"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"2.3 Transfers Between Client Accounts (Inter-Client Transfers)","cards":[{"id":"SA_0026","type":"C","question":"What is an inter-client transfer (paper transfer), and what entries are made for it?","answer":"An inter-client transfer is a transfer of money held for one client to be held instead for another client of the same firm (Rule 8), made by amending the client ledgers only: debit the paying client's ledger (client account) and credit the receiving client's ledger (client account) for the transferred amount. No cash sheet entry is made because the funds remain within the same client bank account throughout — the money never actually leaves the client bank account.","tags":["solicitors_accounts","ch2","2.3 Transfers Between Client Accounts (Inter-Client Transfers)"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0027","type":"D","question":"What is the common wrong answer for recording an inter-client transfer?","answer":"A tempting wrong answer is to debit money out of both client ledgers (treating it like two separate withdrawals), or to assume a cash sheet entry is needed because \"money is moving.\" Neither is correct: it is a single debit on the paying client's ledger and a single credit on the receiving client's ledger, with no cash sheet entry.","tags":["solicitors_accounts","ch2","2.3 Transfers Between Client Accounts (Inter-Client Transfers)"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]}]},{"id":"ch3","title":"3 . Dealing with VAT","subchapters":[{"title":"3.1 General Principles of VAT","cards":[{"id":"SA_0028","type":"A","question":"What is the VAT registration threshold, and what rate is the standard rate?","answer":"A person/business must register for VAT if the value of its taxable supplies in the preceding 12 months exceeds GBP90,000, meaning most law firms must register. The standard VAT rate (since January 2011) is 20%. Some supplies are exempt or charged at a reduced rate of 5% or zero rate.","tags":["solicitors_accounts","ch3","3.1 General Principles of VAT"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0029","type":"C","question":"What is the difference between output tax and input tax?","answer":"Output tax is VAT a business charges to its own customers — e.g. VAT charged on the firm's professional fees and recoverable client expenses. Input tax is VAT charged to a business by its own suppliers — e.g. VAT charged to the firm for office furniture or counsel's services. A VAT-registered business deducts input tax from output tax and accounts to HMRC only for the difference.","tags":["solicitors_accounts","ch3","3.1 General Principles of VAT"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0030","type":"D","question":"If VAT is not expressly stated as an extra charge on a quoted fee, what is assumed, and who can reclaim input tax on an invoice?","answer":"The quoted sum is deemed to already include VAT, so the firm must account for VAT out of that sum, receiving less than the headline figure. Only the person/entity to whom a VAT invoice is actually addressed can use it to reclaim input tax.","tags":["solicitors_accounts","ch3","3.1 General Principles of VAT"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"3.2.1 Conditions for a Disbursement","cards":[{"id":"SA_0031","type":"A","question":"List the five conditions that must all be met for an item to count as a disbursement.","answer":"(1) The firm paid the supplier on the client's behalf, acting as the client's agent; (2) the client received, used, or had the benefit of the goods/services; (3) the client was responsible for paying the third party; (4) the client authorised the firm to make the payment; and (5) the client was aware the goods/services came from another supplier, not the firm.","tags":["solicitors_accounts","ch3","3.2.1 Conditions for a Disbursement"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0032","type":"B","question":"Give examples of true disbursements (VAT-free) and of firm overheads that are not disbursements (VAT charged via Profit Costs).","answer":"True disbursements (no VAT charged) include SDLT, HM Land Registry registration fees, estate agents' fees, and counsel's fees. Firm overheads that are NOT disbursements (VAT charged as part of Profit Costs) include telephone call charges, travel expenses incurred by the firm, postage fees, and photocopying/bank transfer fees.","tags":["solicitors_accounts","ch3","3.2.1 Conditions for a Disbursement"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0033","type":"E","question":"When is a property search fee treated as part of legal services rather than as a disbursement?","answer":"A search fee is treated as part of the supply of legal services (not a disbursement) when it is used by the firm to advise the client or draft a document (e.g. a contract for the sale of land) — VAT is then charged on it as part of the firm's own service. Only where a search result is passed on to the client with no comment or use by the firm is it a true disbursement, passed on VAT-free.","tags":["solicitors_accounts","ch3","3.2.1 Conditions for a Disbursement"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"3.3 Payment of Disbursements With a VAT Element — Agency vs Principal Method","cards":[{"id":"SA_0034","type":"C","question":"What triggers the Agency Method versus the Principal Method for VAT on disbursements, and whose money is used under each?","answer":"The Agency Method is triggered when the third-party invoice is addressed to the client; client money is used (or business money if the client account is not in funds), and no entry is made on the firm's HMRC ledger. The Principal Method is triggered when the invoice is addressed to the firm; business money must be used, even if the client account holds sufficient funds, and input VAT is recorded on the HMRC ledger, then output VAT is charged again when the firm bills the client.","tags":["solicitors_accounts","ch3","3.3 Payment of Disbursements With a VAT Element — Agency vs Principal Method"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0035","type":"D","question":"Why is the Principal Method's money rule a common MCQ trap, and how does the firm eventually charge the client for the VAT?","answer":"Under the Principal Method, business money must be used even though the client account may hold sufficient funds — a common wrong answer pays the invoice out of the client account because funds are available there, which is incorrect if the invoice is addressed to the firm. The firm eventually \"resupplies\" the service to the client at the same price and includes the VAT (e.g. the surveyor's VAT) within its own Profit Costs bill, charged as output tax.","tags":["solicitors_accounts","ch3","3.3 Payment of Disbursements With a VAT Element — Agency vs Principal Method"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0036","type":"E","question":"What is the exception for counsel's (barrister's) fees addressed to the firm?","answer":"The firm may simply cross out its own name and substitute the client's name, converting the transaction into an Agency Method transaction, so that client money can then be used (if available), rather than being forced to use the Principal Method.","tags":["solicitors_accounts","ch3","3.3 Payment of Disbursements With a VAT Element — Agency vs Principal Method"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"3.3.1 Worked Multi-Transaction Example (Mrs Jackson Property Dispute)","cards":[{"id":"SA_0037","type":"D","question":"What is the single most common error to avoid in multi-transaction VAT questions?","answer":"Always check who the third-party invoice is addressed to before deciding whether to use client or business money. Getting the surveyor's invoice (addressed to the firm, using business money under the Principal Method) and the search fee invoice (addressed to the client, using client money under the Agency Method) reversed is the single most common error in this topic.","tags":["solicitors_accounts","ch3","3.3.1 Worked Multi-Transaction Example (Mrs Jackson Property Dispute)"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]}]},{"id":"ch4","title":"4 . Stakeholder Money; Mortgage Money; Petty Cash; Interest","subchapters":[{"title":"4.1 Deposits — Stakeholder vs Agent","cards":[{"id":"SA_0038","type":"C","question":"What is the key difference between a deposit held as stakeholder and one held as agent?","answer":"Stakeholder money belongs jointly to buyer and seller until completion and can only be paid to the seller on completion (an inter-client-style internal transfer). Agent money belongs wholly to the seller immediately and is credited straight to the seller's own client ledger on exchange of contracts.","tags":["solicitors_accounts","ch4","4.1 Deposits — Stakeholder vs Agent"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0039","type":"A","question":"How is Rule 8.1 satisfied for a stakeholder deposit?","answer":"Rule 8.1 requires all client money to be recorded on a client ledger identified by that client's name. For a stakeholder deposit, this is satisfied either by (a) a separate stakeholder ledger in both buyer's and seller's names, or (b) crediting the deposit straight to the seller's ledger but making clear in the Details column that it is held as stakeholder for both parties.","tags":["solicitors_accounts","ch4","4.1 Deposits — Stakeholder vs Agent"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0040","type":"E","question":"What is the trap regarding crediting a stakeholder deposit to the seller's own ledger on exchange?","answer":"Only an agent deposit can be credited straight to the seller's personal ledger on exchange. A stakeholder deposit must go on a joint/stakeholder ledger (or be clearly flagged as jointly held) until completion — crediting it to the seller alone too early misstates whose money it currently is.","tags":["solicitors_accounts","ch4","4.1 Deposits — Stakeholder vs Agent"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"4.2 Acting for an Institutional Lender (Mortgage Money)","cards":[{"id":"SA_0041","type":"C","question":"When a firm acts for both Borrower and Lender on a mortgage, who does the mortgage advance belong to before completion, and what is the SRA-approved alternative recording method for institutional lenders?","answer":"The mortgage advance belongs to the Lender, not the Borrower, until completion, even though both are treated as two separate clients of the firm. The SRA-approved alternative for institutional lenders on standard terms is that the firm may credit the mortgage advance straight to the Borrower's ledger on receipt, provided the Details column clearly notes the funds are held for the Lender (e.g. \"Cash — mortgage advance held for Bricklays Bank\").","tags":["solicitors_accounts","ch4","4.2 Acting for an Institutional Lender (Mortgage Money)"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0042","type":"D","question":"What exam-technique tip does the source give about multi-stage property transactions involving deposits and mortgage advances?","answer":"You will not be asked for every entry across a full transaction in one question — questions focus only on the entries for one specific date or stage at a time. Don't assume a question wants the entire chain; answer only what is asked.","tags":["solicitors_accounts","ch4","4.2 Acting for an Institutional Lender (Mortgage Money)"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"4.3 Petty Cash","cards":[{"id":"SA_0043","type":"E","question":"Is petty cash ever client money, and what entries record a petty cash payment on behalf of a client?","answer":"No — petty cash is always business money, even if there is sufficient money in the client account for that client; using petty cash for a client payment must come from the business account. Entries: debit client ledger (amount) business account; credit petty cash ledger (amount) business account. The source of the cash (physically held office cash) dictates the account, not the client's ledger balance.","tags":["solicitors_accounts","ch4","4.3 Petty Cash"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"4.4 When Should Interest Be Paid?","cards":[{"id":"SA_0044","type":"A","question":"What rule requires firms to account to clients for interest, and what standard applies?","answer":"Rule 7.1 requires firms to account to clients (or third parties) for a fair sum of interest on client money held by them. Rule 7.2 allows firms to agree a different arrangement in writing with the client, provided sufficient information is given for the client to give informed consent.","tags":["solicitors_accounts","ch4","4.4 When Should Interest Be Paid?"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""},{"id":"SA_0048","type":"D","question":"Must a client always be paid some interest under the Rules?","answer":"No — the Rules require only a fair sum, which can legitimately be zero, for example under a de minimis policy where the sum/time held is small. An answer choice asserting a client \"must always\" receive interest is a common trap and is likely incorrect; always check the firm's written policy and the de minimis threshold first.","tags":["solicitors_accounts","ch4","4.4 When Should Interest Be Paid?"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"4.4.1 Written Policy Required","cards":[{"id":"SA_0045","type":"A","question":"What must every firm have regarding interest, and when should it be presented to the client?","answer":"Each firm must have a written policy on the payment of interest aimed at achieving a fair outcome. The policy should be presented to the client at the outset of a transaction, though actual payment of interest is usually dealt with at the conclusion of the matter.","tags":["solicitors_accounts","ch4","4.4.1 Written Policy Required"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"4.4.2 What Counts as Fair?","cards":[{"id":"SA_0046","type":"E","question":"What is a \"de minimis\" interest policy, and can a firm keep interest earned above the fair sum it pays out?","answer":"A de minimis policy is one under which no interest is paid where the firm holds below a stated minimum amount (e.g. GBP20) for an individual client. Where money is held in a general client account, the firm may keep any interest earned above the fair sum it is required to pay the client under the Rules — the firm may legitimately earn more interest than it pays out.","tags":["solicitors_accounts","ch4","4.4.2 What Counts as Fair?"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]},{"title":"4.4.3 Payment Methods","cards":[{"id":"SA_0047","type":"B","question":"Name the three methods a firm can use to pay interest due to a client, with a worked example of offsetting.","answer":"A firm may pay interest due to a client by: (1) offsetting it against any amount the client owes the firm for bills; (2) transferring the sum from the business account to the client account; or (3) paying it directly to the client once the transaction has ended. Example: where a firm decides a fair interest payment is GBP30 and the client has an outstanding bill, the firm debits the interest payable ledger GBP30 business account and credits the client ledger GBP30 business account to offset it.","tags":["solicitors_accounts","ch4","4.4.3 Payment Methods"],"source":"Solicitors_Accounts_SQE_Notes.pdf","note":""}]}]}]},{"id":"land_law","title":"Land Law","color":"#e8d5b0","chapters":[{"id":"ch1","title":"1 . The Nature of Land","subchapters":[{"title":"1.1 What Is Land?","cards":[{"id":"LL_0001","type":"A","question":"What statute defines \"land\" and what are the two categories within that definition?","answer":"Land is defined under the Law of Property Act 1925, s.205(1)(ix). The definition splits into corporeal hereditaments (tangible things, e.g. the surface, buildings, mines/minerals, trees, airspace, subsoil, fixtures) and incorporeal hereditaments (intangible things, e.g. rights, easements, rents).","tags":["land_law","ch1","1.1 What Is Land?"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0002","type":"C","question":"What are the two subcategories of personal property, and how do they differ from land?","answer":"Personal property splits into choses in possession (physical movable things) and choses in action (intangible rights not relating to land, e.g. debts, patents). Unlike land, neither category is governed by the LPA 1925 land definition.","tags":["land_law","ch1","1.1 What Is Land?"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"1.2 Limits on Ownership","cards":[{"id":"LL_0003","type":"A","question":"How far does land extend in principle, and how is this cut down in practice for airspace?","answer":"In principle land extends \"to the heavens and to the centre of the earth\", but in practice airspace rights are limited to the height necessary for ordinary use and enjoyment of the land and its structures, so aircraft in normal flight do not trespass.","tags":["land_law","ch1","1.2 Limits on Ownership"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0004","type":"A","question":"Who owns coal, oil, natural gas and treasure found under land?","answer":"Ownership of coal, oil and natural gas is removed from the freeholder by statute. The Crown is entitled to gold, silver, and treasure found under land.","tags":["land_law","ch1","1.2 Limits on Ownership"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0005","type":"D","question":"Does a landowner own wild animals on their land?","answer":"No — a landowner does not own wild animals on their land, but they do have the right to hunt them.","tags":["land_law","ch1","1.2 Limits on Ownership"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"1.3 Fixtures and Fittings","cards":[{"id":"LL_0006","type":"A","question":"What two tests determine whether an item is a fixture or a fitting, and which prevails if they conflict?","answer":"The degree of annexation test asks how physically attached the item is to the land (greater attachment makes it more likely to be a fixture). The purpose of annexation test asks whether the item was brought onto the land to make a permanent improvement (fixture) or only for temporary enjoyment as a chattel (fitting). If the two tests conflict, the purpose of annexation test prevails.","tags":["land_law","ch1","1.3 Fixtures and Fittings"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0007","type":"B","question":"Give an example of an item likely to be a fixture despite low physical attachment, and explain why.","answer":"A freestanding statue that forms part of the architectural design of a house or garden is likely to be a fixture even though it is not physically attached at all, because the purpose of permanent improvement to the overall design prevails over the low degree of annexation.","tags":["land_law","ch1","1.3 Fixtures and Fittings"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0008","type":"D","question":"Do fixtures need to be mentioned in the sale contract to pass to the buyer, and what about fittings?","answer":"Fixtures pass automatically as part of the land and do not need to be mentioned in the contract. Fittings pass only if specifically mentioned in the contract, typically recorded on the Fittings and Contents Form attached to the contract of sale.","tags":["land_law","ch1","1.3 Fixtures and Fittings"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"1.4 Planning","cards":[{"id":"LL_0009","type":"A","question":"Is planning permission generally required for development of land?","answer":"Yes — as a general rule, no development can take place without planning permission.","tags":["land_law","ch1","1.4 Planning"],"source":"Land_Law_SQE_Notes.pdf","note":""}]}]},{"id":"ch2","title":"2 . Estates and Interests in Land","subchapters":[{"title":"2.1 Land Ownership in England and Wales","cards":[{"id":"LL_0010","type":"A","question":"Who owns all the land in England and Wales, and what do individual landowners actually hold?","answer":"The Crown owns all the land in England and Wales. Individual landowners instead hold an estate in the land, derived ultimately from the Crown, though a freehold holder is still commonly called a \"landowner\".","tags":["land_law","ch2","2.1 Land Ownership in England and Wales"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.2 The Two Legal Estates","cards":[{"id":"LL_0011","type":"A","question":"What are the formal names of the freehold and leasehold estates, and how do they differ?","answer":"Freehold's formal name is fee simple absolute in possession — of indefinite duration, so it is not possible to be sure at creation how long it will last. Leasehold's formal name is term of years absolute — a fixed maximum duration with an ascertainable end date.","tags":["land_law","ch2","2.2 The Two Legal Estates"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0012","type":"E","question":"Does \"in possession\" in the freehold estate's formal name require the freeholder to be physically occupying the land?","answer":"No — this is a common trap. \"In possession\" actually means the holder has an immediate right to enjoyment/income (as opposed to a future or reversionary interest). A landlord who has let the property under a lease still holds the freehold \"in possession\" in this technical sense (the reversion).","tags":["land_law","ch2","2.2 The Two Legal Estates"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.2.1 Commonhold","cards":[{"id":"LL_0013","type":"A","question":"What is commonhold and what three conditions does its creation require?","answer":"Commonhold is a rarely-used hybrid form of ownership for flats/business parks designed to make positive covenants easier to enforce against successive owners, with rights and duties set out in a Commonhold Community Statement. Creation requires: (1) the freehold must be registered as a \"freehold estate in commonhold land\"; (2) the land must be specified in the Commonhold Association's Memorandum; and (3) there must be a Commonhold Community Statement governing the rights and duties of the Association and unit holders.","tags":["land_law","ch2","2.2.1 Commonhold"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.3 Legal Interests in Land","cards":[{"id":"LL_0014","type":"A","question":"List the five legal interests capable of existing at law, and what formality do they generally require?","answer":"The five legal interests are: mortgage, easement, rentcharge, profit a prendre, and right of entry. Legal interests must generally be created by deed.","tags":["land_law","ch2","2.3 Legal Interests in Land"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0015","type":"C","question":"What is the difference between a profit a prendre held in gross and one held appurtenant?","answer":"A profit in gross is free-standing, not attached to any dominant land, and is freely transferable on its own, and may be substantively registered at HMLR. A profit appurtenant is attached to and benefits specific dominant land like an easement, and cannot be separately registered.","tags":["land_law","ch2","2.3 Legal Interests in Land"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.4 Equitable Interests","cards":[{"id":"LL_0016","type":"A","question":"What does the maxim \"equity sees as done that which ought to be done\" explain, and give a worked example.","answer":"It explains how equity recognises an interest where a legal interest was attempted but deed formalities were not satisfied. Example: a farmer and tenant sign a document headed \"deed\", with all lease terms and dated signatures, but no witness attests either signature — the legal lease fails (deed formalities not met), but because the document is in writing, contains all terms, and is signed by both parties, it can take effect as a valid contract for land, giving rise to an equitable lease.","tags":["land_law","ch2","2.4 Equitable Interests"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.4.1 Equitable mortgages","cards":[{"id":"LL_0017","type":"D","question":"If a legal mortgage deed fails because it is unwitnessed, can it still be valid as an equitable mortgage?","answer":"Yes — it may still be valid as an equitable mortgage if it satisfies the requirements of a contract for land: in writing, signed by the parties, and containing all agreed terms.","tags":["land_law","ch2","2.4.1 Equitable mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.4.2 Restrictive covenants","cards":[{"id":"LL_0018","type":"C","question":"Under the doctrine of privity of contract, who can generally enforce a covenant, and what type of covenant can be an exception against later owners?","answer":"Under privity of contract, a contract generally binds and is enforceable only by the original parties. However, if a covenant is negative (restrictive) in nature, it may be enforceable against later owners of the burdened land — full enforceability rules against successors are covered in Chapter 8.","tags":["land_law","ch2","2.4.2 Restrictive covenants"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.4.3 Positive covenants","cards":[{"id":"LL_0019","type":"D","question":"Do positive covenants generally run with and bind successors in title in the same way restrictive covenants can?","answer":"No — positive covenants generally do not run with the land to bind successors in the same way restrictive covenants can (see Chapter 8 for the detailed rules and exceptions).","tags":["land_law","ch2","2.4.3 Positive covenants"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.4.4 Estate contracts","cards":[{"id":"LL_0020","type":"A","question":"What is an estate contract and from what date does the equitable interest under it arise?","answer":"An estate contract is an agreement to buy land, also covering an option to purchase and a right of pre-emption (first refusal). On entering a contract to buy land, the buyer is deemed to have an equitable interest in the land from the date of the contract.","tags":["land_law","ch2","2.4.4 Estate contracts"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.5.1 Valid deed","cards":[{"id":"LL_0021","type":"A","question":"What four requirements must a valid deed satisfy?","answer":"A valid deed must: be in writing; state on its face that it is a deed; be signed by the grantor in the presence of a witness who attests the signature; and be delivered (showing an intention to be bound, usually by dating).","tags":["land_law","ch2","2.5.1 Valid deed"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.5.2 Valid contract for land","cards":[{"id":"LL_0022","type":"A","question":"What three requirements (beyond ordinary contract law requirements) must a valid contract for the sale of land satisfy?","answer":"It must: be in writing; include all the terms agreed; and be signed by all contracting parties (or someone with their written authority). A contract not meeting these requirements is unenforceable.","tags":["land_law","ch2","2.5.2 Valid contract for land"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.5.3 Other formalities","cards":[{"id":"LL_0023","type":"E","question":"What formality is required for covenants and equitable easements, and for a beneficial interest under an implied trust?","answer":"Covenants and equitable easements require only writing signed by the grantor — not a full estate contract. A beneficial interest under an implied (resulting/constructive) trust requires no formal requirements at all. This is a common trap, as students often assume all equitable interests need the full contract-for-land formalities.","tags":["land_law","ch2","2.5.3 Other formalities"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"2.6 Proprietary Estoppel","cards":[{"id":"LL_0024","type":"A","question":"What four elements must be satisfied to establish proprietary estoppel?","answer":"(1) An assurance that the claimant would have an interest in land (an assurance about something else, e.g. money, will not do) — assurances may be active or passive; (2) reasonable reliance on the assurance; (3) detriment suffered as a result (e.g. spending money on the land, working on it unpaid, or giving up other employment); and (4) unconscionability — having regard to all the circumstances, it would be unconscionable to allow the title holder to deny the claimant's entitlement.","tags":["land_law","ch2","2.6 Proprietary Estoppel"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0025","type":"D","question":"Is the remedy for a successful proprietary estoppel claim fixed once the four elements are proved?","answer":"No — the remedy is discretionary, weighing the claimant's expectation, the detriment suffered, and proportionality. It can range from transfer of the freehold, the grant of a lease, a right to occupy, financial compensation, or even no remedy at all. This is a common trap: meeting the four elements does not guarantee the claimant gets exactly what was promised.","tags":["land_law","ch2","2.6 Proprietary Estoppel"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0026","type":"E","question":"Can an assurance of a cash payment found a proprietary estoppel claim?","answer":"No — the assurance must relate to an interest in land. A promise of a cash sum or other non-land benefit cannot found a proprietary estoppel claim, even if the other three elements (reliance, detriment, unconscionability) are present.","tags":["land_law","ch2","2.6 Proprietary Estoppel"],"source":"Land_Law_SQE_Notes.pdf","note":""}]}]},{"id":"ch3","title":"3 . Unregistered Land","subchapters":[{"title":"3.1 Proving Title in the Unregistered System","cards":[{"id":"LL_0027","type":"A","question":"In what year did compulsory land registration begin, and roughly what proportion of land remains unregistered?","answer":"Compulsory land registration began in 1990, but roughly 10% of land in England and Wales remains unregistered.","tags":["land_law","ch3","3.1 Proving Title in the Unregistered System"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"3.1.2 Root of title","cards":[{"id":"LL_0028","type":"A","question":"What is the minimum age a document must be to serve as a good root of title, and what other three conditions must it satisfy?","answer":"A good root of title must: be at least 15 years old at the date of the contract; deal with the whole legal and equitable interest in the property; contain an adequate description of the property; and do nothing to cast doubt on the title.","tags":["land_law","ch3","3.1.2 Root of title"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"3.1.3 When title passes","cards":[{"id":"LL_0029","type":"C","question":"When does equitable title pass to a buyer of unregistered land, and when does legal title pass?","answer":"Equitable title passes on exchange of contracts (equity sees as done that which ought to be done) — both parties are bound to proceed even if the property is later damaged. Legal title passes on completion, when the deed is handed to the buyer's solicitor. An application for first registration at HMLR must then be made within two months of completion.","tags":["land_law","ch3","3.1.3 When title passes"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0030","type":"E","question":"Does the seller bear the risk of damage to unregistered land right up until completion?","answer":"No — this is a common trap. Once contracts are exchanged the buyer is equitably bound to proceed even if the property is destroyed before completion, which is exactly why the buyer must insure from exchange, not from completion.","tags":["land_law","ch3","3.1.3 When title passes"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"3.2.1 Legal interests","cards":[{"id":"LL_0031","type":"A","question":"Are legal interests in unregistered land binding on a buyer who did not know about them?","answer":"Yes — a buyer takes subject to legal interests whether or not they knew about them. Legal interests bind irrespective of notice; no registration is needed because they are generally discoverable from the deeds or by inspection.","tags":["land_law","ch3","3.2.1 Legal interests"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"3.2.2 Equitable interests","cards":[{"id":"LL_0032","type":"A","question":"What does registering an equitable interest as a land charge at the Land Charges Register constitute?","answer":"Registration constitutes actual notice to all persons, making the interest binding on all subsequent owners.","tags":["land_law","ch3","3.2.2 Equitable interests"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0033","type":"A","question":"Which land charge class covers an estate contract (e.g. a contract to purchase, an option, or a right of pre-emption)?","answer":"Class C(iv).","tags":["land_law","ch3","3.2.2 Equitable interests"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0034","type":"C","question":"Which land charge classes cover a restrictive covenant and an equitable easement respectively?","answer":"D(ii) covers a restrictive covenant; D(iii) covers an equitable easement.","tags":["land_law","ch3","3.2.2 Equitable interests"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0035","type":"A","question":"What does a Class F land charge protect, and under what statute?","answer":"A Class F land charge protects a non-owning spouse's or civil partner's statutory right of occupation of the matrimonial home under the Family Law Act 1996, often registered once a marriage is in difficulty.","tags":["land_law","ch3","3.2.2 Equitable interests"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"3.2.3 Registration mechanics","cards":[{"id":"LL_0036","type":"A","question":"Are land charges registered against the land's address or the estate owner's name, and what happens if registration is against the wrong name?","answer":"Land charges are registered against the estate owner's name, not the land's address. If the name is incorrect, registration is ineffective; if correct, a buyer searching against the wrong name still takes subject to the charge.","tags":["land_law","ch3","3.2.3 Registration mechanics"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0037","type":"E","question":"If a Class C(i), C(iii), or Class F land charge is not registered, against whom is it ineffective?","answer":"It will not bind a purchaser of any interest in the land for valuable consideration. By contrast, a D(ii), D(iii), or C(iv) land charge that is not registered will not bind only a purchaser of a legal estate for money or money's worth — a narrower category.","tags":["land_law","ch3","3.2.3 Registration mechanics"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0038","type":"E","question":"Does actual knowledge of an unregistered land charge bind a buyer even though the charge was never registered?","answer":"No — this is a common trap. Even actual knowledge of an unregistered interest is irrelevant if the statutory conditions for non-registration to defeat it are met. Registration (or its absence) is what counts, not notice.","tags":["land_law","ch3","3.2.3 Registration mechanics"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"3.2.4 The doctrine of notice","cards":[{"id":"LL_0039","type":"C","question":"What kind of equitable interest cannot be protected by land charge registration, and what governs its enforceability instead?","answer":"A beneficial interest under a trust (BIUT) cannot be protected by land charge registration. For BIUTs (and any interest created before 1926), enforceability against a buyer is governed by the old doctrine of notice. A buyer is bound unless they can show they are \"equity's darling\" — a bona fide purchaser for valuable consideration of a legal estate without notice.","tags":["land_law","ch3","3.2.4 The doctrine of notice"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0040","type":"A","question":"What are the three types of notice under the doctrine of notice?","answer":"Actual notice (the buyer actually knew of the interest); constructive notice (facts the buyer would have discovered on reasonable enquiry/inspection); and imputed notice (notice received by the buyer's agent, e.g. solicitor or surveyor, in the course of their professional investigations, treated as notice to the buyer).","tags":["land_law","ch3","3.2.4 The doctrine of notice"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0041","type":"B","question":"A buyer never inspects unregistered land, but a visible dirt track used for decades by a neighbour crosses it. Is the buyer bound by the neighbour's equitable easement?","answer":"Yes — even though neither the buyer nor their solicitor looked, the buyer is fixed with constructive notice of the track because reasonable inspection would have revealed it.","tags":["land_law","ch3","3.2.4 The doctrine of notice"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"3.3 Interests Overriding First Registration","cards":[{"id":"LL_0042","type":"A","question":"Name the four categories of unregistered interest that override first registration under LRA 2002.","answer":"A lease granted for 7 years or less; a legal easement; a local land charge; and an interest belonging to a person in actual occupation, so far as it relates to the land they occupy.","tags":["land_law","ch3","3.3 Interests Overriding First Registration"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0043","type":"B","question":"A son is sole legal owner of a cottage; his mother lives with him and has a beneficial interest under a trust from contributing to the purchase price. He sells the unregistered freehold. Can the mother's interest bind the buyer on first registration?","answer":"Yes — the mother's actual occupation can make her beneficial interest under a trust (BIUT) an overriding interest binding the buyer on first registration, even though a BIUT cannot itself be protected by land charge registration; actual occupation gives it a different route to bind a purchaser.","tags":["land_law","ch3","3.3 Interests Overriding First Registration"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"3.4 Adverse Possession (Unregistered Land)","cards":[{"id":"LL_0044","type":"A","question":"How many years of adverse possession are needed before a paper owner of unregistered land loses the right to recover it, and what happens to legal title?","answer":"12 years. The paper owner loses the right to recover the land, but retains legal title, holding it on trust for the squatter, who can apply to be registered in their place.","tags":["land_law","ch3","3.4 Adverse Possession (Unregistered Land)"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"3.4.2 Requirements for a successful claim","cards":[{"id":"LL_0045","type":"A","question":"What four things must an adverse possession claimant prove?","answer":"Actual physical possession; exclusive possession (not shared with the paper owner or others by permission); intention to possess the land; and possession without the consent of the paper owner (i.e. \"as of right\", not by licence).","tags":["land_law","ch3","3.4.2 Requirements for a successful claim"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0046","type":"E","question":"If an occupier asks the paper owner's permission to use a strip of land, does this defeat an adverse possession claim?","answer":"Yes — asking permission destroys the claim because possession was no longer \"as of right\", it was by licence. Even silence/passive tolerance by the true owner does not stop time running, but an actual request for consent does defeat the claim.","tags":["land_law","ch3","3.4.2 Requirements for a successful claim"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0047","type":"E","question":"Does unfenced or unmarked land usually satisfy the \"exclusive possession\" element of adverse possession, even after 12+ years of use?","answer":"No — if the disputed strip is not fenced, walled, or otherwise marked off from the true owner's use, a claim is likely to fail for lack of exclusivity, even if the claimant has used it for well over 12 years.","tags":["land_law","ch3","3.4.2 Requirements for a successful claim"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0048","type":"D","question":"What class of title is typically awarded on a successful adverse possession claim to previously unregistered land?","answer":"Possessory title.","tags":["land_law","ch3","3.4.2 Requirements for a successful claim"],"source":"Land_Law_SQE_Notes.pdf","note":""}]}]},{"id":"ch4","title":"4 . Registered Land","subchapters":[{"title":"4.1 First Registration","cards":[{"id":"LL_0049","type":"A","question":"Within how long must an application for first registration be made after a triggering event?","answer":"Two months.","tags":["land_law","ch4","4.1 First Registration"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"4.1.1 Triggering events","cards":[{"id":"LL_0050","type":"A","question":"Name the six triggering events for compulsory first registration of land.","answer":"A conveyance on sale of freehold land; an assent; a deed of gift; the grant of a lease for a term exceeding 7 years; the grant of a first legal mortgage; and an assignment on sale of a lease with an unexpired term exceeding 7 years.","tags":["land_law","ch4","4.1.1 Triggering events"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"4.1.2 Failure to register in time","cards":[{"id":"LL_0051","type":"D","question":"What happens if the two-month deadline for first registration is missed?","answer":"The legal transfer becomes void and the legal estate reverts to the seller/transferor, who holds it on trust as a bare trustee for the buyer (the transaction still operates in equity as a contract for valuable consideration). The cost of remedying the failure falls on the defaulting party, who must also indemnify the other party for any liability reasonably incurred.","tags":["land_law","ch4","4.1.2 Failure to register in time"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0052","type":"E","question":"Does missing the first registration deadline mean the buyer loses everything?","answer":"No — this is a common trap. The buyer retains an equitable interest (the seller holds as bare trustee), and the registration can usually still be perfected, just at the defaulting party's cost.","tags":["land_law","ch4","4.1.2 Failure to register in time"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"4.2 Classes of Title","cards":[{"id":"LL_0053","type":"A","question":"What is the best class of title HMLR can award, and what is it subject to?","answer":"Absolute freehold title is the best class — it is subject only to entries on the register and overriding interests under LRA 2002 Sched 1.","tags":["land_law","ch4","4.2 Classes of Title"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0054","type":"C","question":"When is possessory title typically awarded, and what is its key limitation compared to absolute title?","answer":"Possessory title is typically awarded on adverse possession claims or where title deeds are lost. It has the same effect as absolute title except it does not guarantee priority over interests subsisting at the date of first registration — someone with a better title could still claim.","tags":["land_law","ch4","4.2 Classes of Title"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0055","type":"C","question":"What is the difference between good leasehold title and absolute leasehold title?","answer":"Good leasehold title is awarded where the freehold/superior leasehold title was not produced to HMLR on application; the guarantee does not extend to the freehold or superior leasehold estate. Absolute leasehold title requires HMLR to have inspected all superior titles and the freehold, giving a full guarantee equivalent to absolute freehold.","tags":["land_law","ch4","4.2 Classes of Title"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"4.3 The Register of Title","cards":[{"id":"LL_0056","type":"A","question":"What four parts make up the register of title, including the header?","answer":"Header (title number, edition date, official copy date, Land Registry office); A: Property Register (postal address, title plan reference, legal estate held, rights benefiting the property); B: Proprietorship Register (class of title, name(s) of current registered proprietor(s), any restriction); and C: Charges Register (encumbrances adversely affecting the land, e.g. restrictive covenants, mortgages).","tags":["land_law","ch4","4.3 The Register of Title"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"4.4.1 Interests requiring registration to take effect at law","cards":[{"id":"LL_0057","type":"A","question":"Which two interests must be registered to take effect at law in registered land?","answer":"A legal mortgage of registered land (protected by registering the charge on the Charges Register), and an expressly created legal easement (must be \"completed by registration\" — a notice on the servient tenement's Charges Register and a corresponding entry on the dominant tenement's Property Register).","tags":["land_law","ch4","4.4.1 Interests requiring registration to take effect at law"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"4.4.2 Notices and restrictions","cards":[{"id":"LL_0058","type":"D","question":"What is the effect of failing to enter a notice protecting an interest in registered land?","answer":"The interest will not bind a purchaser for valuable consideration, though it remains binding on a donee or someone who inherits the property.","tags":["land_law","ch4","4.4.2 Notices and restrictions"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0059","type":"C","question":"What is the difference in effect between a notice and a restriction on the register of title?","answer":"A notice records the burden of an interest affecting the registered estate/charge; if not entered, the interest simply does not bind a purchaser for value. A restriction prevents dealing with the land other than in accordance with its terms; if the restriction's terms are not complied with, the transfer simply cannot be registered at all.","tags":["land_law","ch4","4.4.2 Notices and restrictions"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0060","type":"A","question":"What kind of interest is typically protected by a restriction rather than a notice, and give an example.","answer":"A beneficial interest under a trust (BIUT), e.g. a standard Form A restriction where land is held by tenants in common, preventing registration of a disposition by a sole proprietor unless court-ordered.","tags":["land_law","ch4","4.4.2 Notices and restrictions"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"4.5 Interests that Override Registration","cards":[{"id":"LL_0061","type":"A","question":"What length of legal lease is automatically an overriding interest in registered land?","answer":"A legal lease of 7 years or less.","tags":["land_law","ch4","4.5 Interests that Override Registration"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0062","type":"A","question":"What three alternative conditions can make an implied legal easement an overriding interest binding a purchaser of registered land?","answer":"The purchaser had actual knowledge of it; OR it was obvious on reasonably careful inspection of the land; OR it had been exercised within one year of the disposition.","tags":["land_law","ch4","4.5 Interests that Override Registration"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0063","type":"E","question":"Is mere physical presence at a property enough to give someone an overriding interest under the \"actual occupation\" category?","answer":"No — this is a common trap. A person merely living at a property does not have an overriding interest unless they also have a genuine proprietary right in the land (e.g. a beneficial interest under a trust). A licensee with no proprietary right cannot claim an overriding interest from occupation alone, even if physically present.","tags":["land_law","ch4","4.5 Interests that Override Registration"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0064","type":"E","question":"Can a non-owning spouse's matrimonial home right under the Family Law Act 1996 ever be an overriding interest?","answer":"No — it is a personal right, not a property interest, so it cannot qualify as an overriding interest via actual occupation. It can only be protected by registering a notice.","tags":["land_law","ch4","4.5 Interests that Override Registration"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0065","type":"B","question":"Peter has used a visible path across Johan's land for over 20 years to reach the highway (a legal easement by prescription). Johan sells to Alison, whose solicitor never inspects the land. Is Alison bound?","answer":"Yes — Peter's easement is overriding and binds Alison. It is a legal right (not expressly created) and the path was obvious on a reasonably careful inspection, even though Alison's solicitor failed to actually look.","tags":["land_law","ch4","4.5 Interests that Override Registration"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"4.6 Adverse Possession of Registered Land","cards":[{"id":"LL_0066","type":"C","question":"How does adverse possession of registered land differ from unregistered land in terms of the years required and the effect on the owner's title?","answer":"For registered land, a squatter only gains the right to

s (Beneficiaries)"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0019","type":"E","question":"Why does a discretionary trust for 'all or some of the inhabitants of West Yorkshire' fail, despite satisfying conceptual certainty?","answer":"It fails for administrative unworkability — not merely because there are 2.5 million potential objects, but because there is nothing linking them that lets trustees make a sensible, principled selection (sometimes called capriciousness). Administrative unworkability is about the breadth and structure of the class, not just raw numbers.","tags":["trusts","ch2","2.1.3 Certainty of Objects (Beneficiaries)"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0020","type":"D","question":"What happens to property if a trust is void for uncertainty of objects?","answer":"A resulting trust in favour of the settlor (or the settlor's estate) is presumed, because there is no beneficiary for whom the trustee can hold the property, so the equitable interest reverts to the person who provided it.","tags":["trusts","ch2","2.1.3 Certainty of Objects (Beneficiaries)"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0021","type":"A","question":"What is the beneficiary principle?","answer":"A trust must have ascertainable human beneficiaries able to enforce it. A trust for an abstract, non-charitable purpose normally fails, subject to the narrow honorary trust exceptions. This rule does not apply to charitable trusts, which the Attorney General enforces on behalf of the public.","tags":["trusts","ch2","2.1.3 Certainty of Objects (Beneficiaries)"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.2 Trustees","cards":[{"id":"TR_0022","type":"B","question":"Does the total absence of a named trustee at the moment of creation always cause a trust to fail?","answer":"No — a trust does not fail merely because a trustee dies, refuses to act, or resigns, since the court will appoint a replacement unless the settlor clearly intended the trust to continue only while a specific person served. However, the total absence of any trustee at the moment of creation can cause an inter vivos trust to fail for lack of constitution, because property cannot be transferred to a non-existent trustee. A testamentary trust does not fail for want of a trustee, since the court can appoint one.","tags":["trusts","ch2","2.2 Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0023","type":"A","question":"What are the statutory minimum and maximum numbers of trustees for a trust of land, and why does the minimum matter?","answer":"A trust of land needs at least two trustees (or a trust corporation) and no more than four. At least two are required to give a valid receipt for capital money on a sale of land. There is no statutory minimum or maximum number of trustees generally for trusts of personalty.","tags":["trusts","ch2","2.2 Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0024","type":"E","question":"Can a minor be a trustee?","answer":"No — a minor cannot be a trustee, even over personal property (personalty), although anyone else with capacity to hold property for their own benefit may be a trustee.","tags":["trusts","ch2","2.2 Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.3 Rules Against Perpetuity","cards":[{"id":"TR_0025","type":"A","question":"What is the perpetuity period for remoteness of vesting for trusts taking effect after 6 April 2010?","answer":"125 years. This rule against remoteness of vesting applies to any trust interest, ensuring that an interest must vest (if at all) within that period.","tags":["trusts","ch2","2.3 Rules Against Perpetuity"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0026","type":"A","question":"What is the inalienability rule and to what trusts does it apply?","answer":"The inalienability rule applies to non-charitable purpose ('honorary') trusts, capping their duration at 21 years, or a life in being plus 21 years, or 'for as long as the law allows' (treated as 21 years). A non-charitable purpose trust where no fixed period is specified but the trustees may spend the capital on the purpose at any time is also valid, even though it could end the trust immediately.","tags":["trusts","ch2","2.3 Rules Against Perpetuity"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.4 Creating an Inter Vivos Trust","cards":[{"id":"TR_0027","type":"C","question":"What are the two ways a settlor can create an inter vivos trust, and what formality applies to each for land?","answer":"A settlor can create a lifetime trust either by (a) self-declaration — manifesting an intention to be bound, with the three certainties, beneficiary principle and perpetuity rules satisfied, requiring signed writing to evidence a declaration of trust of land — or (b) transfer to a third-party trustee, requiring both signed writing for the declaration and a deed transferring legal title, registered at HM Land Registry.","tags":["trusts","ch2","2.4 Creating an Inter Vivos Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0028","type":"D","question":"Why does a signed letter alone not constitute a trust of land if the trustee never receives legal title?","answer":"A trust of land needs signed writing to evidence the declaration, separately from the deed and registration needed to transfer legal title. A signed letter declares the trust but does not constitute it if the trustee never actually receives legal title — the declaration formality and the transfer formality are distinct requirements that must both be satisfied.","tags":["trusts","ch2","2.4 Creating an Inter Vivos Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0029","type":"A","question":"Is any formality required to declare a trust of personalty?","answer":"No — there is no formality requirement for declaring a trust of personalty; it can even be created orally. This contrasts with a trust of land, which requires signed writing to evidence the declaration.","tags":["trusts","ch2","2.4 Creating an Inter Vivos Trust"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.4.1 Constitution — Transferring Legal Title","cards":[{"id":"TR_0030","type":"A","question":"How is legal title transferred for each of: land, shares, chattels, and money in a bank account?","answer":"Land: by deed of transfer, registered at HM Land Registry. Shares: by signed stock transfer form, registered with the company. Chattels: by intention to transfer plus delivery (or transfer by deed). Money in a bank account: by signed written notice of the transfer to the bank. Until the correct transfer method is completed, the trust is incompletely constituted.","tags":["trusts","ch2","2.4.1 Constitution — Transferring Legal Title"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.4.2 Equity Will Not Assist a Volunteer — and Its Exceptions","cards":[{"id":"TR_0031","type":"A","question":"What is the general rule when a settlor declares a trust but never completes the transfer of legal title?","answer":"Equity generally will not assist a (volunteer) beneficiary to perfect an incompletely constituted trust — 'equity will not assist a volunteer.' The trust remains unenforceable unless one of the recognised exceptions applies.","tags":["trusts","ch2","2.4.2 Equity Will Not Assist a Volunteer — and Its Exceptions"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0032","type":"E","question":"What is the 'every effort' test exception to 'equity will not assist a volunteer'?","answer":"If the donor has done everything within their own power and put the property beyond their own control (e.g. handed over an executed transfer deed or stock transfer, even though registration is still outstanding), an imperfect gift or trust will be treated as completely constituted despite the outstanding registration step.","tags":["trusts","ch2","2.4.2 Equity Will Not Assist a Volunteer — and Its Exceptions"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0033","type":"D","question":"Why does retaining a signed transfer document in the donor's own desk drawer defeat the 'every effort' test, even though the document is fully executed?","answer":"The every-effort exception requires the donor to have put the property beyond their own control by handing the document to the trustee or donee. If the donor instead retains control by keeping the document, the exception does not apply, and the property remains in the donor's estate despite the document being fully executed.","tags":["trusts","ch2","2.4.2 Equity Will Not Assist a Volunteer — and Its Exceptions"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0034","type":"E","question":"What three conditions must be satisfied for a donatio mortis causa?","answer":"(1) Delivery of property in contemplation of imminent death; (2) the gift is intended to take effect only if the donor dies, and is to be returned if the donor survives; and (3) the donor actually dies. Constructive delivery (e.g. handing over a safe key) suffices for the delivery requirement.","tags":["trusts","ch2","2.4.2 Equity Will Not Assist a Volunteer — and Its Exceptions"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0035","type":"E","question":"What is the rule in Strong v Bird?","answer":"Where the donor had a continuing, unbroken intention to give the gift right up to death, and the intended donee or trustee becomes the donor's executor or administrator, that person thereby acquires legal title to the property — perfecting the imperfect lifetime gift through the operation of the appointment as personal representative.","tags":["trusts","ch2","2.4.2 Equity Will Not Assist a Volunteer — and Its Exceptions"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0036","type":"E","question":"How can proprietary estoppel perfect an incompletely constituted gift or trust?","answer":"Where the donee reasonably relied on an assurance that the gift or trust would be made, and suffered detriment as a result, proprietary estoppel can operate as an exception to 'equity will not assist a volunteer', allowing the gift or trust to be enforced despite the lack of complete constitution.","tags":["trusts","ch2","2.4.2 Equity Will Not Assist a Volunteer — and Its Exceptions"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.5 Creation of Testamentary Trusts","cards":[{"id":"TR_0037","type":"A","question":"What formality governs a testamentary trust, and is a separate transfer formality needed?","answer":"A testamentary trust must be contained in a will duly executed under the Wills Act, and generally all the terms must appear in the will itself. No transfer formality is needed because the property vests in the trustees via the deceased's personal representatives.","tags":["trusts","ch2","2.5 Creation of Testamentary Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.5.1 Secret and Half-Secret Trusts","cards":[{"id":"TR_0038","type":"C","question":"What is the difference between a secret trust and a half-secret trust in terms of the will's wording?","answer":"A secret trust looks like an outright gift in the will, with no trust mentioned at all. A half-secret trust mentions that there is a trust, but does not identify the beneficiary.","tags":["trusts","ch2","2.5.1 Secret and Half-Secret Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0039","type":"C","question":"When must communication of the trust's terms to the 'trustee' occur for a secret trust versus a half-secret trust?","answer":"For a secret trust, communication can occur before or after the will is executed, as long as it is before death. For a half-secret trust, communication must occur at or before the making of the will, and must be consistent with the will's wording. Both also require that the legatee did not expressly refuse and knew of the trust before the testator's death.","tags":["trusts","ch2","2.5.1 Secret and Half-Secret Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0040","type":"E","question":"Why does a half-secret trust fail if the will refers to 'trusts I have communicated to them' but the communication only happens after the will is executed, or the will refers to a future communication?","answer":"If the will's own wording points to a communication that might happen after execution, a half-secret trust fails even if the testator did in fact tell the trustee the terms before signing, because the communicated terms must be consistent with the will's wording requiring communication at or before the will's execution. The named 'trustee' then holds on resulting trust for the estate.","tags":["trusts","ch2","2.5.1 Secret and Half-Secret Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0041","type":"D","question":"What happens if the legatee/trustee under a secret trust expressly refuses, or never knew of it before the testator's death?","answer":"There is no trust and the legatee keeps the gift free of any trust. However, mere silence in response to being told of the trust counts as implied acceptance, so silence will not produce this outcome.","tags":["trusts","ch2","2.5.1 Secret and Half-Secret Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.6 Beneficial Entitlement","cards":[{"id":"TR_0042","type":"C","question":"Distinguish a vested interest from a contingent interest, and a limited interest from an absolute interest.","answer":"A vested interest has no conditions attached — the beneficiary is definitely entitled, even if enjoyment is delayed (e.g. until majority). A contingent interest is conditional on an event (e.g. attaining a stated age, surviving another beneficiary); if the condition fails, the interest fails. A limited interest carries no right to capital, typically a life interest in income only, while an absolute interest is full entitlement, including capital.","tags":["trusts","ch2","2.6 Beneficial Entitlement"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.6.1 Fixed Interest Trusts","cards":[{"id":"TR_0043","type":"B","question":"A will leaves the residue to a son provided he attains 25, and he is 19 when his mother dies but dies aged 23. What is the outcome?","answer":"While alive and under 25, the son's interest is contingent (conditional on attaining 25). Because he died aged 23, before satisfying the condition, his interest fails and passes under the will's substitutional provisions, or, absent any, on a resulting trust to the estate.","tags":["trusts","ch2","2.6.1 Fixed Interest Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.6.2 Discretionary Trusts","cards":[{"id":"TR_0044","type":"D","question":"What rights does a member of a class under a discretionary trust have if they receive nothing?","answer":"Each class member can compel the trustees to consider exercising their discretion, and can sue for breach if trust property is paid to a non-beneficiary, but no individual can insist on receiving any particular share — receiving nothing on a given occasion is not itself a breach.","tags":["trusts","ch2","2.6.2 Discretionary Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"2.6.4 Termination by Beneficiaries — Saunders v Vautier","cards":[{"id":"TR_0045","type":"A","question":"State the rule in Saunders v Vautier.","answer":"Beneficiaries who are, between them, (1) of full age and capacity, (2) absolutely entitled to the entire equitable interest, and (3) unanimous, may collapse the trust early and call for the property. This applies to both fixed and discretionary trusts, though unanimity is very hard to achieve in a large discretionary trust.","tags":["trusts","ch2","2.6.4 Termination by Beneficiaries — Saunders v Vautier"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0046","type":"E","question":"Does a single minor beneficiary with a vested interest block the operation of Saunders v Vautier?","answer":"Yes — even if all adult beneficiaries agree, the rule cannot be invoked while any beneficiary with a vested interest in the trust fund is still a minor, because all beneficiaries invoking the rule must be of full age. The class must wait until that beneficiary turns 18.","tags":["trusts","ch2","2.6.4 Termination by Beneficiaries — Saunders v Vautier"],"source":"Trusts_SQE_Notes.pdf","note":""}]}]},{"id":"ch3","title":"3 . Resulting Trusts","subchapters":[{"title":"3.1 What Is a Resulting Trust?","cards":[{"id":"TR_0047","type":"A","question":"What is a resulting trust, and what are its two main categories?","answer":"A resulting trust is implied by law, based on the settlor's presumed but unexpressed intention; the equitable interest 'results' back to the settlor or their estate. There are two main categories: (1) voluntary transfer or purchase money provided in the name of another, and (2) failure to exhaust the beneficial interest under an express trust.","tags":["trusts","ch3","3.1 What Is a Resulting Trust?"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"3.2 Voluntary Transfer and Purchase-Money Resulting Trusts","cards":[{"id":"TR_0048","type":"A","question":"When does a purchase-money resulting trust arise, and what counts as the relevant consideration?","answer":"Where X transfers property to Y for no consideration with no evidence of why, equity presumes X did not intend a gift, so Y holds the property on resulting trust for X. The same presumption arises where X provides some or all of the purchase money but legal title is taken in Y's name — Y then holds on resulting trust for X (or for X and Y in proportion to their contributions, if both contributed). The consideration must be the purchase price itself; money for improvements or for paying taxes afterwards does not generate a resulting trust.","tags":["trusts","ch3","3.2 Voluntary Transfer and Purchase-Money Resulting Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0049","type":"D","question":"By when must consideration be provided to support a purchase-money resulting trust, and who bears the burden of proof?","answer":"The consideration (or a binding obligation to pay) must be supplied at or before the time the title-holder takes title — reimbursing the title-holder afterwards does not create a resulting trust. The burden of proof is on the claimant alleging the resulting trust, who must prove this by clear and convincing evidence.","tags":["trusts","ch3","3.2 Voluntary Transfer and Purchase-Money Resulting Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"3.2.1 The Presumption of Advancement (Exception)","cards":[{"id":"TR_0050","type":"E","question":"List the three relationships that trigger the presumption of advancement.","answer":"(1) X is Y's husband or fiancé; (2) X is Y's father; or (3) X stands in loco parentis to Y (has assumed parental responsibility for Y). In these relationships, the usual presumption of a resulting trust is reversed and a gift is presumed instead.","tags":["trusts","ch3","3.2.1 The Presumption of Advancement (Exception)"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0051","type":"D","question":"Does the presumption of advancement extend to a wife transferring property to her husband, or a mother to her child?","answer":"No — this is an old, gender-asymmetric doctrine with no modern extension by authority, although the loco parentis category has been applied to a single mother who had sole responsibility for a child. There is no symmetry between spouses or parents generally.","tags":["trusts","ch3","3.2.1 The Presumption of Advancement (Exception)"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"3.2.2 Rebutting Either Presumption","cards":[{"id":"TR_0052","type":"B","question":"A father transfers shares into his daughter's name and later continues to collect and spend the dividends himself. Does this rebut the presumption of advancement?","answer":"No — the presumption of advancement (gift) applies to the initial transfer, and his post-transfer conduct of collecting dividends is not admissible evidence to rebut the presumption in his own favour, because it occurred after the transfer. Only evidence at or before the transfer is admissible in a party's own favour.","tags":["trusts","ch3","3.2.2 Rebutting Either Presumption"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0053","type":"A","question":"What evidence is admissible to rebut a presumption of resulting trust or advancement?","answer":"Surrounding circumstances at the time of transfer are admissible, and courts increasingly use this to undercut the discriminatory presumption of advancement. Acts and declarations of the party seeking to rely on them are only admissible if made before or at the time of the purchase/transfer — later conduct is not admissible in that party's own favour.","tags":["trusts","ch3","3.2.2 Rebutting Either Presumption"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"3.2.3 Illegal or Fraudulent Purpose","cards":[{"id":"TR_0054","type":"E","question":"Does an illegal or fraudulent purpose behind a transfer automatically bar a resulting trust claim?","answer":"No — where the transfer was part of an illegal or fraudulent scheme (e.g. hiding assets from creditors, or facilitating a fraudulent benefits claim), the court has a discretion whether to allow the claim, weighing the underlying purpose of the law concerned and the parties' conduct. There is no automatic bar.","tags":["trusts","ch3","3.2.3 Illegal or Fraudulent Purpose"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"3.3 Resulting Trusts Arising on Failure of an Express Trust","cards":[{"id":"TR_0055","type":"B","question":"Property is held 'for Xena, provided she attains 21' and Xena dies aged 19. What is the result?","answer":"This is a failure of a contingent interest under an express trust. The property is held on resulting trust for the settlor (or the settlor's estate), since the condition for Xena's interest was never satisfied.","tags":["trusts","ch3","3.3 Resulting Trusts Arising on Failure of an Express Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0056","type":"D","question":"What duties does a trustee owe under a resulting trust?","answer":"No management duties — only the duty to convey the property back to the settlor (or their estate). This contrasts with an express trust, where the trustee has active management, investment and safeguarding obligations.","tags":["trusts","ch3","3.3 Resulting Trusts Arising on Failure of an Express Trust"],"source":"Trusts_SQE_Notes.pdf","note":""}]}]},{"id":"ch4","title":"4 . Trusts of the Family Home","subchapters":[{"title":"4.1 Why This Area Matters","cards":[{"id":"TR_0057","type":"D","question":"Why does the analysis of beneficial entitlement to the family home matter most for unmarried cohabitants?","answer":"On divorce or dissolution of a civil partnership, the family court has wide statutory powers to redistribute property regardless of legal or equitable title. Cohabitants who are neither married nor in a civil partnership have no equivalent statutory regime, so on separation a non-owning or minority-owning partner must rely on ordinary trusts law (resulting trusts, constructive trusts, proprietary estoppel) to establish a beneficial share in the home.","tags":["trusts","ch4","4.1 Why This Area Matters"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"4.2 Legal Title Held in Both Names","cards":[{"id":"TR_0058","type":"A","question":"If legal title to a house is registered in both parties' names, how is the legal title necessarily held, and can the equitable interest differ?","answer":"The legal title is necessarily held as joint tenants at law — legal joint tenancy is the only option under the LPA 1925, since there is no legal tenancy in common. However, the equitable interest does not have to mirror the legal interest: joint legal owners may hold the equitable interest as joint tenants or as tenants in common, in equal or unequal shares.","tags":["trusts","ch4","4.2 Legal Title Held in Both Names"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"4.2.1 Express Declaration of Trust","cards":[{"id":"TR_0059","type":"A","question":"What effect does an express declaration of the parties' beneficial interests in the transfer deed have?","answer":"If the transfer deed contains an express declaration of the parties' beneficial interests, that declaration is conclusive as to the size of each party's share, regardless of how much each party actually contributed financially — unless it can be set aside for fraud or mistake.","tags":["trusts","ch4","4.2.1 Express Declaration of Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0060","type":"B","question":"Femi and Grace buy a flat as joint legal owners; Femi pays 80% of the price and Grace 20%, but the transfer states they hold the equitable interest as tenants in common in equal halves. On a later sale, what is Grace entitled to?","answer":"Grace is entitled to 50% of the proceeds, not 20% — the express declaration is conclusive notwithstanding the unequal contributions, because there is no suggestion of fraud or mistake. The express declaration overrides the actual financial contributions.","tags":["trusts","ch4","4.2.1 Express Declaration of Trust"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"4.2.2 No Express Declaration of Trust","cards":[{"id":"TR_0061","type":"A","question":"What is the equitable starting presumption where legal title is held jointly with no express declaration of trust?","answer":"'Equity follows the law': the parties are presumed to hold the equitable interest jointly and equally, just as they hold the legal title. A party seeking a different (larger or smaller) share must prove that both parties had a common intention to hold otherwise, either from the outset or arising later.","tags":["trusts","ch4","4.2.2 No Express Declaration of Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0062","type":"C","question":"List factors relevant to the court's holistic 'whole course of dealing' review when inferring a common intention to depart from equal joint shares.","answer":"Non-exhaustively: advice received or discussions had at the point of purchase; the purpose for which the property was bought; the parties' motivation for purchasing jointly; the nature of their relationship; whether there are children for whom they share responsibility to provide a home; how they arranged their finances (e.g. separate vs joint accounts); how they paid bills and other outgoings; and why a party was authorised to give a valid receipt for capital monies.","tags":["trusts","ch4","4.2.2 No Express Declaration of Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0063","type":"D","question":"Do unequal financial contributions by joint legal owners automatically generate unequal equitable shares?","answer":"No — the joint-names starting point is equal beneficial ownership, displaced only by proof of a different common intention assessed across the whole relationship, not contribution alone. Treating unequal contributions as automatically producing unequal shares is a common wrong answer.","tags":["trusts","ch4","4.2.2 No Express Declaration of Trust"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"4.3 Legal Title Held in the Sole Name of One Party","cards":[{"id":"TR_0064","type":"C","question":"What four routes can a non-owning party rely on to establish a beneficial share where legal title is in the sole name of one party?","answer":"(1) An express declaration of trust; (2) proprietary estoppel; (3) a resulting trust from a direct contribution to the purchase price; or (4) a common intention constructive trust.","tags":["trusts","ch4","4.3 Legal Title Held in the Sole Name of One Party"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0074","type":"D","question":"Is there a starting presumption of any equitable share for a non-owner where legal title is held in one party's sole name?","answer":"No — unlike the joint-names 'equity follows the law' presumption, where title is in one name only there is no starting presumption of any equitable share for the non-owner at all. The non-owner must affirmatively establish one of the four routes (express declaration, proprietary estoppel, resulting trust, or common intention constructive trust) from scratch.","tags":["trusts","ch4","4.3 Legal Title Held in the Sole Name of One Party"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"4.3.1 Express Declaration of Trust","cards":[{"id":"TR_0065","type":"A","question":"What formality applies to an express declaration of trust of land in favour of a non-legal owner?","answer":"It must be evidenced in signed writing under LPA 1925 s.53(1)(b). The declaration can be made at the time of the conveyance or later, and (absent fraud, mistake or undue influence) is generally conclusive.","tags":["trusts","ch4","4.3.1 Express Declaration of Trust"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"4.3.2 Proprietary Estoppel","cards":[{"id":"TR_0066","type":"A","question":"What three elements must a claimant show to establish proprietary estoppel in a family home context?","answer":"(1) A representation or assurance was made to the claimant that they had or would have an interest in the property (a clear representation, or passive encouragement/acquiescence, is sufficient); (2) the claimant relied on that representation or assurance; and (3) the claimant suffered detriment as a result of that reliance. Detriment is not confined to financial outlay — it can include unpaid care of a relative or unpaid labour in a family business.","tags":["trusts","ch4","4.3.2 Proprietary Estoppel"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0067","type":"D","question":"Is the remedy for a successful proprietary estoppel claim automatically what was originally promised?","answer":"No — the remedy is discretionary and need not match the original promise; the court tailors relief to the claimant's expectation and the detriment actually suffered, so it may be less (or, rarely, more) than what was promised.","tags":["trusts","ch4","4.3.2 Proprietary Estoppel"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"4.3.3 Common Intention Constructive Trust","cards":[{"id":"TR_0068","type":"A","question":"What two elements must be shown to establish a common intention constructive trust?","answer":"(1) A common intention, express or inferred, that the claimant should have a beneficial interest; and (2) that the claimant relied to their detriment on that common intention.","tags":["trusts","ch4","4.3.3 Common Intention Constructive Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0069","type":"D","question":"What must an express common intention relate to, as opposed to what is insufficient?","answer":"It must relate to ownership of the property itself, not merely to sharing a home or a life together generally. A statement like 'I think of the house as ours' despite sole legal title can amount to an express common intention; merely cohabiting does not.","tags":["trusts","ch4","4.3.3 Common Intention Constructive Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0070","type":"C","question":"Give examples of conduct from which a court may infer common intention in the absence of express discussion.","answer":"A direct contribution to the purchase price; mortgage payments; payment of household expenses made specifically to free up the legal owner to make the mortgage payments; or substantial improvements to the property. The court may, but need not, infer a common intention from such conduct.","tags":["trusts","ch4","4.3.3 Common Intention Constructive Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0071","type":"E","question":"Will decorating the property or merely supervising builders amount to sufficient detrimental reliance for a common intention constructive trust?","answer":"No — these are minor acts and do not suffice on their own. Contributions to the purchase price or mortgage payments are easily sufficient, and household expense payments and home improvements may also count, but decorating or supervision alone will not.","tags":["trusts","ch4","4.3.3 Common Intention Constructive Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0072","type":"B","question":"If there is an express agreement on the size of beneficial shares, will the court depart from it?","answer":"Only if the parties' subsequent conduct makes it inappropriate to hold them to the agreed share; otherwise the court gives the agreement effect. Absent an express agreement on quantum, the court infers (or, if necessary, imputes) an intention from the parties' whole course of dealing with the property.","tags":["trusts","ch4","4.3.3 Common Intention Constructive Trust"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0073","type":"D","question":"Why is it wrong to calculate a family home beneficial share by simple contribution percentage once title is held jointly, after Stack v Dowden and Jones v Kernott?","answer":"For the family home specifically, the modern approach for joint legal owners is the common intention constructive trust framework, not a resulting trust based purely on contribution proportions. That contribution-percentage approach has been displaced by the whole-course-of-dealing constructive trust analysis.","tags":["trusts","ch4","4.3.3 Common Intention Constructive Trust"],"source":"Trusts_SQE_Notes.pdf","note":""}]}]},{"id":"ch5","title":"5 . Charitable and Other Purpose Trusts","subchapters":[{"title":"5.1 The Beneficiary Principle and Its Exceptions","cards":[{"id":"TR_0075","type":"A","question":"What is a purpose trust, and into what two categories do purpose trusts fall?","answer":"A purpose trust is a trust set up to accomplish a purpose rather than to benefit a person. Purpose trusts fall into two categories: charitable trusts (for public purposes) and noncharitable purpose trusts (for private purposes, valid only within a narrow recognised list) — both are exceptions to the general beneficiary principle requiring ascertainable human beneficiaries.","tags":["trusts","ch5","5.1 The Beneficiary Principle and Its Exceptions"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"5.2 Why Charitable Status Matters","cards":[{"id":"TR_0076","type":"C","question":"Name the three special exemptions charitable trusts receive from the ordinary private trust rules.","answer":"(1) Certainty of objects/ascertainable human beneficiaries is not required — a trust for an abstract charitable purpose is valid; (2) a failed charitable trust may be redirected to a similar purpose via the cy-près doctrine instead of resulting back to the settlor; and (3) charitable trusts may be perpetual, not subject to the inalienability rule that limits private (noncharitable) purpose trusts to 21 years or a life in being plus 21 years.","tags":["trusts","ch5","5.2 Why Charitable Status Matters"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"5.3.1 The Purpose Must Be Charitable","cards":[{"id":"TR_0077","type":"A","question":"What is the source of the list of charitable purposes, and what is the recommended exam technique for it?","answer":"The purpose must fall within the list in the Charities Act 2011, which includes (non-exhaustively) prevention/relief of poverty, advancement of education, advancement of religion, advancement of health, advancement of citizenship, advancement of the arts, advancement of amateur sport, advancement of human rights, environmental protection, relief of those in need, animal welfare, and promotion of the efficiency of the armed/emergency services, among others. The exam technique is not to memorise the full list verbatim, but to recognise quickly whether a proposed purpose is likely charitable, and to focus on the public-benefit and exclusivity issues where MCQs usually bite.","tags":["trusts","ch5","5.3.1 The Purpose Must Be Charitable"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"5.3.2 The Purpose Must Be for Public Benefit","cards":[{"id":"TR_0078","type":"A","question":"What two-part test must a charitable purpose satisfy for public benefit?","answer":"The trust must confer (1) an identifiable benefit, (2) on the public or a sufficient section of the public. It is not enough for the purpose merely to fall within the statutory list of charitable purposes.","tags":["trusts","ch5","5.3.2 The Purpose Must Be for Public Benefit"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0079","type":"E","question":"What is the 'personal nexus' problem in the public benefit test?","answer":"Where the class of beneficiaries is defined by their relationship to a specific private individual or business (e.g. a trust for the education of the children of a named company's employees), the trust is private and fails the public benefit test, because the class is linked by a personal connection rather than constituting the public or a sufficient section of it.","tags":["trusts","ch5","5.3.2 The Purpose Must Be for Public Benefit"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0080","type":"E","question":"What is the exception to the public benefit requirement for poverty-relief charities?","answer":"Poverty-relief trusts can be charitable even where the class is defined by a personal nexus (e.g. relief of poverty among employees of a named company), because the courts treat the relief of poverty as inherently for the public benefit despite the personal connection — this is a recognised exception to the ordinary personal nexus problem.","tags":["trusts","ch5","5.3.2 The Purpose Must Be for Public Benefit"],"source":"Trusts_SQE_Notes.pdf","note":"sparse source — exact scope of the poverty exception summarised concisely in the notes"},{"id":"TR_0081","type":"B","question":"Does charging fees for access to a charitable benefit (e.g. a fee-charging school) automatically defeat public benefit?","answer":"No — incidental private benefit and reasonable fee-charging do not automatically defeat charitable status, provided the organisation still confers a genuine public benefit and is not operated essentially for private profit.","tags":["trusts","ch5","5.3.2 The Purpose Must Be for Public Benefit"],"source":"Trusts_SQE_Notes.pdf","note":"sparse source"},{"id":"TR_0082","type":"E","question":"Why are political purposes excluded from charitable status, per National Anti-Vivisection Society v IRC [1948] AC 31?","answer":"Political purposes are excluded because the court cannot determine whether a change in the law that the purpose seeks to achieve would itself be for the public benefit — this was established in National Anti-Vivisection Society v IRC [1948] AC 31, where a trust to campaign for the abolition of vivisection by changing the law was held not charitable.","tags":["trusts","ch5","5.3.2 The Purpose Must Be for Public Benefit"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"5.3.3 The Purpose Must Be Exclusively Charitable","cards":[{"id":"TR_0083","type":"A","question":"What does the requirement that a charitable purpose be 'exclusively charitable' mean, and what happens if a trust mixes charitable and non-charitable purposes?","answer":"All of the trust's purposes must be charitable; if a trust mixes charitable and non-charitable purposes (e.g. 'for charitable and benevolent purposes'), it fails for the non-exclusivity unless the gift can be severed so that the charitable and non-charitable parts are treated separately, in which case the charitable part may still take effect.","tags":["trusts","ch5","5.3.3 The Purpose Must Be Exclusively Charitable"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"5.4 Enforcement","cards":[{"id":"TR_0084","type":"A","question":"Who enforces a charitable trust?","answer":"The Attorney General enforces charitable trusts on behalf of the public, since charitable trusts have no individual beneficiaries with standing to sue.","tags":["trusts","ch5","5.4 Enforcement"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"5.5 The Cy-Près Doctrine","cards":[{"id":"TR_0085","type":"C","question":"What is the cy-près doctrine, and how does it treat initial failure differently from subsequent failure?","answer":"The cy-près doctrine allows failed charitable gifts to be redirected to a similar charitable purpose instead of resulting back to the settlor or estate. Where the charitable purpose fails initially (i.e. it was already impossible or non-existent at the time the gift was meant to take effect), cy-près only applies if the donor had a general charitable intention, not just intent to benefit the one named charity. Where the failure is subsequent (the charity existed and operated but later ceased or merged after the gift took effect), cy-près applies without needing to show a general charitable intention.","tags":["trusts","ch5","5.5 The Cy-Près Doctrine"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0086","type":"D","question":"If a named charity closes down after the testator's death but before the gift is distributed, does cy-près require a general charitable intention?","answer":"No — this is treated as subsequent failure (the charity existed and the gift had already taken effect), so cy-près applies to redirect the gift to a similar purpose without needing to prove a general charitable intention. The timing of the charity's closure relative to the testator's death is the key factor distinguishing initial from subsequent failure.","tags":["trusts","ch5","5.5 The Cy-Près Doctrine"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"5.6.1 Denley Trusts","cards":[{"id":"TR_0087","type":"A","question":"What is a Denley trust, and how is it distinguished from an unenforceable 'honorary' trust?","answer":"A Denley trust (from Re Denley's Trust Deed) is a trust for a purpose that directly and indirectly benefits ascertainable individuals (e.g. a sports ground for the benefit of a company's employees), and is enforceable by those individuals even though framed as a purpose trust. This is distinguished from an honorary trust (e.g. for the maintenance of a specific animal or a monument), which is valid as a narrow exception to the beneficiary principle but is not enforceable by anyone — it survives only because the trustee chooses to carry it out, and if the trustee fails to do so, no beneficiary has standing to compel performance.","tags":["trusts","ch5","5.6.1 Denley Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"5.6.2 \"Honorary\" Trusts","cards":[{"id":"TR_0088","type":"A","question":"What perpetuity limit applies to honorary trusts, and what is the rule about judicial notice of an animal's lifespan?","answer":"Honorary trusts are capped at 21 years (or a life in being plus 21 years) under the inalienability rule. Courts will not take judicial notice of an animal's lifespan to extend this period — i.e. a trust 'for as long as my dog lives' cannot be assumed to fit within 21 years just because dogs typically live less than that; the trust must still be drafted to comply with the 21-year cap.","tags":["trusts","ch5","5.6.2 \"Honorary\" Trusts"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0089","type":"C","question":"Name the four recognised categories of valid 'honorary' (noncharitable purpose) trusts.","answer":"Trusts for: (1) the maintenance of specific animals; (2) the maintenance of graves and monuments; (3) the saying of private (non-public-benefit) masses; and (4) (per some authority) the furtherance of fox hunting or similar private sporting purposes — recognised as a narrow, anomalous exception to the beneficiary principle, each subject to the 21-year perpetuity cap.","tags":["trusts","ch5","5.6.2 \"Honorary\" Trusts"],"source":"Trusts_SQE_Notes.pdf","note":"sparse source — exact enumerated list summarised from the chapter's honorary trust discussion"}]}]},{"id":"ch6","title":"6 . Appointment, Retirement and Removal of Trustees","subchapters":[{"title":"6.1.1 Original Trustees","cards":[{"id":"TR_0090","type":"A","question":"Is acceptance of the office of original trustee all-or-nothing?","answer":"Yes — a person named as original trustee may accept or disclaim the office, but cannot accept part of the trust property while disclaiming the rest; acceptance or disclaimer of the trusteeship is all-or-nothing.","tags":["trusts","ch6","6.1.1 Original Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"6.1.2 Number of Trustees","cards":[{"id":"TR_0091","type":"A","question":"What are the minimum and maximum numbers of trustees for land, compared with personalty?","answer":"For a trust of land, the minimum is two trustees (or a trust corporation) and the statutory maximum is four. For pure personalty, there is no statutory limit on the number of trustees.","tags":["trusts","ch6","6.1.2 Number of Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"6.1.3 Subsequent Appointment","cards":[{"id":"TR_0092","type":"D","question":"Once a trust is created, does the settlor retain the power to appoint subsequent trustees?","answer":"No — the settlor loses the power to appoint subsequent trustees once the trust is created, unless that power is expressly reserved to the settlor in the trust instrument.","tags":["trusts","ch6","6.1.3 Subsequent Appointment"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"6.1.4 Additional Trustees","cards":[{"id":"TR_0093","type":"A","question":"Who holds the power to appoint additional trustees by default, and what is the cap?","answer":"The existing trustees hold the power to appoint additional trustees by default, capped at a maximum of four trustees in total (matching the general statutory maximum for trusts of land).","tags":["trusts","ch6","6.1.4 Additional Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"6.1.5 Replacement Trustees","cards":[{"id":"TR_0094","type":"A","question":"List the six grounds justifying appointment of a replacement trustee.","answer":"Death; refusal to act; continuous absence from the UK exceeding 12 months; unfitness to act (e.g. breach of trust, bankruptcy); incapacity; or desiring to be discharged.","tags":["trusts","ch6","6.1.5 Replacement Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0095","type":"A","question":"What is the default order of priority for appointing a replacement trustee?","answer":"The person named in the trust instrument with power to appoint; if none, the surviving/continuing trustees; if none, the personal representatives of the last surviving trustee; if none, the court.","tags":["trusts","ch6","6.1.5 Replacement Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0096","type":"D","question":"Can a removed trustee take part in choosing their own replacement?","answer":"No — although a retiring trustee may have input, a trustee who has been removed cannot participate in selecting the new trustee.","tags":["trusts","ch6","6.1.5 Replacement Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0097","type":"E","question":"Must the appointment of a new trustee be made by deed?","answer":"No — it must be in writing, but a deed is commonly used because it automatically vests legal title to land and chattels in the new trustee, avoiding the need for a separate conveyance.","tags":["trusts","ch6","6.1.5 Replacement Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0098","type":"D","question":"When do the personal representatives of a deceased trustee gain power to appoint a replacement trustee?","answer":"Only if the deceased was the sole or last surviving trustee — not if co-trustees survive, since surviving/continuing trustees take priority over the personal representatives in the appointment order.","tags":["trusts","ch6","6.1.5 Replacement Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"6.1.6 Power of the Beneficiaries","cards":[{"id":"TR_0099","type":"A","question":"What three conditions let beneficiaries direct the retirement and appointment of trustees under the statutory power?","answer":"(1) No person is nominated with power to appoint; (2) the beneficiaries are all of full age/capacity and together absolutely entitled to the trust property; and (3) they act unanimously.","tags":["trusts","ch6","6.1.6 Power of the Beneficiaries"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0100","type":"E","question":"If a remainder beneficiary's interest is contingent on surviving another beneficiary, can the beneficiaries direct trustee changes under the statutory power?","answer":"No — a contingent interest means the beneficiaries are not together absolutely entitled, so the power does not apply, even if every currently living beneficiary agrees.","tags":["trusts","ch6","6.1.6 Power of the Beneficiaries"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"6.1.7 Power of the Court","cards":[{"id":"TR_0101","type":"A","question":"On what basis can the court appoint or remove trustees under its general power?","answer":"Whenever expedient, and it is inexpedient, difficult or impracticable to do so without the court's assistance — no breach of trust need be shown for the court to exercise this power.","tags":["trusts","ch6","6.1.7 Power of the Court"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"6.2 Retirement","cards":[{"id":"TR_0102","type":"A","question":"What two conditions must be met for a trustee to retire without being replaced?","answer":"Consent by deed of all co-trustees (and any named appointor), and at least two trustees or a trust corporation remaining in office afterwards.","tags":["trusts","ch6","6.2 Retirement"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"6.3 Removal","cards":[{"id":"TR_0103","type":"C","question":"On what grounds, and by whom, can a trustee be removed?","answer":"On the same grounds as justify appointing a replacement (death, refusal to act, continuous absence exceeding 12 months, unfitness, incapacity, or desire to be discharged), removal can be effected by beneficiaries acting under the unanimous/absolute-entitlement conditions, or by the court under its general expediency-based power.","tags":["trusts","ch6","6.3 Removal"],"source":"Trusts_SQE_Notes.pdf","note":""}]}]},{"id":"ch7","title":"7 . Trustees' Duties and Powers","subchapters":[{"title":"7.1 Fiduciary Obligations of Trustees","cards":[{"id":"TR_0104","type":"A","question":"What is the core fiduciary obligation that underpins all of a trustee's duties?","answer":"To act with utmost good faith and undivided loyalty, avoiding any conflict between personal interest and the beneficiaries' interests — not just acting in the beneficiaries' interests, but avoiding any possibility that the trustee's personal interests might conflict with those of the beneficiaries.","tags":["trusts","ch7","7.1 Fiduciary Obligations of Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"7.1.1 Duty Not to Profit from Trusteeship","cards":[{"id":"TR_0105","type":"B","question":"When does a trustee hold director's fees on constructive trust, and what is the exception?","answer":"Where the trustee was appointed or elected as a paid director by virtue of votes attached to trust-owned shares, the trustee holds the fees on constructive trust for the beneficiaries. The exception is where the trustee would have been appointed director regardless of the trust's votes — there, the trustee keeps the fees.","tags":["trusts","ch7","7.1.1 Duty Not to Profit from Trusteeship"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0106","type":"B","question":"A trustee personally profits from information or an opportunity gained through trusteeship, having acted entirely in the trust's interests. Must the profit be accounted for?","answer":"Yes — a trustee who personally profits from information or an opportunity gained through trusteeship holds that profit on constructive trust, even if there was no obvious conflict and the trustee acted in the trust's interests throughout. Courts have sometimes awarded the trustee generous remuneration for their skill and effort, but the underlying profit itself must still be accounted for.","tags":["trusts","ch7","7.1.1 Duty Not to Profit from Trusteeship"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0107","type":"A","question":"What is the default rule on trustee remuneration, and name the exceptions.","answer":"The default rule is that a trustee cannot charge for acting as trustee (though out-of-pocket expenses are always recoverable). Exceptions: a charging clause in the trust instrument; a professional trustee (not a trust corporation) charging reasonable remuneration under the Trustee Act 2000 if not sole trustee, co-trustees consent in writing, and the trust instrument contains no provision on the point; a trust corporation, which may charge even acting as sole trustee; consent of beneficiaries who are all of full age/capacity; or court authorisation where the trust is exceptionally onerous or the trustee performed exceptional services.","tags":["trusts","ch7","7.1.1 Duty Not to Profit from Trusteeship"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"7.1.2 No Self-Dealing — Duty Not to Purchase Trust Property","cards":[{"id":"TR_0108","type":"D","question":"Is a self-dealing purchase by a trustee of trust property void or voidable, and is a fair price a defence?","answer":"Voidable, not void — and no, a fair price (even at full market value) is irrelevant; the prohibition on self-dealing is automatic regardless of the trustee's good faith or whether the trust actually benefited. The beneficiaries can require the trustee to hand the property back and take only the price originally paid, without interest.","tags":["trusts","ch7","7.1.2 No Self-Dealing — Duty Not to Purchase Trust Property"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0109","type":"A","question":"What three things must a trustee show to validly purchase a beneficiary's equitable interest under the fair-dealing rule?","answer":"A fair price was paid; full disclosure of all material facts was made to the beneficiary; and the trustee did not abuse their position. Unlike self-dealing with trust property itself, there is no blanket bar on a trustee buying a beneficiary's beneficial interest.","tags":["trusts","ch7","7.1.2 No Self-Dealing — Duty Not to Purchase Trust Property"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"7.2 Further Duties of Trustees","cards":[{"id":"TR_0110","type":"C","question":"Name three further duties trustees owe besides the fiduciary duty not to profit.","answer":"Any three of: the equitable duty to get in trust property (and segregate it from personal assets); the duty to observe the terms of the trust; the duty to act jointly (unanimously, unless the trust deed allows majority decisions); the duty to act personally (no general delegation, subject to limited statutory exceptions); the duty to take possession of trust property; the duty to keep accounts and disclose information; the duty to act impartially between successive beneficiaries; and the duty of confidentiality.","tags":["trusts","ch7","7.2 Further Duties of Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0111","type":"D","question":"Why does the duty to act impartially between a life tenant and a remainderman cut both ways?","answer":"Failing to invest for income breaches the duty to the life tenant, while investing only for income at the expense of capital growth or preservation breaches the duty to the remainderman. A correct answer addresses both sides — impartiality is not just about avoiding favouritism in one direction.","tags":["trusts","ch7","7.2 Further Duties of Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"7.2.1 Delegation — the Statutory Exceptions","cards":[{"id":"TR_0112","type":"C","question":"What functions can trustees delegate under the statutory exceptions, and what is the limit on delegation by power of attorney?","answer":"Trustees acting together may delegate purely administrative functions (e.g. tax returns, accounts, legal documents) to an agent, but cannot delegate the exercise of discretions. Investment decisions may be delegated to an asset manager subject to detailed conditions. An individual trustee may delegate all functions to another individual or trust corporation by power of attorney for a fixed term not exceeding 12 months, but the delegating trustee remains liable for the attorney's acts/omissions as if they had acted personally.","tags":["trusts","ch7","7.2.1 Delegation — the Statutory Exceptions"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"7.2.2 Duty of Care","cards":[{"id":"TR_0113","type":"A","question":"What statutory standard of care applies to a trustee's investment decisions and appointment of agents?","answer":"Such care and skill as is reasonable in the circumstances, taking into account any special knowledge the trustee has or claims to have — with professional trustees held to a higher standard, reflecting the knowledge/experience expected of their profession. Elsewhere (e.g. exercising maintenance/advancement powers), the general 'prudence of an ordinary man of business' case-law standard applies instead.","tags":["trusts","ch7","7.2.2 Duty of Care"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"7.3 Duty to Invest","cards":[{"id":"TR_0114","type":"A","question":"Name the two standard investment criteria trustees must consider.","answer":"The suitability of the type of investment and the specific investment to the trust, and the need for diversification so far as appropriate to the trust's circumstances.","tags":["trusts","ch7","7.3 Duty to Invest"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0115","type":"A","question":"Is land outside the UK an authorised investment by default?","answer":"No — only UK freehold or leasehold land is authorised under the statutory power unless the trust instrument extends this. Trustees may buy freehold or leasehold land in the UK for occupation by a beneficiary or any other reason.","tags":["trusts","ch7","7.3 Duty to Invest"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0116","type":"A","question":"What is 'proper advice' in the context of the duty to invest, and when is it not required?","answer":"Proper advice is advice from a person the trustees reasonably and genuinely believe is qualified by ability and practical experience — a mixed subjective/objective test; the adviser need not be a regulated financial adviser. It is not required where the trustees reasonably conclude it is unnecessary or inappropriate in the circumstances (e.g. a small, short-term cash deposit).","tags":["trusts","ch7","7.3 Duty to Invest"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0117","type":"D","question":"Does poor investment performance alone make trustees liable to beneficiaries?","answer":"No — provided trustees comply with the proper investment process (authorised investments, standard criteria, advice, review), they are not liable merely because investments fall in value or fail to beat inflation. The duty is one of process, not of guaranteeing outcomes.","tags":["trusts","ch7","7.3 Duty to Invest"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0118","type":"B","question":"Can ethical or moral criteria be applied when investing trust funds?","answer":"The fund should ordinarily be invested for the best financial return, but ethical or moral criteria may be applied if the trust instrument expressly permits it, or the beneficiaries consent — for example, an environmental charity declining oil and gas investments.","tags":["trusts","ch7","7.3 Duty to Invest"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"7.4.1 Power of Maintenance (Income)","cards":[{"id":"TR_0119","type":"D","question":"What is the key precondition before the power of maintenance can apply to a beneficiary, and what trap does this create?","answer":"The beneficiary must have an interest in the trust income — a remainderman with no current income interest (e.g. behind a life tenant) cannot benefit from the power of maintenance at all, even though they have a future interest in the trust property generally.","tags":["trusts","ch7","7.4.1 Power of Maintenance (Income)"],"source":"Trusts_SQE_Notes.pdf","note":"related cross-subject content: WIL_0084 (wills_estates) covers the full s.31 Trustee Act 1925 maintenance rule in a PR-administration context; this card tests a narrower precondition/trap angle specific to the trusts framing — not a duplicate, retained as a distinct testable angle."},{"id":"TR_0120","type":"E","question":"Can income under the power of maintenance be paid directly to a 12-year-old beneficiary?","answer":"No — a minor cannot give a valid receipt, so income must go to a parent or guardian, or be applied directly for the beneficiary's benefit, rather than being paid to the minor directly.","tags":["trusts","ch7","7.4.1 Power of Maintenance (Income)"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0121","type":"D","question":"What happens to income accumulated during minority where the beneficiary has only a contingent interest in capital, once they turn 18?","answer":"It is added to capital (not paid out) when the beneficiary turns 18, and is lost with the rest of capital if the contingent interest later fails. This contrasts with a beneficiary holding a vested interest in income, who becomes entitled to all income (including past accumulations) from age 18.","tags":["trusts","ch7","7.4.1 Power of Maintenance (Income)"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"7.4.2 Power of Advancement (Capital)","cards":[{"id":"TR_0122","type":"D","question":"What is the precondition for the power of advancement to apply, as distinct from the power of maintenance?","answer":"The beneficiary must have an interest in capital (vested or contingent) — not merely income. A life tenant with only an income interest cannot receive an advancement of capital at all; only a remainderman with a capital interest qualifies. This must not be confused with the power of maintenance, which turns on an interest in income.","tags":["trusts","ch7","7.4.2 Power of Advancement (Capital)"],"source":"Trusts_SQE_Notes.pdf","note":"related cross-subject content: WIL_0085 (wills_estates) covers the full s.32 Trustee Act 1925 advancement rule in a PR-administration context; this card tests a narrower precondition/trap angle specific to the trusts framing — not a duplicate, retained as a distinct testable angle."},{"id":"TR_0123","type":"A","question":"Name the three provisos on the power of advancement.","answer":"(1) The amount advanced cannot exceed the beneficiary's whole vested or presumptive share; (2) advances must be brought into account on final distribution of the fund; and (3) if the advance would prejudice a beneficiary with a prior interest (typically a life tenant whose income would be reduced), that prior-interest holder must be of full age/capacity and give written consent.","tags":["trusts","ch7","7.4.2 Power of Advancement (Capital)"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0124","type":"B","question":"A £300,000 fund is held for whichever of three children reaches 25. Does advancing capital to one child require the consent of the others?","answer":"No — advancing to one child does not require the others' consent, because their interests are not 'prior' interests; they merely stand to gain if that child's interest fails, which is not the same as having a current prior interest in the fund being advanced. Consent is only required from beneficiaries with a genuinely prior interest that would be prejudiced.","tags":["trusts","ch7","7.4.2 Power of Advancement (Capital)"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"7.5 Control of Trustees by Beneficiaries","cards":[{"id":"TR_0125","type":"B","question":"Can beneficiaries challenge how trustees exercised a genuine discretion?","answer":"Only if the exercise was irrational or capricious — beneficiaries otherwise have no right to demand reasons or substitute their own view, provided the trustees acted within their powers.","tags":["trusts","ch7","7.5 Control of Trustees by Beneficiaries"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0126","type":"A","question":"What trust documents are beneficiaries entitled to inspect, and what is excluded?","answer":"The trust instrument, accounts and meeting minutes — excluding material revealing the trustees' deliberations on how to exercise a discretion.","tags":["trusts","ch7","7.5 Control of Trustees by Beneficiaries"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0127","type":"A","question":"What two special powers do beneficiaries have if they are together absolutely entitled to the whole equitable interest?","answer":"The power to direct retirement/appointment of trustees, and the power to collapse the trust and demand distribution under Saunders v Vautier.","tags":["trusts","ch7","7.5 Control of Trustees by Beneficiaries"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0128","type":"D","question":"Does a 'legitimate expectation' give a beneficiary an enforceable right to continued discretionary payments?","answer":"Not an enforceable right as such, but trustees departing from an established pattern of payments (e.g. paying the same sum every year for a decade) should give the beneficiary advance warning before changing course.","tags":["trusts","ch7","7.5 Control of Trustees by Beneficiaries"],"source":"Trusts_SQE_Notes.pdf","note":""}]}]},{"id":"ch8","title":"8 . Liability for Breach of Trust","subchapters":[{"title":"8.1 Was There a Breach of Duty?","cards":[{"id":"TR_0129","type":"A","question":"What is the first question to ask in identifying a breach of trust?","answer":"Was the act one the trustee was authorised to perform by the trust instrument or by law? If not, there is a breach regardless of the trustee's good faith, skill or diligence in carrying it out. If the act was authorised, the second question is whether the trustee met the relevant standard of care.","tags":["trusts","ch8","8.1 Was There a Breach of Duty?"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0130","type":"D","question":"Is good faith a defence to an unauthorised act by a trustee?","answer":"No — a trustee who acts outside their powers, however honestly and skilfully, is automatically in breach. Good faith only becomes relevant to the separate question of relief from liability, not to whether a breach occurred.","tags":["trusts","ch8","8.1 Was There a Breach of Duty?"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.2.1 Liability for Loss","cards":[{"id":"TR_0131","type":"A","question":"Who bears the burden of proving loss caused by a breach of trust?","answer":"The beneficiaries — if they cannot prove the loss resulted from the breach, the trustees escape liability. Beneficiaries have a personal claim against trustees for losses caused by breach, with interest running from the date of breach.","tags":["trusts","ch8","8.2.1 Liability for Loss"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0132","type":"B","question":"Lay trustees leave a £100,000 trust fund in a non-interest-bearing account for years rather than investing it, causing a £10,000 real-terms loss. Are they liable?","answer":"Yes, they are liable for the £10,000 shortfall — failing to invest at all is a breach regardless of their inexperience. Compare: if the trustees show that, having taken proper advice, a prudent trustee would have made the same investment choices and the loss was caused by a genuine market downturn, they escape liability because the loss was not caused by their breach.","tags":["trusts","ch8","8.2.1 Liability for Loss"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.2.2 Multiple Breaches — Losses Cannot Generally Be Offset","cards":[{"id":"TR_0133","type":"E","question":"Can a trustee offset a loss from one breach against a gain from a separate, unrelated breach?","answer":"Generally no — except where the breaches form part of a single linked investment scheme, in which case the resulting losses and gains can be offset against each other. Otherwise, beneficiaries can keep the gain from one breach and still sue for the loss on another.","tags":["trusts","ch8","8.2.2 Multiple Breaches — Losses Cannot Generally Be Offset"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.2.3 Which Trustee Is Liable?","cards":[{"id":"TR_0134","type":"D","question":"Is a trustee vicariously liable for a co-trustee's breach?","answer":"No — but a co-trustee may be separately liable for their own breach, e.g. failing to supervise a co-trustee or allowing trust property to fall outside joint control. A trustee who allows a co-trustee unsupervised sole access to the trust bank account can be liable on this separate basis even without personally stealing anything.","tags":["trusts","ch8","8.2.3 Which Trustee Is Liable?"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.2.4 Liability Is Joint and Several","cards":[{"id":"TR_0135","type":"A","question":"How is liability apportioned where multiple trustees are in breach?","answer":"Joint and several — beneficiaries may sue any one trustee for the whole loss, who may then seek contribution from co-trustees.","tags":["trusts","ch8","8.2.4 Liability Is Joint and Several"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.2.5 Defences","cards":[{"id":"TR_0136","type":"A","question":"What is the general limitation period for an action against a trustee, and what are the two key exceptions?","answer":"Six years. Exceptions: no limitation period applies where the trustee was party to fraud, or in a claim to recover trust property/proceeds still in a trustee's hands; also, time does not run against a remainderman until their interest falls into possession — so a breach many years ago can still be challenged by a remainderman whose interest only recently vested.","tags":["trusts","ch8","8.2.5 Defences"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0137","type":"D","question":"Can a beneficiary who consented to a breaching act with full knowledge of the material facts later sue on that breach?","answer":"No — a beneficiary of full age/capacity who consented to the breaching act with full knowledge of the material facts cannot later sue on that breach. If only some beneficiaries consented, trustees remain liable to those who did not.","tags":["trusts","ch8","8.2.5 Defences"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0138","type":"E","question":"Can an exclusion clause validly exclude liability for a fraudulent breach of trust?","answer":"No — such a clause is void; exclusion clauses can validly cover ordinary and even gross negligence, but not fraud, because fraud cannot be contracted out of.","tags":["trusts","ch8","8.2.5 Defences"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0139","type":"E","question":"When will the court grant discretionary relief from liability to a trustee in breach?","answer":"Where the trustee acted honestly and reasonably and ought fairly to be excused — rarely granted, and unavailable where the trustee failed to meet the required standard of care.","tags":["trusts","ch8","8.2.5 Defences"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.2.6 Measure of Liability","cards":[{"id":"TR_0140","type":"A","question":"What is the measure of a trustee's liability for breach, and what are the two available remedies?","answer":"A trustee in breach must either account (pay money into the trust to restore its value) or pay equitable compensation (a direct payment to the beneficiary) — the two are largely interchangeable in effect, both aiming to make good the loss sustained.","tags":["trusts","ch8","8.2.6 Measure of Liability"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.2.7 Liability Among Trustees","cards":[{"id":"TR_0141","type":"C","question":"What two grounds let a trustee claim a full indemnity (not just contribution) from a co-trustee?","answer":"(1) The co-trustee was solely guilty of fraud (or was the trust's solicitor and advised the breach); or (2) the co-trustee is a professional trustee while the claiming trustee is a lay trustee who did not also cause the breach.","tags":["trusts","ch8","8.2.7 Liability Among Trustees"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.2.8 Tracing","cards":[{"id":"TR_0142","type":"A","question":"What is a 'charge' in the tracing context?","answer":"A proprietary security interest over an asset bought with trust money, letting beneficiaries force its sale and take proceeds up to their loss, ahead of the trustee's other creditors.","tags":["trusts","ch8","8.2.8 Tracing"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0143","type":"B","question":"If trust money alone is used to buy an asset that has fallen in value, what is the beneficiaries' best option?","answer":"Claim a charge over the asset for the full amount taken, and sue personally (as an unsecured creditor) for any shortfall. By contrast, if the asset has risen in value, the beneficiaries can instead claim the asset itself and keep the increase.","tags":["trusts","ch8","8.2.8 Tracing"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0144","type":"C","question":"Where trust money is mixed with the trustee's own money to buy an asset, what can the beneficiaries claim?","answer":"A proportionate share of the asset, or a charge over it for the amount of trust money used — whichever is more advantageous to the beneficiaries.","tags":["trusts","ch8","8.2.8 Tracing"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0145","type":"A","question":"What is the 'lowest intermediate balance' rule?","answer":"The beneficiaries' proprietary claim against a mixed bank account is capped at the lowest balance the account fell to between the last withdrawal and the next deposit — if that balance is zero, the proprietary claim is lost entirely and beneficiaries are left with a personal claim only (the trustee's own later deposits are not treated as replacing the dissipated trust money, absent clear intent to repay).","tags":["trusts","ch8","8.2.8 Tracing"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0146","type":"D","question":"What is the default tracing rule for two trusts' funds mixed in a current account, and when is it displaced?","answer":"'First in, first out' (FIFO) — the earliest money in is treated as the first money spent. This is displaced for a proportionate solution where FIFO conflicts with the parties' intentions, is impractical, or causes injustice. For a savings account, the proportionate solution applies as the default from the outset.","tags":["trusts","ch8","8.2.8 Tracing"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.3 Liability of Third Parties","cards":[{"id":"TR_0147","type":"C","question":"Compare the personal and proprietary liability of a bona fide purchaser for value without notice, an innocent volunteer, a knowing recipient, and a dishonest accessory.","answer":"A bona fide purchaser for value without notice faces no personal or proprietary claim — they take entirely free of the beneficiaries' equitable interest. An innocent volunteer faces no personal claim (their conscience is unaffected) but does face a proprietary claim via equitable tracing. A knowing recipient faces both a personal claim (treated as a constructive trustee) and a proprietary claim (trustee tracing rules apply). A dishonest accessory faces a personal claim (treated as a constructive trustee) but generally no proprietary claim, since they typically hold no trust property.","tags":["trusts","ch8","8.3 Liability of Third Parties"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.3.1 Bona Fide Purchaser","cards":[{"id":"TR_0148","type":"D","question":"Does a bona fide purchaser for value without notice face any liability to the beneficiaries?","answer":"No — they take the property entirely free of the beneficiaries' equitable interest, cutting off the beneficiaries' rights altogether.","tags":["trusts","ch8","8.3.1 Bona Fide Purchaser"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.3.2 Innocent Volunteer","cards":[{"id":"TR_0149","type":"D","question":"Can beneficiaries bring a personal claim against an innocent volunteer recipient of trust property?","answer":"No — only a proprietary claim via equitable tracing, because the innocent volunteer's conscience is unaffected. Because of this, there is no charge option for a mixed-fund purchase against an innocent volunteer; any loss in value is shared proportionately between the trust and the innocent recipient, unlike the position against a trustee.","tags":["trusts","ch8","8.3.2 Innocent Volunteer"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.3.3 Knowing Recipient","cards":[{"id":"TR_0150","type":"C","question":"What four types of knowledge make it 'unconscionable' for a recipient to retain trust property as a knowing recipient?","answer":"Actual knowledge; wilfully closing one's eyes to the obvious; wilfully and recklessly failing to make inquiries an honest, reasonable person would make; or knowledge of circumstances that would put an honest, reasonable person on notice.","tags":["trusts","ch8","8.3.3 Knowing Recipient"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0151","type":"B","question":"A friend receives £10,000 of trust money from a trustee as a 'gift', is surprised by the windfall and suspects the trustee is not personally wealthy, but deliberately avoids asking where the money came from. Is the friend a knowing recipient?","answer":"Yes — this is wilful blindness; the friend is a knowing recipient, personally liable to restore the loss and subject to ordinary trustee tracing rules, which (unlike the innocent-volunteer rules) give the beneficiaries the benefit of a charge over a mixed asset, or treat the recipient as spending their own money first from a mixed account.","tags":["trusts","ch8","8.3.3 Knowing Recipient"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"8.3.4 Dishonest Accessory","cards":[{"id":"TR_0152","type":"A","question":"What does 'conscious impropriety' mean in the dishonest accessory test, and must the accessory know a trust is involved?","answer":"Conscious impropriety means not acting as an honest person would in the circumstances. No, the accessory need only know the scheme they facilitated was improper in some way, not specifically that a breach of trust was occurring.","tags":["trusts","ch8","8.3.4 Dishonest Accessory"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0153","type":"D","question":"Why is a proprietary claim generally irrelevant against a dishonest accessory?","answer":"Because facilitating a breach typically does not involve the accessory personally receiving trust property, so there is nothing to trace into their hands — the remedy against a dishonest accessory is a personal claim only.","tags":["trusts","ch8","8.3.4 Dishonest Accessory"],"source":"Trusts_SQE_Notes.pdf","note":""}]}]},{"id":"ch9","title":"9 . Nature of Equitable Remedies","subchapters":[{"title":"9.1 Equitable Remedies Are a Discretionary Supplement to the Common Law","cards":[{"id":"TR_0154","type":"A","question":"Are equitable remedies available as of right once a breach is proved?","answer":"No — equitable remedies are always discretionary, unlike common law damages, which a claimant is entitled to as of right once liability is proved. The court decides in each case whether to grant an equitable remedy, applying the governing principles in the chapter.","tags":["trusts","ch9","9.1 Equitable Remedies Are a Discretionary Suppl

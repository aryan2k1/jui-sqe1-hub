function syncDocRef(){
  var code = getSyncCode();
  if (!code || !fbDb) return null;
  return fbDb.collection("syncs").doc(code.trim().toLowerCase());
}
// Per-card merge: whichever side reviewed that specific card more recently wins.
// This means progress made on two devices since the last sync is never lost,
// even for different cards.
function mergeProgress(local, remote){
  var merged = {};
  var ids = {};
  Object.keys(local || {}).forEach(function(k){ ids[k] = 1; });
  Object.keys(remote || {}).forEach(function(k){ ids[k] = 1; });
  Object.keys(ids).forEach(function(id){
    var l = local && local[id];
    var r = remote && remote[id];
    if (l && r) merged[id] = (r.last || 0) > (l.last || 0) ? r : l;
    else merged[id] = l || r;
  });
  return merged;
}
// Custom cards are unioned by id — each id is generated once (Date.now() +
// random suffix) on whichever device created it, so a plain union never
// drops a card from either side.
function mergeCustomCards(local, remote){
  var byId = {};
  (local || []).forEach(function(c){ byId[c.id] = c; });
  (remote || []).forEach(function(c){ if (!byId[c.id]) byId[c.id] = c; });
  return Object.keys(byId).map(function(id){ return byId[id]; });
}
// Custom edits merge last-write-wins per card id, using the "t" timestamp
// stamped on each edit when it's saved.
function mergeCustomEdits(local, remote){
  var merged = {};
  var ids = {};
  Object.keys(local || {}).forEach(function(k){ ids[k] = 1; });
  Object.keys(remote || {}).forEach(function(k){ ids[k] = 1; });
  Object.keys(ids).forEach(function(id){
    var l = local && local[id];
    var r = remote && remote[id];
    if (l && r) merged[id] = (r.t || 0) > (l.t || 0) ? r : l;
    else merged[id] = l || r;
  });
  return merged;
}
function pullAndMerge(cb){
  var ref = syncDocRef();
  if (!ref){ if (cb) cb(); return; }
  setSyncStatus("☁ syncing…");
  ref.get().then(function(snap){
    if (snap.exists){
      var remote = snap.data() || {};
      var mergedProgress = mergeProgress(loadProgress(), remote.progress || {});
      saveProgress(mergedProgress);
      var mergedCards = mergeCustomCards(loadCustomCards(), remote.customCards || []);
      saveCustomCards(mergedCards);
      var mergedEdits = mergeCustomEdits(loadCustomEdits(), remote.customEdits || {});
      saveCustomEdits(mergedEdits);
      applyCustomCards();
      applyCustomEdits();
      buildAllCards();
      updateDueCount();
      updateTodayRatingCounts();
      renderPills();
    }
    setSyncStatus("☁ synced just now");
    if (cb) cb();
  }).catch(function(err){
    console.warn("Sync pull failed:", err);
    setSyncStatus("☁ offline");
    if (cb) cb();
  });
}
function pushProgress(){
  var ref = syncDocRef();
  if (!ref || !fbReady) return;
  ref.set({ progress: loadProgress(), customCards: loadCustomCards(), customEdits: loadCustomEdits(), updatedAt: Date.now() }, { merge: true })
    .then(function(){ setSyncStatus("☁ synced just now"); })
    .catch(function(err){
      console.warn("Sync push failed:", err);
      setSyncStatus("☁ offline");
    });
}
function scheduleSyncPush(){
  if (!getSyncCode()) return;
  clearTimeout(syncPushTimer);
  setSyncStatus("☁ syncing…");
  syncPushTimer = setTimeout(pushProgress, SYNC_DEBOUNCE_MS);
}
function initFirebaseSync(){
  if (typeof firebase === "undefined") return;
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDb = firebase.firestore();
    firebase.auth().signInAnonymously().then(function(){
      fbReady = true;
      if (getSyncCode()) pullAndMerge();
    }).catch(function(err){ console.warn("Firebase auth failed:", err); });
  } catch(e){
    console.warn("Firebase init failed:", e);
  }
}
function loadFirebaseSdk(){
  var base = "https://www.gstatic.com/firebasejs/10.12.2/";
  var scripts = ["firebase-app-compat.js", "firebase-auth-compat.js", "firebase-firestore-compat.js"];
  function loadNext(i){
    if (i >= scripts.length){ initFirebaseSync(); return; }
    var s = document.createElement("script");
    s.src = base + scripts[i];
    s.onload = function(){ loadNext(i + 1); };
    s.onerror = function(){ console.warn("Firebase SDK failed to load (offline?)"); setSyncStatus(getSyncCode() ? "☁ offline" : ""); };
    document.head.appendChild(s);
  }
  loadNext(0);
}
function promptSyncCode(){
  var existing = getSyncCode();
  var msg = existing
    ? "Synced with code: " + existing + "\n\nEnter a new code to switch devices, or press Cancel to keep this one and sync now."
    : "Enter a sync code to link this device with your others (any word, e.g. JUI2026). Use the exact same code on every device — including the desktop version — to share progress and custom cards.";
  var code = prompt(msg, existing || "");
  if (code === null){
    if (existing) pullAndMerge(function(){ pushProgress(); });
    return;
  }
  code = code.trim();
  if (!code) return;
  setSyncCode(code);
  if (!fbReady){ alert("Still connecting — try Sync again in a moment."); return; }
  pullAndMerge(function(){
    pushProgress();
    alert("Synced! Use the code \"" + code + "\" on your other device's Sync button too.");
  });
}

// ---------------------------------------------------------------------------
// Spaced repetition (SM-2 derived, Anki-style 4 grades).
// quality: 0=Again (fail), 2=Hard, 4=Good, 5=Easy.
// Again is the ONLY grade that resets reps to 0 / relearns from scratch.
// Hard/Good/Easy all advance reps but grow the interval by different
// multipliers (Hard slowest, Easy fastest) and nudge "ease" differently, so
// the four buttons are genuinely distinct rather than Hard silently behaving
// like Again.
// ---------------------------------------------------------------------------
function sm2(prev, quality){
  prev = prev || { interval:0, reps:0, ease:2.5, hist:[] };
  var ease = prev.ease || 2.5;
  var reps = prev.reps || 0;
  var interval = prev.interval || 0;

  if (quality === 0){
    reps = 0;
    interval = 1;
    ease = ease - 0.20;
  } else {
    var prevInterval = interval;
    reps += 1;
    if (reps === 1){
      interval = (quality === 5) ? 2 : 1;
    } else if (reps === 2){
      interval = (quality === 2) ? 4 : (quality === 5) ? 8 : 6;
    } else {
      var mult = (quality === 2) ? 0.8 : (quality === 5) ? 1.3 : 1.0;
      interval = Math.round(interval * ease * mult);
      if (quality === 2) interval = Math.max(interval, prevInterval + 1);
    }
    if (quality === 2) ease = ease - 0.15;
    else if (quality === 5) ease = ease + 0.15;
    else ease = ease + 0.02;
  }

  if (ease < 1.3) ease = 1.3;
  interval = Math.max(interval, 1);

  var hist = (prev.hist || []).slice();
  hist.push({ q: quality, t: Date.now() });
  return {
    interval: interval,
    reps: reps,
    ease: ease,
    next: Date.now() + interval * 86400000,
    last: Date.now(),
    hist: hist
  };
}
function isDue(progress, cardId){
  return !progress[cardId] || progress[cardId].next <= Date.now();
}
function fmtInterval(days){
  if (days < 1) return "<1d";
  if (days < 30) return Math.round(days) + "d";
  if (days < 365) return Math.round(days/30) + "mo";
  return Math.round(days/365) + "yr";
}
function nextIntervals(prev){
  return {
    0: fmtInterval(sm2(prev, 0).interval),
    2: fmtInterval(sm2(prev, 2).interval),
    4: fmtInterval(sm2(prev, 4).interval),
    5: fmtInterval(sm2(prev, 5).interval)
  };
}

function testAllChapters(subjectId){
  var subj = DECK.subjects.filter(function(s){ return s.id === subjectId; })[0];
  var cards = ALL_CARDS.filter(function(c){ return c.sId === subjectId; });
  startSession(cards, subj ? subj.color : "#E8A0B4");
}

function testAllSubchapters(subjectId, chapterId){
  var subj = DECK.subjects.filter(function(s){ return s.id === subjectId; })[0];
  var cards = ALL_CARDS.filter(function(c){ return c.sId === subjectId && c.chId === chapterId; });
  startSession(cards, subj ? subj.color : "#E8A0B4");
}

function clearCards(){
  SESS.cards = [];
  document.getElementById("card-area").classList.add("hidden");
  document.getElementById("welcome").classList.remove("hidden");
}

function showCard(){
  if (SESS.cards.length === 0){ clearCards(); return; }
  var card = SESS.cards[SESS.idx];
  SESS.flipped = false;

  var el = document.getElementById("card");
  el.style.transition = "none";
  el.classList.remove("flipped");
  void el.offsetHeight;
  el.style.transition = "";
  document.getElementById("rrow").classList.add("hidden");

  document.getElementById("cf").style.borderLeftColor = card.sColor;
  document.getElementById("cb").style.borderLeftColor = card.sColor;
  var cfType = document.querySelector("#cf .card-type");
  var cbType = document.querySelector("#cb .card-type");
  cfType.textContent = TYPE_LABELS[card.type] || card.type;
  cbType.textContent = TYPE_LABELS[card.type] || card.type;
  document.getElementById("cq").textContent = card.question;
  document.getElementById("ca").textContent = card.answer;

  var tagsEl = document.getElementById("ctags");
  tagsEl.innerHTML = "";
  (card.tags || []).forEach(function(tag){
    var span = document.createElement("span");
    span.className = "tag";
    span.textContent = tag;
    tagsEl.appendChild(span);
  });

  var prevProg = loadProgress()[card.id];
  var previews = nextIntervals(prevProg);
  document.querySelector(".ra .ri").textContent = previews[0];
  document.querySelector(".rh .ri").textContent = previews[2];
  document.querySelector(".rg .ri").textContent = previews[4];
  document.querySelector(".re .ri").textContent = previews[5];

  document.getElementById("card-pos").textContent = "Card " + (SESS.idx+1) + " of " + SESS.cards.length;
  document.getElementById("prev-btn").disabled = (SESS.idx === 0);
  document.getElementById("next-btn").disabled = (SESS.idx === SESS.cards.length - 1);

  document.getElementById("card-area").classList.remove("hidden");
  document.getElementById("welcome").classList.add("hidden");
}

function flipCard(){
  SESS.flipped = !SESS.flipped;
  document.getElementById("card").classList.toggle("flipped", SESS.flipped);
  var rrow = document.getElementById("rrow");
  if (SESS.flipped) rrow.classList.remove("hidden");
  else rrow.classList.add("hidden");
}
function prevCard(){
  if (SESS.idx > 0){ SESS.idx--; showCard(); }
}
function nextCard(){
  if (SESS.idx < SESS.cards.length - 1){ SESS.idx++; showCard(); }
}
function rate(quality){
  if (!SESS.flipped) return;
  var card = SESS.cards[SESS.idx];
  var p = loadProgress();
  p[card.id] = sm2(p[card.id], quality);
  saveProgress(p);
  scheduleSyncPush();
  var n = loadTodayCount() + 1;
  saveTodayCount(n);
  document.getElementById("count-num").textContent = n;
  updateDueCount();
  updateTodayRatingCounts();
  if (n % 50 === 0) showCongrats(n);

  if (SESS.idx < SESS.cards.length - 1){
    SESS.idx++;
    showCard();
  } else {
    var pos = document.getElementById("card-pos");
    var orig = pos.textContent;
    pos.textContent = "✓ All rated!";
    setTimeout(function(){ pos.textContent = orig; }, 2000);
  }
}

// ---------------------------------------------------------------------------
// Milestone congrats — based on TODAY's count only (resets daily).
// ---------------------------------------------------------------------------
var CONGRATS_MSGS = [
  "Yippie! {n} cards today — look at you go! \u{1F389}",
  "{n} down today. You're absolutely smashing it, Jui! \u{1F338}",
  "Whoa, {n} cards! Take a breath — you've earned it. \u{1F495}",
  "{n} cards today?! The SQE doesn't stand a chance. \u{1F33A}",
  "Yippie yippie! {n} cards reviewed today. So proud of you. \u{1F337}"
];
var _congratsTimer = null;
function showCongrats(n){
  var el = document.getElementById("congrats-toast");
  if (!el) return;
  var msg = CONGRATS_MSGS[Math.floor(Math.random() * CONGRATS_MSGS.length)].replace("{n}", n);
  el.textContent = msg;
  el.classList.add("show");
  if (_congratsTimer) clearTimeout(_congratsTimer);
  _congratsTimer = setTimeout(function(){ el.classList.remove("show"); }, 3200);
}

function setText(id, val){ var el = document.getElementById(id); if (el) el.textContent = val; }

function updateDueCount(){
  var progress = loadProgress();
  var now = Date.now();
  var newCount = 0, reviewCount = 0;
  ALL_CARDS.forEach(function(c){
    var p = progress[c.id];
    if (!p) newCount++;
    else if (p.next <= now) reviewCount++;
  });
  setText("due-count-new", newCount);
  setText("due-count-review", reviewCount);
  setText("due-count-side-new", newCount);
  setText("due-count-side-review", reviewCount);
  setText("study-all-count", ALL_CARDS.length);
  setText("weak-due-count", weakDueCards().length);
}

// "Weak Cards Due" = cards whose MOST RECENT rating (ever, not just today)
// was Hard or Good, restricted to ones currently due per the SM-2 schedule.
// Deliberately NOT date-scoped to "yesterday" — an all-time view of "cards
// she's found tricky that are coming back up for review." Again-rated cards
// are excluded (already one tap away via "Again today" and resurface almost
// immediately), and Easy-rated cards are excluded (already mastered).
function weakDueCards(){
  var progress = loadProgress();
  var now = Date.now();
  return ALL_CARDS.filter(function(c){
    var p = progress[c.id];
    if (!p || !p.hist || !p.hist.length) return false;
    var lastQ = p.hist[p.hist.length - 1].q;
    return (lastQ === 2 || lastQ === 4) && p.next <= now;
  });
}
function startWeakDue(){
  var cards = weakDueCards();
  if (!cards.length){
    alert("No Hard/Good cards are due for review right now — nice work staying on top of them!");
    return;
  }
  NAV.level = 0; NAV.sId = null; NAV.chId = null; NAV.scId = null;
  renderPills();
  closeSidebar();
  startSession(cards, "#E8A430");
}

// "Study All" ignores the SM-2 schedule entirely and just runs through every
// card in the deck, in deck order — for a full read-through rather than a
// scheduled review.
function startAll(){
  if (!ALL_CARDS.length){
    alert("No cards in the deck yet.");
    return;
  }
  NAV.level = 0; NAV.sId = null; NAV.chId = null; NAV.scId = null;
  renderPills();
  closeSidebar();
  startSession(ALL_CARDS.slice(), "#E8A0B4");
}

// Buckets cards by what Jui rated them as on their MOST RECENT review today
// (local date). If a card got reviewed twice today, only its latest verdict
// counts — this powers the sidebar's "Again/Hard/Good/Easy today" buttons so
// she can jump straight back into the cards she's struggling with right now.
function isLocalToday(ts){
  return localDateStr(new Date(ts)) === localDateStr();
}
function todaysRatingBuckets(){
  var progress = loadProgress();
  var buckets = { 0: [], 2: [], 4: [], 5: [] };
  ALL_CARDS.forEach(function(c){
    var p = progress[c.id];
    if (!p || !p.hist || !p.hist.length) return;
    var todays = p.hist.filter(function(h){ return isLocalToday(h.t); });
    if (!todays.length) return;
    var last = todays[todays.length - 1];
    if (buckets[last.q]) buckets[last.q].push(c.id);
  });
  return buckets;
}
function updateTodayRatingCounts(){
  var buckets = todaysRatingBuckets();
  setText("again-today-count", buckets[0].length);
  setText("hard-today-count", buckets[2].length);
  setText("good-today-count", buckets[4].length);
  setText("easy-today-count", buckets[5].length);
}
function startByTodayRating(quality){
  var ids = todaysRatingBuckets()[quality] || [];
  if (!ids.length){
    alert("No cards rated that way today yet — keep reviewing and they'll show up here.");
    return;
  }
  var idSet = {};
  ids.forEach(function(id){ idSet[id] = true; });
  var cards = ALL_CARDS.filter(function(c){ return idSet[c.id]; });
  var colorMap = { 0: "#E85858", 2: "#E8A430", 4: "#5BB98C", 5: "#5B9EE8" };
  NAV.level = 0; NAV.sId = null; NAV.chId = null; NAV.scId = null;
  renderPills();
  closeSidebar();
  startSession(cards, colorMap[quality]);
}

function toggleSidebar(){
  var sb = document.getElementById("sidebar");
  if (sb) sb.classList.toggle("open");
}
function closeSidebar(){
  var sb = document.getElementById("sidebar");
  if (sb) sb.classList.remove("open");
}

function startDue(){
  var progress = loadProgress();
  var due = ALL_CARDS.filter(function(c){ return isDue(progress, c.id); });
  due.sort(function(a, b){
    var an = (progress[a.id] && progress[a.id].next) || 0;
    var bn = (progress[b.id] && progress[b.id].next) || 0;
    return an - bn;
  });
  if (due.length === 0){
    alert("All caught up! Well done, Jui 🌸");
    return;
  }
  NAV.level = 0; NAV.sId = null; NAV.chId = null; NAV.scId = null;
  renderPills();
  closeSidebar();
  startSession(due, "#E8A0B4");
}

function confirmReset(){
  if (confirm("Reset all progress? This cannot be undone.")){
    try {
      localStorage.removeItem("jui_sqe_progress");
      var keys = [];
      for (var i = 0; i < localStorage.length; i++){
        var k = localStorage.key(i);
        if (k && k.indexOf("jui_today_") === 0) keys.push(k);
      }
      keys.forEach(function(k){ localStorage.removeItem(k); });
    } catch(e){}
    location.reload();
  }
}

document.addEventListener("keydown", function(e){
  var tag = document.activeElement ? document.activeElement.tagName : "";
  if (tag === "INPUT" || tag === "TEXTAREA") return;
  if (e.code === "Space" || e.key === "Enter"){ e.preventDefault(); flipCard(); }
  else if (e.key === "ArrowLeft" || e.key === "h"){ prevCard(); }
  else if (e.key === "ArrowRight" || e.key === "l"){ nextCard(); }
  else if (e.key === "1"){ rate(0); }
  else if (e.key === "2"){ rate(2); }
  else if (e.key === "3"){ rate(4); }
  else if (e.key === "4"){ rate(5); }
});

var _lastSeenDateStr = null;
function refreshDailyState(){
  var ds = localDateStr();
  _lastSeenDateStr = ds;
  document.getElementById("daily-msg").textContent = MSGS[dayIndexLocal() % MSGS.length];
  document.getElementById("count-num").textContent = loadTodayCount();
  updateDueCount();
  updateTodayRatingCounts();
}
function checkDateRollover(){
  if (localDateStr() !== _lastSeenDateStr) refreshDailyState();
}

function init(){
  applyStoredImports();
  applyCustomCards();
  applyCustomEdits();
  buildAllCards();
  refreshDailyState();
  renderPills();
  document.getElementById("welcome").classList.remove("hidden");
  document.getElementById("card-area").classList.add("hidden");
  setInterval(checkDateRollover, 60000);
  document.addEventListener("visibilitychange", function(){
    if (!document.hidden) checkDateRollover();
  });
}
if (document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

if ("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("service-worker.js").catch(function(err){
      console.warn("Service worker registration failed:", err);
    });
  });
}

// Load the Firebase SDK lazily, after the app shell has already rendered and
// initialized from localStorage. Sync is a best-effort layer on top of the
// fully offline-capable app, not a requirement for it to work.
loadFirebaseSdk();

</script>

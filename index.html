l beneficiaries (who must have full capacity), by the court, or (for a professional PR acting alongside at least one other PR) by the applicable statutory provision, which requires more than a single acting professional PR to apply on its own.","tags":["wills_estates","ch17","17.4 PRs' Remuneration"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"17.5 Estate Accounts","cards":[{"id":"WIL_0109","type":"D","question":"What can PRs do if a beneficiary refuses to approve the estate accounts?","answer":"If a beneficiary refuses to approve the estate accounts, PRs can apply to the court for the accounts to be passed (approved) formally, or otherwise seek directions from the court, to protect themselves from a later challenge and allow the administration to be concluded despite the beneficiary's objection.","tags":["wills_estates","ch17","17.5 Estate Accounts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]}]},{"id":"ch18","title":"18 · Assents","subchapters":[{"title":"18.1 Requirements","cards":[{"id":"WIL_0110","type":"A","question":"What is an assent, and from what date does it take effect for income purposes?","answer":"An assent occurs when PRs acknowledge they no longer need an asset for administration and transfer it to a beneficiary. It relates back to the date of death — so the beneficiary is entitled to rents/income from that date, not just from the date of the assent itself. An assent of land must be in writing; an assent of personalty need not be in writing.","tags":["wills_estates","ch18","18.1 Requirements"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"18.2 Land -- Registration","cards":[{"id":"WIL_0111","type":"A","question":"What must PRs do regarding registration when assenting unregistered land to a beneficiary?","answer":"When PRs assent unregistered land to a beneficiary, this triggers a requirement of first registration of the land at HM Land Registry, since the transfer of unregistered land by assent is one of the triggering events for compulsory first registration under the Land Registration Act 2002 regime.","tags":["wills_estates","ch18","18.2 Land -- Registration"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"18.3 Protection for Purchasers","cards":[{"id":"WIL_0112","type":"A","question":"How is a purchaser from PRs protected against an undisclosed prior assent of the same property?","answer":"A purchaser buying the asset from the PRs is protected by a statutory presumption (in the purchaser's favour) that no prior assent has been made, provided the purchaser takes in good faith and for value — this allows purchasers to deal safely with PRs without needing to investigate whether the PRs have already assented the property to a beneficiary.","tags":["wills_estates","ch18","18.3 Protection for Purchasers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]}]},{"id":"ch19","title":"19 · Beneficiaries' Rights and Remedies","subchapters":[{"title":"19.1 Rights During Administration","cards":[{"id":"WIL_0113","type":"A","question":"What interest does a beneficiary have in estate assets before administration is complete?","answer":"A beneficiary holds only a chose in action — the right to have the estate properly administered — until administration completes; they have no legal or equitable interest in any specific estate asset until then. This means a beneficiary cannot, for example, assert a proprietary claim to a particular item before the PRs have completed the administration and appropriated or assented that asset to them.","tags":["wills_estates","ch19","19.1 Rights During Administration"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"19.2 Remedies","cards":[{"id":"WIL_0114","type":"A","question":"What three types of remedy are available to a beneficiary against PRs or third parties for loss to the estate?","answer":"A beneficiary may bring (1) a personal action against the PRs for breach of duty, seeking to recover the loss caused; (2) administration proceedings, asking the court to supervise or direct the administration; and (3) tracing, to recover estate property (or its traceable proceeds) from the PRs or any other recipient.","tags":["wills_estates","ch19","19.2 Remedies"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"19.2.2 Tracing","cards":[{"id":"WIL_0115","type":"E","question":"When is a beneficiary's right to trace estate property lost?","answer":"The right to trace is lost against a bona fide purchaser for value without notice of the beneficiary's interest, or in any other circumstances where it would be inequitable to allow tracing — for example, where the property has been dissipated such that there is nothing identifiable left to trace into.","tags":["wills_estates","ch19","19.2.2 Tracing"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch20","title":"20 · Claims Against Estates (Inheritance (Provision for Family and Dependants) Act 1975)","subchapters":[{"title":"20.1 Time Limit","cards":[{"id":"WIL_0116","type":"A","question":"What is the time limit for bringing a claim under the Inheritance (Provision for Family and Dependants) Act 1975?","answer":"The key time limit is six months from the issue of the grant of representation. This is also why PRs are advised to wait six months from the grant before distributing the estate, to protect themselves against a late but still-permitted claim (the court retains discretion to allow a claim out of time in appropriate cases).","tags":["wills_estates","ch20","20.1 Time Limit"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"20.3 The Test for Reasonable Financial Provision","cards":[{"id":"WIL_0117","type":"A","question":"What is the two-stage test for reasonable financial provision under the 1975 Act?","answer":"The two-stage test is: (1) has the will/intestacy failed to make reasonable financial provision for the applicant?; and (2) if so, what provision should be made? This reflects that the court must first establish a failure of reasonable provision before it has any jurisdiction to make an order altering the distribution of the estate.","tags":["wills_estates","ch20","20.3 The Test for Reasonable Financial Provision"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"20.3.1 Standard for Spouses/Civil Partners","cards":[{"id":"WIL_0118","type":"C","question":"What standard of provision applies to a surviving spouse/civil partner's claim, compared with other applicants, and when can a former spouse claim the more generous standard?","answer":"A surviving spouse/civil partner's claim is assessed against what is reasonable in all the circumstances (not limited to maintenance) — a more generous standard than that applied to other applicants, who are assessed only by reference to maintenance. A former spouse (divorced, not remarried) normally gets only the maintenance standard, unless no clean break order was made in the divorce or within 12 months of it, in which case the more generous spousal standard can still apply.","tags":["wills_estates","ch20","20.3.1 Standard for Spouses/Civil Partners"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"20.3.2 Standard for Other Applicants","cards":[{"id":"WIL_0119","type":"D","question":"Are adult, able-bodied, employed children of the deceased likely to succeed in a 1975 Act claim?","answer":"Generally no — applicants other than spouses/civil partners (including adult children) are assessed only against the maintenance standard, and an adult child who is able-bodied and in employment will typically struggle to show they need maintenance from the estate, making such claims difficult to succeed on absent special circumstances (e.g. moral obligation, promises made, or financial need).","tags":["wills_estates","ch20","20.3.2 Standard for Other Applicants"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"20.5 Types of Orders","cards":[{"id":"WIL_0120","type":"A","question":"If a 1975 Act application succeeds, what orders can the court make, and out of what fund?","answer":"If the application succeeds, the estate devolves under the court's order, not the will/intestacy. The court has wide discretion, including orders for: (1) transfer of property; (2) lump sum payment; (3) payment of income; (4) settlement of property on trust. Orders are made out of the deceased's net estate; lump sum payment (cash or asset transfer) is the most common order, though periodical payments are also possible. For IHT purposes, the order is treated as if it had been read back into the will/intestacy from the date of death.","tags":["wills_estates","ch20","20.5 Types of Orders"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch21","title":"21 · Inheritance Tax","subchapters":[{"title":"21.1-21.3 Introduction: Transfers, Domicile, and the Relationship With CGT","cards":[{"id":"WIL_0121","type":"A","question":"What is IHT a tax on, and what is the relationship between IHT and CGT on death?","answer":"IHT is a tax on transfers (the terms 'transfer' and 'gift' are interchangeable) — defined as 'a transfer of value for no consideration' — whether made on death or during lifetime; death is described as 'the last transfer anyone will ever make'. Death is not a disposal for CGT purposes (no CGT arises on death itself, even though assets may have risen in value) — this is the key trap distinguishing the two taxes' treatment of the same event.","tags":["wills_estates","ch21","21.1-21.3 Introduction: Transfers, Domicile, and the Relationship With CGT"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0122","type":"C","question":"How is a UK-domiciled individual's estate taxed for IHT compared with a non-UK-domiciled individual's estate?","answer":"A UK-domiciled individual is taxed on worldwide assets for IHT purposes. A non-UK-domiciled individual is taxed only on UK assets — their non-UK assets are 'excluded property', ignored entirely for IHT. Domicile (a person's permanent home/closest ties — distinct from nationality or residence) is therefore the key concept governing the territorial scope of IHT.","tags":["wills_estates","ch21","21.1-21.3 Introduction: Transfers, Domicile, and the Relationship With CGT"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0123","type":"A","question":"What is required for a transaction to count as a 'transfer of value' for IHT, and how does this affect a bad bargain between unconnected persons?","answer":"A transfer must involve gratuitous intent. An arm's-length bad bargain with an unconnected person is not a gift for IHT purposes (because there is no gratuitous intent, only a poor commercial deal), but the same transaction with a connected person (e.g. a child) is likely to be treated as a gift, since the connection makes gratuitous intent more likely to be inferred.","tags":["wills_estates","ch21","21.1-21.3 Introduction: Transfers, Domicile, and the Relationship With CGT"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.4 The Threshold for IHT -- the Nil Rate Band","cards":[{"id":"WIL_0124","type":"A","question":"What is the nil rate band (NRB) and the standard death rate of IHT?","answer":"The nil rate band is GBP325,000 — the amount of chargeable value that can pass without attracting IHT before tax becomes payable on the excess. The standard death rate of IHT charged on the value above the available NRB is 40%.","tags":["wills_estates","ch21","21.4 The Threshold for IHT -- the Nil Rate Band"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.5.1 The Seven-Year Look-Back","cards":[{"id":"WIL_0125","type":"A","question":"What is the seven-year look-back rule and what is its effect on the NRB available to the death estate?","answer":"Gifts made within seven years of death are taken into account on death, using up part of the nil rate band that would otherwise be available to the death estate — meaning the death estate's effective NRB can be reduced (or exhausted) by chargeable lifetime gifts made in that seven-year window, even though those gifts were made before death.","tags":["wills_estates","ch21","21.5.1 The Seven-Year Look-Back"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.5.2-21.5.3 Chargeable Transfers and Domicile","cards":[{"id":"WIL_0126","type":"C","question":"On death, which transfers are chargeable versus exempt, and how does this differ from the lifetime position?","answer":"On death: all transfers are chargeable unless made to a spouse/civil partner or to charity (which are exempt). During lifetime, by contrast, only transfers to trusts or companies are immediately chargeable (chargeable lifetime transfers, CLTs); gifts to individuals are instead potentially exempt transfers (PETs), which only become chargeable if the donor dies within seven years.","tags":["wills_estates","ch21","21.5.2-21.5.3 Chargeable Transfers and Domicile"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.5.5-21.5.8 Valuing Transfers","cards":[{"id":"WIL_0127","type":"C","question":"How is a death-estate asset valued for IHT compared with a lifetime transfer, and what are the related property rules?","answer":"On death, the estate is valued at open market value immediately before death ('probate value'). For lifetime transfers, the 'loss to donor' principle applies — value is measured by the reduction in the transferor's estate, not the value received by the donee; these can differ, especially for shareholdings, where value depends on the percentage stake retained. Related property rules provide that if an asset is more valuable combined with similar property owned by a spouse/civil partner than on a standalone basis, it is valued at the higher, combined-basis figure.","tags":["wills_estates","ch21","21.5.5-21.5.8 Valuing Transfers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.6 Three Types of Lifetime Transfer","cards":[{"id":"WIL_0128","type":"C","question":"What are the three categories of lifetime transfer for IHT, and how does this differ from the position on death?","answer":"Lifetime transfers fall into three categories: exempt transfers (never chargeable); potentially exempt transfers (PETs) (chargeable only if the donor dies within 7 years); and chargeable lifetime transfers (CLTs) (immediately chargeable). On death, by contrast, a transfer is either exempt or chargeable — there is no PET on death, since one cannot 'survive seven years' from the moment of dying.","tags":["wills_estates","ch21","21.6 Three Types of Lifetime Transfer"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.6.1 Exempt Transfers","cards":[{"id":"WIL_0129","type":"E","question":"What is the small gifts exemption, and is it an all-or-nothing exemption?","answer":"The small gifts exemption allows lifetime gifts of a limited value per donee, per tax year, to be exempt from IHT. It is all-or-nothing per donee: if a gift to a particular donee in the tax year exceeds the small gifts limit, the exemption is lost entirely for that gift to that donee (it cannot be used to exempt part of a larger gift), making it important to keep small gifts within the threshold to that one recipient.","tags":["wills_estates","ch21","21.6.1 Exempt Transfers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0130","type":"A","question":"What is the annual exemption for lifetime transfers, and can it be carried forward?","answer":"The annual exemption allows a set amount of lifetime gifts to be exempt from IHT each tax year. If unused (in whole or part) in one tax year, it can be carried forward to be used in the following tax year only (one year only) — but the current year's exemption is always used before any carried-forward amount, and any unused exemption from more than one year back is lost.","tags":["wills_estates","ch21","21.6.1 Exempt Transfers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.6.2 Potentially Exempt Transfers (PETs)","cards":[{"id":"WIL_0131","type":"A","question":"What is a PET, and when does it become chargeable?","answer":"A PET is a lifetime gift to an individual that is not covered by an exemption. It is treated as exempt while the donor is alive; becomes fully exempt if the donor survives 7 years from the date of the gift; and becomes chargeable (valued at the date of the gift) if the donor dies within 7 years of making it.","tags":["wills_estates","ch21","21.6.2 Potentially Exempt Transfers (PETs)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.6.3 Chargeable Lifetime Transfers (CLTs)","cards":[{"id":"WIL_0132","type":"A","question":"What is a CLT, and what is the exception for gifts to charitable trusts and bare trusts?","answer":"Gifts to trusts or companies are immediately chargeable lifetime transfers (CLTs) — except gifts to charitable trusts, which are exempt, or to bare trusts, which are instead treated as PETs since the beneficiary has an immediate absolute entitlement to the trust property (so the gift is treated as if made to that individual directly).","tags":["wills_estates","ch21","21.6.3 Chargeable Lifetime Transfers (CLTs)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0133","type":"A","question":"How often does an individual's nil rate band 'refresh', and which transfers use it up during lifetime?","answer":"Each individual has a fresh NRB every 7 years — the NRB is only consumed by chargeable transfers (CLTs, PETs that become chargeable on death within 7 years, or the death estate itself). Exempt transfers, and PETs while the donor remains alive, do not use up the NRB at all.","tags":["wills_estates","ch21","21.6.3 Chargeable Lifetime Transfers (CLTs)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0134","type":"A","question":"What does the 'cumulation' principle mean for assessing a CLT, and what is the five-step procedure for calculating lifetime tax on a CLT?","answer":"IHT is cumulative: when assessing a CLT, it is added to the sum of any other CLTs made in the previous 7 years (the 'cumulation period'); only CLTs erode the NRB during lifetime, since PETs are ignored for cumulation purposes unless and until they become chargeable on death. The five-step procedure is: (1) identify the value transferred (loss to donor); (2) deduct available annual exemption(s); (3) identify the NRB for the year of transfer; (4) deduct other chargeable transfers in the 7 years before the gift to find the NRB remaining; (5) tax the excess over the NRB at the lifetime rate of 20%.","tags":["wills_estates","ch21","21.6.3 Chargeable Lifetime Transfers (CLTs)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.7.1 Death Tax on Failed PETs","cards":[{"id":"WIL_0135","type":"A","question":"What happens for IHT purposes when a donor dies within 7 years of making a PET?","answer":"No tax is paid when a PET is made. If the donor dies within 7 years, the PET becomes chargeable, valued at the date of the gift, using the NRB and rates in force at the date of death (not at the date of the gift). To find the NRB remaining for the PET, deduct chargeable transfers made in the 7 years before the PET itself (not before death).","tags":["wills_estates","ch21","21.7.1 Death Tax on Failed PETs"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0136","type":"E","question":"What is taper relief, and does it reduce the value of the gift or only the tax payable?","answer":"Taper relief reduces the percentage of tax still payable on a failed PET (or a CLT subject to additional death tax) according to how many complete years elapsed between the gift and death, with relief only becoming available once more than 3 years have elapsed (no relief if death occurs within 3 years, with the relief percentage increasing in stages thereafter up to the 7-year survival point). The trap is that taper relief only reduces the tax payable — it does not reduce the value of the gift itself for the purposes of calculating that tax.","tags":["wills_estates","ch21","21.7.1 Death Tax on Failed PETs"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.7.2 Additional Death Tax on CLTs","cards":[{"id":"WIL_0137","type":"D","question":"What additional IHT may arise on a CLT if the donor dies within 7 years, and how is lifetime tax already paid treated?","answer":"If the donor dies within 7 years of a CLT, the trustees may owe additional IHT at the death rate (40%), calculated the same way as for failed PETs, subject to taper relief if more than 3 years have elapsed. The trustees get credit for lifetime tax already paid (at 20%) against the recalculated death tax; if the lifetime tax already paid exceeds the recalculated death tax, the excess is not repaid — the additional tax is simply reduced to zero (there is no refund of previously paid lifetime tax).","tags":["wills_estates","ch21","21.7.2 Additional Death Tax on CLTs"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.8.1 Business Relief","cards":[{"id":"WIL_0138","type":"A","question":"What is business relief, what rates apply, and what disqualifies a business from it?","answer":"Business relief reduces the value of business property gifted (lifetime or on death), given automatically (no claim needed) and applied before the annual exemption. It is given at 100% for unlisted trading company shares/sole trade or partnership interests, and at 50% for controlling holdings of listed shares or land/plant used in a controlled business. The business must be a trading business — relief is denied to a business that makes or holds investments, or that deals in land (e.g. a buy-to-let/property-investment company), though overseas trading company shares can still qualify.","tags":["wills_estates","ch21","21.8.1 Business Relief"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0139","type":"E","question":"What is the general minimum ownership period for business relief, and what are the two exceptions?","answer":"The general minimum ownership period is 2 years. The two exceptions are: (1) where the donor replaces one qualifying business asset with another within 3 years, the ownership periods can be aggregated; and (2) where the donor inherited the business asset from a spouse, the spouse's period of ownership counts towards the new owner's 2-year requirement.","tags":["wills_estates","ch21","21.8.1 Business Relief"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.8.2 Agricultural Relief","cards":[{"id":"WIL_0140","type":"C","question":"What does agricultural relief cover, what is excluded, and how does it interact with business relief on the same transfer?","answer":"Agricultural relief reduces the agricultural value of farmland/farm buildings gifted lifetime or on death, normally at 100%, given before annual exemptions; it is available to a farmer working their own land, or a landowner letting to a farmer, but excludes grazing horses (unless part of a stud) and land used for fishing/shooting/sporting rights. Agricultural relief and business relief can apply to the same transfer (e.g. a working farm): agricultural relief takes priority on the agricultural value (land/buildings), while business relief may then cover non-agricultural farming assets (plant, machinery, goodwill) — but business relief is unavailable on land that is leased to a tenant.","tags":["wills_estates","ch21","21.8.2 Agricultural Relief"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0141","type":"D","question":"How do business/agricultural relief apply differently to a CLT compared with a PET?","answer":"For CLTs, business/agricultural relief reduce the value transferred immediately at the time of the gift. For PETs, the reliefs are only factored in if and when the PET later becomes chargeable on death — they are not assessed or 'banked' at the time the PET is originally made, since no tax calculation occurs at that point.","tags":["wills_estates","ch21","21.8.2 Agricultural Relief"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.9.1 The Seven Steps to Calculate IHT on Death","cards":[{"id":"WIL_0142","type":"A","question":"What are the seven steps for calculating IHT on the death estate?","answer":"Step 1: identify which assets are included in the estate for IHT. Step 2: value those assets. Step 3: consider exemptions (exempt beneficiaries, e.g. spouse/charity). Step 4: consider reliefs (e.g. business/agricultural relief). Step 5: apply the available nil rate band. Step 6: consider lifetime gifts made in the 7 years before death, which erode the NRB. Step 7: calculate the IHT due on what remains.","tags":["wills_estates","ch21","21.9.1 The Seven Steps to Calculate IHT on Death"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.9.2 Step 1 (continued): What Falls Within the Death Estate","cards":[{"id":"WIL_0143","type":"A","question":"What four categories of property are included within the death estate for IHT, despite some passing outside the succession estate?","answer":"Included: (1) assets in the deceased's sole name; (2) the deceased's share of property held as tenants in common; (3) the deceased's notional share of joint tenancy property passing by survivorship (joint ownership does NOT escape IHT, even though it bypasses the will/intestacy); and (4) the capital of a life interest trust where the deceased was life tenant (treated as owning the capital itself, not just the income) — but a discretionary trust beneficiary owns nothing for IHT, having no fixed entitlement.","tags":["wills_estates","ch21","21.9.2 Step 1 (continued): What Falls Within the Death Estate"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0144","type":"D","question":"What four categories of property are excluded from the death estate for IHT?","answer":"Excluded: (1) life assurance policies written in trust for a named beneficiary (if not written in trust, the proceeds DO fall into the estate); (2) discretionary pension death benefit lump sums; (3) excluded property of a non-UK domiciled person (their non-UK assets); and (4) a remainder interest under a life interest trust — the remainderman's interest is excluded property and does not form part of the remainderman's own estate if they die before the life tenant.","tags":["wills_estates","ch21","21.9.2 Step 1 (continued): What Falls Within the Death Estate"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.9.3 Step 2: Valuation","cards":[{"id":"WIL_0145","type":"C","question":"How is jointly owned property valued for IHT for married co-owners compared with unmarried co-owners?","answer":"For spouses/civil partners, the related property rules apply, valuing the share on a combined basis (e.g. half of a GBP400,000 jointly-owned house = GBP200,000, i.e. a straight proportionate share with no discount). For unmarried co-owners (e.g. siblings), no related property uplift applies — instead a discount of around 5%-15% is usually applied to reflect that a part-share is worth less than its arithmetical fraction on the open market, subject to negotiation with HMRC.","tags":["wills_estates","ch21","21.9.3 Step 2: Valuation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0146","type":"D","question":"What is deductible from the gross estate in valuing it for IHT, and what is generally not deductible?","answer":"Deductible from the gross estate: debts and liabilities owed at death (mortgages, loans, unpaid bills, income tax owed) and reasonable funeral expenses. Not deductible: probate costs, with a limited exception for overseas probate costs.","tags":["wills_estates","ch21","21.9.3 Step 2: Valuation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.9.4 Step 3: Exemptions on Death","cards":[{"id":"WIL_0147","type":"A","question":"What is the spouse exemption on death, and what cap applies if the recipient spouse is non-UK domiciled?","answer":"Gifts to a spouse/civil partner on death are wholly exempt from IHT — but if the recipient spouse is non-UK domiciled, the exemption is capped at GBP325,000 (matching the standard nil rate band), rather than being unlimited as it would be for a UK-domiciled recipient spouse.","tags":["wills_estates","ch21","21.9.4 Step 3: Exemptions on Death"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0148","type":"B","question":"Does the spouse exemption still apply where the deceased's spouse is only a life tenant of a trust the deceased set up, rather than absolute owner?","answer":"Yes — a spouse who is life tenant of a life interest trust set up by the deceased is treated as owning the trust capital, so the spouse exemption still applies in full on the first spouse's death. IHT is instead collected later, when the surviving spouse/life tenant themselves dies and the trust capital is taxed as part of their own estate.","tags":["wills_estates","ch21","21.9.4 Step 3: Exemptions on Death"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0149","type":"A","question":"What is the reduced 36% charity rate, and what test must be satisfied to access it?","answer":"A reduced rate of 36% (instead of the standard 40%) applies to the chargeable death estate where at least 10% of the 'baseline amount' (broadly, the chargeable estate before the charitable gift) passes to charity. The trap is not to apply the 36% rate where there is no chargeable estate left after exemptions/reliefs/NRB, or where the 10% baseline test is not actually met.","tags":["wills_estates","ch21","21.9.4 Step 3: Exemptions on Death"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"The source's worked example for the 36% charity rate yields the figure GBP144,000, but the extracted text does not preserve the full step-by-step arithmetic — this matches a previously flagged arithmetic inconsistency in the Ch.21 worked examples; the figure is preserved here as stated in the source rather than recalculated or silently corrected."}]},{"title":"21.9.5 Step 4 (continued): Reliefs Recap","cards":[{"id":"WIL_0150","type":"D","question":"Do business relief and agricultural relief apply equally to lifetime transfers and to the death estate?","answer":"Yes — business relief (100% on unlisted trading shares/sole trade/partnership interest; 50% on controlling listed shares or land/plant used in a controlled business) and agricultural relief (100% on qualifying agricultural property, subject to the 2-year/7-year ownership rules) apply equally when calculating tax on the death estate as they do to lifetime transfers (see 21.8.1-21.8.2) — the same qualifying conditions and rates carry across both contexts.","tags":["wills_estates","ch21","21.9.5 Step 4 (continued): Reliefs Recap"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.9.6 Step 5: The Transferable Nil Rate Band","cards":[{"id":"WIL_0151","type":"A","question":"How does the transferable nil rate band work, and does it matter how the first spouse's assets actually passed?","answer":"If a deceased person dies leaving some or all of their NRB unused, the unused percentage (not the cash amount) can be claimed by the surviving spouse's PRs on the survivor's later death, uplifting the survivor's own NRB by that percentage of the NRB current at the survivor's death. It does not matter how the first spouse's assets passed (will, intestacy, or survivorship) — only how much of their NRB was actually used by chargeable transfers on or before their death; the claim is made on the second death, not recorded at the first.","tags":["wills_estates","ch21","21.9.6 Step 5: The Transferable Nil Rate Band"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0152","type":"D","question":"What is the maximum number of 'extra' 100% NRB uplifts a surviving spouse can claim from multiple previously deceased spouses, and does the transferable NRB apply to lifetime CLTs made by the survivor while still alive?","answer":"A surviving spouse can claim a maximum additional 100% uplift in total (i.e. their own NRB can be increased to at most double the current NRB — 2 x the current NRB), however many previously deceased spouses they had, even if each had fully unused NRB. The transferable NRB applies to all death-related IHT charges (the death estate itself, and PETs/CLTs that become chargeable because of the survivor's death) — but it never applies to lifetime tax on a CLT made while the second spouse is still alive.","tags":["wills_estates","ch21","21.9.6 Step 5: The Transferable Nil Rate Band"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.9.6 (continued) The Residence Nil Rate Band (RNRB)","cards":[{"id":"WIL_0153","type":"A","question":"What is the Residence Nil Rate Band, how is it calculated, and to whom must the residence pass?","answer":"The Residence Nil Rate Band (RNRB) is capped at GBP175,000 and equals the value of the qualifying residence (after deducting any mortgage on it), up to that cap. It is available only where the qualifying residence passes to lineal descendants (children, grandchildren, etc.) — there is no requirement that the descendants actually occupy the property after death; it may be sold and the proceeds distributed and the relief is still available, since it applies only to the death estate, not to lifetime transfers.","tags":["wills_estates","ch21","21.9.6 (continued) The Residence Nil Rate Band (RNRB)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0154","type":"E","question":"How does the RNRB taper for large estates?","answer":"The RNRB tapers away for estates with a net value over GBP2 million: it reduces by GBP1 for every GBP2 by which the net estate exceeds the GBP2 million threshold, meaning very large estates can lose some or all of the RNRB even where the residence and descendant conditions are otherwise met. The trap to avoid is treating the combined NRB and RNRB as if they made a flat 'GBP1 million' threshold — the RNRB is a separate, conditional, and taperable relief, not simply an addition to a fixed combined figure.","tags":["wills_estates","ch21","21.9.6 (continued) The Residence Nil Rate Band (RNRB)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0155","type":"D","question":"Can the RNRB be transferred between spouses in the same way as the general NRB?","answer":"Yes — an unused percentage of RNRB (e.g. because the first spouse had no qualifying residence, or did not leave it to descendants) can likewise be transferred to a surviving spouse, also capped at an additional 100% uplift, mirroring the transferable NRB mechanism in 21.9.6.","tags":["wills_estates","ch21","21.9.6 (continued) The Residence Nil Rate Band (RNRB)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0156","type":"A","question":"What is the downsizing addition, and what condition must be met for it to apply?","answer":"The downsizing addition restores some or all of the RNRB that would otherwise be lost where the deceased sold, gave away, or downsized from a more valuable home before death — provided the new (lower-value) home, or assets of equivalent value, pass to lineal descendants. Without this addition, simply downsizing before death would otherwise reduce the available RNRB even though the deceased's intention to benefit descendants was unchanged.","tags":["wills_estates","ch21","21.9.6 (continued) The Residence Nil Rate Band (RNRB)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.9.7 Step 6: Lifetime Gifts and Their Effect on the Death Estate NRB","cards":[{"id":"WIL_0157","type":"D","question":"How do the six lifetime exemptions, PETs, and CLTs each affect the NRB available to the death estate?","answer":"The six lifetime exemptions (annual, spouse, charity, small gifts, marriage, normal expenditure out of income) are always ignored regardless of timing — they never erode the death estate's NRB. PETs made more than 7 years before death can be ignored entirely; PETs within 7 years become chargeable, are tested against the NRB as at the date of the PET, and reduce the NRB available for the death estate itself. CLTs follow the same logic as chargeable PETs, with credit given for lifetime tax already paid.","tags":["wills_estates","ch21","21.9.7 Step 6: Lifetime Gifts and Their Effect on the Death Estate NRB"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.9.8 Step 7: Calculate IHT on the Death Estate","cards":[{"id":"WIL_0158","type":"A","question":"At what rate is IHT charged on the death estate after deducting all available reliefs and bands, and what is the trap regarding the annual exemption?","answer":"IHT on the death estate (after deducting the NRB, transferable NRB, RNRB, and transferable RNRB) is charged at 40%, or at the reduced 36% rate if the charity reduced-rate test (21.9.4) is met. The trap is that the annual exemption (GBP3,000) is a lifetime-transfer exemption only and never applies to reduce the death estate itself.","tags":["wills_estates","ch21","21.9.8 Step 7: Calculate IHT on the Death Estate"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0159","type":"A","question":"What is quick succession relief, and within what time limit does it apply?","answer":"Quick succession relief applies where the deceased's estate was increased by a chargeable transfer received within the 5 years before their own death (e.g. an inheritance on which IHT was already paid, or a PET that became chargeable) — it reduces the IHT charged again on the same wealth in the second estate. The relief reduces by 20% for each year between the two deaths (no precise calculation is expected on the SQE) and applies even if the gifted property is no longer owned by the second deceased at their own death.","tags":["wills_estates","ch21","21.9.8 Step 7: Calculate IHT on the Death Estate"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.10 Other Reliefs -- Post-Mortem Value Adjustments","cards":[{"id":"WIL_0160","type":"A","question":"What is the purpose of post-mortem value adjustment reliefs?","answer":"Post-mortem value adjustment reliefs allow PRs to substitute a lower actual sale value for certain assets (such as quoted shares or land) sold within a specified window after death for less than their probate (date-of-death) value, reducing the IHT payable to reflect the asset's true realised value rather than the (now overstated) date-of-death valuation.","tags":["wills_estates","ch21","21.10 Other Reliefs -- Post-Mortem Value Adjustments"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"21.11 Anti-Avoidance Rules","cards":[{"id":"WIL_0161","type":"A","question":"What is a gift with reservation of benefit (GROB) for anti-avoidance purposes, and how is it valued?","answer":"A gift with reservation of benefit is an asset given away but still benefited from by the donor (e.g. continuing to live in a gifted house) — it is treated as still part of the donor's death estate, valued at its date-of-death value, even beyond the normal 7-year PET survival period (i.e. surviving 7 years does not save a GROB the way it saves an ordinary PET).","tags":["wills_estates","ch21","21.11 Anti-Avoidance Rules"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0162","type":"E","question":"What two exceptions prevent the GROB rule from applying despite the donor retaining some connection to the gifted asset?","answer":"The GROB rule does not apply if (1) the donor pays full market rent for continued occupation of the gifted property, or (2) HMRC guidance treats the retained benefit as insignificant — in either case the reservation of benefit is treated as not substantial enough to bring the GROB anti-avoidance charge into play.","tags":["wills_estates","ch21","21.11 Anti-Avoidance Rules"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0163","type":"D","question":"What happens if a donor releases their reserved benefit before death, and what is the consequence of this 'death-bed avoidance' protection?","answer":"If the donor gives up their benefit before death (e.g. moves out of the gifted house), the GROB charge falls away. However, HMRC then treats the release itself as a new PET, valued at the date of release — this prevents donors from avoiding the GROB charge by releasing the benefit shortly before death while a 7-year survival period from that release has not yet run.","tags":["wills_estates","ch21","21.11 Anti-Avoidance Rules"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0164","type":"A","question":"What is double charges relief, and when does it apply?","answer":"Double charges relief applies where the GROB rules would otherwise tax the same wealth twice — for example, a PET that fails on death AND a GROB charge on the same house. HMRC computes the tax under each basis separately and charges whichever produces the higher amount, rather than charging both, preventing the same economic transfer from being taxed twice over.","tags":["wills_estates","ch21","21.11 Anti-Avoidance Rules"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.12 Payment of Inheritance Tax","cards":[{"id":"WIL_0165","type":"A","question":"What is the instalment option for paying IHT, and over what period can it be paid?","answer":"The instalment option allows IHT attributable to certain qualifying property (such as land, and shareholdings in certain circumstances) to be paid in 10 equal annual instalments, rather than as a single lump sum, easing the cash-flow burden where the estate's wealth is tied up in illiquid assets like land or a business.","tags":["wills_estates","ch21","21.12 Payment of Inheritance Tax"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"21.13 Tax Planning","cards":[{"id":"WIL_0166","type":"B","question":"What are the main IHT mitigation strategies discussed for lifetime tax planning?","answer":"Common mitigation strategies are: (1) full use of exemptions, especially the GBP3,000 annual exemption; (2) making lifetime gifts of appreciating assets rather than waiting until death — a PET surviving 7 years is entirely free of IHT, and even a failed PET/CLT is valued at the (lower) date-of-gift value with potential taper relief; (3) using any transferable NRB (and RNRB) available from a previously deceased spouse, since unclaimed allowances are simply wasted if not claimed; and (4) investing in business or agricultural property to access up to 100% relief while still being able to pass on wealth.","tags":["wills_estates","ch21","21.13 Tax Planning"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch22","title":"22 · Taxation of Estates in Administration","subchapters":[{"title":"22.1.1 The Deceased's Income Tax and CGT (Pre-Death)","cards":[{"id":"WIL_0167","type":"A","question":"What period does the deceased's final income tax return cover, and why must it (and any CGT) be settled before calculating IHT?","answer":"The deceased's final income tax return covers the period from 6 April to the date of death, settling any income tax owed for the year of death and any earlier unpaid years; any CGT due for the year of death is also settled at this stage. This must be sequenced before calculating IHT because unpaid income tax and CGT are liabilities of the estate that reduce its net value for IHT purposes — IHT is charged on the estate's net value after deducting debts and liabilities, so these tax liabilities must be quantified first.","tags":["wills_estates","ch22","22.1.1 The Deceased's Income Tax and CGT (Pre-Death)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"22.1.2 The PRs' Own Income Tax and CGT (During Administration)","cards":[{"id":"WIL_0168","type":"A","question":"Who is liable for income tax and CGT on estate assets during the administration period, and what filing flexibility do PRs have?","answer":"During the administration period, income produced by estate assets belongs legally to the PRs (not yet to the beneficiaries) until the assets are distributed, so the PRs must pay income tax on that income; likewise, if the PRs sell estate assets at a profit, they are liable to CGT on the gain. If the administration period straddles more than one tax year, separate returns are needed for each year, with PRs following normal self-assessment deadlines (returns by 31 January) and the same interest/penalty regime as individuals — though PRs may alternatively make an informal single payment covering the whole administration period with one combined computation.","tags":["wills_estates","ch22","22.1.2 The PRs' Own Income Tax and CGT (During Administration)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"22.2 Income Tax During Administration","cards":[{"id":"WIL_0169","type":"A","question":"What income tax rates apply to PRs during administration, and is interest on a loan to pay the IHT bill deductible?","answer":"PRs pay income tax at the basic rate of 20% on non-savings income/interest, and at the dividend ordinary rate of 8.75% on dividend income — PRs do not get a personal allowance, personal savings allowance, or dividend allowance (these are reliefs for individuals, not estates). Interest on a loan taken out by the PRs to pay the IHT bill is deductible against the estate's income for income tax purposes.","tags":["wills_estates","ch22","22.2 Income Tax During Administration"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"22.3 Capital Gains Tax During Administration","cards":[{"id":"WIL_0170","type":"A","question":"What is the PRs' CGT base cost for estate assets, and how is this affected by a post-mortem IHT loss relief claim?","answer":"PRs are deemed to acquire the deceased's assets at the date of death, with a CGT base cost equal to their market (probate) value at death. If a post-mortem IHT loss relief claim has substituted a lower value for quoted shares or land (see 21.10), that adjusted (lower) value becomes the new CGT base cost too, rather than the original date-of-death probate value.","tags":["wills_estates","ch22","22.3 Capital Gains Tax During Administration"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"22.3.1 Disposals by the PRs","cards":[{"id":"WIL_0171","type":"A","question":"What CGT annual exempt amount do PRs get, and for how long, and how are capital losses treated?","answer":"PRs get an annual exempt amount for CGT (the same amount as for individuals — GBP3,000 in 2025/26), but only for the tax year of death and the following two tax years; after that period, no further annual exempt amount is available to the PRs. Capital losses are set against gains in the same year, with any excess losses carried forward to future years.","tags":["wills_estates","ch22","22.3.1 Disposals by the PRs"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"22.3.3 Distributions to Beneficiaries","cards":[{"id":"WIL_0172","type":"D","question":"Is a distribution of an asset by PRs to a beneficiary under the will/intestacy a disposal for CGT purposes, and at what value does the beneficiary acquire the asset?","answer":"No — a distribution of an asset by the PRs to a beneficiary under the will/intestacy is not a disposal for CGT (so no CGT charge arises on the PRs at the point of distribution). The beneficiary is deemed to acquire the asset at its probate value (the value at the date of death) — the value at the actual date of distribution/transfer to the beneficiary is irrelevant for this purpose.","tags":["wills_estates","ch22","22.3.3 Distributions to Beneficiaries"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"22.3.4 Subsequent Disposal by the Beneficiary","cards":[{"id":"WIL_0173","type":"B","question":"When a beneficiary later sells an asset they inherited, how is their CGT gain or loss calculated?","answer":"The beneficiary's CGT gain or loss is calculated by comparing their disposal proceeds against their acquisition cost — which, per the rule in 22.3.3, is the probate value at the date of death (not the value at the date the asset was actually distributed to them, and not any earlier cost the deceased may have paid for the asset).","tags":["wills_estates","ch22","22.3.4 Subsequent Disposal by the Beneficiary"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]}]},{"id":"contract","title":"Contract","color":"#c4956a","chapters":[{"id":"ch1_offer","title":"Chapter 1: Agreement — Offer","subchapters":[{"id":"1.1","title":"1.1 What Is an Offer?","cards":[{"id":"CON_0001","type":"A","question":"What must an offer express to be valid, and what question do the courts ask to distinguish it from mere negotiation?","answer":"An offer must express an intention to be bound — not merely an intention to begin negotiating. The courts assess this by asking whether the statement showed the maker was willing to be bound on those terms without further negotiation. If the maker is still open to bargaining over the terms, the statement is not an offer.","tags":["offer","formation","intention to be bound"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"1.2","title":"1.2 Invitations to Treat (ITT) — Not Offers","cards":[{"id":"CON_0002","type":"C","question":"What is the dividing line between an offer and an invitation to treat (ITT)?","answer":"An offer is a statement showing willingness to be bound on stated terms without further negotiation, whereas an ITT is merely an expression of willingness to receive offers from others. An ITT invites others to make offers, which the ITT-maker can then accept or reject. The practical consequence is that if something is an ITT, the person who purports to 'accept' it is in fact the one making the offer, and the original party is free to accept or reject that offer.","tags":["invitation to treat","offer","formation","distinction"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"1.3","title":"1.3 Unilateral Contracts","cards":[{"id":"CON_0003","type":"A","question":"What is a unilateral contract and how does it differ from an ordinary bilateral offer?","answer":"A unilateral contract is one where only one party promises something: the offeror says 'if you do X, I will do Y.' The offeree makes no return promise — they may simply perform the requested act (thereby forming the contract) or do nothing at all, with no liability for failing to act. Classic examples given in the notes are reward offers and competitions, where the offeree's performance is both their acceptance and their consideration.","tags":["unilateral contract","offer","formation"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch2_acceptance","title":"Chapter 2: Agreement — Acceptance","subchapters":[{"id":"2.1","title":"2.1 Rules for Valid Acceptance","cards":[{"id":"CON_0004","type":"C","question":"How is acceptance distinguished from a counter-offer?","answer":"Acceptance is the final, unqualified assent to all the terms of the offer — it completes the agreement exactly as offered. Any variation of the offeror's terms is not acceptance at all; it is a counter-offer, which itself operates as a new offer capable of being accepted or rejected by the original offeror. This matters because a counter-offer also destroys the original offer, so it can no longer be accepted later.","tags":["acceptance","counter-offer","formation","distinction"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"2.2","title":"2.2 Method of Acceptance","cards":[{"id":"CON_0005","type":"A","question":"What method must an offeree use to accept, and what happens if the offeror waives the need for communication?","answer":"If the offeror stipulates a required method of acceptance, the offeree must use that method or a method equally advantageous to the offeror; if no method is stipulated, any reasonable method will do. Separately, if the offeror waives the requirement for communication of acceptance (expressly or by implication from context), acceptance is complete as soon as the offeree performs the stipulated act, even if the offeror does not yet know it has happened. The notes give the example of sales by post, where the buyer's act of dispatching goods can itself constitute acceptance.","tags":["acceptance","method of acceptance","communication"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"2.3","title":"2.3 The Postal Rule","cards":[{"id":"CON_0006","type":"B","question":"A offers to sell a car to B. B posts a letter of acceptance on Wednesday. A posts a letter of revocation on Tuesday, which B receives on Thursday. When, if at all, is a contract formed, and why?","answer":"A contract is formed on Wednesday, when B posted the acceptance. Under the postal rule, acceptance by post takes effect on posting, not on receipt, so B's acceptance was effective on Wednesday. A's revocation, by contrast, is only effective when it is actually received by B, which was Thursday — by which point the contract already existed, so the revocation came too late to prevent formation.","tags":["postal rule","acceptance","revocation","formation"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"2.4","title":"2.4 The Battle of the Forms","cards":[{"id":"CON_0007","type":"A","question":"Are 'prevail clauses' (clauses stating that a party's own terms prevail over any others) generally effective in a battle of the forms, and what determines whose terms actually govern?","answer":"Prevail clauses are usually ineffective. If one party sends terms containing a prevail clause, the other party can simply reject all of those terms — including the prevail clause itself — by responding with a counter-offer on their own terms. Once that happens, the 'last-shot rule' determines which set of terms governs: broadly, the terms last put forward and not objected to before performance begins.","tags":["battle of the forms","prevail clause","last shot rule","formation"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch3_consideration","title":"Chapter 3: Consideration","subchapters":[{"id":"3.0","title":"3.0 What Is Consideration?","cards":[{"id":"CON_0008","type":"A","question":"What is consideration and why is it required for a promise to be enforceable?","answer":"Consideration is what makes a promise legally enforceable; without it, a promise is merely gratuitous — it may be morally binding but not legally so. The notes describe consideration as 'the price for which the other's promise is bought,' meaning it is what each party gives in exchange for what the other promises. A promise unsupported by consideration (and not made by deed) generally cannot be enforced.","tags":["consideration","definition","enforceability"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"3.1","title":"3.1 Executed and Executory Consideration","cards":[{"id":"CON_0009","type":"C","question":"What is the difference between executory and executed consideration?","answer":"Executory consideration arises where both parties have made promises but neither has yet performed; each party's promise is consideration for the other's promise, which is typical of bilateral contracts and is how most commercial contracts stand at formation. Executed consideration arises where one party has already performed their side before the contract was formed — their act of performance is itself the consideration. The notes note this is common in unilateral contracts, giving the example of finding a lost dog, where the finder's act is simultaneously their acceptance and their executed consideration.","tags":["consideration","executed","executory","distinction"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"3.2","title":"3.2 Consideration Must Be Sufficient But Not Adequate","cards":[{"id":"CON_0010","type":"A","question":"What is the difference between consideration being 'sufficient' and being 'adequate', and what follows from this for the law's requirements?","answer":"Sufficient consideration means having some value in the eyes of the law, even if that value is tiny; adequate means fair or equivalent value to what is being received in return. The law requires only sufficiency, not adequacy, so a peppercorn, a nominal fee of £1, or even agreeing not to complain can all be valid consideration, however disproportionate they are to the other party's promise.","tags":["consideration","sufficiency","adequacy"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"3.3","title":"3.3 Past Consideration Is Not Good Consideration","cards":[{"id":"CON_0011","type":"A","question":"Why can't an act performed before a promise was made serve as consideration for that promise?","answer":"If an act was performed before the promise was made, that past act cannot be consideration for the later promise, because consideration and the promise it supports must form part of a single, contemporaneous transaction rather than two separate, time-separated events. The notes illustrate this with A walking B's dog on Monday as a favour, after which B promises on Friday to pay A £50 'in consideration of' the dog-walking already done — A has given no consideration for that promise because the act preceded it, so B's promise is unenforceable.","tags":["past consideration","consideration","formation"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0012","type":"E","question":"What is the recognised exception to the rule that past consideration is not good consideration, and what makes it different?","answer":"The exception is where the act was done at the other party's request, with an implied understanding that payment would follow — in that situation the prior act can still count as valid consideration for a later promise. The notes give the example of A asking B to value an antique collection, B doing so, and A later promising to pay £200: because B's valuation was done at A's request with an implied understanding that a professional valuer would be paid, B's past act of valuing can support A's later promise. The key distinguishing feature from ordinary past consideration is that the act was requested in advance with a mutual expectation of payment, rather than volunteered as a favour.","tags":["past consideration","exception","implied understanding of payment"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"3.4","title":"3.4 Performance of an Existing Duty — The Pre-Existing Duty Rule","cards":[{"id":"CON_0013","type":"B","question":"C is contractually obliged to deliver goods to X. D, a stranger to that contract, promises C £500 if C delivers on time. Is C's performance good consideration for D's promise?","answer":"Yes. Where a pre-existing duty is owed to a third party (X) rather than to the promisor (D), performing that duty is good consideration for D's new promise. This is because D gets something they had no previous right to demand — D was not owed the delivery under the original contract with X, so C's act of delivering confers a real benefit on D that the law treats as sufficient consideration.","tags":["pre-existing duty","third party","consideration"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0014","type":"E","question":"What is the general rule on performing a pre-existing statutory duty as consideration, and what is the exception?","answer":"The general rule is that performing a duty already imposed by law is not good consideration — the notes give the example that a police officer cannot charge extra for simply doing their job. The exception is where a party goes beyond the statutory duty: the notes cite additional policing at a football match beyond the legal minimum required as an example of conduct that can amount to good consideration, because it exceeds what the law already obliges the party to do.","tags":["pre-existing duty","statutory duty","exception","consideration"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"3.5","title":"3.5 Part Payment of a Debt — Pinnel's Case and Foakes v Beer","cards":[{"id":"CON_0015","type":"E","question":"What are the recognised exceptions where part payment of a debt DOES discharge the whole debt?","answer":"The notes identify six exceptions: (1) a disputed debt — if the existence or amount of the debt is genuinely disputed, paying an agreed sum to settle it is good consideration because settling a disputed claim has value to the creditor; (2) an unliquidated claim, where the amount is genuinely uncertain, so any agreed payment can be consideration; (3) payment at a different time or place at the creditor's request, since this may benefit the creditor; (4) payment by different means at the creditor's request, such as goods or services instead of cash; (5) payment by a third party, where the creditor cannot then sue the debtor for the balance because doing so would be a fraud on the third party; and (6) composition with creditors, where multiple creditors agree to accept a percentage payment and each creditor's acceptance is supported by the others' acceptance, giving each creditor certainty of some payment they would not get alone.","tags":["part payment","Pinnel's case","Foakes v Beer","exception","consideration"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"3.6","title":"3.6 Promissory Estoppel — Equity to the Rescue","cards":[{"id":"CON_0016","type":"A","question":"What is promissory estoppel and why is it described as 'a shield, not a sword'?","answer":"Promissory estoppel is an equitable doctrine that prevents a party from going back on a promise not to enforce their legal rights, even though that promise lacks consideration. It is described as a shield, not a sword, because it does not create new rights for the promisee to sue on — it can only be used defensively, to stop the promisor from enforcing rights they had promised not to enforce.","tags":["promissory estoppel","equity","consideration"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0017","type":"C","question":"What is the difference between the suspensory and extinctive effect of promissory estoppel?","answer":"For continuing obligations, such as an obligation to pay rent, the effect of promissory estoppel is suspensory: the promisor can resume their strict legal rights on giving reasonable notice, so the estoppel suspends rather than extinguishes those rights. For one-off obligations, where the promise relates to a specific past obligation that can no longer be revived, such as a promise to waive a debt already due and past, the estoppel may be extinctive and permanently extinguish the right.","tags":["promissory estoppel","suspensory","extinctive","distinction"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch4_iclr_capacity","title":"Chapter 4: Intention to Create Legal Relations & Capacity","subchapters":[{"id":"4.2","title":"4.2 Capacity","cards":[{"id":"CON_0018","type":"E","question":"What is the general rule on contracts made by minors, and what are the recognised binding exceptions?","answer":"The general rule is that contracts entered into by minors (under 18) are voidable, not void: the minor can enforce the contract, but the other party cannot enforce it against the minor unless the minor ratifies it on reaching 18. There are three recognised binding exceptions: (1) contracts for necessaries — goods or services suitable to the minor's condition and actual requirements, at a reasonable price, which the minor must pay for; (2) employment contracts that are, on balance, beneficial to the minor, which are binding on both parties; and (3) contracts for a permanent interest in property, such as shares or land, which are binding on the minor unless they repudiate before or shortly after turning 18. The notes add that under the Minors' Contracts Act 1987, if the other party has transferred property to the minor, a court may order the minor to restore it if just and equitable to do so.","tags":["capacity","minors","voidable","exception"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0019","type":"A","question":"Under the Mental Capacity Act 2005, when does a person lack capacity to contract, and what is the effect on a contract they enter into?","answer":"Under the Mental Capacity Act 2005, a person lacks capacity if they are unable to make a decision for themselves because of an impairment of the mind, meaning they cannot understand, retain, use, or communicate the relevant information. A contract made by a person lacking capacity is voidable, but only if the other party knew of the incapacity at the time; even so, the person lacking capacity must still pay a reasonable price for necessaries.","tags":["capacity","mental incapacity","Mental Capacity Act 2005","voidable"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0020","type":"A","question":"What does s.39 of the Companies Act 2006 provide about a company's contractual capacity?","answer":"Section 39 of the Companies Act 2006 provides that the validity of an act done by a company cannot be called into question on the ground of lack of capacity by reason of anything in the company's constitution. The practical effect, as the notes state, is that companies have full contractual capacity, regardless of any restriction on their objects or powers contained in their constitution.","tags":["capacity","companies","Companies Act 2006 s.39"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch5_privity","title":"Chapter 5: Privity of Contract","subchapters":[{"id":"5.0","title":"5.0 The Privity Doctrine","cards":[{"id":"CON_0021","type":"A","question":"What does the doctrine of privity of contract state?","answer":"The privity doctrine states that only the parties to a contract can sue or be sued on it. A third party who benefits from a contract cannot enforce it, and conversely a third party cannot have a burden imposed on them by a contract to which they were never a party.","tags":["privity","third parties","definition"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"5.1","title":"5.1 Contracts (Rights of Third Parties) Act 1999 (CRTPA)","cards":[{"id":"CON_0022","type":"E","question":"What are the important limitations on a third party's right to enforce a contract under the CRTPA 1999?","answer":"The CRTPA 1999 created a statutory exception allowing certain third parties to enforce contractual terms, but subject to three important limitations described in the notes: (1) the third party (T) can only enforce benefits, not have burdens imposed on them — the Act does not allow a contract to impose obligations on T; (2) once T has communicated assent to the term, or has relied on it, the contracting parties cannot vary or rescind the contract without T's consent; and (3) T's claim is subject to the same defences and set-offs that the promisor would have had available against the promisee.","tags":["CRTPA 1999","privity","third parties","exception"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"5.2","title":"5.2 Common Law Exceptions to Privity","cards":[{"id":"CON_0023","type":"E","question":"What are the common law exceptions to the privity doctrine?","answer":"The notes identify four common law exceptions: (1) agency — if A acts as agent for a disclosed principal P in forming a contract with B, P (not A) can sue and be sued on it; (2) assignment — contractual benefits, though not burdens, can be assigned to a third party with the debtor's consent or as equity permits; (3) trusts — if a promisee holds the benefit of a promise on trust for a third party, that third party can enforce the promise through equity, though the notes describe this as rare and complex; and (4) collateral contracts — a separate collateral contract between A and the third party T, supported by T's own consideration to A, can be enforced by T against A even though T is not a party to the main contract.","tags":["privity","common law exception","agency","assignment","trusts","collateral contract"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch6_terms","title":"Chapter 6: Determining the Terms of the Contract","subchapters":[{"id":"6.1","title":"6.1 Terms vs Representations","cards":[{"id":"CON_0024","type":"C","question":"What is the difference between a term and a representation, and why does the distinction matter?","answer":"A term is a contractual promise, so its breach entitles the innocent party to damages and possibly termination of the contract. A representation is a statement of fact made before the contract to induce the other party to enter it; if false, it gives rise to misrepresentation remedies rather than breach of contract remedies. The notes stress that getting this classification right matters enormously because the remedies available differ depending on which category the statement falls into.","tags":["terms","representations","distinction","misrepresentation"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0025","type":"E","question":"What three factors do courts use to distinguish a term from a representation?","answer":"The notes give three factors: (1) importance — whether the innocent party would have entered the contract but for that statement, illustrated by a car dealer stating mileage (likely a term) versus a private seller mentioning interior colour (likely a representation); (2) timing — whether the statement was made at or close to the time of contracting (more likely a term) or during earlier preliminary negotiations (more likely a representation); and (3) specialist knowledge — if the maker of the statement has superior knowledge or expertise the statement is more likely a term, illustrated by a car dealer stating the model year (likely a term) versus a private seller merely relaying what the registration document says (more likely a representation, since they have no special knowledge).","tags":["terms","representations","test","specialist knowledge"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"6.3","title":"6.3 Express Terms and the Parol Evidence Rule","cards":[{"id":"CON_0026","type":"E","question":"What are the recognised exceptions to the parol evidence rule?","answer":"The notes list four exceptions: (1) implied terms, whether implied by statute, the courts, or custom; (2) collateral contracts — a separate contract alongside the written one, supported by its own consideration, where the oral promise forms a separate contract rather than being added to the written one; (3) partly written, partly oral contracts, where the written document was never intended to be the complete record, so oral evidence can show what the full contract is; and (4) an entire agreement clause, which is generally upheld, though the notes flag that courts are vigilant that such clauses cannot be used to exclude liability for misrepresentation.","tags":["parol evidence rule","exception","express terms","entire agreement clause"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"6.4","title":"6.4 Implied Terms","cards":[{"id":"CON_0027","type":"A","question":"What is an implied term and how binding is it compared with an express term?","answer":"An implied term is a term read into the contract even though it was not expressly stated by the parties. The notes state that implied terms are as binding as express terms, meaning their breach has the same legal consequences as breach of an express term.","tags":["implied terms","definition"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"6.4.2","title":"6.4.2 Terms Implied by Courts","cards":[{"id":"CON_0028","type":"A","question":"What is the business efficacy test for implying a term, and what is its purpose?","answer":"The business efficacy test, from The Moorcock (1889), implies a term where it is necessary to give the contract business efficacy — that is, where the contract would otherwise be unworkable or lack commercial sense without that term. The notes situate this alongside the principle that courts imply terms to give effect to the parties' presumed intention, not to rewrite a bad bargain.","tags":["implied terms","business efficacy test","The Moorcock"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0029","type":"A","question":"What is the officious bystander test for implying a term?","answer":"The officious bystander test, from Shirlaw v Southern Foundries (1939), asks whether, had an officious bystander asked the parties 'should this clause be included?', both parties would have responded 'of course — obviously!'. If either party would have had reservations about the term, it is not implied under this test.","tags":["implied terms","officious bystander test","Shirlaw v Southern Foundries"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0030","type":"E","question":"What five conditions must an implied term satisfy under the courts' tests for implication?","answer":"The notes state that both the business efficacy and officious bystander tests require the implied term to be: (1) reasonable and equitable; (2) necessary to give effect to the parties' actual or presumed intention; (3) so obvious that it goes without saying; (4) capable of clear expression; and (5) consistent with the express terms of the contract.","tags":["implied terms","business efficacy test","officious bystander test","requirements"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch7_exclusion","title":"Chapter 7: Exclusion Clauses","subchapters":[{"id":"7.0","title":"7.0 Overview","cards":[{"id":"CON_0031","type":"A","question":"What is an exclusion clause, and what three-stage framework do the notes say should be used to analyse one?","answer":"An exclusion clause is a term that attempts to exclude or limit a party's liability, and the notes state there are strict rules governing its validity. The notes instruct that exclusion clauses should always be analysed in three stages: incorporation (has the clause become part of the contract), construction (does the clause, properly interpreted, cover this type of loss), and statutory controls (is the clause nonetheless rendered unenforceable by statute).","tags":["exclusion clause","framework","overview"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"7.2","title":"7.2 Stage 2: Construction — Does the Clause Cover This Loss?","cards":[{"id":"CON_0032","type":"A","question":"What does the contra proferentem rule require when interpreting an exclusion clause, and how strictly is this applied to clauses excluding negligence?","answer":"Under the contra proferentem rule, an exclusion clause must be clearly and unambiguously worded, and any ambiguity is construed against the party relying on the clause. To exclude liability for negligence specifically, the clause must either expressly mention negligence, or be worded so widely that negligence is the only possible basis of liability; if the clause is wide enough to cover both negligent and non-negligent breaches, it will not automatically be read as covering negligence without express mention.","tags":["exclusion clause","contra proferentem","negligence","construction"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0033","type":"B","question":"A contract contains a clause excluding liability for 'loss of goods'. The goods are lost and the claimant also seeks to recover loss of profits that would have been made from those goods. Does the clause cover the loss of profits?","answer":"Not necessarily. The notes state that courts read exclusion clauses narrowly, giving the specific example that a clause excluding liability for 'loss of goods' may not cover 'loss of profits from those goods'. Because the clause is construed strictly against the party relying on it, the claimant would have a strong argument that the loss of profits falls outside the clause's wording and remains recoverable.","tags":["exclusion clause","narrow construction","loss of profits"],"source":"Contract SQE Notes.docx","note":""}]}]},{"id":"ch8_vitiating","title":"Chapter 8: Vitiating Factors","subchapters":[{"id":"8.0","title":"8.0 What Is a Vitiating Factor?","cards":[{"id":"CON_0034","type":"C","question":"What is the critical distinction between a void contract and a voidable contract?","answer":"A vitiating factor is something that undermines or negates a contract that would otherwise be valid, affecting the quality of the parties' consent. The critical distinction is that a void contract has no legal effect from the outset, as though it never existed, whereas a voidable contract remains valid and binding until the innocent party takes steps to avoid it.","tags":["vitiating factors","void","voidable","distinction"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"8.1","title":"8.1 Mistake","cards":[{"id":"CON_0035","type":"A","question":"Why are courts very reluctant to find that a contract is void for operative mistake?","answer":"Operative mistake makes a contract void ab initio, as if it never existed, which is a very drastic consequence. Because of this, courts are very reluctant to find operative mistake, and the notes emphasise that the mistake must be fundamental — it is not enough that the parties were mistaken merely about the quality or value of what was agreed.","tags":["mistake","operative mistake","void ab initio"],"source":"Contract SQE Notes.docx","note":""}]},{"id":"8.1.1","title":"8.1.1 Common Mistake (Both Parties, Same Mistake)","cards":[{"id":"CON_0036","type":"B","question":"Two parties contract for the sale of a cargo of coffee. Unknown to either party, the ship carrying the cargo had already sunk before the contract was made. What is the effect on the contract, and why?","answer":"The contract is void for common mistake under the res extincta category, because the subject matter of the contract — the cargo of coffee — never existed at the time of contracting. Since both parties were mistaken about the same fundamental fact (the existence of the subject matter), and that fact made performance impossible from the outset, the contract is treated as void ab initio.","tags":["common mistake","res extincta","void"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0037","type":"B","question":"A contracts to buy from B something that A already owns, unknown to either party. What is the legal effect?","answer":"The contract is void under the res sua category of common mistake. Since A already owns the thing being 'bought', A cannot buy what is already theirs, so the contract has no subject matter capable of being transferred and is void from the outset.","tags":["common mistake","res sua","void"],"source":"Contract SQE Notes.docx","note":""},{"id":"CON_0038","type":"B","question":"In Bell v Lever Brothers [1932], employees were paid compensation for terminating their contracts, even though their contracts could have been terminated for cause without any payment. Both parties were mistaken about this. Was this an operative mistake?","answer":"No. The House of Lords held this was not an operative mistake, because the subject matter of the contract — the employees' contracts of employment — did in fact exist; the parties' mistake was only about the quality of that subject matter (namely, that it could have been terminated for cause without payment). The notes confirm that mistake as to quality alone is not operative at common law, however significant the mistake turns out to be in practice.","tags":["common mistake","mistake as to quality","Bell v Lever Brothers"],"source":"Contract SQE Notes.docx","note":"key authority — mistake as to quality is not operative"}]},{"id":"8.1.2","title":"8.1.2 Mutual Mistake (Cross-Purposes)","cards":[{"id":"CON_0039","type":"B","questio

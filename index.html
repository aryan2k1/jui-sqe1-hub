ement to the Common Law"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"9.2.1 The Claimant Must Have a Legal or Equitable Right","cards":[{"id":"TR_0155","type":"A","question":"What is the first precondition for any equitable remedy?","answer":"The claimant must establish an underlying right enforceable at law or in equity — for example, a breach of trust claim establishes the equitable right that then opens the door to remedies such as equitable compensation or tracing.","tags":["trusts","ch9","9.2.1 The Claimant Must Have a Legal or Equitable Right"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"9.2.2 No Adequate Remedy at Common Law","cards":[{"id":"TR_0156","type":"A","question":"When will the court treat common law damages as 'inadequate', opening the door to an equitable remedy?","answer":"Where the subject matter is unique (e.g. a particular parcel of land under a contract for sale), or where the claimant's real goal is to prevent a wrong from occurring or continuing, rather than to be compensated after the fact.","tags":["trusts","ch9","9.2.2 No Adequate Remedy at Common Law"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"9.2.3 Enforcement Must Be Feasible","cards":[{"id":"TR_0157","type":"C","question":"In what sense do equitable remedies act 'in personam', and what is the consequence of breaching such an order?","answer":"They operate on the person, compelling or restraining conduct, rather than directly affecting property — breach of the court's order is punishable as contempt of court. Equity will decline to act where it lacks the practical means to enforce its order or where supervising compliance would be impractical.","tags":["trusts","ch9","9.2.3 Enforcement Must Be Feasible"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0158","type":"B","question":"Why might a court refuse specific performance of a contract requiring an artist to paint a portrait, or a contract for land located abroad?","answer":"Performance of a portrait commission depends on subjective taste and skill and would require impractical ongoing supervision by the court. A contract for land abroad may be refused because the defendant could easily place themselves beyond the English court's reach, so the court cannot practically guarantee enforcement. In both cases, the remedy is refused for lack of feasible enforcement, not for lack of an underlying right.","tags":["trusts","ch9","9.2.3 Enforcement Must Be Feasible"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"9.2.4 Balance of Hardship","cards":[{"id":"TR_0159","type":"A","question":"What does the court weigh under the 'balance of hardship' principle?","answer":"The hardship to the defendant if the remedy is granted against the hardship to the claimant if it is refused, before deciding whether to make the award.","tags":["trusts","ch9","9.2.4 Balance of Hardship"],"source":"Trusts_SQE_Notes.pdf","note":""}]},{"title":"9.2.5 Defences — Inequitable Conduct","cards":[{"id":"TR_0160","type":"A","question":"What does it mean for a claimant to come to equity 'with clean hands'?","answer":"The claimant must not have engaged in inequitable conduct in relation to the matter in dispute, or the court may refuse the remedy regardless of the merits of the underlying claim.","tags":["trusts","ch9","9.2.5 Defences — Inequitable Conduct"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0161","type":"C","question":"What is 'laches' and how does it differ from a statutory limitation period?","answer":"Laches is unreasonable delay in bringing a claim, which can bar equitable relief even where the claim is brought within the applicable statutory limitation period. Laches and clean hands are equitable doctrines distinct from the statutory limitation period — a claim can be brought in time and still be refused an equitable remedy for delay or misconduct, since the two defences operate on separate tracks.","tags":["trusts","ch9","9.2.5 Defences — Inequitable Conduct"],"source":"Trusts_SQE_Notes.pdf","note":""},{"id":"TR_0162","type":"D","question":"Does proving a breach of trust guarantee the claimant a specific equitable remedy such as an injunction?","answer":"No — the court still applies the full discretionary analysis (adequacy of damages, feasibility of enforcement, balance of hardship, claimant's conduct) before granting any specific remedy. Proving the underlying breach only establishes the right; it does not automatically entitle the claimant to a particular equitable remedy.","tags":["trusts","ch9","9.2.5 Defences — Inequitable Conduct"],"source":"Trusts_SQE_Notes.pdf","note":""}]}]}]},{"id":"wills_estates","title":"Wills and Administration of Estates","color":"#d4bc8e","chapters":[{"id":"ch1","title":"1 · Execution of Wills","subchapters":[{"title":"1.1 The Three Requirements for a Valid Will","cards":[{"id":"WIL_0001","type":"A","question":"What three requirements must be satisfied for a will to be valid?","answer":"A testator must (1) have had testamentary capacity at the time the will was made; (2) have intended to make the will, comprising both general intention (intention to make a will at all) and specific intention (intention to make this particular will); and (3) have executed the will in accordance with the statutory formalities. All three elements are independently required, so a will valid in form but made without capacity, or with capacity but without proper execution, fails.","tags":["wills_estates","ch1","1.1 The Three Requirements for a Valid Will"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"1.2 Capacity","cards":[{"id":"WIL_0002","type":"A","question":"What is the test for testamentary capacity and when must it be satisfied?","answer":"The testator must understand: (1) the nature of the act of making a will and its effects; (2) the extent of the property of which they are disposing; and (3) the claims to which they ought to give effect (i.e. the people who might expect to benefit). Capacity is assessed by this common law/statutory test, and there is a presumption that a testator is presumed to have had mental capacity unless the contrary is shown.","tags":["wills_estates","ch1","1.2 Capacity"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0003","type":"E","question":"What is the 'golden rule' on the material time for assessing capacity, and what does it require?","answer":"Capacity is normally assessed at the date of execution of the will. As a protective practice (the 'golden rule'), where a testator's capacity is in doubt (e.g. due to age or illness), a medical practitioner should assess and confirm capacity at the time of execution, and ideally witness or approve the will, to reduce the risk of a later capacity challenge.","tags":["wills_estates","ch1","1.2 Capacity"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0004","type":"E","question":"Who may make a privileged will despite being under 18?","answer":"A privileged will is an exception to the normal minimum age and formality requirements for a will; it is available to certain categories of person (such as those in actual military service) who would otherwise lack capacity to make a valid will due to age. This is a narrow exception to the general rule that a testator must be 18 or over to make a will.","tags":["wills_estates","ch1","1.2 Capacity"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"1.3 Intention","cards":[{"id":"WIL_0005","type":"A","question":"What is the rebuttable presumption on knowledge and approval, and what triggers exceptions to it?","answer":"If the testator had capacity, the law presumes they acted with knowledge and approval of the will's contents (i.e. they knew what was in it and approved it). This presumption can be rebutted in certain circumstances, including where there is a conflict of interest — for example, where the person who drafted the will (or a closely connected person) receives a substantial gift under it, which raises suspicion and shifts the burden onto the propounder of the will to prove knowledge and approval affirmatively.","tags":["wills_estates","ch1","1.3 Intention"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0006","type":"A","question":"What must a challenger prove to establish that a will was procured by duress or undue influence?","answer":"The challenger must show that the testator's free will was overborne: for duress, that the testator's volition was overpowered by threats or force; for undue influence, that the testator's judgment was overpowered by coercion or pressure (going beyond mere persuasion) such that the will does not reflect the testator's own wishes. Unlike lifetime transactions, undue influence is not presumed from a relationship of trust and confidence in the testamentary context — actual undue influence must be proved.","tags":["wills_estates","ch1","1.3 Intention"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0007","type":"D","question":"What is a grant 'in solemn form' and when is it relevant to disputes over intention?","answer":"A grant in solemn form is obtained through court proceedings (rather than the standard non-contentious process) where the validity of a will is disputed, for example on grounds of lack of knowledge and approval, duress, or undue influence. Unless the will is proved in solemn form in such circumstances, its validity may remain open to challenge.","tags":["wills_estates","ch1","1.3 Intention"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"1.4 Formalities","cards":[{"id":"WIL_0008","type":"A","question":"What are the four formalities required for valid execution of a will under s.9 Wills Act 1837?","answer":"A will must be: (1) in writing; (2) signed by the testator (or signed by another person at the testator's direction and in their presence); (3) made or acknowledged by the testator in the presence of two or more witnesses present at the same time; and (4) signed by each witness in the testator's presence (though not necessarily in the presence of each other).","tags":["wills_estates","ch1","1.4 Formalities"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0009","type":"B","question":"Can a will be validly witnessed if the witnesses do not know the contents of the will?","answer":"Yes. The witnesses' role is to attest to the testator's signature and apparent capacity/intention, not to read or approve the contents of the will. A witness need not know what the document contains for the attestation to be valid, provided the other formal requirements (presence, signature) are satisfied.","tags":["wills_estates","ch1","1.4 Formalities"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0010","type":"E","question":"Can a blind person validly act as a witness to a will?","answer":"No. A witness must be able to see the testator sign (or acknowledge their signature) for the attestation to be effective, so a person who is blind cannot act as a valid witness. By contrast, a person who is mentally incapable only becomes disqualified if their incapacity exists at the time of witnessing.","tags":["wills_estates","ch1","1.4 Formalities"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0011","type":"E","question":"Can a beneficiary under a will act as a witness to that will?","answer":"A beneficiary (or their spouse/civil partner) can physically witness a will and the attestation itself remains valid, but the consequence is that the gift to that witnessing beneficiary fails (see 3.3.4) — the witnessing does not invalidate the will as a whole, only the gift to the witness.","tags":["wills_estates","ch1","1.4 Formalities"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0012","type":"D","question":"Is a stamped or initialled mark sufficient to satisfy the signature requirement for a will?","answer":"The signature requirement under s.9 Wills Act 1837 is interpreted flexibly: what matters is that the mark was intended by the testator to give effect to the document as their will. A testator's initials, a mark, or an unusual form of signature can suffice provided it was intended to authenticate the document as the testator's will.","tags":["wills_estates","ch1","1.4 Formalities"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"},{"id":"WIL_0013","type":"A","question":"What is an attestation clause and what is its evidential effect?","answer":"An attestation clause is a statement at the end of a will recording that the formalities of execution (signature by the testator, presence of witnesses, signature by witnesses) were duly observed. A special (more detailed) attestation clause may be used where there is doubt about the testator's capacity or ability to sign, to provide stronger evidence that the formalities were properly complied with.","tags":["wills_estates","ch1","1.4 Formalities"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"1.5 Incorporation by Reference","cards":[{"id":"WIL_0014","type":"A","question":"What two conditions must be satisfied for a document to be incorporated into a will by reference?","answer":"The document must (1) have existed at the date of the will, and (2) be referred to in the will as a document already in existence at that date. A document that does not yet exist when the will is executed cannot be incorporated by reference, even if it is in fact created before the testator's death.","tags":["wills_estates","ch1","1.5 Incorporation by Reference"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0015","type":"C","question":"What is the distinction between a will referring to a document 'to be found' versus one it says it 'shall write'?","answer":"Wording referring to a document as already existing or 'to be found' is capable of incorporation by reference. Wording indicating the testator intends to write or create a document in future (e.g. 'I shall write a letter of wishes') signals a document that does not yet exist, and so cannot be incorporated even if later created before death — this distinction is a recurring examination trap.","tags":["wills_estates","ch1","1.5 Incorporation by Reference"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch2","title":"2 · Alteration, Amendment, and Revocation of Wills","subchapters":[{"title":"2.1 Alterations and Amendments","cards":[{"id":"WIL_0016","type":"A","question":"When is an alteration to a will valid, and how can it be proved?","answer":"An alteration is valid only if made before execution of the will. This can be proved either by witness statements as to timing, or by the testator's and witnesses' initials placed adjacent to the alteration (and the will must still read naturally after the change). An alteration without such attestation is presumed to have been made after execution, and is therefore presumed invalid.","tags":["wills_estates","ch2","2.1 Alterations and Amendments"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0017","type":"D","question":"What is presumed about an unattested alteration to a will, and what is the one exception?","answer":"An unattested alteration is presumed to have been made after execution of the will, and so is invalid and given no effect — the original wording governs instead. The exception is where the alteration merely fills a blank space left in a will form (e.g. completing 'I, Terry Testator, being of sound mind...'), which is treated as part of the original execution rather than a later alteration.","tags":["wills_estates","ch2","2.1 Alterations and Amendments"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0018","type":"E","question":"What happens if an unattested alteration obliterates the original wording so it is illegible, with no valid replacement wording?","answer":"If the obliteration renders the original wording illegible and there is no valid attested replacement, the original wording is treated as revoked (since it can no longer be ascertained) but no new wording takes effect, since the alteration itself was not properly attested — the gift in that obliterated part of the will fails. This is the trap version of the alteration rule: illegibility may defeat the original gift even though the substituted wording is also ineffective.","tags":["wills_estates","ch2","2.1 Alterations and Amendments"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"2.2 Codicils","cards":[{"id":"WIL_0019","type":"A","question":"What is a codicil and what four formal requirements must it meet?","answer":"A codicil is a (normally brief) document that adds to, amends, or partially revokes an existing will. To be valid it must satisfy the same formalities as a will itself: it must be in writing, signed by the testator, signed in the presence of two or more witnesses, and signed by each witness in the testator's presence.","tags":["wills_estates","ch2","2.2 Codicils"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0020","type":"B","question":"What two functions can a codicil serve in relation to an existing will?","answer":"A codicil can be used to refer to and republish the existing will (updating its effective date for certain purposes), or to remedy a gift that was void in the original will (for example, replacing a gift that failed) — as well as more generally adding to, amending, or partially revoking the dispositions in the will, without the need to execute an entirely new will.","tags":["wills_estates","ch2","2.2 Codicils"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"2.3 Revocation","cards":[{"id":"WIL_0021","type":"A","question":"In what two ways may a will be revoked, and what precondition applies?","answer":"A will may be revoked at any time by a testator who retains testamentary capacity, either (a) automatically by operation of law, or (b) by a deliberate act of the testator. A testator who has lost capacity cannot revoke a will, even informally.","tags":["wills_estates","ch2","2.3 Revocation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0022","type":"D","question":"What is the effect of marriage and of divorce on an existing will?","answer":"Marriage automatically revokes a will made before the marriage in its entirety (subject to limited exceptions, e.g. a will expressed to be made in contemplation of that marriage). Divorce (decree absolute) does not revoke the whole will, but has a partial effect: any gift to the former spouse and any appointment of the former spouse as executor are treated as if the former spouse had predeceased the testator — the rest of the will remains effective.","tags":["wills_estates","ch2","2.3 Revocation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0023","type":"C","question":"Does separation (without divorce) revoke a gift to a spouse under a will, in contrast to divorce?","answer":"No — mere separation has no automatic effect on gifts to a spouse under a will; the gift to the spouse remains valid. This contrasts with divorce (decree absolute), which automatically treats gifts to, and executorship of, the former spouse as if they had predeceased the testator.","tags":["wills_estates","ch2","2.3 Revocation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0024","type":"A","question":"What two elements must be shown to revoke a will by destruction?","answer":"Destruction requires (1) a physical act of destruction of the will (e.g. burning, tearing) and (2) an intention by the testator at that time to revoke the will (animus revocandi) — both elements present together. Destruction without the requisite intention (e.g. accidental destruction) does not revoke the will, and intention without actual destruction is equally ineffective.","tags":["wills_estates","ch2","2.3 Revocation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0025","type":"E","question":"Is writing the word 'cancelled' or 'revoked' across a will sufficient to revoke it by destruction?","answer":"No — merely writing 'cancelled' or 'revoked' across the document is not a physical act of destruction within the meaning of the Wills Act 1837 revocation rules; the will is not thereby revoked since no actual destructive act (burning, tearing, etc.) has occurred, even though the testator's intention to revoke may be clear.","tags":["wills_estates","ch2","2.3 Revocation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0026","type":"E","question":"Can a person other than the testator validly destroy a will to revoke it?","answer":"Destruction by another person can revoke the will, but only if it is done at the testator's direction and in the testator's presence. Destruction by a third party outside the testator's presence (even if the testator wanted the will destroyed) does not satisfy the formal requirements for revocation by destruction.","tags":["wills_estates","ch2","2.3 Revocation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0027","type":"A","question":"What is the doctrine of dependent relative revocation?","answer":"Dependent relative revocation treats a testator's act of revocation as conditional (rather than absolute) where the testator only intended to revoke the existing will on the assumption that a replacement disposition would take effect — if that condition fails (e.g. the intended new will is invalid), the revocation is treated as not having taken effect, and the original will may be saved, except where the revocation was genuinely unconditional.","tags":["wills_estates","ch2","2.3 Revocation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"2.4 Mutual Wills","cards":[{"id":"WIL_0028","type":"A","question":"What are mutual wills and what legal device protects beneficiaries under them?","answer":"Mutual wills are made by two or more people, usually with reciprocal benefits, pursuant to an agreement not to revoke them without the other's consent. The agreement creates a constructive trust in favour of the intended beneficiaries: if one testator dies and the survivor later changes their will, a disadvantaged beneficiary may seek a court order requiring the recipient of the changed gift to transfer it to the person who would have benefited under the original will.","tags":["wills_estates","ch2","2.4 Mutual Wills"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0029","type":"D","question":"What practical caution is given regarding mutual wills?","answer":"Practitioners generally avoid drafting mutual wills because of the inflexibility they impose (the survivor cannot freely change their will after the first death without breaching the agreement) and the complexity of enforcing the resulting constructive trust — alternative arrangements (such as trusts) are often preferred to achieve similar aims with more flexibility.","tags":["wills_estates","ch2","2.4 Mutual Wills"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]}]},{"id":"ch3","title":"3 · The Interpretation of Wills","subchapters":[{"title":"3.1 The Date From Which a Will \"Speaks\"","cards":[{"id":"WIL_0030","type":"C","question":"From what date does a will 'speak' for identifying property, and from what date are beneficiaries identified?","answer":"Subject to a contrary intention, a will is treated as if executed immediately before death (not at the date it was actually signed) for the purpose of identifying the property given — this can be displaced by words such as 'now' or 'at present'. By contrast, the beneficiaries of the will are generally identified as at the date of execution (subject to class-closing rules).","tags":["wills_estates","ch3","3.1 The Date From Which a Will \"Speaks\""],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"3.2 Types of Legacy","cards":[{"id":"WIL_0031","type":"C","question":"What is the difference between a legacy and a devise?","answer":"A legacy is a gift of personalty (personal property); a devise is a gift of realty (land). The distinction matters because different rules on ademption and other failure rules can apply depending on the type and specificity of the gift.","tags":["wills_estates","ch3","3.2 Types of Legacy"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"3.3 Failure of Gifts","cards":[{"id":"WIL_0032","type":"A","question":"What is ademption, and what causes a gift to adeem?","answer":"A specific gift adeems (fails) if it is no longer part of the estate at death, is subject to a binding contract for sale, or no longer matches the will's description. A change in the substance of the subject matter causes ademption; a mere change of name or form does not. Ademption is assessed by reference to the property as it exists at death against the description given at the date of the will.","tags":["wills_estates","ch3","3.3 Failure of Gifts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0033","type":"E","question":"What is the classic exam trap regarding a specific gift described as 'my car'?","answer":"If the testator's car is replaced (e.g. sold and a new car bought) before death, the gift of 'my car' adeems because the specific item identified no longer exists at death — it does not automatically transfer to the replacement vehicle, since the gift is tied to the particular car owned at the date of the will, not to 'whatever car I own at death' unless the wording supports that broader reading.","tags":["wills_estates","ch3","3.3 Failure of Gifts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0034","type":"A","question":"What is lapse, and what happens to a lapsed specific gift versus a lapsed residuary gift?","answer":"If a beneficiary predeceases the testator, their gift lapses (fails), unless a substitutional gift is effective. A lapsed (non-residuary) gift falls into residue; a lapsed residuary gift instead passes under the intestacy rules, since there is no further fund for it to fall into.","tags":["wills_estates","ch3","3.3 Failure of Gifts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0035","type":"A","question":"What is the commorientes rule and when does it apply?","answer":"The commorientes rule addresses the situation where two or more people die in circumstances where it is uncertain who survived whom (e.g. a common accident) — in default of evidence to the contrary, the elder is presumed to have died first, so that the younger is treated as the survivor for succession purposes. This is a presumption only, displaced by evidence of the actual order of death.","tags":["wills_estates","ch3","3.3 Failure of Gifts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0036","type":"E","question":"What is the 'per stirpes' saving rule for gifts to predeceasing issue, and what is its limit?","answer":"If a gift is made to the testator's child or other issue who predeceases the testator but leaves living issue of their own (including children conceived but unborn — en ventre sa mere), the gift does not lapse: the deceased beneficiary's living issue take in their place, per stirpes ('through the root' — the deceased's share is split among their own issue), unless the will shows a contrary intention. The trap is that this saving rule applies only to gifts to the testator's own issue, not to gifts to collateral relatives such as a nephew.","tags":["wills_estates","ch3","3.3 Failure of Gifts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0037","type":"B","question":"How did the courts treat the wording 'to such of them, my daughters... as shall survive me... and if more than one in equal shares' in relation to the per stirpes saving rule?","answer":"This wording was held sufficient to show a contrary intention displacing the per stirpes saving rule — the testator did not want a predeceasing daughter's share to pass to her own issue, so only the daughters who actually survived the testator took, and the predeceasing daughter's share did not pass per stirpes to her children.","tags":["wills_estates","ch3","3.3 Failure of Gifts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0038","type":"E","question":"What happens to a gift to a beneficiary who (or whose spouse/civil partner) witnessed the will?","answer":"The gift to that beneficiary fails, but the will itself remains valid and is unaffected otherwise. The exception is where there are at least two other valid witnesses to the will in addition to the beneficiary-witness — in that case the gift to the witnessing beneficiary is saved, because attestation by the requisite two witnesses is independently satisfied.","tags":["wills_estates","ch3","3.3 Failure of Gifts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"3.4 Gifts to Children and Class Gifts","cards":[{"id":"WIL_0039","type":"D","question":"Does the term 'children' in a will include stepchildren, illegitimate children, and adopted children?","answer":"'Children' includes legitimate, illegitimate, and adopted children, but does not include stepchildren unless the will expressly says otherwise. This is narrower than colloquial usage and is a frequent trap in interpreting class gifts.","tags":["wills_estates","ch3","3.4 Gifts to Children and Class Gifts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0040","type":"A","question":"What are class closing rules and why do they matter for gifts to children?","answer":"Class closing rules determine the date on which membership of a class of beneficiaries (e.g. 'my grandchildren' or 'children who attain 18') is fixed, even though further class members might in principle come into existence after that date (e.g. by birth). Once the class closes, later-born or later-qualifying members are excluded from sharing in the gift, which avoids indefinitely postponing distribution while a class remains open.","tags":["wills_estates","ch3","3.4 Gifts to Children and Class Gifts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]}]},{"id":"ch4","title":"4 · Intestacy","subchapters":[{"title":"4.1 Entitlement of Spouse/Civil Partner and Issue","cards":[{"id":"WIL_0041","type":"A","question":"What survivorship period must a spouse or civil partner satisfy to inherit on intestacy, and what is 'personal chattels'?","answer":"A spouse/civil partner must survive the intestate by 28 days to inherit under the intestacy rules (s.46 Administration of Estates Act 1925) — if they do not survive that period, they are treated as having predeceased the intestate. 'Personal chattels' means tangible moveable property, excluding money and excluding assets used for business or held for investment; these pass to a surviving spouse as part of their entitlement where there is a spouse and issue.","tags":["wills_estates","ch4","4.1 Entitlement of Spouse/Civil Partner and Issue"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0042","type":"D","question":"Can a surviving spouse require the matrimonial home to be appropriated to them as part of their intestacy entitlement?","answer":"Yes — a surviving spouse has a right to require the personal representatives to appropriate the matrimonial home towards satisfaction of their entitlement on intestacy, subject to the value of the home and the spouse's overall entitlement under the statutory scheme.","tags":["wills_estates","ch4","4.1 Entitlement of Spouse/Civil Partner and Issue"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"4.2 No Surviving Spouse: Order of Entitlement","cards":[{"id":"WIL_0043","type":"A","question":"What is the order of entitlement on intestacy where there is no surviving spouse/civil partner?","answer":"Where there is no surviving spouse/civil partner, the estate passes in a strict order of classes of relative; an earlier class excludes all later classes entirely once a member of that class is identified as entitled. If no relative within any class survives, the estate passes as bona vacantia (to the Crown).","tags":["wills_estates","ch4","4.2 No Surviving Spouse: Order of Entitlement"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"4.2.1 Statutory Trusts","cards":[{"id":"WIL_0044","type":"A","question":"What are 'statutory trusts' on intestacy and to which classes do they not apply?","answer":"Statutory trusts provide that, for every class of relative except parents and grandparents, if a class member has predeceased the intestate but left issue who attain 18, that issue takes the predeceased member's share per stirpes (through the root) instead of their share simply failing.","tags":["wills_estates","ch4","4.2.1 Statutory Trusts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0045","type":"C","question":"How do statutory trusts on intestacy differ from the will's 'per stirpes' saving rule?","answer":"Statutory trusts on intestacy apply automatically by statute across most classes (except parents and grandparents) whenever a class member predeceases leaving issue who attain 18, and operate independently of any document. The per stirpes saving rule for wills (Chapter 3) instead operates only for gifts to the testator's own issue, can be displaced by a contrary intention in the will, and depends on the will's drafting — the two rules should not be conflated despite their similar 'per stirpes' mechanics.","tags":["wills_estates","ch4","4.2.1 Statutory Trusts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"4.3 Adopted and Illegitimate Children","cards":[{"id":"WIL_0046","type":"D","question":"How are adopted children treated for the purposes of intestacy?","answer":"Adopted children are treated as children of their adoptive family only (not their natural family) for intestacy purposes, and may inherit on the intestacy of any adoptive family member in the same way as a biological child — their entitlement (and any entitlement from) the natural family is severed by the adoption.","tags":["wills_estates","ch4","4.3 Adopted and Illegitimate Children"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0047","type":"D","question":"What is the presumption regarding a child of unmarried parents for intestacy purposes?","answer":"A child of unmarried parents is presumed, in the absence of evidence to the contrary, not to have been survived by their father (i.e. the father is presumed to have predeceased them) for intestacy purposes where parentage cannot be established — this affects which class of relatives the child's estate (or the child's claim against a parent's estate) flows through.","tags":["wills_estates","ch4","4.3 Adopted and Illegitimate Children"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]}]},{"id":"ch5","title":"5 · Property Passing Outside the Will or Intestacy","subchapters":[{"title":"5.1 Beneficial Joint Tenancy Property","cards":[{"id":"WIL_0048","type":"C","question":"How does property held as beneficial joint tenants pass on death, compared with property held as tenants in common?","answer":"An interest held as beneficial joint tenant (e.g. a jointly-owned house or bank account) passes automatically to the surviving joint tenant(s) by the right of survivorship, bypassing the will/intestacy entirely. This does NOT apply to tenancies in common, where the deceased's distinct share instead passes under the will or intestacy rules as normal — confusing joint tenancy with tenancy in common is a recurring exam trap.","tags":["wills_estates","ch5","5.1 Beneficial Joint Tenancy Property"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"5.2 Life Assurance Policies","cards":[{"id":"WIL_0049","type":"D","question":"Are life assurance policy proceeds part of the deceased's taxable estate for IHT purposes?","answer":"Where a life assurance policy is written in trust for a named beneficiary, the proceeds pass outside both the succession estate and the taxable IHT estate (see also 21.9.2). Proceeds of a policy not written in trust instead form part of the estate for both succession and IHT purposes.","tags":["wills_estates","ch5","5.2 Life Assurance Policies"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"5.3 Pension Scheme Death Benefits","cards":[{"id":"WIL_0050","type":"A","question":"How are pension scheme death benefits typically structured to pass outside the estate?","answer":"Pension scheme death benefits are commonly paid at the discretion of the scheme trustees under discretionary trusts established by the pension scheme rules, rather than being directed by the deceased's will. Because the benefit is paid at trustee discretion rather than being an asset to which the deceased was entitled, it generally falls outside the succession estate and the IHT death estate.","tags":["wills_estates","ch5","5.3 Pension Scheme Death Benefits"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"5.4 Nominated Property","cards":[{"id":"WIL_0051","type":"A","question":"What is nominated property and what is its scope?","answer":"Nominated property is property (such as funds held with friendly societies, the National Savings Bank, and National Savings Certificates) that the deceased validly nominated, during their lifetime, to pass directly to a named recipient on death, bypassing the will/intestacy and the need for a grant of representation — subject to a statutory cap on the amount that can pass this way.","tags":["wills_estates","ch5","5.4 Nominated Property"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"5.5 Life Interests in Trust Property","cards":[{"id":"WIL_0052","type":"A","question":"Who receives trust capital when a life tenant beneficiary dies, and does the capital pass through the life tenant's estate?","answer":"When a life tenant dies, the trust capital passes to the remainderman under the terms of the trust — it does not form part of the life tenant's own succession estate, since the life tenant never had more than a right to income, not to the capital itself. (Note, however, that for IHT purposes the capital of a life interest trust is treated as belonging to the life tenant — see 21.9.2.)","tags":["wills_estates","ch5","5.5 Life Interests in Trust Property"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"5.6 Gifts With Reservation of Benefit","cards":[{"id":"WIL_0053","type":"C","question":"What is a 'gift with reservation of benefit' and how does it differ for succession purposes versus IHT purposes?","answer":"A gift with reservation of benefit (GROB) arises where the deceased gave an asset away during their lifetime but retained some benefit in it (e.g. continued to live in a gifted house rent-free). For succession purposes the asset does not belong to the deceased and passes outside the estate — but for IHT purposes it is still treated as forming part of the taxable estate. The trap is that the succession estate and the taxable estate are not the same thing, and GROB is the clearest illustration of that divergence.","tags":["wills_estates","ch5","5.6 Gifts With Reservation of Benefit"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0054","type":"D","question":"Which categories of property passing outside the succession estate nonetheless count toward the taxable estate for IHT?","answer":"At least three categories illustrate this divergence: (1) gifts with reservation of benefit (5.6); (2) the deceased's notional share of joint tenancy property passing by survivorship (5.1, confirmed at 21.9.2 — joint ownership does not escape IHT even though it bypasses the will/intestacy); and (3) the capital of a life interest trust where the deceased was life tenant (5.5, confirmed at 21.9.2 — the life tenant is treated as owning the capital for IHT, despite it passing to the remainderman on death for succession purposes).","tags":["wills_estates","ch5","5.6 Gifts With Reservation of Benefit"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch6","title":"6 · Personal Representatives","subchapters":[{"title":"6.1 Appointment of Executors","cards":[{"id":"WIL_0055","type":"D","question":"What is the effect of divorce on the appointment of a spouse as executor under a will?","answer":"On divorce (decree absolute), the appointment of the former spouse as executor is treated as if the former spouse had predeceased the testator — the appointment fails, in the same way that a gift to the former spouse fails (see 2.3). Any substitute executor named in the will then takes effect in their place, if one was appointed.","tags":["wills_estates","ch6","6.1 Appointment of Executors"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0056","type":"E","question":"Can a minor or a person lacking mental capacity be appointed and act as an executor?","answer":"A minor cannot take a grant of probate even if named as executor in the will — a minor named as executor cannot act until they turn 18, and in the meantime power is reserved or a grant is made to others (see Chapter 7). A person lacking mental capacity is similarly unable to act as executor while the incapacity persists.","tags":["wills_estates","ch6","6.1 Appointment of Executors"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"6.2 Renunciation","cards":[{"id":"WIL_0057","type":"A","question":"What is renunciation of executorship, and when is it no longer available?","answer":"No one can be forced to act as executor. A person named as executor may renounce their right to a grant of probate, provided they have not already accepted office (e.g. by intermeddling with the estate or applying for the grant) — once office has been accepted, renunciation is no longer available and the executor must apply for a grant or have power reserved.","tags":["wills_estates","ch6","6.2 Renunciation"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"6.3 Power Reserved","cards":[{"id":"WIL_0058","type":"A","question":"What is 'power reserved' for an executor, and what happens if they never apply for a grant?","answer":"An executor unwilling to act now, but who does not want to give up the role permanently, can have 'power reserved': they step back for the time being but may apply for a grant later if circumstances change (e.g. another executor dies or falls ill). There is no automatic substitution if they never apply — they simply remain able to apply for a grant in future, with no obligation to do so.","tags":["wills_estates","ch6","6.3 Power Reserved"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch7","title":"7 · Grants of Representation","subchapters":[{"title":"7.1 Background","cards":[{"id":"WIL_0059","type":"A","question":"What is a grant of representation and what is its legal effect?","answer":"A grant of representation is a court document authorising the deceased's personal representatives to deal with the estate and transfer assets to beneficiaries. It is conclusive evidence of the terms and due execution of a will, or that the deceased died intestate, and is generally needed before institutions will release the deceased's assets, though there is a discretionary threshold below which a grant may not be required for small deposits.","tags":["wills_estates","ch7","7.1 Background"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"7.2 Types of Grant","cards":[{"id":"WIL_0060","type":"A","question":"What does a grant of probate confirm, and when does the estate actually vest in the executors?","answer":"A grant of probate is available only to expressly appointed executors and confirms (rather than creates) the executors' authority — the estate vests in them automatically on death, by virtue of the will itself; the grant is needed as evidence of that authority (e.g. to sell land, access bank accounts), not as the source of the executors' title.","tags":["wills_estates","ch7","7.2 Types of Grant"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"7.2.2 Letters of Administration With Will Annexed","cards":[{"id":"WIL_0061","type":"A","question":"What is 'clearing off' in the context of an application for letters of administration with will annexed?","answer":"Clearing off requires the applicant to account for, or confirm, that anyone with a better right to the grant has renounced, died, or otherwise dropped out. People in the same category as the applicant do NOT need to be cleared off — any one of them may apply without giving notice to the others, since they all rank equally.","tags":["wills_estates","ch7","7.2.2 Letters of Administration With Will Annexed"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0062","type":"E","question":"Why does a minor beneficiary or a life interest in the estate require two administrators rather than one?","answer":"Where the estate includes a minor beneficiary or a life interest (rather than only adult beneficiaries with vested absolute interests), a sole administrator cannot give a valid receipt for the proceeds of sale of land — a minimum of two administrators (or a trust corporation) is required in those circumstances, to ensure a valid overreaching receipt can be given.","tags":["wills_estates","ch7","7.2.2 Letters of Administration With Will Annexed"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"7.2.3 Letters of Administration (Intestacy)","cards":[{"id":"WIL_0063","type":"D","question":"Are stepchildren included in the order of entitlement for letters of administration on intestacy?","answer":"No distinction is drawn for children born to married or unmarried parents, or for adopted children, but stepchildren are excluded from the order of entitlement unless they were adopted by the deceased — the order of entitlement broadly mirrors the substantive intestacy distribution rules (NCPR rule 22).","tags":["wills_estates","ch7","7.2.3 Letters of Administration (Intestacy)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"7.2.4 Grants De Bonis Non","cards":[{"id":"WIL_0064","type":"A","question":"What is a grant de bonis non, and when is it needed?","answer":"A grant de bonis non is a second grant allowing completion of administration after the sole/last surviving personal representative dies, or where a previous grant is revoked — it is granted to whoever would have been entitled had the original PR never taken the grant. It is not needed where a chain of representation already exists.","tags":["wills_estates","ch7","7.2.4 Grants De Bonis Non"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0065","type":"C","question":"What is a chain of representation, when does it arise, and when does it break?","answer":"A chain of representation arises only where a sole/last surviving executor who took a grant of probate themselves dies, and their own executor proves their will — that new executor automatically becomes executor by representation of the original estate too, without needing a fresh grant de bonis non. The chain breaks if the link in the chain dies intestate or fails to name an executor; a chain of representation never arises for administrators (only for executors who proved a will).","tags":["wills_estates","ch7","7.2.4 Grants De Bonis Non"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"7.3 Minors and Incapacitated Persons","cards":[{"id":"WIL_0066","type":"B","question":"How is a grant of representation handled where the sole or last surviving personal representative is a minor?","answer":"Minors cannot take a grant. If a minor is one of several executors/potential administrators, the grant is made to the adult PRs with power reserved to the minor (for probate). If the minor is the only or last surviving PR, a limited grant is made instead to the minor's parent or guardian, for the minor's use and benefit, until the minor turns 18. Similar rules apply for PRs lacking mental capacity.","tags":["wills_estates","ch7","7.3 Minors and Incapacitated Persons"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch8","title":"8 · Pre-Grant Procedure","subchapters":[{"title":"8.2 Funding the Inheritance Tax Liability","cards":[{"id":"WIL_0067","type":"A","question":"Why must IHT generally be paid before a grant of representation is obtained, and what is the key time limit?","answer":"If IHT is due, it generally must be paid before the grant is obtained, since HMRC must confirm payment (or that no further tax is due) before HMCTS will issue the grant. The key time limit is that IHT is generally due six months from the end of the month of death, after which interest begins to run — but PRs need funds to pay this before they have a grant giving them full access to the estate's assets, creating a funding gap that pre-grant procedures address.","tags":["wills_estates","ch8","8.2 Funding the Inheritance Tax Liability"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0068","type":"B","question":"Can personal representatives sell the deceased's chattels before obtaining a grant of representation?","answer":"Yes — chattels (such as personal possessions) can be sold by PRs even before a grant is obtained, since title to chattels can pass without the formal evidence of authority that a grant provides for other assets (such as land or bank accounts), making this one of the available routes to raise funds to pay IHT before the grant issues.","tags":["wills_estates","ch8","8.2 Funding the Inheritance Tax Liability"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch9","title":"9 · Applying to the Court","subchapters":[{"title":"9.3 Caveats","cards":[{"id":"WIL_0069","type":"A","question":"What is a caveat in probate proceedings, who may lodge one, and how long does it last?","answer":"A caveat lodged with the HMCTS Probate Service prevents the issue of a grant. A 'caveator' with an interest may lodge one — for example, if they believe the named executor lacks capacity or the will is invalid. A caveat lasts six months, though it can be renewed or extended in certain circumstances.","tags":["wills_estates","ch9","9.3 Caveats"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"9.4 Citations","cards":[{"id":"WIL_0070","type":"C","question":"What is the difference between a citation to take probate and a citation to accept or refuse a grant?","answer":"A citation to take probate is used to compel an executor who has intermeddled with the estate (and so cannot renounce) but has not yet applied for a grant, to either apply for the grant or be passed over (passing them over) in favour of someone else. A citation to accept or refuse a grant is used more generally to compel any person entitled to a grant to either take it up or formally refuse/renounce it, so that the administration can proceed.","tags":["wills_estates","ch9","9.4 Citations"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch10","title":"10 · Dealing With HMRC","subchapters":[{"title":"10.1 Determining Whether IHT Is Payable","cards":[{"id":"WIL_0071","type":"A","question":"What must a solicitor do before applying for a grant if IHT is payable, and what form is used for a UK domiciliary?","answer":"Before applying for the grant, the solicitor must assess whether IHT is payable. If so, an account (Form IHT400 for UK domiciliaries) must be submitted to HMRC and the tax paid before the grant application — HMRC then sends a receipt to HMCTS enabling the grant to proceed. PRs may use the instalment option for certain qualifying property (see Chapter 8/21.12).","tags":["wills_estates","ch10","10.1 Determining Whether IHT Is Payable"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"10.2 Excepted Estates","cards":[{"id":"WIL_0072","type":"A","question":"What is an 'excepted estate' and what three types are recognised?","answer":"If IHT is not payable, generally no formal account is needed (unless HMRC demands one) — the estate is an excepted estate and the PRs simply give estate information in the grant application instead of filing Form IHT400. The three types are: (1) small estates, (2) exempt estates, and (3) non-UK domicile estates.","tags":["wills_estates","ch10","10.2 Excepted Estates"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"10.2.1 Small Estates","cards":[{"id":"WIL_0073","type":"A","question":"What are the conditions for an estate to qualify as a 'small estate' excepted estate?","answer":"The conditions are: (1) the deceased was UK-domiciled; and (2) the gross estate value plus chargeable 'specified transfers' made in the 7 years before death does not exceed the IHT threshold (GBP325,000, increased by any unused transferred nil rate band from a predeceased spouse/civil partner). 'Specified transfers' means chargeable lifetime transfers of cash, personal chattels, quoted shares, and most land transfers; 'gross value' means before deducting debts and IHT exemptions/reliefs.","tags":["wills_estates","ch10","10.2.1 Small Estates"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"10.2.2 Exempt Estates","cards":[{"id":"WIL_0074","type":"A","question":"What are the conditions for an estate to qualify as an 'exempt estate'?","answer":"The conditions are: (1) the deceased was a UK domiciliary; (2) the gross estate plus specified transfers does not exceed GBP3 million; and (3) the net chargeable estate (after debts and the spouse/charity exemption) plus specified transfers does not exceed the IHT threshold (GBP325,000, again increasable by transferred nil rate band). These are estates passing mostly to a spouse/civil partner or charity.","tags":["wills_estates","ch10","10.2.2 Exempt Estates"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0075","type":"C","question":"Does a lifetime gift of unquoted shares or a business interest count as a 'specified transfer' for excepted-estate purposes?","answer":"No — 'specified transfers' are limited to chargeable lifetime transfers of cash, personal chattels, quoted shares, and most land transfers. A gift of unquoted shares or a business interest falls outside this definition, so it does not count toward the specified-transfers limit used to test small estate or exempt estate status, even though it may be a chargeable transfer for general IHT purposes.","tags":["wills_estates","ch10","10.2.2 Exempt Estates"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch11","title":"11 · Duties of Personal Representatives","subchapters":[{"title":"11.1 Duty to Collect the Deceased's Assets","cards":[{"id":"WIL_0076","type":"A","question":"What is the PRs' duty to collect the deceased's assets, and when are they liable for loss?","answer":"PRs must, within a reasonable time, collect the deceased's monies and assets that vest in them — typically producing the grant of representation to the relevant institutions. They are liable for loss only if it results from their own unreasonable conduct, not merely because a loss occurred during administration.","tags":["wills_estates","ch11","11.1 Duty to Collect the Deceased's Assets"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0077","type":"D","question":"Does the PRs' duty to collect assets extend to property passing outside the succession estate?","answer":"No — the duty to collect assets relates to property forming part of the succession estate that vests in the PRs. Property passing outside the will or intestacy (Chapter 5, e.g. joint tenancy property passing by survivorship, or trust property) does not vest in the PRs and so is outside the scope of this collection duty.","tags":["wills_estates","ch11","11.1 Duty to Collect the Deceased's Assets"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"11.2 Duty to Administer the Estate","cards":[{"id":"WIL_0078","type":"A","question":"What is the 'executor's year' and what must PRs do within it?","answer":"The 'executor's year' is the 12-month period within which PRs are expected to take reasonable steps to preserve the estate and realise investments improper to retain, then pay debts and legacies, then distribute the residue per the will or intestacy rules. It is a benchmark for reasonable administration timing, not an absolute deadline after which PRs become automatically liable.","tags":["wills_estates","ch11","11.2 Duty to Administer the Estate"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"11.3 Duty of Care -- Trustee Act 2000","cards":[{"id":"WIL_0079","type":"A","question":"What does s.1 Trustee Act 2000 require of personal representatives?","answer":"Section 1 Trustee Act 2000 applies the statutory duty of care to PRs as well as trustees: act with such care and skill as is reasonable, having regard to any special knowledge/experience the PR has, or (if a professional PR) what is reasonably expected of a person acting in that profession. This duty is additional to the fundamental duties to act in beneficiaries' best interests and comply with the terms of any trust imposed.","tags":["wills_estates","ch11","11.3 Duty of Care -- Trustee Act 2000"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"11.3.1 Liability for Breach","cards":[{"id":"WIL_0080","type":"D","question":"Is a personal representative automatically liable for a co-PR's breach of duty?","answer":"No — a PR is not automatically liable for a fellow PR's breach of duty, unless their own negligence (e.g. failing to supervise the co-PR properly) is itself in issue. Liability among PRs is therefore based on personal fault, not vicarious or joint liability merely from holding office together.","tags":["wills_estates","ch11","11.3.1 Liability for Breach"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch12","title":"12 · Administrative Powers of Personal Representatives","subchapters":[{"title":"12.1 Key Statutory Powers","cards":[{"id":"WIL_0081","type":"A","question":"What is appropriation, and can a PR appropriate an asset to themselves for a pecuniary legacy?","answer":"Appropriation is the power of PRs to transfer a specific estate asset to a beneficiary in or towards satisfaction of their entitlement (e.g. using a house to satisfy a pecuniary legacy, rather than selling it for cash), instead of distributing cash. A PR generally requires the beneficiary's consent to appropriate an asset to themselves where they are also a beneficiary, to avoid self-dealing concerns, though the precise consent requirements depend on the circumstances and any contrary will provision.","tags":["wills_estates","ch12","12.1 Key Statutory Powers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"},{"id":"WIL_0082","type":"D","question":"What is the default rule on a PR continuing the deceased's sole trade after death?","answer":"Absent express authority in the will, PRs generally should not continue running the deceased's sole trade indefinitely, since doing so risks exposing the estate (and the PRs personally) to ongoing trading liabilities; PRs' statutory powers favour realising/winding up such a business unless the will or the beneficiaries authorise continuation.","tags":["wills_estates","ch12","12.1 Key Statutory Powers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"12.1.1 Power to Invest (Trustee Act 2000)","cards":[{"id":"WIL_0083","type":"A","question":"What investment powers does the Trustee Act 2000 give PRs, and what are the 'standard investment criteria'?","answer":"The Trustee Act 2000 authorises PRs to make any kind of investment they could make if absolutely entitled to the assets themselves — with statutory exceptions for purchasing land abroad and purchasing an interest in land jointly with someone else (e.g. a beneficiary). A will may restrict this power (e.g. prohibiting unethical investments). When selecting investments, PRs must have regard to the standard investment criteria: (1) the suitability of the investment to the trust, and (2) the need for diversification; failure to diversify or choosing unsuitable investments can give rise to liability to a harmed beneficiary.","tags":["wills_estates","ch12","12.1.1 Power to Invest (Trustee Act 2000)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"12.1.2 Power to Maintain a Minor (s.31 Trustee Act 1925)","cards":[{"id":"WIL_0084","type":"A","question":"What does s.31 Trustee Act 1925 allow, and what happens to accumulated income when a beneficiary with a vested interest turns 18?","answer":"Where property is held for a minor with a right to intermediate income, trustees/PRs may apply that income for the minor's maintenance, education, or benefit; otherwise they must accumulate it. This applies whether the beneficiary's interest is vested or contingent. At 18, accumulated income is normally added to capital — but it is instead paid out directly to the beneficiary if they then have a life interest at that point.","tags":["wills_estates","ch12","12.1.2 Power to Maintain a Minor (s.31 Trustee Act 1925)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"overlaps in part with trusts TR_0119/TR_0122 (same Trustee Act 1925 ss.31-32 provisions) — retained here for the PR-specific administration context, which is a distinct testable angle from the general trustee-powers framing in the trusts deck."}]},{"title":"12.1.3 Power to Advance Capital (s.32 Trustee Act 1925)","cards":[{"id":"WIL_0085","type":"A","question":"What does s.32 Trustee Act 1925 allow, and is an advance recoverable if the beneficiary never satisfies a contingency?","answer":"Trustees/PRs have discretion to advance capital early to a beneficiary (minor or adult) with a vested or contingent interest in capital, including a vested or presumptive share, subject to obtaining the consent of any beneficiary with a prior life interest. The advance is brought into account on the beneficiary's absolute entitlement (unless the will says otherwise); if the beneficiary never satisfies the contingency, the advance is not recoverable from them. The will may vary these statutory terms.","tags":["wills_estates","ch12","12.1.3 Power to Advance Capital (s.32 Trustee Act 1925)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"overlaps in part with trusts TR_0119/TR_0122 (same Trustee Act 1925 ss.31-32 provisions) — retained here for the PR-specific administration context, which is a distinct testable angle from the general trustee-powers framing in the trusts deck."}]},{"title":"12.2 Exercising the Powers","cards":[{"id":"WIL_0086","type":"C","question":"Can a sole PR give a valid receipt for the sale of land, and must all PRs join in a transfer of land or shares?","answer":"A sole PR has the same powers as two or more PRs and can give a valid receipt for proceeds of sale of land alone. However, where there are multiple PRs, all PRs must join in any actual transfer of land or shares, even though for most other purposes multiple PRs have joint and several authority — meaning one PR's act otherwise binds the others and the estate, subject to that exception for transferring land/shares and the fiduciary requirement to act in good faith for the estate as a whole.","tags":["wills_estates","ch12","12.2 Exercising the Powers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch13","title":"13 · Protection of Personal Representatives","subchapters":[{"title":"13.1 Claims of Unknown Beneficiaries or Creditors","cards":[{"id":"WIL_0087","type":"A","question":"What protects PRs against claims by unknown beneficiaries or creditors, and what is the minimum notice period?","answer":"PRs are personally liable to any unpaid beneficiary or creditor (even if unknown at the time of distribution) unless they comply with s.27 Trustee Act 1925: placing adverts in the London Gazette, a local newspaper (covering any land in the estate), and any other appropriate paper (e.g. a trade journal if the deceased ran a business), inviting interested persons to contact the PRs' solicitor within a stated period. The key time limit is a minimum notice period of two months before distribution.","tags":["wills_estates","ch13","13.1 Claims of Unknown Beneficiaries or Creditors"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"13.2 Claims of Missing (Known) Beneficiaries or Creditors","cards":[{"id":"WIL_0088","type":"C","question":"Does a s.27 Trustee Act 1925 notice protect PRs against a known beneficiary or creditor who cannot be located?","answer":"No — s.27 notices only protect against claimants who were genuinely unknown to the PRs; they give no protection where the PRs know a beneficiary or creditor exists but cannot locate them. For a known but missing claimant, PRs must instead use one of the separate protective options available for that situation (such as a Benjamin Order, insurance, setting aside a fund, or distributing on the basis of an indemnity).","tags":["wills_estates","ch13","13.2 Claims of Missing (Known) Beneficiaries or Creditors"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0089","type":"A","question":"What is a Benjamin Order, and in what situation is it used?","answer":"A Benjamin Order is a court order, available as one of the options for dealing with a known but missing (untraceable) beneficiary or creditor, that permits PRs to distribute the estate on the basis of an assumption the court approves about that person's fate (e.g. that they predeceased the intestate), protecting the PRs from personal liability if that assumption later proves wrong.","tags":["wills_estates","ch13","13.2 Claims of Missing (Known) Beneficiaries or Creditors"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"13.3.1 Claims for Financial Provision (I(PFD)A 1975)","cards":[{"id":"WIL_0090","type":"A","question":"How long should PRs wait before distributing the estate, to protect themselves against a possible claim under the Inheritance (Provision for Family and Dependants) Act 1975?","answer":"PRs should wait six months from the issue of the grant of representation before distributing the estate, since that is the time limit within which an application under the I(PFD)A 1975 must normally be brought (see Chapter 20) — distributing before that period expires risks personal liability if a claim is later made and succeeds.","tags":["wills_estates","ch13","13.3.1 Claims for Financial Provision (I(PFD)A 1975)"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"13.3.3 Failed PETs or Chargeable Lifetime Transfers","cards":[{"id":"WIL_0091","type":"D","question":"When can PRs become personally liable for IHT on the deceased's failed PETs or chargeable lifetime transfers?","answer":"PRs can become liable if additional IHT arising on a failed potentially exempt transfer (PET) or chargeable lifetime transfer (CLT) made by the deceased within 7 years of death remains unpaid 12 months after the end of the month of death, and the PRs have distributed the estate without first obtaining a certificate of discharge or otherwise protecting against this liability.","tags":["wills_estates","ch13","13.3.3 Failed PETs or Chargeable Lifetime Transfers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]}]},{"id":"ch14","title":"14 · Collecting and Realising Assets","subchapters":[{"title":"14.1 General Principles","cards":[{"id":"WIL_0092","type":"A","question":"Do causes of action vested in the deceased survive for the estate's benefit, and what about claims on behalf of dependants?","answer":"Causes of action vested in the deceased at death generally survive for the estate's benefit (and likewise actions against the deceased survive against the estate). PRs may also have a separate claim to recover damages on behalf of dependants if the deceased was killed by a wrongful act — such dependency damages do not form part of the estate itself, but are held for the dependants.","tags":["wills_estates","ch14","14.1 General Principles"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"14.3 Payment of Debts -- Solvent Estate","cards":[{"id":"WIL_0093","type":"A","question":"What defines a solvent estate, and how are secured debts discharged?","answer":"A solvent estate can pay funeral, testamentary, and administration expenses, debts, and other liabilities in full — regardless of whether legacies under the will can also be paid in full (that is a separate question, addressed by abatement, not solvency). Secured debts (e.g. a mortgage) are discharged from the secured property itself, subject to any contrary will provision directing otherwise.","tags":["wills_estates","ch14","14.3 Payment of Debts -- Solvent Estate"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"14.3.1 Statutory Order for Paying Unsecured Debts","cards":[{"id":"WIL_0094","type":"D","question":"How does the statutory order for paying unsecured debts change if the will exonerates the residue from debts?","answer":"Where the will does not exonerate the residue, unsecured debts are paid following the default statutory order of assets. If the will exonerates the residue from debts, that order is instead followed starting from item 3 in the sequence (i.e. skipping the residue, which is protected from bearing the debt burden first).","tags":["wills_estates","ch14","14.3.1 Statutory Order for Paying Unsecured Debts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"14.3.2 Marshalling","cards":[{"id":"WIL_0095","type":"A","question":"What is marshalling, and when can a beneficiary invoke it?","answer":"Marshalling applies where PRs use a legacy to pay a debt that, as between beneficiaries, should not have borne that burden (e.g. paying a debt out of a specific legacy when the statutory order required it to come from residue first). The disappointed beneficiary can invoke marshalling to be compensated out of the residue, restoring the balance between beneficiaries that the statutory order was meant to preserve.","tags":["wills_estates","ch14","14.3.2 Marshalling"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"14.4 Payment of Debts -- Insolvent Estate","cards":[{"id":"WIL_0096","type":"C","question":"What is the statutory order of priority among creditors of an insolvent estate, and how do creditors rank within a category?","answer":"An insolvent estate cannot pay expenses, debts, and liabilities in full, so beneficiaries receive nothing. Secured creditors have priority over unsecured creditors up to the value of the secured property; unsecured creditors are then paid in the statutory order of preferred debts, then ordinary debts, then deferred debts. Creditors rank equally within a category and abate proportionately if funds are insufficient for that whole category.","tags":["wills_estates","ch14","14.4 Payment of Debts -- Insolvent Estate"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0097","type":"A","question":"What is a 'deferred debt' in the insolvency priority order?","answer":"A deferred debt is a category of debt ranking below both preferred and ordinary unsecured debts in the statutory order of priority on an insolvent estate, meaning deferred debts are only paid if funds remain after preferred and ordinary debts have been satisfied in full — they are the last unsecured category to be paid before any consideration of beneficiaries (who receive nothing in an insolvent estate in any event).","tags":["wills_estates","ch14","14.4 Payment of Debts -- Insolvent Estate"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"14.5 Protection of PRs in Paying Debts","cards":[{"id":"WIL_0098","type":"D","question":"When are PRs personally liable for paying debts out of the correct statutory order?","answer":"Paying a debt while knowing of higher-ranking unpaid debts is treated as an implied warranty that sufficient assets exist to cover those higher debts of which the PR has notice — if insufficient, the PR is personally liable for the shortfall. PRs are not liable for paying an inferior debt without notice of a superior one, provided they did not act with undue haste, and are not liable for paying debts within the same category out of order (since creditors within a category rank equally in any event).","tags":["wills_estates","ch14","14.5 Protection of PRs in Paying Debts"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch15","title":"15 · Post-Death Changes","subchapters":[{"title":"15.1 Disclaimers","cards":[{"id":"WIL_0099","type":"A","question":"What is a disclaimer, and what disqualifies a beneficiary from disclaiming?","answer":"A beneficiary may disclaim an inheritance orally or in writing — unless they have already accepted a benefit from the gift, in which case the right to disclaim is lost. Ordinarily, a disclaimer is itself a transfer of value for IHT and a deemed disposal for CGT by the original beneficiary to the new one; however, if statutory conditions are met (including a two-year time limit from death), the change is 'read back' to the date of death for IHT and CGT purposes, as if the deceased had left the property to the new beneficiary directly in their will.","tags":["wills_estates","ch15","15.1 Disclaimers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0100","type":"D","question":"Where does a disclaimed gift go, and can the disclaiming beneficiary still benefit on intestacy?","answer":"A disclaimed gift falls into residue (or passes under intestacy if it was a disclaimed residuary gift), in the same way as a lapsed gift. Disclaiming a gift under a will does not automatically block the same person from inheriting that same property under the intestacy rules if it would otherwise pass to them that way (e.g. as next of kin), since disclaimer only rejects the specific gift made, not the person's status more generally.","tags":["wills_estates","ch15","15.1 Disclaimers"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]},{"title":"15.2 Variations","cards":[{"id":"WIL_0101","type":"C","question":"What is the key difference between a disclaimer and a variation, and what is the time limit for IHT/CGT read-back treatment for a variation?","answer":"Unlike a disclaimer, a variation lets the original beneficiary direct who receives the inheritance instead — giving them control over the destination of the property that a disclaimer lacks (a disclaimer simply rejects the gift, leaving its destination to the default rules). Like a disclaimer, a variation qualifies for IHT/CGT read-back treatment only if made within two years of death and the other statutory conditions are met; a variation, unlike a disclaimer, can also be made even after the beneficiary has accepted a benefit from the gift.","tags":["wills_estates","ch15","15.2 Variations"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""},{"id":"WIL_0102","type":"D","question":"When must the PRs also sign the election for a variation to be effective?","answer":"The PRs must join in (sign) the variation election where the variation would increase the amount of IHT payable on the estate — since the PRs are responsible for accounting to HMRC for the estate's IHT, their consent is required where the variation creates or increases a tax liability that they will have to settle from the estate.","tags":["wills_estates","ch15","15.2 Variations"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]}]},{"id":"ch16","title":"16 · Payment of Legacies","subchapters":[{"title":"16.1 Vesting Specific Legacies and Devises","cards":[{"id":"WIL_0103","type":"D","question":"Who bears the cost of transferring a specific legacy, and from what date is the beneficiary entitled to income on it?","answer":"Costs of transfer fall on the beneficiary unless the will says otherwise. The beneficiary is entitled to income arising on the specifically gifted asset from the date of death (not merely from the date of actual transfer), reflecting that a specific gift vests in the beneficiary's favour as at death, subject to the PRs' administration of the estate.","tags":["wills_estates","ch16","16.1 Vesting Specific Legacies and Devises"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"16.2 Pecuniary Legacies","cards":[{"id":"WIL_0104","type":"A","question":"Within what period are pecuniary legacies normally due to be paid, and what happens if payment is late?","answer":"Pecuniary legacies are normally due within 12 months of death (the 'executor's year'). If a pecuniary legacy is paid late (i.e. after the 12-month period), interest becomes payable on the legacy for the period of delay, compensating the beneficiary for being kept out of their money.","tags":["wills_estates","ch16","16.2 Pecuniary Legacies"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"16.3 Abatement","cards":[{"id":"WIL_0105","type":"A","question":"What is abatement, and how are annuities treated for this purpose?","answer":"If the fund or assets from which legacies are payable are insufficient to pay them in full, legacies abate proportionately — unless the will gives priority to a particular legacy, in which case that legacy is paid in full first and only the remaining legacies abate. Annuities abate on the same basis as general legacies, being treated as part of the same pool for proportionate reduction.","tags":["wills_estates","ch16","16.3 Abatement"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"16.5 Receipts From Minors","cards":[{"id":"WIL_0106","type":"A","question":"What options do PRs have if a minor beneficiary cannot give a valid receipt for their legacy?","answer":"A minor cannot give a valid receipt unless the will provides otherwise. Subject to the debated view that anyone with parental responsibility can give a receipt, PRs' options include: (1) paying to a parent/guardian with parental responsibility on the minor's behalf; (2) appointing trustees (e.g. under s.42 Administration of Estates Act 1925) to hold the legacy for the minor; (3) retaining the legacy themselves as trustees until the minor turns 18; or (4) paying into court.","tags":["wills_estates","ch16","16.5 Receipts From Minors"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":"sparse source"}]}]},{"id":"ch17","title":"17 · Ascertaining the Residue","subchapters":[{"title":"17.1.2 Corrective Accounts and Certificate of Discharge","cards":[{"id":"WIL_0107","type":"A","question":"What is a corrective account, and what does a Certificate of Discharge from HMRC achieve?","answer":"A corrective account is filed when the wrong amount of IHT was initially paid; if the IHT due changes as a result, the residue is adjusted accordingly. PRs should obtain a Certificate of Discharge from HMRC, which discharges them from further IHT liability — except in cases of fraud, failure to disclose material facts, later discovery of further assets, or a subsequent variation changing the IHT liability. Absent a Certificate, automatic discharge occurs 35 days after the relevant event.","tags":["wills_estates","ch17","17.1.2 Corrective Accounts and Certificate of Discharge"],"source":"Wills_and_Estates_SQE_Notes.pdf","note":""}]},{"title":"17.4 PRs' Remuneration","cards":[{"id":"WIL_0108","type":"D","question":"Can a sole PR charge remuneration relying solely on the statutory professional-PR charging provision?","answer":"No — a sole PR cannot rely on the statutory professional charging provision alone to charge for their services; PRs are not entitled to charge for their services unless authorised by the will, by agreement of al

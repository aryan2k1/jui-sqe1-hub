apply for registration after a minimum of 10 years (vs 12 for unregistered), and the registered proprietor is notified and can object — if they object, the application will usually be rejected. By contrast, in unregistered land the owner's title is automatically lost after 12 years with no notification or objection process.","tags":["land_law","ch4","4.6 Adverse Possession of Registered Land"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0067","type":"A","question":"What three grounds allow a contested adverse possession application for registered land to succeed despite the proprietor's objection?","answer":"It would be unconscionable to dispossess the applicant and the applicant ought to be registered; OR the applicant is for some other reason entitled to be registered; OR there is a reasonable mistake as to boundaries (with at least 10 years' possession ending on the date of application, reasonably believing the land to be theirs).","tags":["land_law","ch4","4.6 Adverse Possession of Registered Land"],"source":"Land_Law_SQE_Notes.pdf","note":""}]}]},{"id":"ch5","title":"5 . Co-ownership of Land (Trust of Land)","subchapters":[{"title":"5.1 Legal Estate vs Equitable (Beneficial) Interest","cards":[{"id":"LL_0068","type":"A","question":"What kind of trust arises automatically whenever land is co-owned, and can the legal estate be held as tenants in common?","answer":"A trust of land arises automatically, imposed by statute. The legal estate must always be held as a joint tenancy — a tenancy in common cannot exist at law; only the equitable interest can be a tenancy in common.","tags":["land_law","ch5","5.1 Legal Estate vs Equitable (Beneficial) Interest"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0069","type":"A","question":"What is the maximum number of trustees who can hold the legal estate in co-owned land, and is there a limit on beneficiaries?","answer":"A maximum of four trustees (minimum one), all of sound mind and over 18. There is no limit on the number of beneficiaries.","tags":["land_law","ch5","5.1 Legal Estate vs Equitable (Beneficial) Interest"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"5.2 Joint Tenancy","cards":[{"id":"LL_0070","type":"D","question":"What happens to a joint tenant's interest on death?","answer":"It passes automatically to the surviving joint tenant(s) under the doctrine of survivorship — there is no severable share to leave by will, as the interest simply vanishes and the survivors' shares grow.","tags":["land_law","ch5","5.2 Joint Tenancy"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0071","type":"E","question":"Can a joint tenant leave their \"share\" of jointly owned property by will?","answer":"No — this is a classic trap. There is no severable share to leave; survivorship operates automatically and overrides anything in the will, unless severance occurred before death.","tags":["land_law","ch5","5.2 Joint Tenancy"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"5.3 Tenancy in Common","cards":[{"id":"LL_0072","type":"C","question":"What is the key feature of a tenancy in common that differs from a joint tenancy, and name three circumstances where it is advised.","answer":"Each tenant in common holds a distinct, quantifiable share, which can be left by will or passes on intestacy — survivorship does not apply. It is advised where the parties: clearly intend not to have survivorship apply; contributed unequal amounts to the purchase price; or are in a commercial/business relationship where a joint tenancy would be inappropriate.","tags":["land_law","ch5","5.3 Tenancy in Common"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0073","type":"B","question":"Ann and Isabella, unmarried, buy a house contributing 30%/70% respectively and hold as tenants in common. Ann wants her share to pass to Isabella but never makes a will. What happens on Ann's death?","answer":"Her share passes under the intestacy rules to her children, not to Isabella — survivorship does not rescue the omission because they are tenants in common, not joint tenants.","tags":["land_law","ch5","5.3 Tenancy in Common"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"5.3.1 The declaration of trust","cards":[{"id":"LL_0074","type":"A","question":"What document is conclusive as to co-owners' agreed beneficial shares?","answer":"A declaration of trust, which records the co-owners' agreement on how the beneficial interest is held and is conclusive as to that agreement.","tags":["land_law","ch5","5.3.1 The declaration of trust"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0075","type":"E","question":"If co-owners contribute unequally to the purchase price but hold as joint tenants with no declaration of trust, how are sale proceeds split?","answer":"Equally, regardless of the unequal contribution — the party who paid more loses out unless a declaration of trust (or a tenancy in common with recorded shares) was put in place.","tags":["land_law","ch5","5.3.1 The declaration of trust"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"5.4 Severance","cards":[{"id":"LL_0076","type":"A","question":"Name six methods of severing an equitable joint tenancy into a tenancy in common.","answer":"Written notice; treating a share as separate (e.g. contracting to sell it); dealing with the equitable interest (disposing of, leasing, or mortgaging one's beneficial interest); mutual agreement; course of dealings; and bankruptcy (which automatically severs the bankrupt's beneficial interest).","tags":["land_law","ch5","5.4 Severance"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0077","type":"D","question":"Does severance affect the legal estate in co-owned land?","answer":"No — severance only converts the equitable joint tenancy into an equitable tenancy in common; the legal estate always remains held as a joint tenancy.","tags":["land_law","ch5","5.4 Severance"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0078","type":"D","question":"What happens to a joint tenant's beneficial interest on their bankruptcy?","answer":"It is automatically severed and converted into a tenancy in common, as the interest vests in the trustee in bankruptcy.","tags":["land_law","ch5","5.4 Severance"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0079","type":"B","question":"Ishaaq, Zakariya and Ali hold the beneficial interest in land as joint tenants. Ishaaq sells his equitable interest to Fred. What is the effect?","answer":"This severs the joint tenancy as to Ishaaq's share only — Ishaaq still holds the legal estate as trustee alongside Zakariya and Ali, but in equity there is now a tenancy in common between Fred (Ishaaq's former share), Zakariya, and Ali.","tags":["land_law","ch5","5.4 Severance"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"5.5 Determining the Parties' Intention","cards":[{"id":"LL_0080","type":"A","question":"If intention as to joint tenancy versus tenancy in common cannot be deduced, what does the court presume?","answer":"The court presumes equity follows the law — since the legal estate must be a joint tenancy, equity will presume a joint tenancy too, absent clear contrary evidence.","tags":["land_law","ch5","5.5 Determining the Parties' Intention"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"5.6 Overreaching on a Sale","cards":[{"id":"LL_0081","type":"A","question":"What is overreaching, and what is the key condition for it to occur automatically?","answer":"Overreaching is the automatic transfer of beneficial interests from the land to the sale proceeds on a sale, allowing the buyer to take free of those beneficial interests. The key condition is that the purchase money must be paid to two or more trustees (or a trust corporation) — payment to a sole trustee does not overreach.","tags":["land_law","ch5","5.6 Overreaching on a Sale"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0082","type":"E","question":"If a buyer pays purchase money to only one legal owner, is a non-owning beneficiary's interest overreached?","answer":"No — this is the single most tested point in this chapter. Any beneficial interest of a non-owning party is not overreached and may bind the buyer (especially if that party is in actual occupation). The fix is to ensure a second trustee is appointed before completion, or to obtain the beneficiary's written release of their rights (typically by having them join in and sign the contract).","tags":["land_law","ch5","5.6 Overreaching on a Sale"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0083","type":"A","question":"What register entry typically signals a hidden beneficial interest under a tenancy in common, and what does it require a buyer to do?","answer":"A Form A restriction on the proprietorship register — this signals that a behind-the-scenes beneficial interest exists (tenancy in common) and that overreaching (payment to two trustees) will be needed to give the buyer a clean title.","tags":["land_law","ch5","5.6 Overreaching on a Sale"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"5.7 Resolving Disputes — TLATA 1996","cards":[{"id":"LL_0084","type":"A","question":"Under which statutory sections can a co-owner apply to the court to resolve a dispute about trust property, and what does each section do?","answer":"Sections 14 and 15 of TLATA 1996. Section 14 allows a trustee or any other person with an interest in trust property to apply to the court for an order relating to the trustees' functions (e.g. an order for sale, or a declaration of the extent of a person's interest). Section 15 sets out the factors the court must weigh: (i) the intentions of those who created the trust; (ii) the purposes for which the property is held; (iii) the welfare of any minor occupying the property as their home; and (iv) the interests of any secured creditor of a beneficiary.","tags":["land_law","ch5","5.7 Resolving Disputes — TLATA 1996"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"5.7.1 Division of property on relationship breakdown","cards":[{"id":"LL_0085","type":"C","question":"On relationship breakdown, if property was transferred into joint names with no declaration of trust, what does the court presume, and how can this be displaced?","answer":"A legal and equitable joint tenancy (equal shares) is presumed, and the challenging party must prove a different common intention — which can be shown to have existed at purchase or to have arisen later, and can be inferred from conduct. Absent express or inferred intention, the court will award what it considers fair, having regard to the whole course of dealings between the parties.","tags":["land_law","ch5","5.7.1 Division of property on relationship breakdown"],"source":"Land_Law_SQE_Notes.pdf","note":""}]}]},{"id":"ch6","title":"6 . Leases","subchapters":[{"title":"6.1 The Landlord-Tenant Relationship","cards":[{"id":"LL_0086","type":"A","question":"What is the landlord's retained interest in a lease called, and how does privity of contract differ from privity of estate?","answer":"The landlord's retained interest is the reversion (the buyer of it is the assignee of the reversion). Privity of contract exists only between the original parties to the lease contract; privity of estate exists between whoever currently holds the landlord and tenant positions, even if not the original parties, and allows each to enforce the lease covenants against the other.","tags":["land_law","ch6","6.1 The Landlord-Tenant Relationship"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0087","type":"C","question":"What is the difference between a sublease and an assignment of a lease?","answer":"A sublease (underlease) is a further lease for a shorter term than the tenant's own, where the tenant becomes sub-landlord but remains tenant under the head lease. An assignment is a transfer of the tenant's entire remaining interest, where the tenant drops out entirely and the assignee steps into their shoes.","tags":["land_law","ch6","6.1 The Landlord-Tenant Relationship"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0088","type":"E","question":"If a tenant tries to grant a \"sublease\" for a term equal to or longer than their own remaining term, what happens?","answer":"It cannot take effect as a sublease, because there would be no reversion left for the tenant to revert to. Equity/the courts treat it instead as an assignment of the tenant's own lease.","tags":["land_law","ch6","6.1 The Landlord-Tenant Relationship"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.2 Registration of Leases at HM Land Registry","cards":[{"id":"LL_0089","type":"A","question":"What is the registration position for leases of more than 7 years, between 3 and 7 years, and 7 years or less?","answer":"More than 7 years: triggers compulsory first registration / must be substantively registered with its own title. Between 3 and 7 years: legal but unregistrable as a separate title, protected against a buyer of the reversion by entry of a notice on the landlord's register. 7 years or less: an overriding interest, binding automatically without any registration.","tags":["land_law","ch6","6.2 Registration of Leases at HM Land Registry"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0090","type":"E","question":"When is a reversionary lease void, and when must its grant be registered regardless of the lease's overall length?","answer":"A reversionary lease (where possession is deferred to a future date) is void if the gap between grant and the tenant taking possession exceeds 21 years; if the gap exceeds 3 months, the grant must be registered regardless of the lease's overall length.","tags":["land_law","ch6","6.2 Registration of Leases at HM Land Registry"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.3 Lease vs Licence","cards":[{"id":"LL_0091","type":"C","question":"How do courts distinguish a lease from a licence, regardless of the label the parties give the arrangement?","answer":"Courts look at the substance of the arrangement, not the label the parties give it. A licence is a mere personal permission to be on land, creating no proprietary interest, unable to bind third parties, and giving the occupier none of the statutory protections (security of tenure, rent regulation) that attach to a tenancy.","tags":["land_law","ch6","6.3 Lease vs Licence"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.4 Essential Characteristics of a Lease","cards":[{"id":"LL_0092","type":"A","question":"What three essential characteristics must an arrangement have to be a lease, and is rent essential?","answer":"Certainty of term (start and end ascertainable at the outset); exclusive possession (the right to exclude everyone, including the landlord); and appropriate formalities. Rent is not essential to a lease, though it is usual.","tags":["land_law","ch6","6.4 Essential Characteristics of a Lease"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.4.1 Certainty of term","cards":[{"id":"LL_0093","type":"E","question":"Is a lease void only if its length is uncertain, or can it also be void if the commencement date is uncertain?","answer":"A lease is equally void if the length is certain but the commencement date is uncertain. This is a common trap, since students often only check the end date.","tags":["land_law","ch6","6.4.1 Certainty of term"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0094","type":"B","question":"A landlord grants \"a tenancy of the flat to continue for as long as the tenant remains employed by the landlord's company.\" Is this a valid lease?","answer":"No — this is void for uncertainty of term, because the end point depends on a contingent future event, not a fixed or calculable date.","tags":["land_law","ch6","6.4.1 Certainty of term"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.4.2 Exclusive possession","cards":[{"id":"LL_0095","type":"A","question":"What are the \"four unities\" needed for multiple occupants to hold exclusive possession together as joint tenants?","answer":"Unity of time, title, interest, and possession — each must hold an identical interest, granted under the same document, at the same time, with an equal right to possess the whole.","tags":["land_law","ch6","6.4.2 Exclusive possession"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0096","type":"E","question":"Do courts treat commercial control clauses limiting exclusive possession the same as similar clauses in domestic/residential settings?","answer":"No — courts are far less willing to strike down clauses that genuinely limit exclusive possession in a commercial setting than in a domestic one. A control clause that would be a \"sham\" between cohabiting partners may be perfectly genuine, and therefore licence-creating, in a commercial lease.","tags":["land_law","ch6","6.4.2 Exclusive possession"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0118","type":"A","question":"What must a service occupier show to have only a licence rather than a lease?","answer":"A factual nexus between their employment and the occupation, and that occupying helps them better perform their duties — e.g. a vicar or armed forces accommodation, because the property will be needed back for a successor employee.","tags":["land_law","ch6","6.4.2 Exclusive possession"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.5 Common Types of Lease","cards":[{"id":"LL_0117","type":"A","question":"What notice period generally applies to terminate a periodic tenancy, and what is the exception?","answer":"Notice must generally be at least one full period, expiring at the end of a completed period — except a yearly periodic tenancy, which always requires six months' notice expiring at the end of a period.","tags":["land_law","ch6","6.5 Common Types of Lease"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.6 Formalities for Creating a Lease","cards":[{"id":"LL_0097","type":"C","question":"What length lease can be created without a deed, and what two conditions must be met?","answer":"A legal lease of 3 years or less can be created orally/informally, provided (i) the tenant takes immediate possession, and (ii) rent is the best obtainable without taking a premium.","tags":["land_law","ch6","6.6 Formalities for Creating a Lease"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0098","type":"A","question":"What formality is always required to assign a legal lease, even a short informal one?","answer":"A deed — assignment of a legal lease must always be by deed, even if the lease itself needed no deed to be created.","tags":["land_law","ch6","6.6 Formalities for Creating a Lease"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0099","type":"C","question":"If a lease fails the deed requirement but satisfies land contract formalities, what results, and how is it protected?","answer":"An equitable lease arises. It is protected in unregistered land by a Class C(iv) land charge, and in registered land by a notice on the charges register — absent protection, a purchaser for value of the landlord's interest takes free of it, unless the tenant is in actual occupation (making it an overriding interest).","tags":["land_law","ch6","6.6 Formalities for Creating a Lease"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.7.1 Common express covenants","cards":[{"id":"LL_0100","type":"C","question":"What is the difference between the quiet enjoyment covenant and the non-derogation from grant covenant?","answer":"Quiet enjoyment protects against direct interference with use of the demised premises (e.g. landlord erecting scaffolding blocking access). Non-derogation from grant prevents the landlord from doing something elsewhere (e.g. letting a neighbouring unit to a competing or disruptive business) that defeats the very purpose of the letting. Students often wrongly treat these as identical.","tags":["land_law","ch6","6.7.1 Common express covenants"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0101","type":"C","question":"What is the difference between a qualified and an absolute covenant against alterations?","answer":"A qualified covenant allows alterations with the landlord's consent, not to be unreasonably withheld. An absolute bar means no alterations at all, with consent at the landlord's complete discretion.","tags":["land_law","ch6","6.7.1 Common express covenants"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.7.2 Statutory implied covenants","cards":[{"id":"LL_0102","type":"A","question":"What structural and installation repairs are implied into short residential leases by statute, and can these be excluded?","answer":"The landlord must keep in repair the structure and exterior of the dwelling (plasterwork, staircases, banisters, drains, gutters, external pipes — but not mere decoration/fittings) and keep installations for water, gas, electricity, sanitation and heating in repair and working order. These statutory covenants cannot be excluded.","tags":["land_law","ch6","6.7.2 Statutory implied covenants"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.8.1 Non-payment of rent","cards":[{"id":"LL_0103","type":"A","question":"What is CRAR and what can it not recover?","answer":"Commercial Rent Arrears Recovery — a statutory self-help seizure-and-sale procedure for wholly commercial premises (no use as a dwelling); the landlord must give 7 days' notice before a certificated enforcement agent can seize and sell the tenant's goods. It cannot recover service charge arrears.","tags":["land_law","ch6","6.8.1 Non-payment of rent"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0104","type":"A","question":"What is forfeiture for non-payment of rent, and when can a landlord be taken to have waived the right to forfeit?","answer":"Forfeiture is re-entry and termination of the lease for breach; it must be an express term (never implied), and the tenant may pay arrears and apply for relief from forfeiture. The landlord waives the right to forfeit if, with knowledge of the breach, they demand or accept rent, or otherwise treat the lease as continuing.","tags":["land_law","ch6","6.8.1 Non-payment of rent"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.8.2 Breach of repairing covenant","cards":[{"id":"LL_0105","type":"A","question":"What is a Jervis v Harris clause and how does it benefit a landlord seeking to remedy a breach of a repairing covenant?","answer":"A lease clause (named after Jervis v Harris (1995)) that lets the landlord serve notice specifying breaches, enter and carry out repairs itself if the tenant fails to act promptly, and recover the cost as a debt — a simpler claim than a damages action, and not subject to the statutory cap on damages for breach of a repairing covenant.","tags":["land_law","ch6","6.8.2 Breach of repairing covenant"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0106","type":"A","question":"What must a s.146 LPA 1925 notice specify before a landlord can forfeit for breach of a repairing (or other) covenant?","answer":"It must specify the breach, require it to be remedied within a reasonable time (if capable of remedy), and require compensation if the landlord wants it.","tags":["land_law","ch6","6.8.2 Breach of repairing covenant"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.9 Continuing Liability","cards":[{"id":"LL_0107","type":"C","question":"Under the Landlord and Tenant (Covenants) Act 1995, how does an original tenant's liability differ between leases granted before 1996 and after 1995, and what date determines which regime applies?","answer":"For \"old\" leases (granted before 1996), the original tenant remains liable for the whole term even after assigning, unless expressly released, and the original landlord remains liable likewise. For \"new\" leases (granted after 1995), the assignor is automatically released on assignment, with no liability for a successor's later breaches, though the landlord has no automatic release. The date the lease was originally granted determines which regime applies, not the date of any later assignment.","tags":["land_law","ch6","6.9 Continuing Liability"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0108","type":"D","question":"What does an Authorised Guarantee Agreement (AGA) guarantee, and when does it end?","answer":"The outgoing tenant guarantees performance by their immediate successor only — it ends when that successor itself assigns. An AGA does not make the original tenant liable all the way down the chain of assignments.","tags":["land_law","ch6","6.9 Continuing Liability"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0109","type":"B","question":"Priya took a 2003 (post-1996) commercial lease and assigned to Raj in 2010 with an AGA. Raj assigned to Sunita in 2016, and Sunita assigned to Tariq in 2022, who is now in arrears. Can the landlord pursue Priya?","answer":"No — Priya's AGA liability ended once Raj himself assigned to Sunita. The landlord also cannot pursue Raj or Sunita unless one of them separately gave an AGA to their immediate successor. Had the lease instead been granted in 1994 (pre-1996), Priya would remain liable for the whole term, including Tariq's arrears, regardless of how many assignments occurred.","tags":["land_law","ch6","6.9 Continuing Liability"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.10 Subletting","cards":[{"id":"LL_0110","type":"D","question":"Is there privity of estate between a head landlord and a subtenant, and what follows from this?","answer":"No — so the head landlord generally cannot directly enforce head-lease covenants against the subtenant (though a use covenant may be enforceable as a restrictive covenant under Chapter 8's rules).","tags":["land_law","ch6","6.10 Subletting"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.11 Covenants Against Assignment/Subletting","cards":[{"id":"LL_0111","type":"C","question":"What is the difference between an absolute and a qualified covenant against assignment/subletting?","answer":"An absolute covenant is a total bar — the tenant cannot assign/sublet under any circumstances. A qualified covenant permits assignment/subletting with the landlord's consent, which, if required, may not be unreasonably withheld or delayed.","tags":["land_law","ch6","6.11 Covenants Against Assignment/Subletting"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0112","type":"A","question":"Name four reasonable grounds a landlord may rely on to refuse consent under a qualified covenant against assignment.","answer":"No bank reference for the incoming tenant; the proposed use breaches a use covenant; the incoming tenant would compete with the landlord's/another tenant's business; or the landlord doubts the incoming tenant's ability to pay rent.","tags":["land_law","ch6","6.11 Covenants Against Assignment/Subletting"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.12 Effect of Assignment","cards":[{"id":"LL_0113","type":"E","question":"If a landlord unreasonably refuses consent under a qualified covenant and the tenant assigns anyway, does the assignment still take effect?","answer":"Yes — the assignment still takes effect between assignor and assignee, but the tenant is in breach of covenant. The safer route is to seek a court declaration that the refusal was unreasonable, rather than assigning regardless and risking forfeiture if the court disagrees.","tags":["land_law","ch6","6.12 Effect of Assignment"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0114","type":"D","question":"Does assignment of a head lease affect an existing sublease?","answer":"No — the incoming head tenant becomes the subtenant's new landlord, taking the head lease subject to the sublease.","tags":["land_law","ch6","6.12 Effect of Assignment"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"6.13 Termination of Leases","cards":[{"id":"LL_0115","type":"C","question":"Can frustration apply to a lease where the building burns down?","answer":"No — frustration requires destruction of the land itself (e.g. coastal erosion), not merely the structure on it, because insurance and rebuilding obligations are the normal mechanism for fire damage. Fire destroying only the building does not frustrate the lease.","tags":["land_law","ch6","6.13 Termination of Leases"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0116","type":"C","question":"What is the effect on an existing sublease when the head lease ends by surrender or merger, compared with expiry, notice, or forfeiture?","answer":"On surrender or merger, the sublease survives — the subtenant becomes tenant of the head landlord directly on the sublease terms. On expiry, notice to quit, or forfeiture, the sublease generally ends too.","tags":["land_law","ch6","6.13 Termination of Leases"],"source":"Land_Law_SQE_Notes.pdf","note":""}]}]},{"id":"ch7","title":"7 . Easements and Profits a Prendre","subchapters":[{"title":"7.1 What Is an Easement?","cards":[{"id":"LL_0119","type":"A","question":"What is an easement, and is the list of rights capable of being easements closed?","answer":"An easement is a right benefiting one piece of land (the dominant tenement) exercised over another piece of land (the servient tenement), which bears the burden. Common examples include a right of way and a right to run service cables/pipes. The list of rights capable of being easements is not closed — new types can be recognised as society's needs change.","tags":["land_law","ch7","7.1 What Is an Easement?"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"7.1.1 The four characteristics of an easement","cards":[{"id":"LL_0120","type":"A","question":"What four characteristics must a right have to be an easement, per Re Ellenborough Park?","answer":"There must be a dominant and a servient tenement; the right must accommodate (benefit) the dominant tenement; the tenements must be in separate ownership; and the right must be of a recognised type and described with sufficient certainty.","tags":["land_law","ch7","7.1.1 The four characteristics of an easement"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0121","type":"E","question":"Why does a purely personal right, such as permission to fly racing pigeons from land, fail to be an easement?","answer":"It does not benefit the land itself, only the individual personally, so it fails the \"accommodates the dominant tenement\" requirement. The test is whether the right benefits the land (i.e. would benefit any owner of the dominant tenement), not merely whether it personally helps the current occupier.","tags":["land_law","ch7","7.1.1 The four characteristics of an easement"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"7.2 Profits a Prendre","cards":[{"id":"LL_0122","type":"C","question":"What distinguishes a profit a prendre held \"in gross\" from one held \"appurtenant\"?","answer":"In gross: free-standing, not attached to any dominant land, transferable independently. Appurtenant: attached to and benefits specific dominant land, similarly to an easement.","tags":["land_law","ch7","7.2 Profits a Prendre"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"7.3 Legal Requirements to Create a Legal Easement or Profit","cards":[{"id":"LL_0123","type":"A","question":"What two requirements must be met for an easement or profit to be legal?","answer":"It must be granted for an interest equivalent to a freehold or leasehold (a fixed period or indefinitely — not \"for life\", since a life is not a fixed period), and it must be created by deed.","tags":["land_law","ch7","7.3 Legal Requirements to Create a Legal Easement or Profit"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"7.4.1 Implied easements","cards":[{"id":"LL_0124","type":"A","question":"What kind of easement can be implied by necessity, and how narrow is this category?","answer":"Only a right of way, and only where the land is landlocked with no other means of access — this is the narrowest category of implied easement.","tags":["land_law","ch7","7.4.1 Implied easements"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0125","type":"A","question":"What two requirements must be satisfied for an easement implied by common intention?","answer":"(i) A common intention as to how the land was to be used, and (ii) it being impossible to give effect to that intention without the easement.","tags":["land_law","ch7","7.4.1 Implied easements"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0126","type":"A","question":"What three requirements must be satisfied under the rule in Wheeldon v Burrows, and does it apply to reservations?","answer":"The right must be continuous and apparent; necessary for reasonable enjoyment of the land (not absolute necessity); and used by the seller for the benefit of the land sold at the date of conveyance. It applies only to grants, never to reservations.","tags":["land_law","ch7","7.4.1 Implied easements"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0127","type":"C","question":"How does s.62 LPA 1925 differ from the rule in Wheeldon v Burrows in what it requires and what it can do?","answer":"Both can convert prior informal use into an easement, but s.62 requires a conveyance (legal deed) — it has no application to a mere contract — whereas Wheeldon v Burrows operates on any grant including equitable ones. Also, s.62 can upgrade a permission/licence (no prior proprietary right needed); Wheeldon v Burrows requires the use to have been by the common owner for the land's benefit.","tags":["land_law","ch7","7.4.1 Implied easements"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0128","type":"E","question":"Is there an implied reservation under s.62 LPA 1925 or Wheeldon v Burrows, and what are the only two recognised implied reservations?","answer":"No — neither s.62 nor Wheeldon v Burrows permits an implied reservation; this is a common trap, since the law strongly favours dominant owners (buyers) over a seller/grantor who should expressly reserve what they need. The only implied reservations recognised are necessity and common intention.","tags":["land_law","ch7","7.4.1 Implied easements"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"7.4.2 Prescription (long use)","cards":[{"id":"LL_0129","type":"A","question":"What two requirements must be shown to establish an easement by prescription, and name the three legal routes?","answer":"Use for more than 20 years, unchallenged, and \"as of right\" (without permission, without payment, and not by force or in secret). The three routes are: common law prescription (presumes use \"from time immemorial\"); lost modern grant (a legal fiction presuming a grant was once made and lost, on proof of 20 years' actual enjoyment); and the Prescription Act 1832 (statutory route, based on either 20 or 40 years' use depending on the right claimed).","tags":["land_law","ch7","7.4.2 Prescription (long use)"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"7.5 Protection of Easements — Registered Land","cards":[{"id":"LL_0130","type":"A","question":"How is an express legal easement over registered land protected, and what happens if unregistered?","answer":"By registration — a notice on the servient title's Charges Register and an entry on the dominant title's Property Register. If unregistered, it only takes effect in equity (assuming land contract formalities are met).","tags":["land_law","ch7","7.5 Protection of Easements — Registered Land"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0131","type":"A","question":"When can an implied or prescriptive legal easement override a registered disposition?","answer":"If the purchaser had actual knowledge of it, it was obvious on reasonably careful inspection, or it had been exercised within the year before the disposition.","tags":["land_law","ch7","7.5 Protection of Easements — Registered Land"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"7.6 Protection of Easements — Unregistered Land","cards":[{"id":"LL_0132","type":"A","question":"How must an equitable easement be protected in unregistered land, and do legal easements need the same protection?","answer":"An equitable easement must be registered as a Class D(iii) land charge to bind a purchaser. Legal easements bind a buyer of unregistered land automatically without registration, since legal rights bind the whole world.","tags":["land_law","ch7","7.6 Protection of Easements — Unregistered Land"],"source":"Land_Law_SQE_Notes.pdf","note":""}]}]},{"id":"ch8","title":"8 . Freehold Covenants","subchapters":[{"title":"8.1 What Is a Covenant?","cards":[{"id":"LL_0133","type":"A","question":"Define covenantor and covenantee, and which land takes the burden versus the benefit.","answer":"Covenantor: the person making the promise (usually the buyer, bears the burden). Covenantee: the person with the benefit of the promise (usually the seller). The land burdened by the covenant takes the burden; the land intended to benefit enjoys the benefit.","tags":["land_law","ch8","8.1 What Is a Covenant?"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"8.2 Restrictive vs Positive Covenants","cards":[{"id":"LL_0134","type":"C","question":"How do you tell whether a covenant is positive or restrictive, regardless of its wording?","answer":"Look at the steps required to comply — if money or action is needed, it is positive; if compliance requires no act, it is restrictive, even if phrased \"not to...\". For example, \"not to allow the fence to fall into disrepair\" looks restrictive but requires spending money/doing work to comply, so it is positive.","tags":["land_law","ch8","8.2 Restrictive vs Positive Covenants"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"8.3 Enforceability Between Original Parties","cards":[{"id":"LL_0135","type":"A","question":"Can the original covenantee always enforce a covenant against the original covenantor?","answer":"Yes — under ordinary contract law privity of contract, regardless of any later sale of either party's land. The original covenantor remains liable on the covenant even after selling the burdened land.","tags":["land_law","ch8","8.3 Enforceability Between Original Parties"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"8.4 Enforceability Between Successors in Title","cards":[{"id":"LL_0136","type":"A","question":"What is the \"no mixing\" rule for passing the benefit and burden of a freehold covenant between successors?","answer":"The benefit and burden must pass together under the same system (both at common law, or both in equity) — they cannot be mixed and matched. A student cannot pass the burden in equity but the benefit at common law (or vice versa) just because the facts happen to satisfy each set of conditions separately.","tags":["land_law","ch8","8.4 Enforceability Between Successors in Title"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"8.4.1 Passing the burden in equity","cards":[{"id":"LL_0137","type":"A","question":"What four requirements must be satisfied for the burden of a covenant to pass to a successor in equity?","answer":"The covenant must be negative (restrictive) in nature — a positive covenant's burden can never pass in equity; the covenant must touch and concern (accommodate) the dominant land; the burden must have been intended to run with the land (implied by statute unless expressly excluded); and the successor must have notice (via a Class D(ii) land charge in unregistered land, or a notice on the servient title's Charges Register in registered land).","tags":["land_law","ch8","8.4.1 Passing the burden in equity"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"8.4.2 Passing the benefit in equity","cards":[{"id":"LL_0138","type":"A","question":"What two core requirements plus which alternative mechanisms allow the benefit of a covenant to pass in equity?","answer":"The covenant must touch and concern the covenantee's land in which the successor now holds an estate; and the successor must show one of: annexation (the benefit expressly or impliedly attached to the land, happening automatically by statute unless excluded); express assignment (the benefit expressly assigned when the benefited land is sold); or a building scheme (allowing all plot owners to mutually enforce the same covenants against each other).","tags":["land_law","ch8","8.4.2 Passing the benefit in equity"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"8.4.3 Passing the burden at common law","cards":[{"id":"LL_0139","type":"D","question":"Does the burden of a positive covenant ever pass directly to a successor, at law or in equity?","answer":"No — there is no direct mechanism for a positive covenant's burden to bind a successor at law or in equity. The original covenantor remains liable indefinitely, so the covenantee's successor can always sue them if the benefit has passed, but the remedy is limited to damages and will not prevent further breaches.","tags":["land_law","ch8","8.4.3 Passing the burden at common law"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0140","type":"E","question":"What two indirect workarounds exist for enforcing a positive covenant's burden against a successor, and which case established the second?","answer":"A chain of indemnity covenants, where each successive buyer covenants to indemnify their seller (unreliable if any link is broken, e.g. an insolvent intermediate owner); and the mutual benefit and burden rule from Halsall v Brizell, where a successor cannot take the benefit of a right (e.g. use of a road) without also accepting the linked burden (e.g. paying for its upkeep).","tags":["land_law","ch8","8.4.3 Passing the burden at common law"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"8.4.4 Passing the benefit at common law","cards":[{"id":"LL_0141","type":"A","question":"What four requirements must be satisfied for the benefit of a covenant to pass to a successor at common law?","answer":"The covenant touches and concerns the covenantee's land; the covenant was intended to run with the legal estate held by the covenantee (by express or implied annexation); the original covenantee held a legal estate in the benefited land when the covenant was made; and the successor now holds a legal estate in that land too (not necessarily the same legal estate).","tags":["land_law","ch8","8.4.4 Passing the benefit at common law"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0142","type":"B","question":"Owen sells Southfield to Priya with a restrictive covenant benefiting his retained Northfield, then sells Northfield to Quentin. Can Quentin enforce the covenant against Priya at common law?","answer":"Yes — because all four common-law benefit requirements are met (touches and concerns; intended to run; Owen held a legal estate when made; Quentin now holds a legal estate). Had Owen instead only granted a lease of Northfield to a tenant, that tenant — holding a legal estate in the benefited land, even though not the freehold — could equally enforce the covenant.","tags":["land_law","ch8","8.4.4 Passing the benefit at common law"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"8.5 Summary","cards":[{"id":"LL_0143","type":"C","question":"What land charge class protects the burden of a restrictive covenant in unregistered land, and how is it protected in registered land?","answer":"A Class D(ii) land charge in unregistered land; a notice on the servient title's Charges Register in registered land.","tags":["land_law","ch8","8.5 Summary"],"source":"Land_Law_SQE_Notes.pdf","note":""}]}]},{"id":"ch9","title":"9 . Mortgages","subchapters":[{"title":"9.1 Creation of Mortgages","cards":[{"id":"LL_0144","type":"A","question":"What formality is required for a legal mortgage, and what makes a contract to create a legal mortgage give rise to an equitable mortgage?","answer":"A legal mortgage must be created by deed — clear on its face that it is a deed, signed by the mortgagor, witnessed/attested, and delivered (usually by dating). Any contract to create a legal mortgage gives rise to an equitable mortgage from the date of the contract, provided it satisfies land contract formalities.","tags":["land_law","ch9","9.1 Creation of Mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.2 Protection of Mortgages","cards":[{"id":"LL_0145","type":"A","question":"How is a legal mortgage of registered land protected, and what is the consequence of non-registration?","answer":"By registration as a registrable disposition — without registration it is only equitable, and the lender cannot exercise the statutory power to convey/sell the legal estate.","tags":["land_law","ch9","9.2 Protection of Mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0146","type":"E","question":"Does every legal mortgage of unregistered land need land charge registration to be protected?","answer":"No — this is a common trap. A first legal mortgagee who has taken possession of the title deeds is automatically protected without registering anything. The Class C(i) puisne mortgage registration requirement only catches legal mortgages where the deeds were not deposited with that lender (typically second or subsequent mortgages).","tags":["land_law","ch9","9.2 Protection of Mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0147","type":"C","question":"How is an equitable mortgage of an unregistered legal estate protected, compared with an equitable mortgage of an equitable interest under a trust?","answer":"An equitable mortgage of an unregistered legal estate must be registered as a Class C(iii) land charge. An equitable mortgage of an equitable interest under a trust of land has no land charge registration available; instead the mortgagee should give notice to the trustees.","tags":["land_law","ch9","9.2 Protection of Mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.3.1 The right to redeem","cards":[{"id":"LL_0148","type":"C","question":"Distinguish the mortgagor's \"redemption date\" from the \"repayment period\".","answer":"Redemption date is the earliest date the loan can be paid off; repayment period is the longest time allowed to pay it off in full. They serve opposite functions and are often muddled.","tags":["land_law","ch9","9.3.1 The right to redeem"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0149","type":"D","question":"Is a clause excluding the mortgagor's right to redeem valid, and what about a clause merely postponing redemption?","answer":"A clause excluding the right to redeem entirely is void. A clause postponing redemption will be void if it renders the right illusory, e.g. postponing redemption until almost nothing of value remains in the estate (such as postponing redemption of a 20-year lease for 19 years).","tags":["land_law","ch9","9.3.1 The right to redeem"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.3.2 Option to purchase","cards":[{"id":"LL_0150","type":"E","question":"Is an option to purchase clause inside the mortgage deed itself valid?","answer":"No — it is void as inconsistent with the right to redeem. A wholly separate, untied option-to-purchase agreement between the same parties can still be valid.","tags":["land_law","ch9","9.3.2 Option to purchase"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.3.3 Collateral advantage","cards":[{"id":"LL_0151","type":"E","question":"When will a collateral advantage, such as a solus tie (e.g. a publican tied to a brewery's beer), be void?","answer":"If it clogs or fetters the right to redeem — a collateral advantage that continues beyond the redemption date will usually be void, even though collateral advantages are not automatically void.","tags":["land_law","ch9","9.3.3 Collateral advantage"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.3.4 Unconscionable terms","cards":[{"id":"LL_0152","type":"A","question":"What makes a mortgage term \"unconscionable\", and give an example.","answer":"It is morally reprehensible or improper and affects the court's conscience, typically through exploitatively high interest rates imposed amid a significant imbalance of bargaining power (e.g. 19% rising to 57% on default has been held unconscionable).","tags":["land_law","ch9","9.3.4 Unconscionable terms"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.4.1 Tenants","cards":[{"id":"LL_0153","type":"C","question":"When does a legal tenancy of 7 years or less, granted before the mortgage, bind the mortgagee on registered land?","answer":"Automatically — it is an overriding interest.","tags":["land_law","ch9","9.4.1 Tenants"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.4.2 Occupiers with a beneficial interest","cards":[{"id":"LL_0154","type":"B","question":"Compare: a mortgage advance paid to a sole legal owner where a non-owning occupier has a beneficial interest, versus an advance paid to two registered proprietors where a behind-the-scenes contributor occupies. In which case does the mortgagee win?","answer":"Where the advance is paid to a sole legal owner, the non-owning occupier's beneficial interest is not overreached — combined with actual occupation, this gives an overriding interest binding the mortgagee. Where the advance is paid to two trustees, the behind-the-scenes contributor's beneficial interest is overreached on payment to the two trustees, so it does not bind the mortgagee even though they are in occupation.","tags":["land_law","ch9","9.4.2 Occupiers with a beneficial interest"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0155","type":"E","question":"Does actual occupation always protect a beneficiary's interest against a mortgagee seeking possession?","answer":"No — actual occupation only creates an overriding interest if the underlying beneficial interest has not been overreached. Payment of mortgage money to two or more trustees overreaches the interest regardless of occupation.","tags":["land_law","ch9","9.4.2 Occupiers with a beneficial interest"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.4.3 Undue influence","cards":[{"id":"LL_0156","type":"A","question":"What two steps should a lender take to avoid a mortgage being set aside for undue influence where a co-owner guarantees another's debt?","answer":"Ensure the vulnerable party is separately represented by their own solicitor, and is given full financial information, with the solicitor confirming the practical implications have been understood and providing a certificate of confirmation to the lender. If followed, the mortgage will generally stand even if undue influence is later alleged.","tags":["land_law","ch9","9.4.3 Undue influence"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.5.1 Legal mortgages","cards":[{"id":"LL_0157","type":"A","question":"What two conditions must be satisfied for a mortgagee's statutory power of sale to even exist (as opposed to be exercisable)?","answer":"The mortgage was created by deed, and the contractual date for redemption has passed.","tags":["land_law","ch9","9.5.1 Legal mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0158","type":"A","question":"What three alternative triggers make the power of sale exercisable?","answer":"Interest more than 2 months in arrears; OR 3 months passed since a written demand for capital repayment; OR breach of another mortgage term (e.g. failure to insure the property).","tags":["land_law","ch9","9.5.1 Legal mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0159","type":"D","question":"What is foreclosure and why is it rarely used?","answer":"A court process extinguishing the right to redeem and vesting ownership in the mortgagee, only available after the contractual redemption date has passed. It is rarely used because it lacks the finality and practicality of a sale (the court retains discretion and the process is cumbersome).","tags":["land_law","ch9","9.5.1 Legal mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0160","type":"D","question":"Whose agent is a receiver appointed by a mortgagee, and in what context are receivers more commonly used?","answer":"The mortgagor's agent (not the mortgagee's), who manages/sells the property. Receivers are more common in commercial than domestic mortgages.","tags":["land_law","ch9","9.5.1 Legal mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.5.2 Equitable mortgages","cards":[{"id":"LL_0161","type":"C","question":"How does an equitable mortgagee's power of sale differ from a legal mortgagee's, and when does the right to appoint a receiver arise automatically?","answer":"An equitable mortgagee has the same basic remedies (sue for the debt, take possession, foreclose) but has no statutory power to transfer the legal estate on a sale, so a court order/separate mechanism is typically needed to vest legal title in a buyer. The right to appoint a receiver only arises automatically if the mortgage was made by deed; otherwise an application to the court is needed.","tags":["land_law","ch9","9.5.2 Equitable mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""}]},{"title":"9.6 Priority of Mortgages","cards":[{"id":"LL_0162","type":"C","question":"How is priority ranked between two legal mortgages of a registered legal estate, versus two legal mortgages of an unregistered legal estate where deeds were not deposited?","answer":"For registered land, legal mortgages rank by order of registration on the register (absent a contrary entry); an overriding interest existing before the mortgage was registered still takes priority over it. For unregistered land where deeds were not deposited, mortgages rank by date of registration as a Class C(i) land charge (puisne mortgage).","tags":["land_law","ch9","9.6 Priority of Mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0163","type":"E","question":"Does failing to register a required Class C(i) or C(iii) land charge merely lower a mortgage's priority?","answer":"No — this is a common trap. Failing to register renders the mortgage void against a later purchaser of any interest in the land (not just against a later mortgagee), not merely lower-ranked.","tags":["land_law","ch9","9.6 Priority of Mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""},{"id":"LL_0164","type":"A","question":"How is priority ranked for two mortgages of an equitable interest (whether under registered or unregistered title)?","answer":"The same rule applies either way — first in time takes priority.","tags":["land_law","ch9","9.6 Priority of Mortgages"],"source":"Land_Law_SQE_Notes.pdf","note":""}]}]}]},{"id":"property_practice","title":"Property Practice","color":"#dfc9a0","chapters":[{"id":"ch1","title":"1 . Freehold and Leasehold Transactions","subchapters":[{"title":"1.2 Leasehold Transactions","cards":[{"id":"PP_0001","type":"A","question":"What is the typical length of a long residential lease?","answer":"Typically 99, 125 or 999 years, distinct from a short assured shorthold tenancy.","tags":["property_practice","ch1","1.2 Leasehold Transactions"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0003","type":"A","question":"What is a 'premium' in a leasehold transaction?","answer":"The significant up-front purchase price paid by the tenant on the grant of a long lease, in exchange for which the annual rent is nominal (e.g. £100).","tags":["property_practice","ch1","1.2 Leasehold Transactions"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"1.2.1 Types of Lease","cards":[{"id":"PP_0002","type":"A","question":"At what lease length does a new lease become compulsorily registrable at HMLR?","answer":"Where the term exceeds seven years.","tags":["property_practice","ch1","1.2.1 Types of Lease"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0005","type":"E","question":"Can an underlease be granted for longer than the head lease?","answer":"No — an underlease cannot exceed the remaining term of the head lease.","tags":["property_practice","ch1","1.2.1 Types of Lease"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"1.2.2 Grant of a New Lease vs Assignment of an Existing Lease","cards":[{"id":"PP_0004","type":"C","question":"Distinguish 'grant of a new lease' from 'assignment of an existing lease'.","answer":"Grant creates a brand-new leasehold estate (the freeholder is landlord/seller, the first tenant is buyer); assignment transfers the residue of an existing lease (the outgoing tenant is seller, the incoming tenant is buyer). Registration also differs: a grant of a term exceeding 7 years creates a new leasehold title and number, whereas an assignment's details simply appear on the existing leasehold title's property register and the freehold title's charges register.","tags":["property_practice","ch1","1.2.2 Grant of a New Lease vs Assignment of an Existing Lease"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"1.2.3 Management Companies","cards":[{"id":"PP_0010","type":"A","question":"What document usually governs the role of a management company in a leasehold block?","answer":"The lease itself, which addresses freehold transfer to the company and tenant shareholding, supplemented by the company's Memorandum and Articles of Association.","tags":["property_practice","ch1","1.2.3 Management Companies"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"1.2.4 Key Lease Provisions","cards":[{"id":"PP_0007","type":"E","question":"What type of clause restricting assignment is unacceptable in a long residential lease?","answer":"An absolute prohibition against assignment — alienation provisions often require landlord consent (not unreasonably withheld) instead.","tags":["property_practice","ch1","1.2.4 Key Lease Provisions"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"1.3 Commercial Leases","cards":[{"id":"PP_0006","type":"A","question":"What is an Authorised Guarantee Agreement (AGA)?","answer":"A written obligation under which an outgoing tenant, as a condition of the landlord's consent to assignment, guarantees the performance of the lease covenants by their immediate successor in title.","tags":["property_practice","ch1","1.3 Commercial Leases"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0008","type":"B","question":"A tenant under a 15-year commercial lease wants to assign the remaining 6 years. The landlord requires consent (not unreasonably withheld), asks for 3 years of accounts and bank references from the proposed assignee, and (being unconvinced of their financial strength) also requires an Authorised Guarantee Agreement from the outgoing tenant. Is this permissible?","answer":"Yes — the landlord's request for security via referencing and an AGA is a reasonable response to a legitimate concern about the incoming tenant's ability to pay rent.","tags":["property_practice","ch1","1.3 Commercial Leases"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0009","type":"D","question":"What is a rent deposit and what is a typical amount?","answer":"An extra sum paid by an incoming tenant on completion, held by the landlord as security against default; three months' rent is typical.","tags":["property_practice","ch1","1.3 Commercial Leases"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch2","title":"2 . Taking Instructions and Professional Conduct","subchapters":[{"title":"2.3 Capital Gains Tax (CGT)","cards":[{"id":"PP_0011","type":"A","question":"Within how many days of completion must a seller pay CGT to HMRC (where due)?","answer":"60 days of completion; no return is required if no CGT is due.","tags":["property_practice","ch2","2.3 Capital Gains Tax (CGT)"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0012","type":"A","question":"What relief usually removes CGT exposure on a residential sale?","answer":"Private Residence Relief, which means most residential sales escape CGT.","tags":["property_practice","ch2","2.3 Capital Gains Tax (CGT)"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"2.4.1 Undertakings","cards":[{"id":"PP_0019","type":"A","question":"What is an 'undertaking' in conveyancing practice?","answer":"A promise enforceable against the solicitor personally and their firm, arising whenever a solicitor (or firm member) states they will do something; conveyancing relies heavily on solicitors giving and relying on undertakings, e.g. to redeem a mortgage on completion.","tags":["property_practice","ch2","2.4.1 Undertakings"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"2.4.2 Confidentiality","cards":[{"id":"PP_0014","type":"D","question":"What must a solicitor do if a conflict arises while acting for both buyer and lender?","answer":"Cease acting for the lender; the solicitor may continue acting for the buyer alone if no other conduct issue (e.g. a confidentiality breach) prevents it — the buyer's duty prevails over the lender relationship.","tags":["property_practice","ch2","2.4.2 Confidentiality"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"2.4.3 Conflicts of Interest","cards":[{"id":"PP_0013","type":"A","question":"What three conditions allow a solicitor to act for both buyer and lender in the same transaction?","answer":"(1) The lender is an institutional lender in the ordinary course of business; (2) the standard certificate of title is used; (3) there is no conflict of interest, or significant risk of one.","tags":["property_practice","ch2","2.4.3 Conflicts of Interest"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0020","type":"D","question":"Why should a solicitor not act for both a parent gifting a deposit and the buyer-child receiving it?","answer":"Because of the possibility of a conflict of interest arising between the gifting parent and the buyer.","tags":["property_practice","ch2","2.4.3 Conflicts of Interest"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"2.4.4 Joint Instructions","cards":[{"id":"PP_0015","type":"E","question":"Is one spouse's instructions and ID sufficient for a joint sale or purchase by both spouses?","answer":"No — the solicitor must obtain instructions and identification documentation from each client individually; one spouse providing both is insufficient, though once joint instructions are properly taken the clients may agree that one of them takes the lead on day-to-day instructions.","tags":["property_practice","ch2","2.4.4 Joint Instructions"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"2.4.5 Co-Ownership Advice","cards":[{"id":"PP_0016","type":"A","question":"What can the legal estate in co-owned land be held as, as opposed to the beneficial interest?","answer":"The legal estate can only be held as joint tenants (maximum of four legal owners), while the beneficial interest can be held as joint tenants or tenants in common.","tags":["property_practice","ch2","2.4.5 Co-Ownership Advice"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0017","type":"D","question":"Why is a declaration of trust recommended where co-buyers hold as tenants in common?","answer":"It records the parties' respective contributions and shares, which matters because survivorship does not apply to tenants in common — the parties should also make or review their wills.","tags":["property_practice","ch2","2.4.5 Co-Ownership Advice"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"2.5 The Law Society Conveyancing Protocol","cards":[{"id":"PP_0018","type":"E","question":"Does the Law Society Conveyancing Protocol apply to new-build purchases or commercial property?","answer":"No — the Protocol is a best-practice statement for residential conveyancing using the Law Society's standard contract and forms, but it excludes new-build homes and commercial property.","tags":["property_practice","ch2","2.5 The Law Society Conveyancing Protocol"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch3","title":"3 . Pre-Market and Pre-Contract (Stages 1-2)","subchapters":[{"title":"3.1 Pre-Market (Stage 1)","cards":[{"id":"PP_0033","type":"A","question":"What is a 'memorandum of sale'?","answer":"The document an estate agent sends to all parties and solicitors once a price is agreed, detailing the property, price and solicitors instructed.","tags":["property_practice","ch3","3.1 Pre-Market (Stage 1)"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"3.1.1 Energy Performance Certificate (EPC)","cards":[{"id":"PP_0021","type":"A","question":"How long is an Energy Performance Certificate (EPC) valid for, and name two situations where one is not required.","answer":"Valid for 10 years. Not required where the property is a listed building, or where the seller already holds a valid EPC less than 10 years old.","tags":["property_practice","ch3","3.1.1 Energy Performance Certificate (EPC)"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"3.2.2 Seller's Duty of Disclosure","cards":[{"id":"PP_0022","type":"C","question":"Distinguish a latent defect from a patent defect, and state the seller's duty of disclosure for each.","answer":"Latent defect: not apparent on inspection (e.g. an underground pipeline easement or restrictive covenant) — must be disclosed in the contract. Patent defect: apparent on inspection (e.g. a visible right of way) — no duty to disclose, caveat emptor ('buyer beware'). Physical defects (e.g. rotten timbers) are never covered by the disclosure duty, which is why a buyer survey is advised.","tags":["property_practice","ch3","3.2.2 Seller's Duty of Disclosure"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0023","type":"D","question":"What happens if a seller actively conceals a patent defect, e.g. by painting over a wall crack?","answer":"This is wilful deceit, giving the buyer a claim in tort, even though there was no general duty to disclose a patent defect — active concealment is distinct from a mere failure to disclose.","tags":["property_practice","ch3","3.2.2 Seller's Duty of Disclosure"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"3.2.3 – 3.2.4 The Contract Package","cards":[{"id":"PP_0030","type":"C","question":"What is 'good leasehold' title and why does it matter to a buyer's lender?","answer":"Good leasehold title arises where the landlord's freehold title was not produced to HMLR on first registration of the leasehold title. This is normally unacceptable to a buyer's lender (which requires title absolute), so the buyer's solicitor should require the landlord to produce the freehold title so the leasehold title can be upgraded before exchange.","tags":["property_practice","ch3","3.2.3 – 3.2.4 The Contract Package"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"3.2.5 Form of Contract","cards":[{"id":"PP_0024","type":"A","question":"What is the standard deposit percentage under the Standard Conditions of Sale, and how is it held?","answer":"10% of the purchase price, paid on exchange, held by the seller's solicitor as stakeholder (not released to the seller until completion) unless varied to 'agent' (e.g. for new builds).","tags":["property_practice","ch3","3.2.5 Form of Contract"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0025","type":"D","question":"Is a buyer who pays a reduced deposit liable for the full 10% on default?","answer":"Yes, unless the contract is varied to say otherwise — a deposit shortfall does not cap the buyer's liability on default.","tags":["property_practice","ch3","3.2.5 Form of Contract"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0026","type":"E","question":"What two conditions must be met to use a deposit received from a sale towards the deposit on a related purchase?","answer":"The related purchase must be in England and Wales, and must be for use as the party's residence — e.g. Priya can use a £15,000 deposit from selling her flat towards her £20,000 deposit on a new home she will live in, but could not do so if the new property were purely a buy-to-let.","tags":["property_practice","ch3","3.2.5 Form of Contract"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0027","type":"C","question":"Distinguish full, limited and no title guarantee, and identify a typical seller for each.","answer":"Full: seller guarantees entitlement to sell and will do all in their power (at their own cost) to transfer title, free from undisclosed charges/encumbrances — typical of a seller with full legal/equitable interest who has occupied the property. Limited: seller only warrants they have not themselves created undisclosed charges/rights during their ownership — typical of a seller with less knowledge/involvement, e.g. a personal representative. No guarantee: no warranty given at all — typical of a mortgagee in possession, or a gift.","tags":["property_practice","ch3","3.2.5 Form of Contract"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0028","type":"A","question":"If the completion date is not fixed in the contract, when does completion default to under the Standard Conditions of Sale?","answer":"20 working days after exchange.","tags":["property_practice","ch3","3.2.5 Form of Contract"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0031","type":"A","question":"What is the standard commercial equivalent of the Standard Conditions of Sale?","answer":"The Standard Commercial Property Conditions (SCPC), comprising Part 1 (general conditions) and Part 2 (optional conditions, e.g. VAT, transfer of a going concern, taxation allowances).","tags":["property_practice","ch3","3.2.5 Form of Contract"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"3.2.6 – 3.2.7 PIF and Fittings & Contents Form","cards":[{"id":"PP_0029","type":"A","question":"What must a non-owning occupier of the property sign before completion, and why?","answer":"The contract, confirming they will relinquish any rights in the property and vacate on completion; the buyer is entitled to rely on the seller's PIF answers, and misrepresentation in the PIF can found a claim.","tags":["property_practice","ch3","3.2.6 – 3.2.7 PIF and Fittings & Contents Form"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"3.2.8 Title Defects and Indemnity Insurance","cards":[{"id":"PP_0032","type":"E","question":"What two main remedies exist for a title defect discovered during a transaction?","answer":"A deed of variation/rectification to fix the defect, or indemnity insurance to cover future loss (e.g. an undisclosed covenant, a missing deed in the chain of title, breach of covenant, or adverse possession) where a fix is impractical due to cost, time, or a third party's refusal to consent.","tags":["property_practice","ch3","3.2.8 Title Defects and Indemnity Insurance"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch4","title":"4 . Investigating Title","subchapters":[{"title":"4.1 Registered Land — The Register of Title","cards":[{"id":"PP_0034","type":"A","question":"What are the four parts of the HMLR register of title, and what does each contain?","answer":"Header (unique title number, edition date, date/time of the official copy used as the 'search from' date, relevant Land Registry office); Property Register (postal address, title plan reference, legal estate held and lease details if leasehold, plus benefiting rights such as a right of way); Proprietorship Register (class of title and current registered proprietor(s); restrictions and indemnity/positive covenants are noted here); Charges Register (burdens/encumbrances on the land, e.g. restrictive covenants and mortgages).","tags":["property_practice","ch4","4.1 Registered Land — The Register of Title"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0035","type":"B","question":"A seller mentions their driveway crosses a neighbour's land, and separately has an existing mortgage. Where should the buyer's solicitor check for each?","answer":"For the right of way, check the Property Register for an easement entry confirming it is properly registered. For the mortgage, check the Charges Register and obtain an undertaking to redeem it from sale proceeds on completion.","tags":["property_practice","ch4","4.1 Registered Land — The Register of Title"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"4.2 Unregistered Land","cards":[{"id":"PP_0040","type":"A","question":"What is an 'epitome of title'?","answer":"A chronological list of title deeds/documents (with copies attached) sent to the buyer's solicitor in place of the original deeds, used when investigating unregistered title.","tags":["property_practice","ch4","4.2 Unregistered Land"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"4.2.1 Root of Title","cards":[{"id":"PP_0036","type":"A","question":"What is the minimum age for a document to be a 'good root of title' for unregistered land, and name two further requirements.","answer":"At least 15 years old at the date of the contract. It must also deal with the whole legal and equitable interest, adequately describe the property, and do nothing to cast doubt on title; a conveyance on sale is the best root (title was investigated at that time), while a deed of gift is weaker (no investigation occurred at the time).","tags":["property_practice","ch4","4.2.1 Root of Title"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"4.2.2 Compulsory First Registration","cards":[{"id":"PP_0037","type":"A","question":"From what date did compulsory first registration of title begin in England and Wales, and what is its significance for title investigation?","answer":"1 December 1990 — any triggering event (e.g. a transfer) after that date should have led to first registration, so the buyer's solicitor must check no such event has occurred since the root of title without registration following.","tags":["property_practice","ch4","4.2.2 Compulsory First Registration"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0038","type":"D","question":"What must a buyer's solicitor do if a conveyance in the chain of unregistered title shows a different name for the seller (e.g. 'Jane Brown' vs current 'Jane Smith')?","answer":"Treat this as a break in the chain and obtain evidence of the change (e.g. a marriage certificate) — they must not simply proceed without resolving the discrepancy.","tags":["property_practice","ch4","4.2.2 Compulsory First Registration"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0039","type":"A","question":"Under what statute can a buyer safely take a conveyance of unregistered land from a surviving joint tenant after a co-owner's death?","answer":"The Law of Property (Joint Tenants) Act 1964, provided there is no evidence that the joint tenancy was severed before death; the buyer's solicitor should obtain the death certificate as evidence.","tags":["property_practice","ch4","4.2.2 Compulsory First Registration"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]}]},{"id":"ch5","title":"5 . Searches and Enquiries","subchapters":[{"title":"5.1 Purpose and Timing","cards":[{"id":"PP_0041","type":"D","question":"Why can either party withdraw penalty-free if a search reveals a problem before exchange?","answer":"Because the contract is not yet legally binding before exchange of contracts — searches are run precisely so the buyer can decide whether to proceed before becoming bound.","tags":["property_practice","ch5","5.1 Purpose and Timing"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"5.2.1 Local Search","cards":[{"id":"PP_0042","type":"A","question":"What does a Tree Preservation Order (TPO) restrict, and what is the consequence of breach?","answer":"It restricts lopping or felling of a protected tree without local authority consent; breach is a criminal offence with an unlimited fine, and TPO entries appear on the Local Land Charges Register.","tags":["property_practice","ch5","5.2.1 Local Search"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0043","type":"C","question":"Distinguish the local land charges register from the (unregistered) land charges register.","answer":"The local land charges register is searched by the buyer's solicitor as a practical pre-contract search of the local authority, revealing financial/planning/listed-building charges. The land charges register (relevant to Land Law) is searched against unregistered estate owners' names back to 1926 to investigate title to unregistered land and reveal third-party equitable interests — the two sound alike but are entirely different registers.","tags":["property_practice","ch5","5.2.1 Local Search"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"5.2.3 Environmental Search","cards":[{"id":"PP_0046","type":"D","question":"Why are landowners liable for contaminated land clean-up costs even if they did not cause the contamination?","answer":"Liability attaches to current ownership of the land, not to historic causation — this is why an environmental search is run in every case, revealing current/former land use.","tags":["property_practice","ch5","5.2.3 Environmental Search"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"5.3 Transaction-Specific Searches","cards":[{"id":"PP_0044","type":"E","question":"When is a chancel liability search mandatory versus merely recommended?","answer":"Mandatory if title is unregistered; recommended if title is registered and has not been transferred since 13 October 2013. The search reveals an ancient liability to contribute to upkeep of a local church chancel — the usual remedy if a risk is found is indemnity insurance.","tags":["property_practice","ch5","5.3 Transaction-Specific Searches"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0045","type":"A","question":"What does a bankruptcy search reveal, and when is it run?","answer":"Pending or actual bankruptcy orders against the buyer, run where the buyer is mortgaging the property; results must be reported to the lender, since a bankruptcy finding will likely cause the transaction to fail.","tags":["property_practice","ch5","5.3 Transaction-Specific Searches"],"source":"Property_Practice_SQE_Notes.pdf","note":""},{"id":"PP_0048","type":"A","question":"From what date should a land charges search against unregistered estate owners typically run?","answer":"Back to 1926, unless reliable prior search results already exist in the epitome of title.","tags":["property_practice","ch5","5.3 Transaction-Specific Searches"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"5.7 Raising Enquiries","cards":[{"id":"PP_0049","type":"D","question":"What is the consequence of exchanging contracts before all enquiries have been satisfactorily answered?","answer":"The buyer generally cannot withdraw penalty-free post-exchange even if the issue later comes to light, absent misrepresentation by the seller — so the buyer's solicitor should not proceed to exchange until satisfied with all replies.","tags":["property_practice","ch5","5.7 Raising Enquiries"],"source":"Property_Practice_SQE_Notes.pdf","note":""}]},{"title":"5.7.2 Commercial Equivalent — CPSE","cards":[{"id":"PP_0047","type":"A","question":"What is the commercial equivalent of the Property Information Form?","answer":"The Commercial Property Standard Enquiries (CPSE), which are more comprehensive than the PIF, covering bo
